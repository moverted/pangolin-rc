name = "pangolin-rc"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[[d1_databases]]
binding = "DB"
database_name = "pangolin-rc"
database_id = "4bd25737-94c1-4da3-b54a-b28d467ef505"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "RAW_BUCKET"
bucket_name = "pangolin-rc-payloads"

[[kv_namespaces]]
binding = "ACCESS_KV"
id = "aea02943b81941a698a1bbbc5c78228d"

[durable_objects]
bindings = [
  { name = "RESOURCE_DO", class_name = "ResourceCoordinator" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ResourceCoordinator"]

[[queues.producers]]
binding = "PROCESS_QUEUE"
queue = "pangolin-rc-processing"

[[queues.producers]]
binding = "EVENTS_QUEUE"
queue = "pangolin-rc-events"

[[queues.consumers]]
queue = "pangolin-rc-processing"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[ai]
binding = "AI"

# Bug-report email notifications. Unrestricted (no destination_address) so the
# Worker deploys without a verified-destination check; at runtime Email Routing
# only delivers to a verified destination, so sends no-op (caught) until
# edward.m.willett@gmail.com is verified as an Email Routing destination on
# pangolinrc.com. See the bug-report handler in src/index.ts.
[[send_email]]
name = "BUG_EMAIL"

# Inbound Airtable → D1 watch sync. Every 2 minutes; no-op until AIRTABLE_* set.
[triggers]
crons = ["*/2 * * * *"]
