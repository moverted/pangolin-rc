<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=overlays-content, viewport-fit=cover">
  <title>pangolinRC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a14;
      height: 100dvh; overflow: hidden; user-select: none;
      /* WKWebView (Capacitor): no rubber-band bounce when dragging the wheel/cube */
      overscroll-behavior: none; position: fixed; inset: 0; width: 100%;
      background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* Option A: the whole composition lives in #app, which rotates in place to
       match device orientation. A transform on #app also makes its position:fixed
       children (controls, overlays, hint) anchor to #app rather than the screen. */
    #app {
      position: fixed; left: 50%; top: 50%;
      width: 100%; height: 100%;
      transform-origin: 50% 50%; transform: translate(-50%, -50%);
    }
    #canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      cursor: grab; touch-action: none;
      -webkit-touch-callout: none;   /* no long-press callout on the cube drag surface */
      transition: opacity 0.25s ease;   /* fade the cube out when a face is open */
    }
    #canvas:active { cursor: grabbing; }


    /* ── pinch hint (free mode) ── */
    #pinch-hint {
      position: fixed;
      bottom: 196px; left: 0; right: 0;
      text-align: center;
      font-family: 'Comic Neue', cursive;
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      pointer-events: none;
      opacity: 1; transition: opacity 0.35s;
    }
    #pinch-hint.hide { opacity: 0; }

    /* ── episode face overlay ── */
    .face-overlay {
      position: fixed; inset: 0;
      z-index: 20;
      opacity: 0; pointer-events: none;
      overflow: visible;
    }
    .face-overlay iframe {
      position: absolute; top: 0; left: 0;
      width: 480px; height: 480px;
      border: none;
      transform-origin: 0 0;
    }

    /* ── media controls (Fire TV remote) — warm theme, matches the faces ── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 30;
      /* raised bottom so the wheel clears the browser's URL bar; in the Capacitor
         app max() keeps it clear of the home indicator instead (safe-area inset) */
      padding: 20px 24px max(80px, calc(env(safe-area-inset-bottom, 0px) + 56px));
      background: linear-gradient(to top, rgba(12,9,7,0.97) 55%, transparent);
      display: flex; flex-direction: column; gap: 14px; justify-content: center; align-items: center;
    }
    #media-controls { display: flex; gap: 32px; align-items: center; }

    /* ── iPod-style click wheel ── */
    #wheel {
      position: relative; width: 258px; height: 258px;
      touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;   /* no long-press callout on the wheel */
    }
    #wheel .wheel-ring {
      position: absolute; inset: 0; border-radius: 50%; cursor: pointer;
      background:
        radial-gradient(closest-side, rgba(0,0,0,0) 36%, rgba(0,0,0,0.0) 37%,
          rgba(34,28,22,0.96) 38%, rgba(24,20,16,0.96) 100%);
      border: 1px solid rgba(240,169,59,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 0 22px rgba(0,0,0,0.55), 0 8px 22px rgba(0,0,0,0.5);
    }
    #wheel .wheel-ring:active { box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 0 30px rgba(0,0,0,0.6), 0 8px 22px rgba(0,0,0,0.5); }
    #wheel .wlbl {
      position: absolute; pointer-events: none; text-align: center;
      font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 9.5px; font-weight: 600;
      letter-spacing: 0.06em; line-height: 1.25; color: rgba(240,169,59,0.92);
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    #wheel .wlbl.top   { top: 12px; left: 50%; transform: translateX(-50%); }
    #wheel .wlbl.left  { left: 13px; top: 50%; transform: translateY(-50%); }
    #wheel .wlbl.right { right: 13px; top: 50%; transform: translateY(-50%); }
    #wheel .wheel-center {
      position: absolute; left: 50%; top: 50%; width: 35%; height: 35%; transform: translate(-50%,-50%);
      border-radius: 50%; cursor: pointer;
      background: linear-gradient(135deg, #2c241b, #19140f);
      border: 1px solid rgba(240,169,59,0.22);
      box-shadow: 0 2px 8px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
      color: rgba(240,169,59,0.92); font-family: 'JetBrains Mono', monospace, sans-serif;
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.1em;
      display: flex; align-items: center; justify-content: center;
    }
    #wheel .wheel-center:active { transform: translate(-50%,-50%) scale(0.94); }
    /* mic state: the centre becomes the reflection mic while a comfort comment waits */
    #wheel .wheel-center.mic { font-size: 17px; letter-spacing: 0; color: #f0a93b; border-color: rgba(240,169,59,0.55); }
    /* ── transport buttons at the wheel's cardinal points: BACK top, play/pause
       bottom, rw left, ff right. Printed on the ring like iPod labels, but live
       buttons. Shown ONLY while the remote points at a real device — #wheel.rc,
       toggled by cube_shell.js (updateWheelRemote). ── */
    #wheel .wbtn {
      display: none; position: absolute; z-index: 2;
      width: 48px; height: 48px; padding: 0; border: 0; border-radius: 50%;
      background: transparent; cursor: pointer; -webkit-tap-highlight-color: transparent;
      color: rgba(240,169,59,0.92); font-family: 'JetBrains Mono', monospace, sans-serif;
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
      align-items: center; justify-content: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    #wheel.rc .wbtn { display: flex; }
    #wheel .wbtn:active { transform: scale(0.88); color: #f3ebe0; }
    #wheel .wbtn.sent { color: #e89f3d; }
    #wheel .wbtn.top    { top: 2px;    left: 50%; margin-left: -24px; }
    #wheel .wbtn.bottom { bottom: 2px; left: 50%; margin-left: -24px; }
    #wheel .wbtn.left   { left: 2px;   top: 50%;  margin-top: -24px; }
    #wheel .wbtn.right  { right: 2px;  top: 50%;  margin-top: -24px; }
    /* screen-corner remote chrome: axis toggle (bottom-left) + TV home
       (bottom-right), flanking the wheel at the edges of the console band.
       Same device-mode gating as the wheel buttons (.show from cube_shell.js);
       hidden while the console keyboard swaps in. */
    .wcorner {
      display: none; position: absolute; z-index: 31;
      bottom: max(84px, calc(env(safe-area-inset-bottom, 0px) + 60px));
      width: 46px; height: 46px; padding: 0; border-radius: 50%;
      border: 1px solid rgba(240,169,59,0.28); background: rgba(33,26,19,0.85);
      color: rgba(240,169,59,0.92); font-family: 'JetBrains Mono', monospace, sans-serif;
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
      align-items: center; justify-content: center; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .wcorner.show { display: flex; }
    .wcorner:active { transform: scale(0.9); color: #f3ebe0; }
    .wcorner.sent { border-color: #e89f3d; color: #e89f3d; }
    .wcorner.off  { opacity: 0.55; }   /* axis toggle in ⊘ — ring sends nothing */
    #wbtn-axis { left: 14px; font-size: 18px; font-weight: 400; }
    #wbtn-home { right: 14px; }
    #controls:has(#console-kb.show) .wcorner { display: none; }

    /* ── console keyboard: swaps in for the wheel while typing ── */
    #console-kb {
      display: none; width: min(440px, 96vw); min-height: 258px;
      flex-direction: column; gap: 7px; justify-content: center;
      touch-action: manipulation; -webkit-user-select: none; user-select: none;
    }
    #console-kb.show { display: flex; }
    #console-kb .kb-row { display: flex; gap: 6px; justify-content: center; }
    #console-kb .kb-key {
      flex: 1 1 0; max-width: 44px; height: 46px; padding: 0;
      border-radius: 9px; border: 1px solid rgba(240,169,59,0.22);
      background: linear-gradient(135deg, #2c241b, #19140f);
      color: #f3ebe0; font-family: 'JetBrains Mono', monospace, sans-serif;
      font-size: 15px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #console-kb .kb-key:active { transform: translateY(1px); background: #3a2f22; }
    #console-kb .kb-key.wide  { max-width: 64px; font-size: 13px; color: rgba(240,169,59,0.92); }
    #console-kb .kb-key.space { max-width: none; flex: 4 1 0; }
    #console-kb .kb-key.on    { background: #f0a93b; color: #1a1206; border-color: #8a5a10; }
    #console-kb .kb-key.enter { color: #f0a93b; }

    /* ── Pierre mic: the designed mic, centered in the console-chrome row ── */
    #pierre-mic {
      display: none; position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 352px; z-index: 31;
      width: 46px; height: 46px; border-radius: 50%;
      border: 2px solid #f0a93b; background: rgba(240,169,59,0.2); color: #f0a93b;
      align-items: center; justify-content: center; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, box-shadow 0.15s;
    }
    #pierre-mic.show { display: flex; }
    #pierre-mic:active { transform: translateX(-50%) scale(0.94); }
    #pierre-mic.rec { background: #f0a93b; color: #1a1206; border-color: #8a5a10;
      box-shadow: 0 0 18px rgba(240,169,59,0.8); }
    #pierre-mic.rec svg, #pierre-mic.busy svg { display: none; }
    #pierre-mic #pierre-mic-count { display: none;
      font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 13px; font-weight: 700; }
    #pierre-mic.rec #pierre-mic-count, #pierre-mic.busy #pierre-mic-count { display: block; }

    /* device + streamer indicator: what the play button launches, and where.
       Device comes from the Profile picker (pg_device); streamer from the show
       the Watch face has loaded. Tap to jump to the Profile device picker. */
    /* Console chrome flanks the click wheel: device indicator upper-LEFT, with the
       streamer stacked under it; the floating cube sits upper-RIGHT. */
    #device-chip {
      display: none; position: absolute; left: 16px; bottom: 352px; z-index: 31;
      flex-direction: column; align-items: flex-start; gap: 3px; max-width: 42vw;
      padding: 7px 11px; border-radius: 12px;
      border: 1px solid #3a2f22; background: rgba(33,26,19,0.85);
      font-family: 'Comic Neue', cursive; font-size: 12px; font-weight: 700;
      letter-spacing: 0.02em; line-height: 1.1; white-space: nowrap;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, border-color 0.15s;
    }
    #device-chip.show { display: inline-flex; }
    #device-chip:active { border-color: #e89f3d; }
    #device-chip .dc-row { display: inline-flex; align-items: center; gap: 6px; }
    #device-chip .dc-dev { color: #f3ebe0; }
    #device-chip .dc-svc { color: #e89f3d; font-size: 11px; }
    #device-chip.dimmed { opacity: 0.78; }

    /* floating cube — back to cube nav, upper-right of the wheel */
    #wheel-cube {
      display: none; position: absolute; right: 16px; bottom: 352px; z-index: 31;
      width: 46px; height: 46px; border: 0; background: rgba(10,12,16,0.55);
      border-radius: 13px; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      cursor: pointer; opacity: 0.85;
      align-items: center; justify-content: center; perspective: 120px;
      -webkit-tap-highlight-color: transparent; transition: transform 0.12s ease, opacity 0.15s ease;
    }
    #wheel-cube.show { display: flex; }
    #wheel-cube:active { transform: scale(0.9); }
    #wheel-cube .wc-cube { position: relative; width: 20px; height: 20px; transform-style: preserve-3d;
      transform: rotateX(-22deg) rotateY(-38deg); animation: wcspin 11s linear infinite; }
    @keyframes wcspin { from { transform: rotateX(-22deg) rotateY(0deg); } to { transform: rotateX(-22deg) rotateY(360deg); } }
    #wheel-cube .wc-face { position: absolute; width: 20px; height: 20px; box-sizing: border-box;
      border: 1.5px solid #f0a93b; background: rgba(240,169,59,0.12); }
    #wheel-cube .wc-front  { transform: translateZ(10px);                 background: rgba(240,169,59,0.16); }
    #wheel-cube .wc-back   { transform: rotateY(180deg) translateZ(10px); background: rgba(240,169,59,0.08); }
    #wheel-cube .wc-right  { transform: rotateY(90deg)  translateZ(10px); background: rgba(240,169,59,0.06); }
    #wheel-cube .wc-left   { transform: rotateY(-90deg) translateZ(10px); background: rgba(240,169,59,0.10); }
    #wheel-cube .wc-top    { transform: rotateX(90deg)  translateZ(10px); background: rgba(240,169,59,0.24); }
    #wheel-cube .wc-bottom { transform: rotateX(-90deg) translateZ(10px); background: rgba(240,169,59,0.04); }

    .media-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: 1px solid #3a2f22;
      background: #211a13;
      color: #a7967f;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, background 0.15s, border-color 0.15s, color 0.15s;
    }
    .media-btn:active { transform: scale(0.88); background: #2b2218; color: #f3ebe0; }
    .media-btn.primary {
      width: 68px; height: 68px;
      border: none;
      background: radial-gradient(circle at 35% 30%, #f2b457, #e89f3d);
      color: #1a130b;
      box-shadow: 0 10px 26px -12px rgba(232,159,61,0.7);
    }
    .media-btn.primary:active { transform: scale(0.92); filter: brightness(1.06); }
    .media-btn.sent { border-color: #e89f3d; color: #e89f3d; }
    /* greyed when the current show's streamer can't be deep-linked */
    .media-btn.dimmed { opacity: 0.4; filter: grayscale(0.85); box-shadow: none; cursor: default; }
    .media-btn.dimmed:active { transform: none; filter: grayscale(0.85); }

    /* ── second-screen captions (top quarter) ──────────────────────────
       Mirrors #controls at the top: shown only when the show is playing on
       another device (not the phone), so the phone is free to caption it. */
    #caption {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 40;
      /* top inset keeps caption text clear of the notch / Dynamic Island in the app */
      padding: calc(env(safe-area-inset-top, 0px) + 26px) 22px 30px;
      background: linear-gradient(to bottom, rgba(12,9,7,0.97) 52%, transparent);
      display: none; flex-direction: column; align-items: center; gap: 9px;
      pointer-events: none;   /* let taps fall through the gradient; the align bar re-enables itself */
    }
    #caption.show { display: flex; }
    #caption-text {
      min-height: 2.6em; max-width: 88vw;
      font-family: 'Comic Neue', cursive; font-weight: 700;
      font-size: 18px; line-height: 1.3; letter-spacing: 0.01em;
      color: #f3ebe0; text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.12s;
    }
    #caption-text.gap { opacity: 0.0; }   /* nothing to show between cues */
    /* status row: source badge + drift hint + align handle */
    #caption-bar {
      display: flex; align-items: center; gap: 10px;
      pointer-events: auto;
      font-family: 'Comic Neue', cursive; font-size: 11px; font-weight: 700;
      letter-spacing: 0.02em; color: #a7967f;
    }
    #caption-bar .cap-src {
      padding: 2px 9px; border-radius: 999px;
      border: 1px solid #3a2f22; background: rgba(33,26,19,0.85);
      white-space: nowrap;
    }
    #caption-bar .cap-src.mic { color: #e89f3d; border-color: #6b4e1e; }
    #cap-align {
      -webkit-appearance: none; appearance: none;
      width: 42vw; max-width: 240px; height: 22px; background: transparent;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #cap-align::-webkit-slider-runnable-track { height: 3px; border-radius: 999px; background: #3a2f22; }
    #cap-align::-moz-range-track { height: 3px; border-radius: 999px; background: #3a2f22; }
    #cap-align::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; margin-top: -6px;
      width: 15px; height: 15px; border-radius: 50%;
      background: #e89f3d; border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    #cap-align::-moz-range-thumb {
      width: 15px; height: 15px; border-radius: 50%;
      background: #e89f3d; border: none;
    }
    #cap-align-lbl { white-space: nowrap; min-width: 3.5em; text-align: left; }
    /* co-viewing: a friend's recorded comment, surfaced as its marker passes.
       Sits under the caption line; the transcript shows even with audio muted. */
    #cap-coview {
      display: none; max-width: 88vw; margin-top: 2px;
      align-items: center; gap: 8px;
      pointer-events: auto;
      font-family: 'Comic Neue', cursive; font-size: 13px; font-weight: 700;
      color: #f3ebe0; text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }
    #cap-coview.show { display: flex; }
    #cap-coview .cv-dot {
      flex: none; width: 7px; height: 7px; border-radius: 50%;
      background: #6cc070; box-shadow: 0 0 6px rgba(108,192,112,0.8);
    }
    #cap-coview .cv-who { color: #6cc070; white-space: nowrap; }
    #cap-coview .cv-text {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── "rotate to use this face" (keyboard faces held sideways) ── */
    #rotate-msg {
      position: fixed; inset: 0; z-index: 80; display: none;
      align-items: center; justify-content: center; text-align: center; padding: 30px;
      background: rgba(8,8,12,.93); color: #e89f3d;
      font-family: 'Comic Neue', cursive; font-weight: 700; font-size: 19px; line-height: 1.6; letter-spacing: .03em;
    }
    #rotate-msg.show { display: flex; }

    /* ── DEMO band (shown to waitlisted visitors) ── */
    #demoband { position: fixed; top: 0; left: 0; right: 0; z-index: 150; display: none;
      align-items: center; justify-content: center; gap: 12px;
      background: #e89f3d; color: #1a130b; font-family: system-ui, sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 14px 8px; }
    #demoband.show { display: flex; }
    #demoband button { background: #1a130b; color: #e89f3d; border: none; border-radius: 999px;
      padding: 5px 11px; font-size: 11px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    /* ── persistent bug reporter ── */
    #bug-btn {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      right: calc(env(safe-area-inset-right, 0px) + 8px);
      z-index: 9999;
      width: 34px; height: 34px; padding: 0;
      border: none; border-radius: 50%;
      background: rgba(20,16,12,0.45);
      -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
      font-size: 18px; line-height: 34px; text-align: center;
      cursor: pointer; opacity: 0.55;
      transition: opacity .2s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    #bug-btn:active { transform: scale(0.9); opacity: 1; }

    #bug-modal {
      position: fixed; inset: 0; z-index: 10000; display: none;
      align-items: center; justify-content: center; padding: 20px;
      background: rgba(0,0,0,0.6);
      -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
    }
    #bug-modal.show { display: flex; }
    #bug-card {
      width: 100%; max-width: 360px; box-sizing: border-box;
      background: #16120e; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      font-family: 'Comic Neue', cursive; color: #f3ede4;
    }
    #bug-card h3 { margin: 0 0 4px; font-size: 17px; }
    #bug-card p.sub { margin: 0 0 12px; font-size: 12px; opacity: 0.6; }
    #bug-shot {
      width: 100%; max-height: 180px; object-fit: contain; display: none;
      border-radius: 8px; background: #000; margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #bug-shot-note { display: none; font-size: 11px; opacity: 0.5; margin: 0 0 12px; }
    #bug-note {
      width: 100%; box-sizing: border-box; min-height: 84px; resize: vertical;
      border-radius: 10px; padding: 10px 12px; margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04); color: #fff;
      font-family: inherit; font-size: 15px;
    }
    #bug-actions { display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
    /* admin-only Send-to-Claude toggle; hidden until the opener confirms admin */
    #bug-claude-row { display: none; margin-right: auto; align-items: center; gap: 6px;
      font-size: 12.5px; color: #f3ede4; opacity: 0.85; cursor: pointer; user-select: none; }
    #bug-claude-row input { width: 15px; height: 15px; accent-color: #FF6B35; cursor: pointer; }
    #bug-actions button {
      border: none; border-radius: 999px; padding: 9px 18px;
      font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #bug-cancel { background: rgba(255,255,255,0.1); color: #f3ede4; }
    #bug-send { background: #FF6B35; color: #fff; }
    #bug-send:disabled { opacity: 0.5; }
  </style>
</head>
<body>

<div id="app">
<canvas id="canvas"></canvas>

<div id="demoband"><span>DEMO &middot; you're on the waitlist</span><button id="textteam">Text the team</button></div>

<!-- second-screen captions: top quarter, shown only when watching on another device -->
<div id="caption">
  <div id="caption-text"></div>
  <div id="caption-bar">
    <span class="cap-src" id="cap-src">CC</span>
    <input type="range" id="cap-align" min="-30" max="30" step="0.5" value="0" aria-label="Align captions">
    <span id="cap-align-lbl">in sync</span>
  </div>
  <div id="cap-coview">
    <span class="cv-dot"></span>
    <span class="cv-who"></span>
    <span class="cv-text"></span>
  </div>
</div>


<div id="pinch-hint">double-tap to open</div>


<div id="controls">
  <div id="device-chip" role="button" aria-label="Playback device — tap to change"></div>

  <!-- floating cube (back to cube nav), upper-right of the wheel -->
  <button id="wheel-cube" aria-label="Back to cube">
    <span class="wc-cube">
      <span class="wc-face wc-front"></span><span class="wc-face wc-back"></span>
      <span class="wc-face wc-right"></span><span class="wc-face wc-left"></span>
      <span class="wc-face wc-top"></span><span class="wc-face wc-bottom"></span>
    </span>
  </button>

  <!-- iPod-style click wheel: the ring scrolls the open face; the four card
       actions (WATCH top / SHARE left / STOP right / SELECT center) drive the
       open show by synthetically clicking the WATCH face's own buttons. Replaces
       the old playback remote (kept hidden below so existing btn-play JS holds). -->
  <div id="wheel" aria-label="Control wheel">
    <div class="wheel-ring" id="wheelRing"></div>
    <button class="wheel-center" id="wheelCenter" aria-label="Select">SELECT</button>
    <!-- transport buttons (cardinal points) — visible only while a real device is
         selected (#wheel.rc). They sit above the ring in the stack, so a tap lands
         on the button and never starts a ring-scroll. Wired in cube_shell.js. -->
    <button class="wbtn top" id="wbtn-back" aria-label="Back">BACK</button>
    <button class="wbtn left" id="wbtn-rw" aria-label="Rewind / step back">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
      </svg>
    </button>
    <button class="wbtn right" id="wbtn-ff" aria-label="Fast forward / step forward">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
      </svg>
    </button>
    <button class="wbtn bottom" id="wbtn-play" aria-label="Play / Pause">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M3 5v14l11-7z"/><path d="M16 5h2.6v14H16zM20.4 5H23v14h-2.6z"/>
      </svg>
    </button>
  </div>

  <!-- screen-corner remote chrome (device mode only): the axis toggle flips
       what the ring drives on the TV (↕ rows / ↔ within a row — clickwheel.js
       owns it); HOME goes to the TV's home screen. -->
  <button class="wcorner" id="wbtn-axis" aria-label="Ring direction">&#8597;</button>
  <button class="wcorner" id="wbtn-home" aria-label="TV home">HOME</button>

  <!-- Console keyboard: replaces the wheel while a text field on the open face
       holds focus. Face fields are tagged inputmode="none" so the OS keyboard
       never rises (and never pans the cube); the console types for itself.
       Keys are built and driven by cube_shell.js. -->
  <div id="console-kb" aria-label="Keyboard"></div>

  <!-- Pierre mic: voice entry for the chat face. Tap → 10s capture (tap again to
       stop early); the transcript lands in Pierre's input, ready to edit + send.
       Sits centered between the device chip and the back-cube; visible only while
       the console keyboard is up on PIERRE (never with the wheel). Driven by cube_shell.js. -->
  <button id="pierre-mic" aria-label="Record a thought (10 seconds)">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
      <line x1="12" y1="19" x2="12" y2="23"></line>
      <line x1="8" y1="23" x2="16" y2="23"></line>
    </svg>
    <span id="pierre-mic-count"></span>
  </button>

  <div id="media-controls" style="display:none">
    <button class="media-btn" id="btn-rw" aria-label="Rewind">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
      </svg>
    </button>
    <button class="media-btn primary" id="btn-play" aria-label="Play / Pause">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <button class="media-btn" id="btn-ff" aria-label="Fast Forward">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
      </svg>
    </button>
    <button class="media-btn" id="btn-back" aria-label="Back">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
    </button>
  </div>
</div>

<!-- shown on keyboard faces (Pierre / any open keyboard) when held in landscape -->
<div id="rotate-msg"><span>&#8635;<br>rotate to use this face</span></div>

</div><!-- #app -->

<!-- Persistent bug reporter. Lives OUTSIDE #app so it stays pinned to the screen
     corner across every view (the cube + every open face iframe). data-html2canvas-ignore
     keeps the widget out of its own screenshot. -->
<button id="bug-btn" data-html2canvas-ignore aria-label="Report a bug" title="Report a bug"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2l1.88 1.88"/><path d="M14.12 3.88L16 2"/><path d="M9 7.13v-1a3 3 0 1 1 6 0v1"/><path d="M18 11a4 4 0 0 0-4-4h-4a4 4 0 0 0-4 4v3c0 3.3 2.7 6 6 6s6-2.7 6-6z"/><path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/><path d="M6 13H2"/><path d="M3 21c0-2.1 1.7-3.9 3.8-4"/><path d="M20.97 5c0 2.1-1.6 3.8-3.5 4"/><path d="M22 13h-4"/><path d="M17.2 17c2.1.1 3.8 1.9 3.8 4"/></svg></button>
<div id="bug-modal" data-html2canvas-ignore>
  <div id="bug-card">
    <h3>Report a bug</h3>
    <p class="sub" id="bug-where">What went wrong?</p>
    <img id="bug-shot" alt="screenshot preview">
    <div id="bug-shot-note">Couldn't grab a screenshot — your note will still send.</div>
    <textarea id="bug-note" placeholder="What were you doing? What did you expect?"></textarea>
    <div id="bug-actions">
      <!-- admin-only: queue this bug for an automated Claude Code pass -->
      <label id="bug-claude-row"><input type="checkbox" id="bug-claude"> Send to Claude</label>
      <button id="bug-cancel" type="button">Cancel</button>
      <button id="bug-send" type="button">Send</button>
    </div>
  </div>
</div>

<!-- Cube app, split into two native ES modules (no bundler / no build step):
     cube_shell.js — shell + off-cube layer: owns face-focus state, the cube, the
       six face iframes + their projection, and every off-cube UI except the wheel.
     clickwheel.js — the iPod-style click-wheel widget ONLY; imports the CubeShell
       interface (getFocus / getActiveDoc / FACE_INDEX) from cube_shell.js.
     cube_shell.js is listed first so its exports exist when clickwheel.js runs. -->
<script type="module" src="/cube_shell.js"></script>
<script type="module" src="/clickwheel.js"></script>
</body>
</html>
