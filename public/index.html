<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>pangolinRC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a14;
      height: 100dvh; overflow: hidden; user-select: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    #canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      cursor: grab; touch-action: none;
    }
    #canvas:active { cursor: grabbing; }

    /* ── face info strip (locked state only) ── */
    #face-info {
      position: fixed;
      bottom: 128px; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      pointer-events: none;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.35s, transform 0.35s;
    }
    #face-info.show { opacity: 1; transform: translateY(0); }

    #face-name {
      font-family: 'Bangers', cursive;
      font-size: 32px; letter-spacing: 0.2em; text-transform: uppercase;
      color: #fff;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
    }
    #face-desc {
      font-family: 'Comic Neue', cursive;
      font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* ── pinch hint (free mode) ── */
    #pinch-hint {
      position: fixed;
      bottom: 128px; left: 0; right: 0;
      text-align: center;
      font-family: 'Comic Neue', cursive;
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      pointer-events: none;
      opacity: 1; transition: opacity 0.35s;
    }
    #pinch-hint.hide { opacity: 0; }

    /* ── episode face overlay ── */
    #episode-overlay {
      position: fixed; inset: 0;
      z-index: 20;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    #episode-overlay.active { opacity: 1; pointer-events: all; }
    #episode-overlay iframe {
      position: absolute;
      border: none; display: block;
    }

    /* ── media controls (Fire TV remote) ── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 30;
      padding: 20px 24px 44px;
      background: linear-gradient(to top, rgba(10,10,20,0.97) 60%, transparent);
      display: flex; justify-content: center; align-items: center;
    }
    #media-controls { display: flex; gap: 32px; align-items: center; }

    .media-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.55);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, background 0.15s;
    }
    .media-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.14); }
    .media-btn.primary {
      width: 68px; height: 68px;
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
    }
    .media-btn.primary:active { background: rgba(255,255,255,0.2); }
    .media-btn.sent { border-color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="face-info">
  <div id="face-name">SHOW</div>
  <div id="face-desc">The main event</div>
</div>

<div id="pinch-hint">pinch to lock</div>

<div id="episode-overlay">
  <iframe id="episode-frame" src="/pangolin_episodes_face_v5.html"></iframe>
</div>

<div id="controls">
  <div id="media-controls">
    <button class="media-btn" id="btn-rw" aria-label="Rewind">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
      </svg>
    </button>
    <button class="media-btn primary" id="btn-play" aria-label="Play / Pause">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <button class="media-btn" id="btn-ff" aria-label="Fast Forward">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
      </svg>
    </button>
    <button class="media-btn" id="btn-back" aria-label="Back">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
    </button>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js';

await document.fonts.ready;

// ─── face definitions ──────────────────────────────────────────────────────
// BoxGeometry material order: 0=+X, 1=-X, 2=+Y, 3=-Y, 4=+Z(front), 5=-Z(back)
const FACES = [
  { label: 'EPISODE', bg: '#FF6B35', fg: '#fff',    sub: "What's on right now"  },
  { label: 'FEED',    bg: '#22BB44', fg: '#fff',    sub: 'The latest drops'      },
  { label: 'PIERRE',  bg: '#BB00FF', fg: '#FFE600', sub: 'Your host'             },
  { label: 'PROFILE', bg: '#FFD600', fg: '#000',    sub: "That's you"            },
  { label: 'SHOW',    bg: '#EE1122', fg: '#fff',    sub: 'The main event'        },
  { label: 'JOIN',    bg: '#00BBEE', fg: '#000',    sub: 'Get in on it'          },
];

// Euler to bring each face directly toward camera (+Z)
const SNAP_EULER = [
  new THREE.Euler(0,           -Math.PI / 2, 0),
  new THREE.Euler(0,            Math.PI / 2, 0),
  new THREE.Euler( Math.PI / 2, 0,           0),
  new THREE.Euler(-Math.PI / 2, 0,           0),
  new THREE.Euler(0,            0,           0),
  new THREE.Euler(0,            Math.PI,     0),
];

// ─── canvas face textures (no baked borders — faces connect seamlessly) ──
function makeTex(face) {
  const S = 512;
  const c = document.createElement('canvas');
  c.width = c.height = S;
  const ctx = c.getContext('2d');

  // Solid bg
  ctx.fillStyle = face.bg;
  ctx.fillRect(0, 0, S, S);

  // Ben-Day dots
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  for (let x = 8; x < S; x += 20)
    for (let y = 8; y < S; y += 20) {
      ctx.beginPath(); ctx.arc(x, y, 6.5, 0, Math.PI * 2); ctx.fill();
    }

  // Halftone ring — larger dots near edges fade to hint at depth without a border
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let x = 0; x < S; x += 20)
    for (let y = 0; y < S; y += 20) {
      const dx = x - S / 2, dy = y - S / 2;
      const dist = Math.sqrt(dx * dx + dy * dy) / (S / 2);
      const r = 3 + dist * 8;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    }

  // Label
  const sz = face.label.length > 5 ? 86 : 106;
  ctx.font = `${sz}px Bangers, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 10; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeText(face.label, S / 2, S / 2 - 14);
  ctx.fillStyle = face.fg;
  ctx.fillText(face.label, S / 2, S / 2 - 14);

  // Sub-label
  ctx.font = `bold 23px "Comic Neue", sans-serif`;
  ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.strokeText(face.sub, S / 2, S / 2 + 65);
  ctx.fillStyle = face.fg === '#fff' ? 'rgba(255,255,255,0.75)' : 'rgba(0,0,0,0.6)';
  ctx.fillText(face.sub, S / 2, S / 2 + 65);

  return new THREE.CanvasTexture(c);
}

// ─── three.js ──────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 0, 13);

// Stars
{
  const n = 1800, pos = new Float32Array(n * 3);
  for (let i = 0; i < n * 3; i++) pos[i] = (Math.random() - 0.5) * 280;
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g,
    new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, sizeAttenuation: true, transparent: true, opacity: 0.38 })
  ));
}

// Cube — one MeshBasicMaterial per face (flat/comic, no lighting needed)
const geo  = new THREE.BoxGeometry(1.8, 1.8, 1.8);
const mats = FACES.map(f => new THREE.MeshBasicMaterial({ map: makeTex(f) }));
const cube = new THREE.Mesh(geo, mats);
scene.add(cube);

// ─── interaction state ────────────────────────────────────────────────────
let locked     = false;
let activeFace = 4; // SHOW starts front

// Single-pointer drag
let dragging   = false;
let lastX = 0, lastY = 0, velX = 0, velY = 0;
let dragStartX = 0, dragStartY = 0;

// Multi-pointer pinch
const ptrs = new Map(); // pointerId → {x, y}
let pinchStartDist = 0;
let pinchTriggered = false; // prevent re-trigger until fingers lift

// Snap animation
let snapping  = false;
let snapQ     = new THREE.Quaternion();

// Camera target z
let camTargetZ = 13;

// Double-tap detection
let lastTapTime = 0;

// UI refs
const faceInfo  = document.getElementById('face-info');
const faceName  = document.getElementById('face-name');
const faceDesc  = document.getElementById('face-desc');
const pinchHint = document.getElementById('pinch-hint');

function showFaceInfo(fi) {
  faceName.textContent = FACES[fi].label;
  faceDesc.textContent = FACES[fi].sub;
  faceInfo.classList.add('show');
  pinchHint.classList.add('hide');
}
function hideFaceInfo() {
  faceInfo.classList.remove('show');
  pinchHint.classList.remove('hide');
  // swap hint text
  pinchHint.textContent = 'pinch to lock';
}

function nearestFace() {
  const fwd = new THREE.Vector3(0, 0, 1);
  const normals = [
    new THREE.Vector3( 1,0,0), new THREE.Vector3(-1,0,0),
    new THREE.Vector3( 0,1,0), new THREE.Vector3( 0,-1,0),
    new THREE.Vector3( 0,0,1), new THREE.Vector3( 0,0,-1),
  ];
  let best = 4, bestDot = -Infinity;
  normals.forEach((n, i) => {
    const d = n.clone().applyQuaternion(cube.quaternion).dot(fwd);
    if (d > bestDot) { bestDot = d; best = i; }
  });
  return best;
}

function snapToFace(fi) {
  activeFace = fi;
  snapQ.setFromEuler(SNAP_EULER[fi]);
  snapping = true;
}

function lock() {
  if (locked) return;
  locked = true;
  const fi = nearestFace();
  snapToFace(fi);
  camTargetZ = 4.6;
  showFaceInfo(fi);
  pinchHint.textContent = 'pinch to unlock';
  pinchHint.classList.remove('hide');
  if (fi === 0) {
    updateEpisodeBounds();
    episodeOverlay.classList.add('active');
  }
}

function unlock() {
  if (!locked) return;
  locked = false;
  camTargetZ = 13;
  hideFaceInfo();
  episodeOverlay.classList.remove('active');
  snapping = false; // release to free rotation
  velX = 0; velY = 0;
}

// ─── pointer events ───────────────────────────────────────────────────────
canvas.addEventListener('pointerdown', (e) => {
  canvas.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (ptrs.size === 2) {
    // Second finger down — start pinch tracking
    const [a, b] = [...ptrs.values()];
    pinchStartDist = Math.hypot(b.x - a.x, b.y - a.y);
    pinchTriggered = false;
    dragging = false; // cancel any single-finger drag
  } else if (ptrs.size === 1) {
    dragging = true;
    lastX = dragStartX = e.clientX;
    lastY = dragStartY = e.clientY;
    velX = velY = 0;
    snapping = false;
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!ptrs.has(e.pointerId)) return;
  const prev = ptrs.get(e.pointerId);
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (ptrs.size >= 2) {
    if (!pinchTriggered) {
      const [a, b] = [...ptrs.values()];
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      const scale = dist / pinchStartDist;
      if (!locked && scale > 1.22) {
        pinchTriggered = true;
        lock();
      } else if (locked && scale < 0.78) {
        pinchTriggered = true;
        unlock();
      }
    }
    return; // don't drag-rotate while two fingers are down
  }

  // Single-finger drag
  if (!dragging) return;
  const dx = e.clientX - prev.x;
  const dy = e.clientY - prev.y;
  velX = dx * 0.007;
  velY = dy * 0.007;

  if (!locked) {
    // Rotate around world axes so the direction never flips when upside-down
    const qH = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), velX);
    const qV = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), velY);
    cube.quaternion.premultiply(qH).premultiply(qV);
  }
});

canvas.addEventListener('pointerup', (e) => {
  const start = { x: dragStartX, y: dragStartY };
  ptrs.delete(e.pointerId);
  dragging = false;

  if (ptrs.size < 2) pinchTriggered = false;
  if (ptrs.size > 0) return;

  // Double-tap to toggle lock/unlock
  const tapDist = Math.hypot(e.clientX - start.x, e.clientY - start.y);
  if (tapDist < 16) {
    const now = performance.now();
    if (now - lastTapTime < 340) {
      lastTapTime = 0;
      if (locked) unlock(); else lock();
      return;
    }
    lastTapTime = now;
  }

  // Swipe navigation when locked
  if (locked) {
    const swipeDx = e.clientX - start.x;
    const swipeDy = e.clientY - start.y;
    if (Math.abs(swipeDx) > Math.abs(swipeDy) && Math.abs(swipeDx) > 38) {
      const next = swipeDx < 0
        ? (activeFace + 1) % 6
        : (activeFace + 5) % 6;
      activeFace = next;
      snapToFace(next);
      episodeOverlay.classList.remove('active');
      showFaceInfo(next);
      if (next === 0) {
        updateEpisodeBounds();
        episodeOverlay.classList.add('active');
      }
    }
  }
});

canvas.addEventListener('pointercancel', (e) => {
  ptrs.delete(e.pointerId);
  dragging = false;
  if (ptrs.size < 2) pinchTriggered = false;
});

// ─── episode overlay: project face 0 (+X) corners to screen each frame ──────
const episodeOverlay = document.getElementById('episode-overlay');
const episodeFrame   = document.getElementById('episode-frame');
// Face 0 (+X) local-space corners
const _epC = [
  new THREE.Vector3(0.9, -0.9, -0.9),
  new THREE.Vector3(0.9,  0.9, -0.9),
  new THREE.Vector3(0.9,  0.9,  0.9),
  new THREE.Vector3(0.9, -0.9,  0.9),
];
const _epW = new THREE.Vector3();
const _epP = new THREE.Vector3();

function updateEpisodeBounds() {
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  for (const c of _epC) {
    _epW.copy(c).applyQuaternion(cube.quaternion).add(cube.position);
    _epP.copy(_epW).project(camera);
    const sx = (_epP.x+1)/2*innerWidth,  sy = (1-_epP.y)/2*innerHeight;
    if(sx<x0)x0=sx; if(sx>x1)x1=sx; if(sy<y0)y0=sy; if(sy>y1)y1=sy;
  }
  const l=Math.round(x0),t_=Math.round(y0),w=Math.round(x1-x0),h=Math.round(y1-y0);
  if(episodeFrame._l!==l||episodeFrame._t!==t_||episodeFrame._w!==w||episodeFrame._h!==h){
    episodeFrame.style.left=l+'px'; episodeFrame.style.top=t_+'px';
    episodeFrame.style.width=w+'px'; episodeFrame.style.height=h+'px';
    episodeFrame._l=l; episodeFrame._t=t_; episodeFrame._w=w; episodeFrame._h=h;
  }
}

// ─── animation loop ───────────────────────────────────────────────────────
let t = 0;
(function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  if (snapping) {
    cube.quaternion.slerp(snapQ, 0.16);
    if (cube.quaternion.angleTo(snapQ) < 0.003) {
      cube.quaternion.copy(snapQ);
      snapping = false;
    }
  } else if (!locked && !dragging) {
    // Inertia + gentle auto-drift — same world-axis approach
    velX *= 0.94;
    velY *= 0.94;
    const qH = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), velX + 0.004);
    const qV = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), velY);
    cube.quaternion.premultiply(qH).premultiply(qV);
  }

  // Bob — settle to center when locked
  const targetY = locked ? 0 : Math.sin(t * 0.75) * 0.12;
  cube.position.y += (targetY - cube.position.y) * 0.08;

  // Smooth camera zoom
  camera.position.z += (camTargetZ - camera.position.z) * 0.07;

  renderer.render(scene, camera);
  if (episodeOverlay.classList.contains('active')) updateEpisodeBounds();
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Fire TV remote ───────────────────────────────────────────────────────
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8787'
  : 'https://pangolin-rc.edward-m-willett.workers.dev';

async function sendKey(cmd) {
  try {
    await fetch(`${API}/remote/cmd/${cmd}`, { method: 'POST' });
  } catch { /* ignore network errors */ }
}

function bindRemote(id, cmd) {
  const btn = document.getElementById(id);
  btn.addEventListener('click', () => {
    sendKey(cmd);
    btn.classList.add('sent');
    setTimeout(() => btn.classList.remove('sent'), 180);
  });
}

bindRemote('btn-rw',   'rw');
bindRemote('btn-play', 'play');
bindRemote('btn-ff',   'ff');
bindRemote('btn-back', 'back');

// ‹ back from episode face iframe
window.addEventListener('message', (e) => {
  if (e.data?.type === 'pangolin-back') unlock();
});
</script>
</body>
</html>
