<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pangolinRC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070f;
      color: #e0e8ff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── top-left: ids ── */
    #info {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    .info-row { display: flex; gap: 8px; align-items: center; }
    .info-label {
      color: #4455aa;
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.12em;
      width: 72px;
    }
    .info-value {
      color: #8899cc;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .info-value.set { color: #aabcee; }

    /* ── top-center: state badge ── */
    #state-badge {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334;
      transition: background 0.5s, box-shadow 0.5s;
    }
    #state-label {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #556;
      transition: color 0.5s;
    }

    /* ── bottom: control panel ── */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px 24px 32px;
      background: linear-gradient(to top, rgba(7,7,15,0.95) 60%, transparent);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #role-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3344aa;
    }
    .role-chip {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #1a2255;
      background: transparent;
      color: #3344aa;
      font: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .role-chip.active { border-color: #4466cc; color: #88aaff; background: rgba(68,102,204,0.12); }

    #btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.04);
      color: #fff;
      font: 11px/1 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
      background: rgba(255,255,255,0.08);
    }
    .btn:hover:not(:disabled)::after { opacity: 1; }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .btn-submit  { border-color: #2244cc; color: #88aaff; box-shadow: 0 0 14px rgba(34,68,204,0.25); }
    .btn-advance { border-color: #008899; color: #00eeff; box-shadow: 0 0 14px rgba(0,136,153,0.25); }
    .btn-reveal  { border-color: #007744; color: #00ee88; box-shadow: 0 0 14px rgba(0,119,68,0.25); }
    .btn-revoke  { border-color: #885500; color: #ffaa33; box-shadow: 0 0 14px rgba(136,85,0,0.25); }
    .btn-reject  { border-color: #aa2200; color: #ff6644; box-shadow: 0 0 14px rgba(170,34,0,0.25); }
    .btn-purge   { border-color: #550000; color: #aa4444; box-shadow: 0 0 14px rgba(85,0,0,0.2); }

    .btn:hover.btn-submit  { box-shadow: 0 0 28px rgba(34,68,204,0.5); }
    .btn:hover.btn-advance { box-shadow: 0 0 28px rgba(0,136,153,0.5); }
    .btn:hover.btn-reveal  { box-shadow: 0 0 28px rgba(0,119,68,0.5); }
    .btn:hover.btn-revoke  { box-shadow: 0 0 28px rgba(136,85,0,0.5); }
    .btn:hover.btn-reject  { box-shadow: 0 0 28px rgba(170,34,0,0.5); }
    .btn:hover.btn-purge   { box-shadow: 0 0 28px rgba(85,0,0,0.4); }

    /* ── toast ── */
    #toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 11px;
      letter-spacing: 0.08em;
      background: rgba(20,20,40,0.9);
      border: 1px solid #223;
      color: #8899cc;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #toast.visible { opacity: 1; }
    #toast.error   { border-color: #552200; color: #ff6644; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="info">
  <div class="info-row">
    <span class="info-label">Resource</span>
    <span class="info-value" id="resource-val">—</span>
  </div>
  <div class="info-row">
    <span class="info-label">Submission</span>
    <span class="info-value" id="submission-val">—</span>
  </div>
</div>

<div id="state-badge">
  <div id="state-dot"></div>
  <span id="state-label">no submission</span>
</div>

<div id="toast"></div>

<div id="controls">
  <div id="role-row">
    <span>acting as</span>
    <button class="role-chip active" data-role="authority">authority</button>
    <button class="role-chip" data-role="submitter">submitter</button>
    <button class="role-chip" data-role="system">system</button>
  </div>
  <div id="btn-row"></div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js';

// ─── config ────────────────────────────────────────────────────────────────
const API = window.location.hostname === 'localhost' ? 'http://localhost:8787' : '';

// ─── state ─────────────────────────────────────────────────────────────────
let resourceId   = null;
let submissionId = null;
let submissionState = null;
let actorRole    = 'authority';
const actorId    = () => `demo-${actorRole}`;

// ─── three.js scene ────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 0, 6);

// stars
{
  const n = 2200;
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n * 3; i++) pos[i] = (Math.random() - 0.5) * 300;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo,
    new THREE.PointsMaterial({ color: 0xaabbff, size: 0.18, sizeAttenuation: true, transparent: true, opacity: 0.6 })
  ));
}

// cube faces
const cubeGeo  = new THREE.BoxGeometry(2, 2, 2);
const faceMat  = new THREE.MeshStandardMaterial({
  color: 0x1133cc,
  emissive: 0x001133,
  metalness: 0.15,
  roughness: 0.08,
  transparent: true,
  opacity: 0.28,
  side: THREE.DoubleSide,
});
const cube = new THREE.Mesh(cubeGeo, faceMat);
scene.add(cube);

// cube edges
const edgeMat = new THREE.LineBasicMaterial({ color: 0x3366ff });
const edges   = new THREE.LineSegments(new THREE.EdgesGeometry(cubeGeo), edgeMat);
cube.add(edges);

// inner glow shell (slightly larger, more transparent)
const glowMat  = new THREE.MeshStandardMaterial({
  color: 0x2244ff,
  emissive: 0x112288,
  transparent: true,
  opacity: 0.06,
  side: THREE.BackSide,
});
const glowMesh = new THREE.Mesh(new THREE.BoxGeometry(2.08, 2.08, 2.08), glowMat);
scene.add(glowMesh);

// lights
scene.add(new THREE.AmbientLight(0x111122, 3));
const dirLight = new THREE.DirectionalLight(0x4466ff, 2.5);
dirLight.position.set(4, 6, 4);
scene.add(dirLight);
const orbitLight = new THREE.PointLight(0x2255ff, 4, 14);
scene.add(orbitLight);

// ─── state → visual mapping ────────────────────────────────────────────────
const STATE_THEME = {
  null:       { face: 0x111133, emissive: 0x000011, edge: 0x222255, glow: 0x000033, dot: '#1a1a44' },
  pending:    { face: 0x1133cc, emissive: 0x001133, edge: 0x3366ff, glow: 0x112288, dot: '#3366ff' },
  ready:      { face: 0x006688, emissive: 0x003344, edge: 0x00ccee, glow: 0x004466, dot: '#00ccee' },
  revealed:   { face: 0x006633, emissive: 0x003322, edge: 0x00ee77, glow: 0x004422, dot: '#00ee77' },
  unrevealed: { face: 0x885500, emissive: 0x442200, edge: 0xffaa22, glow: 0x553300, dot: '#ffaa22' },
  rejected:   { face: 0x882200, emissive: 0x441100, edge: 0xff4422, glow: 0x551100, dot: '#ff4422' },
  purged:     { face: 0x222222, emissive: 0x111111, edge: 0x555555, glow: 0x111111, dot: '#444444' },
};

function applyTheme(stateKey) {
  const t = STATE_THEME[stateKey] ?? STATE_THEME[null];
  faceMat.color.setHex(t.face);
  faceMat.emissive.setHex(t.emissive);
  edgeMat.color.setHex(t.edge);
  glowMat.color.setHex(t.edge);
  glowMat.emissive.setHex(t.glow);
  orbitLight.color.setHex(t.edge);

  const dot = document.getElementById('state-dot');
  const lbl = document.getElementById('state-label');
  dot.style.background    = t.dot;
  dot.style.boxShadow     = `0 0 8px ${t.dot}`;
  lbl.style.color         = t.dot;
  lbl.textContent         = stateKey ?? 'no submission';
}

// ─── animation loop ────────────────────────────────────────────────────────
let t = 0;
(function animate() {
  requestAnimationFrame(animate);
  t += 0.012;
  cube.rotation.y      += 0.004;
  cube.rotation.x      += 0.0015;
  cube.position.y       = Math.sin(t) * 0.22;
  glowMesh.rotation.y   = cube.rotation.y;
  glowMesh.rotation.x   = cube.rotation.x;
  glowMesh.position.y   = cube.position.y;
  orbitLight.position.x = Math.cos(t * 0.4) * 5;
  orbitLight.position.z = Math.sin(t * 0.4) * 5;
  orbitLight.position.y = Math.sin(t * 0.25) * 2;
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── toast ─────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'visible' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ─── api ───────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: {
      'Content-Type':  'application/json',
      'X-Actor-Id':    actorId(),
      'X-Actor-Role':  actorRole,
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error ?? res.statusText);
  return data;
}

// ─── buttons ───────────────────────────────────────────────────────────────
const BUTTONS = [
  {
    id: 'submit', label: 'Submit', cls: 'btn-submit',
    show: () => resourceId && !submissionId,
    action: async () => {
      const sub = await api('POST', `/resources/${resourceId}/submissions`, {});
      submissionId = sub.id;
      submissionState = sub.state;
      document.getElementById('submission-val').textContent = submissionId;
      document.getElementById('submission-val').classList.add('set');
      toast('Submitted → pending');
    },
  },
  {
    id: 'advance', label: 'Advance', cls: 'btn-advance',
    show: () => submissionState === 'pending',
    action: async () => {
      const sub = await api('POST', `/submissions/${submissionId}/advance`, null);
      submissionState = sub.state;
      toast('Advanced → ready');
    },
  },
  {
    id: 'reveal', label: 'Reveal', cls: 'btn-reveal',
    show: () => submissionState === 'ready' || submissionState === 'unrevealed',
    action: async () => {
      const sub = await api('POST', `/submissions/${submissionId}/reveal`, null);
      submissionState = sub.state;
      toast(submissionState === 'revealed' ? 'Revealed ✓' : 'Re-revealed ✓');
    },
  },
  {
    id: 'revoke', label: 'Revoke', cls: 'btn-revoke',
    show: () => submissionState === 'revealed',
    action: async () => {
      const sub = await api('POST', `/submissions/${submissionId}/revoke`, null);
      submissionState = sub.state;
      toast('Revoked → unrevealed');
    },
  },
  {
    id: 'reject', label: 'Reject', cls: 'btn-reject',
    show: () => submissionState === 'pending' || submissionState === 'ready',
    action: async () => {
      const sub = await api('POST', `/submissions/${submissionId}/reject`, null);
      submissionState = sub.state;
      toast('Rejected');
    },
  },
  {
    id: 'purge', label: 'Purge', cls: 'btn-purge',
    show: () => submissionState === 'unrevealed' || submissionState === 'rejected',
    action: async () => {
      const sub = await api('POST', `/submissions/${submissionId}/purge`, null);
      submissionState = sub.state;
      toast('Purged — terminal state');
    },
  },
];

function renderButtons() {
  const row = document.getElementById('btn-row');
  row.innerHTML = '';
  BUTTONS.forEach(({ id, label, cls, show, action }) => {
    const visible = show();
    if (!visible && submissionState === 'purged') return;
    const btn = document.createElement('button');
    btn.id        = `btn-${id}`;
    btn.className = `btn ${cls}`;
    btn.textContent = label;
    btn.disabled  = !visible;
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      try {
        await action();
        applyTheme(submissionState);
        renderButtons();
      } catch (e) {
        toast(e.message, true);
        btn.disabled = false;
      }
    });
    row.appendChild(btn);
  });

  // Always show "New submission" button if purged or rejected (for demo reset)
  if (submissionState === 'purged' || submissionState === 'rejected') {
    const btn = document.createElement('button');
    btn.className = 'btn btn-submit';
    btn.textContent = 'New submission';
    btn.addEventListener('click', () => {
      submissionId    = null;
      submissionState = null;
      document.getElementById('submission-val').textContent = '—';
      document.getElementById('submission-val').classList.remove('set');
      applyTheme(null);
      renderButtons();
    });
    row.appendChild(btn);
  }
}

// ─── role chips ────────────────────────────────────────────────────────────
document.getElementById('role-row').addEventListener('click', (e) => {
  const chip = e.target.closest('.role-chip');
  if (!chip) return;
  actorRole = chip.dataset.role;
  document.querySelectorAll('.role-chip').forEach(c => c.classList.toggle('active', c === chip));
  toast(`Acting as ${actorRole}`);
  renderButtons();
});

// ─── init: create resource ─────────────────────────────────────────────────
(async () => {
  try {
    const res = await api('POST', '/resources', null);
    resourceId = res.id;
    document.getElementById('resource-val').textContent = resourceId;
    document.getElementById('resource-val').classList.add('set');
    toast('Resource created — ready');
  } catch (e) {
    toast('API unreachable — start the Worker with npm run dev', true);
  }
  applyTheme(submissionState);
  renderButtons();
})();
</script>
</body>
</html>
