<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PangolinRC · Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080e;
    --bg-2:#0b0b14;
    --face-top:#241c12;
    --face-bot:#15100a;
    --amber:#efa83c;
    --amber-dim:#b8853a;
    --text:#f3efe7;
    --muted:#8b8478;
    --muted-2:#5d574c;
    --line:rgba(239,168,60,.12);
    --line-soft:rgba(239,168,60,.07);
    --card:rgba(239,168,60,.04);
    --card-line:rgba(239,168,60,.16);
    --face-edge:rgba(239,168,60,.14);
    --btn-line:rgba(255,255,255,.20);
    --btn-ico:#b6b1a6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    display:flex;justify-content:center;
    min-height:100dvh;
  }
  .device{
    position:relative;
    width:100%;max-width:430px;
    min-height:100dvh;
    display:flex;flex-direction:column;
    background:
      radial-gradient(circle at 12% 18%, rgba(120,120,150,.05) 0 1px, transparent 1px) 0 0/46px 46px,
      radial-gradient(circle at 60% 70%, rgba(120,120,150,.04) 0 1px, transparent 1px) 0 0/64px 64px,
      linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
    overflow:hidden;
  }

  /* status bar */
  .statusbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 0;font-family:'JetBrains Mono',monospace;
    font-size:16px;font-weight:500;color:var(--text);
  }
  .statusbar .right{display:flex;align-items:center;gap:10px;font-size:13px;}
  .battery{border:1.5px solid var(--text);border-radius:4px;padding:1px 4px;font-size:11px;font-weight:600;position:relative;}
  .battery::after{content:"";position:absolute;right:-3px;top:4px;width:2px;height:7px;background:var(--text);border-radius:0 1px 1px 0;}

  /* stage : the cube sits in space; the face is a square */
  /* min-height:0 is load-bearing: as a flex:1 child it must be allowed to shrink
     below its content so the overflow lands in .scroll (and not blow past the
     480px face iframe, where it'd just be clipped and unscrollable). */
  .stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:18px;}

  .face{
    position:relative;
    width:min(100% , 420px);
    aspect-ratio:1 / 1;
    display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--face-top) 0%, var(--face-bot) 78%);
    border:1px solid var(--face-edge);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 22px 60px -28px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.03);
  }
  /* fade hint at the bottom edge of the square so scroll reads */
  .face::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:42px;pointer-events:none;
    background:linear-gradient(180deg,rgba(21,16,10,0) 0%, var(--face-bot) 100%);
    border-radius:0 0 22px 22px;
  }

  /* hero : stays in view */
  .hero{padding:22px 22px 0;flex:none;}
  .eyebrow{
    display:flex;justify-content:space-between;align-items:center;
    font-family:'JetBrains Mono',monospace;letter-spacing:.18em;
    font-size:12px;color:var(--muted);text-transform:uppercase;
  }
  .member{
    letter-spacing:.16em;font-size:10px;color:var(--amber);white-space:nowrap;
    border:1px solid rgba(239,168,60,.45);border-radius:999px;padding:5px 11px;
  }
  /* Admin bug review surface */
  .adminbugs{margin:0 0 22px;}
  .bug-banner{
    width:100%;display:flex;align-items:center;gap:10px;cursor:pointer;
    background:rgba(239,168,60,.08);border:1px solid rgba(239,168,60,.4);
    border-radius:12px;padding:11px 14px;color:var(--amber);
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
  }
  .bug-banner:active{transform:scale(.99);}
  .bug-ic{font-size:16px;line-height:1;}
  .bug-txt{flex:1;text-align:left;}
  .bug-count{
    min-width:22px;height:22px;padding:0 6px;border-radius:999px;
    background:var(--amber);color:#1a130a;font-weight:700;font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .bug-count.zero{background:var(--muted-2);color:#0b0b14;}
  .bug-caret{font-size:11px;transition:transform .15s ease;}
  .bug-caret.open{transform:rotate(90deg);}
  .bug-list{
    margin-top:10px;display:flex;flex-direction:column;gap:8px;
    max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding-right:4px;scrollbar-width:thin;scrollbar-color:var(--amber-dim) transparent;
  }
  .bug-list::-webkit-scrollbar{width:6px;}
  .bug-list::-webkit-scrollbar-thumb{background:var(--amber-dim);border-radius:999px;}
  .bug-item{
    background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;
  }
  .bug-item.open{border-color:rgba(239,168,60,.35);}
  /* Collapsed: clamp the note to 3 lines. Open: reveal the whole thing. */
  .bug-item .bnote{
    color:var(--muted);font-size:13px;line-height:1.4;word-break:break-word;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  }
  .bug-item.open .bnote{display:block;-webkit-line-clamp:unset;overflow:visible;}
  /* Expanded detail: full URL, id, and the screenshot inline. */
  .bug-item .bexpand{
    display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);
    flex-direction:column;gap:6px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--muted-2);
  }
  .bug-item.open .bexpand{display:flex;}
  .bug-item .bexpand .row{display:flex;gap:8px;word-break:break-all;}
  .bug-item .bexpand .k{color:var(--amber-dim);text-transform:uppercase;flex:none;min-width:44px;}
  .bug-item .bexpand a{color:var(--amber);text-decoration:none;word-break:break-all;}
  .bug-item .bexpand img{max-width:100%;border:1px solid var(--line);border-radius:8px;margin-top:2px;}
  /* Send-to-Claude switch, live-toggleable by the admin from the panel. */
  .bug-item .btoggle{display:flex;align-items:center;gap:8px;cursor:pointer;align-self:flex-start;}
  .bug-item .btoggle input{
    appearance:none;-webkit-appearance:none;width:34px;height:18px;border-radius:999px;
    background:var(--muted-2);position:relative;cursor:pointer;transition:background .15s ease;flex:none;margin:0;
  }
  .bug-item .btoggle input:checked{background:#7fd1c0;}
  .bug-item .btoggle input:disabled{opacity:.5;cursor:default;}
  .bug-item .btoggle input::after{
    content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:999px;
    background:#0b0b14;transition:transform .15s ease;
  }
  .bug-item .btoggle input:checked::after{transform:translateX(16px);}
  .bug-item .btoggle .lbl{color:#7fd1c0;text-transform:uppercase;letter-spacing:.06em;}
  .bug-item .bmeta{
    margin-top:6px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted-2);
  }
  .bug-item .bview{color:var(--amber-dim);}
  .bug-item .bshot{color:var(--amber);text-decoration:none;}
  .bug-item .bclaude{color:#7fd1c0;border:1px solid rgba(127,209,192,.4);border-radius:999px;padding:2px 7px;}
  .bug-item .bstatus{
    margin-left:auto;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--muted);
  }
  .bug-empty{color:var(--muted-2);font-size:12px;padding:10px 2px;}
  .id{display:flex;align-items:center;gap:16px;margin-top:18px;}
  .avatar{
    position:relative;width:70px;height:70px;border-radius:999px;
    background:var(--amber);background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:#1a130a;
    cursor:pointer;flex:none;border:none;padding:0;transition:transform .12s ease;
  }
  .avatar:active{transform:scale(.96);}
  .avatar .initial.hidden{display:none;}
  .avatar .cam{
    position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:999px;
    background:#1a130a;border:2px solid var(--face-top);
    display:flex;align-items:center;justify-content:center;
  }
  .avatar .cam svg{width:12px;height:12px;stroke:var(--amber);}
  .avatar .cam.hidden{display:none;}
  .id .name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:29px;line-height:1;color:var(--text);}
  .id .name.editing{outline:none;border-bottom:1px solid var(--amber);min-width:80px;}
  .id .handle{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .id .ptz{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);opacity:.7;margin-top:4px;}
  .id .ptz:empty{display:none;}
  .authbtn{background:none;border:1px solid rgba(239,168,60,.45);color:var(--amber);
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;padding:3px 9px;border-radius:999px;cursor:pointer;}
  .authbtn:active{opacity:.6;}

  .hero-rule{height:1px;background:var(--line);margin:18px 0 0;}

  /* scroll region inside the square */
  .scroll{
    flex:1;min-height:0;overflow-y:auto;padding:6px 22px 52px;-webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;touch-action:pan-y;
    scrollbar-width:none;display:flex;flex-direction:column;
  }
  .scroll::-webkit-scrollbar{display:none;}

  /* the device picker is the focal point: it sits centered in the active area
     (pbody auto-margins center it vertically when the content is short, and
     pin to the top once devices overflow). Inline rows, no cards / sheets —
     mirrors the name-plate edit: minimal borders, underline fields. */
  .pbody{margin:auto 0;width:100%;padding:8px 0;}

  .devices{margin:0;}
  .dhead{display:flex;justify-content:space-between;align-items:baseline;margin:0 0 2px;}
  .dhead h2{font-family:'JetBrains Mono',monospace;letter-spacing:.24em;
    font-size:13px;color:var(--muted);text-transform:uppercase;font-weight:400;margin:0;}
  .dhint{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted-2);text-transform:uppercase;}
  .dhead-rule{height:1px;background:var(--line);margin:9px 0 0;}

  /* ---- Following (follow members by email; mutual = friend) ---- */
  .following{margin-top:22px;}
  .fl-add{display:flex;gap:8px;margin-top:11px;}
  .fl-add input{flex:1;min-width:0;background:var(--card);border:1px solid var(--card-line);border-radius:10px;
    color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;}
  .fl-add input::placeholder{color:var(--muted-2);}
  .fl-add input:focus{outline:none;border-color:var(--amber);}
  .fl-add button{flex:0 0 auto;background:var(--amber);color:#1a130b;border:0;border-radius:10px;padding:0 16px;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
  .fl-add button:disabled{opacity:.45;cursor:default;}
  .fl-msg{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--muted);margin-top:8px;min-height:12px;}
  .fl-msg.err{color:var(--amber);}
  .fl-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line-soft);}
  .fl-av{width:32px;height:32px;border-radius:50%;flex:0 0 auto;background:linear-gradient(160deg,#caa46f,#7a5a3a);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#1a130b;}
  .fl-name{flex:1;min-width:0;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fl-name small{display:block;color:var(--muted-2);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.04em;}
  .fl-friend{flex:0 0 auto;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--amber);border:1px solid var(--card-line);border-radius:999px;padding:2px 7px;}
  .fl-x{flex:0 0 auto;background:none;border:0;color:var(--muted-2);font-size:17px;line-height:1;cursor:pointer;padding:0 4px;}
  .fl-x:hover{color:var(--amber);}
  .fl-empty{color:var(--muted);font-size:12.5px;line-height:1.5;padding:10px 0;}
  /* search results + section sub-labels + follow-back / invite actions */
  .fl-sub{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;color:var(--muted-2);margin:18px 0 2px;}
  .fl-results{margin-top:9px;}
  .fl-results:empty{margin:0;}
  .fl-btn{flex:0 0 auto;background:none;border:1px solid var(--amber);color:var(--amber);border-radius:999px;
    padding:5px 11px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;cursor:pointer;}
  .fl-btn:disabled{opacity:.5;cursor:default;}
  .fl-btn.dim{border-color:var(--card-line);color:var(--muted-2);}
  .fl-invites{display:flex;gap:8px;margin-top:16px;}
  .fl-invite{flex:1;background:none;border:1px dashed var(--card-line);border-radius:12px;
    color:var(--muted);padding:12px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;cursor:pointer;}
  .fl-invite:hover{border-color:var(--amber);color:var(--amber);}
  .fl-hint{color:var(--muted-2);font-size:11px;line-height:1.5;margin-top:10px;}
  /* open (unfilled) friend slot — mirrors the device "add" affordance */
  .fl-slot{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line-soft);
    width:100%;background:none;text-align:left;cursor:pointer;}
  .fl-slot .fl-av{background:none;border:1px dashed var(--card-line);color:var(--muted-2);}
  .fl-slot .fl-name{color:var(--muted-2);}
  .fl-slot:hover .fl-name,.fl-slot:hover .fl-av{color:var(--amber);border-color:var(--amber);}
  .fl-slot.full{cursor:default;}
  .fl-slot.full .fl-name{color:var(--muted);}

  .dev{border-bottom:1px solid var(--line-soft);}
  .dev:last-of-type{border-bottom:none;}
  .dev-main{width:100%;display:flex;align-items:center;gap:13px;background:none;border:none;
    padding:14px 2px;text-align:left;color:inherit;font:inherit;cursor:pointer;}
  .dev-main:active{opacity:.6;}
  .dev-ic{width:26px;flex:none;display:flex;align-items:center;justify-content:center;}
  .dev-ic svg{width:21px;height:21px;fill:none;stroke:var(--muted);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
  .dev.sel .dev-ic svg{stroke:var(--amber);}
  .dev .meta{flex:1;min-width:0;display:flex;flex-direction:column;}
  .dev .nm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:var(--text);line-height:1.15;}
  .dev.sel .nm{color:var(--amber);}
  .dev .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dev .state{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--amber);text-transform:uppercase;flex:none;}
  .dev .caret{flex:none;width:7px;height:7px;border-right:1.5px solid var(--muted-2);border-bottom:1.5px solid var(--muted-2);
    transform:rotate(45deg);transition:transform .18s ease;margin:-3px 3px 0;}
  .dev.open .caret{transform:rotate(-135deg);margin-top:2px;}

  /* inline action strip + edit, revealed under a tapped row (text links, no boxes) */
  .dev-actions{display:none;gap:24px;padding:0 2px 15px 39px;}
  .dev.open .dev-actions{display:flex;}
  .dev.editing .dev-actions{display:none;}
  .dev-act{background:none;border:none;padding:0;cursor:pointer;font-family:'JetBrains Mono',monospace;
    font-size:13px;letter-spacing:.06em;color:var(--amber);}
  .dev-act:active{opacity:.5;}
  .dev-act.danger{color:#d8765c;}
  .dev-act.muted{color:var(--muted);}
  .dev-note{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;color:var(--muted-2);}

  .dev-edit{display:none;padding:2px 2px 16px 39px;}
  .dev.editing .dev-edit{display:block;}
  .de-field{margin-bottom:14px;}
  .de-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--muted-2);text-transform:uppercase;margin-bottom:3px;}
  .de-in{width:100%;background:none;border:none;border-bottom:1px solid var(--line);color:var(--text);
    font-family:'Inter',sans-serif;font-size:16px;padding:5px 0;outline:none;}
  .de-in:focus{border-bottom-color:var(--amber);}
  .de-types{display:flex;gap:22px;padding-top:6px;}
  .de-type{background:none;border:none;padding:0;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);}
  .de-type.on{color:var(--amber);}
  .de-row{display:flex;gap:26px;align-items:center;margin-top:4px;}
  .de-save{background:none;border:none;padding:0;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.1em;color:var(--amber);text-transform:uppercase;}

  /* add device — simple inline row, no box */
  .add-row{display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;
    padding:16px 2px 4px;text-align:left;cursor:pointer;color:inherit;font:inherit;}
  .add-row:active{opacity:.6;}
  .add-row .plus{width:26px;flex:none;position:relative;height:18px;}
  .add-row .plus::before,.add-row .plus::after{content:"";position:absolute;background:var(--amber);}
  .add-row .plus::before{left:12px;top:3px;width:2px;height:12px;}
  .add-row .plus::after{top:8px;left:7px;height:2px;width:12px;}
  .add-row .label{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.04em;color:var(--muted);}

  /* secondary stat strip under the picker */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:28px;}
  .stat{text-align:center;padding:8px 4px;}
  .stat .num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--amber-dim);line-height:1;}
  .stat .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--muted-2);margin-top:7px;}
  .hidden{display:none;}

  /* dock : persistent cube chrome, outside the face */
  .dock{padding:0 26px calc(20px + env(safe-area-inset-bottom));}
  .unlock{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;
    letter-spacing:.32em;color:var(--muted-2);text-transform:uppercase;margin-bottom:22px;}
  .transport{display:flex;align-items:center;justify-content:space-between;}
  .key{
    background:none;border:1.4px solid var(--btn-line);border-radius:999px;
    width:58px;height:58px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .1s ease, border-color .1s ease, background .1s ease;
  }
  .key svg{width:23px;height:23px;fill:var(--btn-ico);stroke:none;}
  .key.center{width:76px;height:76px;border-color:rgba(255,255,255,.30);background:rgba(255,255,255,.03);}
  .key.center svg{width:29px;height:29px;}
  .key:active{transform:scale(.92);border-color:var(--amber);background:rgba(239,168,60,.10);}
  .key:active svg{fill:var(--amber);}
  .key.power svg{fill:none;stroke:var(--btn-ico);stroke-width:2.2;stroke-linecap:round;}
  .key.power:active svg{fill:none;stroke:var(--amber);}
  .key.back svg{fill:none;stroke:var(--btn-ico);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .key.back:active svg{stroke:var(--amber);fill:none;}

  .toast{
    position:fixed;left:50%;bottom:118px;transform:translateX(-50%) translateY(12px);
    background:#1a140c;border:1px solid var(--card-line);color:var(--text);
    font-family:'JetBrains Mono',monospace;font-size:13px;
    padding:11px 16px;border-radius:10px;opacity:0;pointer-events:none;
    transition:opacity .22s ease, transform .22s ease;max-width:80%;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  input[type=file]{display:none;}
</style>
</head>
<body>
  <div class="device">

    <div class="statusbar">
      <div class="left">9:43</div>
      <div class="right"><span>signal</span><span class="battery">55</span></div>
    </div>

    <div class="stage">
      <div class="face">

        <!-- hero : stays in view -->
        <div class="hero">
          <div class="eyebrow">
            <span>Profile</span>
            <span class="member" id="member">MEMBER</span>
          </div>
          <div class="id">
            <button class="avatar" id="avatar" aria-label="Add profile picture">
              <span class="initial" id="initial">T</span>
              <span class="cam" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 8.5A1.5 1.5 0 0 1 4.5 7h2L8 5h8l1.5 2h2A1.5 1.5 0 0 1 21 8.5v9A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5z"/><circle cx="12" cy="13" r="3.2"/></svg>
              </span>
            </button>
            <div>
              <div class="name" id="pname">Guest</div>
              <div class="handle"><span id="phandle">not signed in</span><button class="authbtn" id="authBtn">log in</button></div>
              <div class="ptz" id="ptz"></div>
            </div>
          </div>
          <div class="hero-rule"></div>
        </div>

        <!-- content scrolls inside the square; the device picker is the focal point -->
        <div class="scroll">
          <div class="pbody">
            <!-- Admin-only bug review. Hidden for everyone else; the banner is a live
                 open-bug count, tapping it reveals the list (note · view · shot). -->
            <div class="adminbugs" id="adminBugs" style="display:none">
              <button class="bug-banner" id="bugBanner" type="button">
                <span class="bug-ic">🐞</span>
                <span class="bug-txt">Open bug reports</span>
                <span class="bug-count" id="bugCount">0</span>
                <span class="bug-caret" id="bugCaret">▸</span>
              </button>
              <div class="bug-list" id="bugList" style="display:none"></div>
            </div>

            <div class="devices">
              <div class="dhead">
                <h2>Your Devices</h2>
                <span class="dhint">tap to manage</span>
              </div>
              <div class="dhead-rule"></div>
              <div id="deviceList"></div>
              <button class="add-row" id="addDevice">
                <span class="plus"></span>
                <span class="label">add device</span>
              </button>
            </div>

            <!-- Friend slots: a tier-limited quota sitting right below devices.
                 A slot = an outgoing invite/follow; mutual = friend. -->
            <div class="following">
              <div class="dhead"><h2>Friends</h2><span class="dhint" id="slotHint">— slots</span></div>
              <div class="dhead-rule"></div>

              <!-- Filled slots (who you follow; friend badge when mutual) + open slots -->
              <div id="followList"></div>
              <div id="slotsOpen"></div>

              <!-- Add to a slot: find a member by name or email -->
              <div class="fl-add" id="addRow">
                <input id="friendSearch" type="text" inputmode="search" placeholder="find by name or email" autocomplete="off">
                <button id="followBtn">Follow</button>
              </div>
              <div class="fl-msg" id="followMsg"></div>
              <div class="fl-results" id="searchResults"></div>

              <!-- People who follow you but you haven't followed back yet -->
              <div id="incomingWrap" style="display:none;">
                <div class="fl-sub">Follows you</div>
                <div id="incomingList"></div>
              </div>

              <!-- Outgoing follows that aren't mutual yet — free, don't use a slot -->
              <div id="pendingWrap" style="display:none;">
                <div class="fl-sub">Invited · awaiting their follow-back</div>
                <div id="pendingList"></div>
              </div>

              <!-- Invite someone not on pangolinRC yet — by text or by email -->
              <div class="fl-invites">
                <button class="fl-invite" id="inviteTextBtn">＋ Invite by text</button>
                <button class="fl-invite" id="inviteEmailBtn">＋ Invite by email</button>
              </div>
              <div class="fl-hint">Friends' comments surface when you co-view a show — turn it on per show on the episode screen.</div>
            </div>

            <div class="stats">
              <div class="stat"><div class="num" id="stShows">0</div><div class="lbl">SHOWS</div></div>
              <div class="stat"><div class="num" id="stEps">0</div><div class="lbl">EPISODES</div></div>
              <div class="stat"><div class="num" id="stThird">0</div><div class="lbl" id="stThirdLbl">MINUTES</div></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="dock">
      <div class="unlock">PINCH TO UNLOCK</div>
      <div class="transport">
        <button class="key power" aria-label="Power">
          <svg viewBox="0 0 24 24"><path d="M12 3v8"/><path d="M6.5 6.5a8 8 0 1 0 11 0"/></svg>
        </button>
        <button class="key" aria-label="Rewind">
          <svg viewBox="0 0 24 24"><path d="M11 6 4 12l7 6V6zM20 6l-7 6 7 6V6z"/></svg>
        </button>
        <button class="key center" aria-label="Play">
          <svg viewBox="0 0 24 24"><path d="M7 5l12 7-12 7V5z"/></svg>
        </button>
        <button class="key" aria-label="Fast forward">
          <svg viewBox="0 0 24 24"><path d="M13 6l7 6-7 6V6zM4 6l7 6-7 6V6z"/></svg>
        </button>
        <button class="key back" aria-label="Back">
          <svg viewBox="0 0 24 24"><path d="M19 12H6"/><path d="M11 7l-5 5 5 5"/></svg>
        </button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <input type="file" id="picker" accept="image/*">
  </div>

<script>
  const API = location.hostname === 'localhost' ? 'http://localhost:8787' : 'https://pangolin-rc.edward-m-willett.workers.dev';
  const $ = id => document.getElementById(id);

  // DEMO = the showcase build (dummy data); MVP = the clean first-run product.
  const DEMO = location.hostname.split('.').includes('demo') || new URLSearchParams(location.search).has('demo');
  $('member').textContent = DEMO ? 'MEMBER' : 'BRAVE FOUNDING MEMBER';
  if(!DEMO){
    $('stShows').textContent='0'; $('stEps').textContent='0';
    $('stThird').textContent='0'; $('stThirdLbl').textContent='MINUTES';
  }

  // ---- avatar photo (client-side for now; DB/R2 photo is a follow-up) ----
  const avatar=$('avatar'), picker=$('picker'), initial=$('initial'), cam=avatar.querySelector('.cam');
  let hasPhoto=false;
  // The add/change icon only shows when there is no photo; once set, hide it
  // (long-hold on the name plate brings the change affordance back).
  function setAvatar(url){ avatar.style.backgroundImage="url('"+url+"')"; initial.classList.add('hidden'); hasPhoto=true; cam.classList.add('hidden'); }
  try{ const saved=localStorage.getItem('pg_avatar'); if(saved) setAvatar(saved); }catch(_){}
  avatar.addEventListener('click', ()=>{ if(!cam.classList.contains('hidden')) picker.click(); });
  picker.addEventListener('change', e=>{
    const file=e.target.files&&e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{ const img=new Image(); img.onload=()=>{
      const sz=240,c=document.createElement('canvas'); c.width=c.height=sz; const ctx=c.getContext('2d');
      const s=Math.min(img.width,img.height); ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,sz,sz);
      const url=c.toDataURL('image/jpeg',0.85); setAvatar(url); try{localStorage.setItem('pg_avatar',url);}catch(_){}
    }; img.src=ev.target.result; };
    r.readAsDataURL(file);
  });

  // ---- toast ----
  const toast=$('toast'); let toastTimer;
  function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('show'),2200); }

  // ---- account + devices, backed by D1 via the Worker ----
  function session(){ try{ return localStorage.getItem('pg_user')||''; }catch(_){ return ''; } }
  function nav(face, payload){
    if(window.parent===window){ showToast('Pierre handles this in the cube'); return; }
    if(typeof window.parent.cubeRotateTo==='function') window.parent.cubeRotateTo(face, payload||{});
    else window.parent.postMessage({type:'cube:rotateTo', face, payload:payload||{}}, '*');
  }
  // The devices we can actually drive today. "Other" devices are collected
  // against the profile (supported:false) but kept out of this picker until we
  // add support and reach out to the people who asked for them.
  const SUPPORTED_TYPES=['LG TV','Amazon Fire Cube'];
  // DEMO shows a static device alongside the always-present This Phone.
  const DEMO_DEVICES=[{id:'demo-fire', type:'Amazon Fire Cube', location:'Home Gym', ip:'192.168.1.50'}];

  // Device-picker state. `selected` is a device id or the 'phone' sentinel for
  // the always-present This Phone (one selection at a time).
  const state={ email:'', devices:[], selected:'phone' };

  function devIcon(type){
    const t=(type||'').toLowerCase();
    if(t==='none'||t.includes('no device'))   // TV outline with a slash = nothing connected
      return '<svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="12" rx="2"/><line x1="8" y1="20" x2="16" y2="20"/><line x1="4" y1="3.5" x2="20" y2="17.5"/></svg>';
    if(t==='phone'||t.includes('mobile')||t.includes('this phone'))
      return '<svg viewBox="0 0 24 24"><rect x="7" y="2.5" width="10" height="19" rx="2.5"/><line x1="11" y1="18.6" x2="13" y2="18.6"/></svg>';
    if(t.includes('fire')||t.includes('cube'))
      return '<svg viewBox="0 0 24 24"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M4 7.5l8 4.5 8-4.5"/><line x1="12" y1="12" x2="12" y2="21"/></svg>';
    return '<svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="12" rx="2"/><line x1="8" y1="20" x2="16" y2="20"/></svg>';
  }
  // This Phone is always first, then the "No device" option, then stored devices.
  // 'none' means: watching on a screen we can't drive — second-screen captions run,
  // but the remote sends nothing (distinct from This Phone, which IS the screen).
  function deviceCards(){
    return [{id:'phone', isPhone:true, type:'This Phone', location:'This Phone'},
            {id:'none', isNone:true, type:'No device', location:'No device connected'},
            ...state.devices.map(d=>({...d, isPhone:false}))];
  }
  function isSelected(dv){
    if(dv.isPhone) return state.selected==='phone' || !state.selected;
    if(dv.isNone)  return state.selected==='none';
    return state.selected===dv.id;
  }
  // Each device is an inline row; tapping it expands an inline action strip
  // (Select · Edit · Delete as text links) directly beneath — no popout sheet.
  function renderDevices(){
    const list=$('deviceList'); list.innerHTML='';
    deviceCards().forEach(dv=>{
      const sel=isSelected(dv);
      const row=document.createElement('div'); row.className='dev'+(sel?' sel':'');

      const fixed = dv.isPhone || dv.isNone;   // virtual rows: no edit/delete
      const main=document.createElement('button'); main.className='dev-main';
      main.innerHTML='<span class="dev-ic">'+devIcon(dv.isPhone?'phone':dv.isNone?'none':dv.type)+'</span>'
        +'<span class="meta"><span class="nm"></span><span class="sub"></span></span>'
        +(sel?'<span class="state">active</span>':'<span class="caret"></span>');
      main.querySelector('.nm').textContent = dv.isPhone ? 'This Phone' : dv.isNone ? 'No device connected' : (dv.location || dv.type);
      main.querySelector('.sub').textContent = dv.isPhone ? 'this device'
        : dv.isNone ? 'captions only · remote off'
        : (dv.type + (dv.ip ? (' · '+dv.ip) : ''));
      main.onclick=()=>{ const open=row.classList.contains('open'); closeAllRows(); if(!open) row.classList.add('open'); };
      row.appendChild(main);

      const acts=document.createElement('div'); acts.className='dev-actions';
      if(!sel) acts.appendChild(devAct('Select', ()=>doSelect(dv)));
      if(!fixed){
        acts.appendChild(devAct('Edit', ()=>{ row.classList.add('editing'); row.querySelector('.de-in').focus(); }));
        acts.appendChild(devAct('Delete', ()=>doDelete(dv), 'danger'));
      }
      if(!acts.children.length){
        const n=document.createElement('span'); n.className='dev-note'; n.textContent='your active device'; acts.appendChild(n);
      }
      row.appendChild(acts);

      if(!fixed) row.appendChild(buildEdit(dv, row));
      list.appendChild(row);
    });
    cacheSelectedDevice();
  }
  // Mirror the selected device's nickname into localStorage so the cube shell can
  // label its play button ("📺 Living Room · Peacock") without re-fetching the
  // profile. Uses the member's nickname (location); falls back to the device type
  // only when unnamed. The shell hears the write as a storage event and re-renders.
  function cacheSelectedDevice(){
    const sel=deviceCards().find(dv=>isSelected(dv));
    // kind drives the shell's gating: 'phone' = this is the screen (no captions),
    // 'none' = off-phone captions but remote sends nothing, 'device' = drive it.
    const kind = (!sel||sel.isPhone) ? 'phone' : sel.isNone ? 'none' : 'device';
    const label = kind==='phone' ? 'This Phone'
                : kind==='none'  ? 'No device'
                : (sel.location || (sel.type||'Device').replace(/^Amazon\s+/,''));
    // kind first: the shell's storage listeners fire on the pg_device write and
    // read pg_device_kind, so it must already be current.
    try{ localStorage.setItem('pg_device_kind', kind); localStorage.setItem('pg_device', label); }catch(_){}
  }
  // SHOWS / EPISODES / MINUTES from the member's watch data (MVP only; DEMO keeps
  // its showcase numbers). EPISODES = sum of watched counts; MINUTES = sum of the
  // logged minute position across every tracked episode.
  async function loadStats(email){
    if(DEMO) return;
    try{
      // Catalog-backed: /watch was dropped with the episode-as-unit migration, so the
      // old call 404'd and the placeholder numbers were never replaced. /titles carries
      // per-title watched + minute counts we sum here.
      const r=await fetch(API+'/profile/'+encodeURIComponent(email)+'/titles');
      if(!r.ok) return;
      const titles=(await r.json()).titles||[];
      let eps=0, mins=0;
      titles.forEach(t=>{ eps+=(t.watched||0); mins+=Math.round(t.minutes||0); });
      $('stShows').textContent=String(titles.length);
      $('stEps').textContent=eps.toLocaleString();
      $('stThird').textContent=mins.toLocaleString(); $('stThirdLbl').textContent='MINUTES';
    }catch(_){}
  }
  async function refresh(){
    const email=session(); state.email=email;
    if(DEMO){ state.devices=DEMO_DEVICES; state.selected='phone'; renderDevices(); }
    if(!email){
      $('pname').textContent='Guest'; $('phandle').textContent='not signed in';
      $('authBtn').textContent='log in'; $('authBtn').onclick=()=>nav('pierre',{intent:'join'});
      if(!DEMO){ state.devices=[]; state.selected='phone'; renderDevices();
        $('stShows').textContent='0'; $('stEps').textContent='0'; $('stThird').textContent='0';
        $('adminBugs').style.display='none'; }  // signed out → zeros, no admin surface
      return;
    }
    $('authBtn').textContent='log out';
    $('authBtn').onclick=()=>{ try{localStorage.removeItem('pg_user');}catch(_){} refresh(); };
    $('phandle').textContent=email;
    if(!DEMO) loadStats(email);
    try{
      const r=await fetch(API+'/profile/'+encodeURIComponent(email));
      if(r.status===404){ try{localStorage.removeItem('pg_user');}catch(_){} return refresh(); }  // account gone -> sign out
      if(r.ok){ const d=await r.json(); if(d.user&&d.user.username) $('pname').textContent=d.user.username;
        if(!DEMO){ state.devices=d.devices||[]; state.selected=(d.user&&d.user.selected_device)||'phone'; renderDevices(); }
        if(!DEMO) syncTimezone(email, d.user&&d.user.timezone);
        if(!DEMO) applyMembership(d.user, email); }
    }catch(_){}
  }

  // Membership chip reflects the real tier + founding flag. Admins additionally
  // get the bug-review surface; everyone else has it hidden.
  const TIER_LABEL = {admin:'ADMIN', elite_pro:'ELITE PRO', elite:'ELITE', basic:'MEMBER'};
  function applyMembership(user, email){
    const tier=(user&&user.user_type)||'basic';
    const founding=!!(user&&(user.founding_member===1||user.founding_member===true));
    const base=TIER_LABEL[tier]||'MEMBER';
    $('member').textContent = founding ? ('FOUNDING '+base) : base;
    if(tier==='admin'){ loadBugs(email); }
    else { $('adminBugs').style.display='none'; }
  }

  // Pull the open bug reports (admin-gated server-side) and render the badge + list.
  async function loadBugs(email){
    try{
      const r=await fetch(API+'/bug-reports?email='+encodeURIComponent(email));
      if(!r.ok){ $('adminBugs').style.display='none'; return; }   // 403 for non-admins → stay hidden
      const d=await r.json();
      $('adminBugs').style.display='';
      const n=d.open||0;
      const c=$('bugCount'); c.textContent=String(n); c.classList.toggle('zero', n===0);
      renderBugs(d.bugs||[]);
    }catch(_){ $('adminBugs').style.display='none'; }
  }
  function renderBugs(bugs){
    const host=$('bugList'); host.innerHTML='';
    if(!bugs.length){ const e=document.createElement('div'); e.className='bug-empty'; e.textContent='No open reports. All clear.'; host.appendChild(e); return; }
    bugs.forEach(b=>{
      const item=document.createElement('div'); item.className='bug-item';
      const note=document.createElement('div'); note.className='bnote';
      note.textContent=(b.note&&b.note.trim())||'(no note)'; item.appendChild(note);
      const meta=document.createElement('div'); meta.className='bmeta';
      const when=document.createElement('span'); when.textContent=fmtWhen(b.created_at); meta.appendChild(when);
      if(b.view){ const v=document.createElement('span'); v.className='bview'; v.textContent=b.view; meta.appendChild(v); }
      if(b.user_email){ const u=document.createElement('span'); u.textContent=b.user_email; meta.appendChild(u); }
      if(b.screenshot_url){ const a=document.createElement('a'); a.className='bshot'; a.href=b.screenshot_url; a.target='_blank'; a.rel='noopener'; a.textContent='📷 shot';
        a.addEventListener('click',e=>e.stopPropagation()); meta.appendChild(a); }
      // Claude badge stays in sync with the live toggle below.
      const cl=document.createElement('span'); cl.className='bclaude';
      const setClaudeBadge=()=>{ cl.style.display=b.send_to_claude?'':'none';
        cl.textContent='🤖 claude'+(b.claude_status&&b.claude_status!=='queued'?(' · '+b.claude_status):''); };
      setClaudeBadge(); meta.appendChild(cl);
      const st=document.createElement('span'); st.className='bstatus'; st.textContent=b.status||'new'; meta.appendChild(st);
      item.appendChild(meta);

      // Expanded detail — tap the card to toggle. Full URL, id, and inline screenshot.
      const ex=document.createElement('div'); ex.className='bexpand';
      const addRow=(k,valNode)=>{ const row=document.createElement('div'); row.className='row';
        const ks=document.createElement('span'); ks.className='k'; ks.textContent=k; row.appendChild(ks);
        row.appendChild(valNode); ex.appendChild(row); };
      if(b.url){ const a=document.createElement('a'); a.href=b.url; a.target='_blank'; a.rel='noopener'; a.textContent=b.url;
        a.addEventListener('click',e=>e.stopPropagation()); addRow('url',a); }
      if(b.id!=null){ const s=document.createElement('span'); s.textContent=String(b.id); addRow('id',s); }
      if(b.screenshot_url){ const img=document.createElement('img'); img.loading='lazy'; img.src=b.screenshot_url; img.alt='screenshot'; ex.appendChild(img); }
      // Live send-to-Claude switch — admin flips it without leaving the panel.
      const tog=document.createElement('label'); tog.className='btoggle';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=!!b.send_to_claude;
      const tl=document.createElement('span'); tl.className='lbl'; tl.textContent='🤖 send to claude';
      tog.appendChild(cb); tog.appendChild(tl); ex.appendChild(tog);
      tog.addEventListener('click',e=>e.stopPropagation());  // don't toggle the card open/closed
      cb.addEventListener('change',async()=>{
        const want=cb.checked; cb.disabled=true;
        try{
          const r=await fetch(API+'/bug-reports/'+encodeURIComponent(b.id)+'/send-to-claude',{
            method:'PATCH',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({email:state.email,send_to_claude:want})});
          if(!r.ok) throw 0;
          b.send_to_claude=want?1:0; if(want) b.claude_status='queued';
          setClaudeBadge();
        }catch(_){ cb.checked=!want; }   // revert on failure
        finally{ cb.disabled=false; }
      });
      item.appendChild(ex);

      item.addEventListener('click',()=>item.classList.toggle('open'));
      host.appendChild(item);
    });
  }
  function fmtWhen(ts){
    if(!ts) return '';
    const d=new Date(Number(ts)), now=Date.now(), diff=now-d.getTime();
    const day=86400000;
    if(diff<day && d.getDate()===new Date(now).getDate()) return 'today';
    if(diff<2*day) return 'yesterday';
    return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  }
  // Tap the banner to expand / collapse the list.
  $('bugBanner').addEventListener('click',()=>{
    const list=$('bugList'), open=list.style.display!=='none';
    list.style.display=open?'none':'';
    $('bugCaret').classList.toggle('open',!open);
  });

  // Show the member's time zone, and persist the browser's IANA zone to the account
  // (once) when the server doesn't have it yet — captured, never guessed from clocks.
  function syncTimezone(email, saved){
    let tz=''; try{ tz=Intl.DateTimeFormat().resolvedOptions().timeZone||''; }catch(_){}
    const shown = saved || tz;
    const el=$('ptz'); if(el) el.textContent = shown ? ('🕓 '+shown) : '';
    if(tz && !saved && email){
      fetch(API+'/profile/signup',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email, timezone:tz})}).catch(()=>{});
    }
  }

  // ---- inline device actions: select / edit / delete --------------------
  function closeAllRows(){ document.querySelectorAll('.dev.open,.dev.editing').forEach(r=>r.classList.remove('open','editing')); }
  function devAct(label, onClick, cls){
    const b=document.createElement('button'); b.className='dev-act'+(cls?(' '+cls):''); b.textContent=label;
    b.onclick=(e)=>{ e.stopPropagation(); onClick(); }; return b;
  }
  // Inline edit, mirroring the name-plate edit: underline fields, no boxes.
  function buildEdit(dv, row){
    const ed=document.createElement('div'); ed.className='dev-edit';
    ed.innerHTML=
       '<div class="de-field"><div class="de-lbl">Label</div><input class="de-in lbl" placeholder="e.g. living room" autocomplete="off"></div>'
      +'<div class="de-field"><div class="de-lbl">IP address</div><input class="de-in ip" placeholder="e.g. 192.168.1.42" inputmode="decimal" autocomplete="off"></div>'
      +'<div class="de-field"><div class="de-lbl">Device</div><div class="de-types"></div></div>'
      +'<div class="de-row"><button class="de-save">Save</button><button class="dev-act muted cancel">Cancel</button></div>';
    const lbl=ed.querySelector('.lbl'), ip=ed.querySelector('.ip'), types=ed.querySelector('.de-types');
    lbl.value=dv.location||''; ip.value=dv.ip||'';
    let chosen=dv.type;
    SUPPORTED_TYPES.forEach(t=>{
      const b=document.createElement('button'); b.className='de-type'+(t===chosen?' on':''); b.textContent=t;
      b.onclick=()=>{ chosen=t; [...types.children].forEach(c=>c.classList.toggle('on',c===b)); };
      types.appendChild(b);
    });
    ed.querySelector('.cancel').onclick=()=>row.classList.remove('editing');
    ed.querySelector('.de-save').onclick=()=>saveEdit(dv,{location:lbl.value.trim(), ip:ip.value.trim(), type:chosen});
    return ed;
  }
  async function doSelect(dv){
    state.selected=dv.id; renderDevices();
    const label=dv.isPhone?'This Phone':(dv.location||dv.type);
    if(!DEMO && state.email){
      try{ await fetch(API+'/profile/'+encodeURIComponent(state.email)+'/select',{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify({device:dv.id})}); }catch(_){}
    }
    showToast(label+' · selected');
  }
  async function doDelete(dv){
    if(DEMO || !state.email){ closeAllRows(); showToast('Not available in the demo'); return; }
    closeAllRows();
    try{ await fetch(API+'/profile/'+encodeURIComponent(state.email)+'/devices/'+encodeURIComponent(dv.id),{method:'DELETE'}); }catch(_){}
    showToast('Removed'); refresh();
  }
  async function saveEdit(dv, body){
    if(DEMO || !state.email){ closeAllRows(); showToast('Not available in the demo'); return; }
    closeAllRows();
    try{ await fetch(API+'/profile/'+encodeURIComponent(state.email)+'/devices/'+encodeURIComponent(dv.id),{method:'PATCH',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }catch(_){}
    showToast('Saved'); refresh();
  }

  $('addDevice').addEventListener('click', ()=> nav('pierre', session()?{intent:'device'}:{intent:'join'}) );

  // ---- Friends: find/add members, follow back incoming, invite off-platform.
  // A mutual follow (you → them AND them → you) is a "friend" — the unit co-viewing
  // keys on. So the section makes both directions easy to complete.
  const escF = s => String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function flMsg(t, err){ const m=$('followMsg'); if(m){ m.textContent=t||''; m.classList.toggle('err', !!err); } }
  function flAvatar(u){ const nm=u.username||String(u.email).split('@')[0];
    return `<div class="fl-av">${escF(nm.charAt(0).toUpperCase())}</div><div class="fl-name">${escF(nm)}<small>${escF(u.email)}</small></div>`; }

  // {tier, limit (null=unlimited), used}. A slot is a CONFIRMED friend (mutual);
  // used = friend count. Pending one-way follows are free.
  let slots={tier:'basic', limit:1, used:0};
  function slotsFull(){ return slots.limit!=null && slots.used>=slots.limit; }

  // Confirmed friends fill the slots.
  function renderFriends(list){
    const box=$('followList'); if(!box) return;
    if(!session()){ box.innerHTML='<div class="fl-empty">Sign in to add friends.</div>'; return; }
    box.innerHTML=(list||[]).map(f=>`<div class="fl-row">${flAvatar(f)}`
      +`<span class="fl-friend">friend</span>`
      +`<button class="fl-x" data-unfollow="${escF(f.email)}" aria-label="Remove">×</button></div>`).join('');
  }
  // Outgoing follows that aren't mutual yet — these cost nothing.
  function renderPending(list){
    const wrap=$('pendingWrap'), box=$('pendingList'); if(!wrap||!box) return;
    if(!list || !list.length){ wrap.style.display='none'; box.innerHTML=''; return; }
    wrap.style.display='block';
    box.innerHTML=list.map(u=>`<div class="fl-row">${flAvatar(u)}`
      +`<span class="fl-friend" style="color:var(--muted-2);border-color:var(--line-soft);">pending</span>`
      +`<button class="fl-x" data-unfollow="${escF(u.email)}" aria-label="Cancel">×</button></div>`).join('');
  }
  // Open slots below the friends: empty placeholders up to the tier limit. Admin
  // (limit null) shows no cap. The add row stays available even when full —
  // pending follows are free; only completing a friendship is gated.
  function renderSlots(){
    const hint=$('slotHint'), open=$('slotsOpen'), add=$('addRow'); if(!hint||!open) return;
    if(add) add.style.display='flex';
    if(!session()){ hint.textContent='— slots'; open.innerHTML=''; return; }
    if(slots.limit==null){ hint.textContent=slots.used+' friends · unlimited'; open.innerHTML=''; return; }
    hint.textContent=slots.used+' / '+slots.limit+' slots';
    const free=Math.max(0, slots.limit-slots.used);
    let rows='';
    for(let i=0;i<free;i++){
      rows+=`<button class="fl-slot" data-openslot="1"><div class="fl-av">＋</div><div class="fl-name">Open slot<small>invite or find a friend</small></div></button>`;
    }
    open.innerHTML=rows;
    if(slotsFull()) flMsg('Friend slots full — new follows stay pending until you free one or upgrade.');
  }
  function renderIncoming(list){
    const wrap=$('incomingWrap'), box=$('incomingList'); if(!wrap||!box) return;
    if(!list || !list.length){ wrap.style.display='none'; box.innerHTML=''; return; }
    wrap.style.display='block';
    box.innerHTML=list.map(u=>`<div class="fl-row">${flAvatar(u)}`
      +`<button class="fl-btn" data-follow="${escF(u.email)}">Follow back</button></div>`).join('');
  }
  async function loadFollows(){
    if(!session()){ slots={tier:'basic',limit:1,used:0}; renderFriends(null); renderPending(null); renderIncoming(null); renderSlots(); return; }
    try{ const r=await fetch(API+'/profile/'+encodeURIComponent(session())+'/follows');
      if(r.ok){ const d=await r.json(); slots=d.slots||slots;
        renderFriends(d.friends||[]); renderPending(d.pending||[]); renderIncoming(d.incoming||[]); renderSlots(); } }catch(_){}
  }

  // Search members by name/email; annotate each with my edge so the button reads
  // Follow / Follow back / Following / friend.
  let searchT=null;
  function onSearch(){
    const q=(($('friendSearch')||{}).value||'').trim();
    clearTimeout(searchT);
    if(q.length<2){ $('searchResults').innerHTML=''; return; }
    searchT=setTimeout(()=>runSearch(q), 220);
  }
  async function runSearch(q){
    if(!session()) return;
    try{
      const r=await fetch(API+'/profile/'+encodeURIComponent(session())+'/find?q='+encodeURIComponent(q));
      if(!r.ok) return; const d=await r.json(); renderResults(d.results||[]);
    }catch(_){}
  }
  function renderResults(list){
    const box=$('searchResults'); if(!box) return;
    if(!list.length){ box.innerHTML='<div class="fl-empty">No members match — invite them below.</div>'; return; }
    box.innerHTML=list.map(u=>{
      const action = u.friend ? '<span class="fl-friend">friend</span>'
        : u.following ? '<button class="fl-btn dim" disabled>Following</button>'
        : `<button class="fl-btn" data-follow="${escF(u.email)}">${u.follows_me?'Follow back':'Follow'}</button>`;
      return `<div class="fl-row">${flAvatar(u)}${action}</div>`;
    }).join('');
  }

  // Shared follow used by the Follow button, search results, and follow-back.
  async function followMember(target){
    const email=session(); if(!email){ flMsg('Sign in first', true); return; }
    target=String(target||'').toLowerCase().trim(); if(!target) return;
    flMsg('');
    try{
      const r=await fetch(API+'/profile/'+encodeURIComponent(email)+'/follow',{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify({target})});
      const d=await r.json().catch(()=>({}));
      if(r.ok){
        flMsg(d.friend ? ('You’re friends with '+(d.username||target)) : ('Invited '+(d.username||target)+' — awaiting their follow-back'));
        const inp=$('friendSearch'); if(inp){ inp.value=''; } $('searchResults').innerHTML='';
        loadFollows();
      } else if(d.error==='slot_limit'){
        // A follow-back / completing follow that would exceed someone's friend cap.
        const mine = d.who===email;
        flMsg(mine ? ('Your '+(d.limit||slots.limit)+' friend slots are full — free one or upgrade.')
                   : 'Their friend slots are full, so this can’t become mutual yet.', true);
      } else flMsg(d.error||'Could not follow', true);
    }catch(_){ flMsg('Could not follow', true); }
  }

  // Invite by email/text. If the address is already a member, skip the join-invite
  // and just follow them in-app (a free pending follow). Otherwise open a native
  // draft to that address — no invite server (matches the co-view reply hand-off).
  function inviteSig(){
    const me=(($('pname')&&$('pname').textContent)||'').trim();
    return me ? (me+' wants to watch alongside you on pangolinRC. ') : 'Watch alongside me on pangolinRC. ';
  }
  // This face runs inside the cube's iframe; setting the iframe's own location to an
  // sms:/mailto: scheme is unreliable (it gets swallowed and nothing opens). Drive
  // the TOP window instead — these schemes hand off to the OS without unloading the
  // page. Falls back to the local frame if top access is ever blocked.
  function openExternal(url){
    try{ (window.top||window).location.href=url; }
    catch(_){ window.location.href=url; }
  }
  // Text invite: a blank sms: draft (you pick the recipient in Messages). We can't
  // check membership without an address, so it stays pure outreach.
  function inviteByText(){
    const msg=inviteSig()+'Join: '+location.origin+'/';
    // Prefer the native share sheet (allowed via the iframe's allow="web-share");
    // it lets you pick Messages/WhatsApp/etc. Fall back to a recipient-less sms:
    // draft — note the '?' before 'body', without it iOS ignores the body.
    if(navigator.share){ navigator.share({text:msg}).catch(()=>{}); return; }
    openExternal('sms:?&body='+encodeURIComponent(msg));
  }
  // Email invite: ask for the address, and if it's already a member, follow them
  // in-app instead of sending a join link; otherwise open a mailto: draft to them.
  async function inviteByEmail(){
    const email=session(); if(!email){ flMsg('Sign in first', true); return; }
    const addr=(prompt('Friend’s email to invite:')||'').trim().toLowerCase();
    if(!addr) return;
    if(addr===email){ flMsg('That’s you.', true); return; }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(addr)){ flMsg('That doesn’t look like an email.', true); return; }
    try{
      const r=await fetch(API+'/profile/'+encodeURIComponent(email)+'/member?addr='+encodeURIComponent(addr));
      const d=await r.json().catch(()=>({}));
      if(d.member){ flMsg((d.username||addr)+' is already on pangolinRC — following them.'); followMember(addr); return; }
    }catch(_){ /* lookup failed → fall through to the draft */ }
    openExternal('mailto:'+encodeURIComponent(addr)+'?subject='+encodeURIComponent('Watch alongside me on pangolinRC')
      +'&body='+encodeURIComponent(inviteSig()+'\n\nJoin here: '+location.origin+'/'));
  }

  // Click delegation: unfollow (×), follow / follow-back, and open-slot taps.
  document.addEventListener('click', e=>{
    if(!session()) return;
    const un=e.target.closest('[data-unfollow]');
    if(un){ fetch(API+'/profile/'+encodeURIComponent(session())+'/follow/'+encodeURIComponent(un.getAttribute('data-unfollow')),{method:'DELETE'})
      .then(()=>loadFollows()).catch(()=>{}); return; }
    const fo=e.target.closest('[data-follow]');
    if(fo){ followMember(fo.getAttribute('data-follow')); return; }
    const os=e.target.closest('[data-openslot]');
    if(os){ const inp=$('friendSearch'); if(inp){ inp.focus(); } }
  });
  (function wireFriends(){
    const btn=$('followBtn'), inp=$('friendSearch');
    // The Follow button follows an exact address if one's typed, else runs search.
    if(btn) btn.onclick=()=>{ const v=((inp&&inp.value)||'').trim(); if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) followMember(v); else if(v.length>=2) runSearch(v); };
    if(inp){ inp.addEventListener('input', onSearch);
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); btn&&btn.onclick(); } }); }
    const it=$('inviteTextBtn'), ie=$('inviteEmailBtn');
    if(it) it.onclick=inviteByText;
    if(ie) ie.onclick=inviteByEmail;
    loadFollows();
  })();
  window.addEventListener('storage', e=>{ if(e.key==='pg_user'||e.key==='pg_refresh') refresh(); });
  refresh();
  try{ const u=localStorage.getItem('pg_username'); if(u && !session()) $('pname').textContent=u; }catch(_){}

  // ---- long-hold the name plate: reveal the change-photo icon + edit username ----
  const idBlock=document.querySelector('.id'), pname=$('pname');
  let holdTimer=null;
  function revealEdit(){
    cam.classList.remove('hidden');                 // bring back the change-photo affordance
    if(pname.dataset.editing) return;
    pname.dataset.prev=(pname.textContent||'').trim();   // remember, to revert if the new name is taken
    pname.dataset.editing='1'; pname.classList.add('editing');
    pname.contentEditable='true'; pname.focus();
    const r=document.createRange(); r.selectNodeContents(pname);
    const sel=getSelection(); sel.removeAllRanges(); sel.addRange(r);
  }
  function commitName(){
    if(!pname.dataset.editing) return;
    delete pname.dataset.editing; pname.classList.remove('editing'); pname.contentEditable='false';
    const name=(pname.textContent||'').trim()||'Guest'; pname.textContent=name;
    if(hasPhoto) cam.classList.add('hidden');       // re-hide the icon if a photo is set
    const prev=pname.dataset.prev||'';
    const email=session();
    if(email && name!==prev){
      // Usernames are unique; on 409 revert to the previous name and say so.
      fetch(API+'/profile/signup',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email, username:name})})
        .then(r=>{
          if(r.status===409){ pname.textContent=prev||'Guest';
            try{ localStorage.setItem('pg_username', prev); }catch(_){}
            alert('That name is taken — pick another.'); }
          else { try{ localStorage.setItem('pg_username', name); }catch(_){} }
        }).catch(()=>{ try{ localStorage.setItem('pg_username', name); }catch(_){} });
    } else { try{ localStorage.setItem('pg_username', name); }catch(_){} }
  }
  pname.addEventListener('blur', commitName);
  pname.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); pname.blur(); } });
  idBlock.addEventListener('pointerdown', e=>{
    if(e.target.closest('.avatar,.authbtn')) return;   // avatar + auth button own their taps
    holdTimer=setTimeout(revealEdit, 500);
  });
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>
    idBlock.addEventListener(ev, ()=>clearTimeout(holdTimer)));

  // ---- cube embedding: hide phone chrome, fill the face, pinch back ----
  if (window.parent !== window) {
    const sb=document.querySelector('.statusbar'), dock=document.querySelector('.dock'),
          dev=document.querySelector('.device'), stage=document.querySelector('.stage'), face=document.querySelector('.face');
    if(sb) sb.style.display='none';
    if(dock) dock.style.display='none';
    document.documentElement.style.height='100%'; document.body.style.height='100%';
    if(dev){ dev.style.minHeight='100%'; dev.style.height='100%'; dev.style.maxWidth='none'; }
    if(stage){ stage.style.padding='0'; }
    if(face){ face.style.width='100%'; face.style.height='100%'; face.style.maxWidth='none'; face.style.aspectRatio='unset'; face.style.borderRadius='0'; }
    if(face){
      let s=0,a=false;
      face.addEventListener('touchstart',e=>{ if(e.touches.length===2){ s=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY); a=true; } },{passive:true});
      face.addEventListener('touchmove',e=>{ if(!a||e.touches.length<2)return; const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY); if(d<s*0.72){a=false;window.parent.postMessage({type:'pangolin-back'},'*');} },{passive:true});
      face.addEventListener('touchend',()=>{a=false;},{passive:true});
      // Keep momentum scrolling responsive: nudge .scroll off its top/bottom edge as a
      // drag begins so the first up-swipe isn't eaten by iOS overscroll chaining.
      const _sc=document.querySelector('.scroll');
      if(_sc) document.addEventListener('touchstart',()=>{
        const max=_sc.scrollHeight-_sc.clientHeight; if(max<=0) return;
        if(_sc.scrollTop<=0) _sc.scrollTop=1; else if(_sc.scrollTop>=max) _sc.scrollTop=max-1;
      },{passive:true});
      let _dt=0;
      document.addEventListener('click',e=>{
        if(e.target.closest("button,a,input,textarea,select,label,[role=button],[contenteditable],.id,.tile,.crow,.savings,.res")){ _dt=0; return; }
        const n=Date.now(); if(n-_dt<350){ _dt=0; window.parent.postMessage({type:"pangolin-back"},"*"); } else _dt=n;
      }, true);
    }
  }
</script>
</body>
</html>
