<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PangolinRC · Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080e;
    --bg-2:#0b0b14;
    --face-top:#241c12;
    --face-bot:#15100a;
    --amber:#efa83c;
    --amber-dim:#b8853a;
    --text:#f3efe7;
    --muted:#8b8478;
    --muted-2:#5d574c;
    --line:rgba(239,168,60,.12);
    --line-soft:rgba(239,168,60,.07);
    --card:rgba(239,168,60,.04);
    --card-line:rgba(239,168,60,.16);
    --face-edge:rgba(239,168,60,.14);
    --btn-line:rgba(255,255,255,.20);
    --btn-ico:#b6b1a6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    display:flex;justify-content:center;
    min-height:100dvh;
  }
  .device{
    position:relative;
    width:100%;max-width:430px;
    min-height:100dvh;
    display:flex;flex-direction:column;
    background:
      radial-gradient(circle at 12% 18%, rgba(120,120,150,.05) 0 1px, transparent 1px) 0 0/46px 46px,
      radial-gradient(circle at 60% 70%, rgba(120,120,150,.04) 0 1px, transparent 1px) 0 0/64px 64px,
      linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
    overflow:hidden;
  }

  /* status bar */
  .statusbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 26px 0;font-family:'JetBrains Mono',monospace;
    font-size:16px;font-weight:500;color:var(--text);
  }
  .statusbar .right{display:flex;align-items:center;gap:10px;font-size:13px;}
  .battery{border:1.5px solid var(--text);border-radius:4px;padding:1px 4px;font-size:11px;font-weight:600;position:relative;}
  .battery::after{content:"";position:absolute;right:-3px;top:4px;width:2px;height:7px;background:var(--text);border-radius:0 1px 1px 0;}

  /* stage : the cube sits in space; the face is a square */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:18px;}

  .face{
    position:relative;
    width:min(100% , 420px);
    aspect-ratio:1 / 1;
    display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--face-top) 0%, var(--face-bot) 78%);
    border:1px solid var(--face-edge);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 22px 60px -28px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.03);
  }
  /* fade hint at the bottom edge of the square so scroll reads */
  .face::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:42px;pointer-events:none;
    background:linear-gradient(180deg,rgba(21,16,10,0) 0%, var(--face-bot) 100%);
    border-radius:0 0 22px 22px;
  }

  /* hero : stays in view */
  .hero{padding:22px 22px 0;flex:none;}
  .eyebrow{
    display:flex;justify-content:space-between;align-items:center;
    font-family:'JetBrains Mono',monospace;letter-spacing:.18em;
    font-size:12px;color:var(--muted);text-transform:uppercase;
  }
  .member{
    letter-spacing:.16em;font-size:10px;color:var(--amber);white-space:nowrap;
    border:1px solid rgba(239,168,60,.45);border-radius:999px;padding:5px 11px;
  }
  .id{display:flex;align-items:center;gap:16px;margin-top:18px;}
  .avatar{
    position:relative;width:70px;height:70px;border-radius:999px;
    background:var(--amber);background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:#1a130a;
    cursor:pointer;flex:none;border:none;padding:0;transition:transform .12s ease;
  }
  .avatar:active{transform:scale(.96);}
  .avatar .initial.hidden{display:none;}
  .avatar .cam{
    position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:999px;
    background:#1a130a;border:2px solid var(--face-top);
    display:flex;align-items:center;justify-content:center;
  }
  .avatar .cam svg{width:12px;height:12px;stroke:var(--amber);}
  .avatar .cam.hidden{display:none;}
  .id .name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:29px;line-height:1;color:var(--text);}
  .id .name.editing{outline:none;border-bottom:1px solid var(--amber);min-width:80px;}
  .id .handle{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .authbtn{background:none;border:1px solid rgba(239,168,60,.45);color:var(--amber);
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;padding:3px 9px;border-radius:999px;cursor:pointer;}
  .authbtn:active{opacity:.6;}

  .hero-rule{height:1px;background:var(--line);margin:18px 0 0;}

  /* scroll region inside the square */
  .scroll{
    flex:1;overflow-y:auto;padding:6px 22px 26px;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;display:flex;flex-direction:column;
  }
  .scroll::-webkit-scrollbar{display:none;}

  /* the device picker is the focal point: it sits centered in the active area
     (pbody auto-margins center it vertically when the content is short, and
     pin to the top once devices overflow). Inline rows, no cards / sheets —
     mirrors the name-plate edit: minimal borders, underline fields. */
  .pbody{margin:auto 0;width:100%;padding:8px 0;}

  .devices{margin:0;}
  .dhead{display:flex;justify-content:space-between;align-items:baseline;margin:0 0 2px;}
  .dhead h2{font-family:'JetBrains Mono',monospace;letter-spacing:.24em;
    font-size:13px;color:var(--muted);text-transform:uppercase;font-weight:400;margin:0;}
  .dhint{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted-2);text-transform:uppercase;}
  .dhead-rule{height:1px;background:var(--line);margin:9px 0 0;}

  /* ---- Following (follow members by email; mutual = friend) ---- */
  .following{margin-top:22px;}
  .fl-add{display:flex;gap:8px;margin-top:11px;}
  .fl-add input{flex:1;min-width:0;background:var(--card);border:1px solid var(--card-line);border-radius:10px;
    color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;}
  .fl-add input::placeholder{color:var(--muted-2);}
  .fl-add input:focus{outline:none;border-color:var(--amber);}
  .fl-add button{flex:0 0 auto;background:var(--amber);color:#1a130b;border:0;border-radius:10px;padding:0 16px;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
  .fl-add button:disabled{opacity:.45;cursor:default;}
  .fl-msg{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--muted);margin-top:8px;min-height:12px;}
  .fl-msg.err{color:var(--amber);}
  .fl-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line-soft);}
  .fl-av{width:32px;height:32px;border-radius:50%;flex:0 0 auto;background:linear-gradient(160deg,#caa46f,#7a5a3a);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#1a130b;}
  .fl-name{flex:1;min-width:0;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fl-name small{display:block;color:var(--muted-2);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.04em;}
  .fl-friend{flex:0 0 auto;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--amber);border:1px solid var(--card-line);border-radius:999px;padding:2px 7px;}
  .fl-x{flex:0 0 auto;background:none;border:0;color:var(--muted-2);font-size:17px;line-height:1;cursor:pointer;padding:0 4px;}
  .fl-x:hover{color:var(--amber);}
  .fl-empty{color:var(--muted);font-size:12.5px;line-height:1.5;padding:10px 0;}

  .dev{border-bottom:1px solid var(--line-soft);}
  .dev:last-of-type{border-bottom:none;}
  .dev-main{width:100%;display:flex;align-items:center;gap:13px;background:none;border:none;
    padding:14px 2px;text-align:left;color:inherit;font:inherit;cursor:pointer;}
  .dev-main:active{opacity:.6;}
  .dev-ic{width:26px;flex:none;display:flex;align-items:center;justify-content:center;}
  .dev-ic svg{width:21px;height:21px;fill:none;stroke:var(--muted);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
  .dev.sel .dev-ic svg{stroke:var(--amber);}
  .dev .meta{flex:1;min-width:0;display:flex;flex-direction:column;}
  .dev .nm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:var(--text);line-height:1.15;}
  .dev.sel .nm{color:var(--amber);}
  .dev .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dev .state{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--amber);text-transform:uppercase;flex:none;}
  .dev .caret{flex:none;width:7px;height:7px;border-right:1.5px solid var(--muted-2);border-bottom:1.5px solid var(--muted-2);
    transform:rotate(45deg);transition:transform .18s ease;margin:-3px 3px 0;}
  .dev.open .caret{transform:rotate(-135deg);margin-top:2px;}

  /* inline action strip + edit, revealed under a tapped row (text links, no boxes) */
  .dev-actions{display:none;gap:24px;padding:0 2px 15px 39px;}
  .dev.open .dev-actions{display:flex;}
  .dev.editing .dev-actions{display:none;}
  .dev-act{background:none;border:none;padding:0;cursor:pointer;font-family:'JetBrains Mono',monospace;
    font-size:13px;letter-spacing:.06em;color:var(--amber);}
  .dev-act:active{opacity:.5;}
  .dev-act.danger{color:#d8765c;}
  .dev-act.muted{color:var(--muted);}
  .dev-note{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;color:var(--muted-2);}

  .dev-edit{display:none;padding:2px 2px 16px 39px;}
  .dev.editing .dev-edit{display:block;}
  .de-field{margin-bottom:14px;}
  .de-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--muted-2);text-transform:uppercase;margin-bottom:3px;}
  .de-in{width:100%;background:none;border:none;border-bottom:1px solid var(--line);color:var(--text);
    font-family:'Inter',sans-serif;font-size:16px;padding:5px 0;outline:none;}
  .de-in:focus{border-bottom-color:var(--amber);}
  .de-types{display:flex;gap:22px;padding-top:6px;}
  .de-type{background:none;border:none;padding:0;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);}
  .de-type.on{color:var(--amber);}
  .de-row{display:flex;gap:26px;align-items:center;margin-top:4px;}
  .de-save{background:none;border:none;padding:0;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.1em;color:var(--amber);text-transform:uppercase;}

  /* add device — simple inline row, no box */
  .add-row{display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;
    padding:16px 2px 4px;text-align:left;cursor:pointer;color:inherit;font:inherit;}
  .add-row:active{opacity:.6;}
  .add-row .plus{width:26px;flex:none;position:relative;height:18px;}
  .add-row .plus::before,.add-row .plus::after{content:"";position:absolute;background:var(--amber);}
  .add-row .plus::before{left:12px;top:3px;width:2px;height:12px;}
  .add-row .plus::after{top:8px;left:7px;height:2px;width:12px;}
  .add-row .label{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.04em;color:var(--muted);}

  /* secondary stat strip under the picker */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:28px;}
  .stat{text-align:center;padding:8px 4px;}
  .stat .num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--amber-dim);line-height:1;}
  .stat .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--muted-2);margin-top:7px;}
  .hidden{display:none;}

  /* dock : persistent cube chrome, outside the face */
  .dock{padding:0 26px calc(20px + env(safe-area-inset-bottom));}
  .unlock{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;
    letter-spacing:.32em;color:var(--muted-2);text-transform:uppercase;margin-bottom:22px;}
  .transport{display:flex;align-items:center;justify-content:space-between;}
  .key{
    background:none;border:1.4px solid var(--btn-line);border-radius:999px;
    width:58px;height:58px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .1s ease, border-color .1s ease, background .1s ease;
  }
  .key svg{width:23px;height:23px;fill:var(--btn-ico);stroke:none;}
  .key.center{width:76px;height:76px;border-color:rgba(255,255,255,.30);background:rgba(255,255,255,.03);}
  .key.center svg{width:29px;height:29px;}
  .key:active{transform:scale(.92);border-color:var(--amber);background:rgba(239,168,60,.10);}
  .key:active svg{fill:var(--amber);}
  .key.power svg{fill:none;stroke:var(--btn-ico);stroke-width:2.2;stroke-linecap:round;}
  .key.power:active svg{fill:none;stroke:var(--amber);}
  .key.back svg{fill:none;stroke:var(--btn-ico);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .key.back:active svg{stroke:var(--amber);fill:none;}

  .toast{
    position:fixed;left:50%;bottom:118px;transform:translateX(-50%) translateY(12px);
    background:#1a140c;border:1px solid var(--card-line);color:var(--text);
    font-family:'JetBrains Mono',monospace;font-size:13px;
    padding:11px 16px;border-radius:10px;opacity:0;pointer-events:none;
    transition:opacity .22s ease, transform .22s ease;max-width:80%;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  input[type=file]{display:none;}
</style>
</head>
<body>
  <div class="device">

    <div class="statusbar">
      <div class="left">9:43</div>
      <div class="right"><span>signal</span><span class="battery">55</span></div>
    </div>

    <div class="stage">
      <div class="face">

        <!-- hero : stays in view -->
        <div class="hero">
          <div class="eyebrow">
            <span>Profile</span>
            <span class="member" id="member">MEMBER</span>
          </div>
          <div class="id">
            <button class="avatar" id="avatar" aria-label="Add profile picture">
              <span class="initial" id="initial">T</span>
              <span class="cam" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 8.5A1.5 1.5 0 0 1 4.5 7h2L8 5h8l1.5 2h2A1.5 1.5 0 0 1 21 8.5v9A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5z"/><circle cx="12" cy="13" r="3.2"/></svg>
              </span>
            </button>
            <div>
              <div class="name" id="pname">Guest</div>
              <div class="handle"><span id="phandle">not signed in</span><button class="authbtn" id="authBtn">log in</button></div>
            </div>
          </div>
          <div class="hero-rule"></div>
        </div>

        <!-- content scrolls inside the square; the device picker is the focal point -->
        <div class="scroll">
          <div class="pbody">
            <div class="devices">
              <div class="dhead">
                <h2>Your Devices</h2>
                <span class="dhint">tap to manage</span>
              </div>
              <div class="dhead-rule"></div>
              <div id="deviceList"></div>
              <button class="add-row" id="addDevice">
                <span class="plus"></span>
                <span class="label">add device</span>
              </button>
            </div>

            <div class="stats">
              <div class="stat"><div class="num" id="stShows">128</div><div class="lbl">SHOWS</div></div>
              <div class="stat"><div class="num" id="stEps">1,340</div><div class="lbl">EPISODES</div></div>
              <div class="stat"><div class="num" id="stThird">$284</div><div class="lbl" id="stThirdLbl">SAVED</div></div>
            </div>

            <div class="following">
              <div class="dhead"><h2>Following</h2><span class="dhint">mutual = friend</span></div>
              <div class="dhead-rule"></div>
              <div id="followList"></div>
              <div class="fl-add">
                <input id="followEmail" type="email" inputmode="email" placeholder="follow by email" autocomplete="off">
                <button id="followBtn">Follow</button>
              </div>
              <div class="fl-msg" id="followMsg"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="dock">
      <div class="unlock">PINCH TO UNLOCK</div>
      <div class="transport">
        <button class="key power" aria-label="Power">
          <svg viewBox="0 0 24 24"><path d="M12 3v8"/><path d="M6.5 6.5a8 8 0 1 0 11 0"/></svg>
        </button>
        <button class="key" aria-label="Rewind">
          <svg viewBox="0 0 24 24"><path d="M11 6 4 12l7 6V6zM20 6l-7 6 7 6V6z"/></svg>
        </button>
        <button class="key center" aria-label="Play">
          <svg viewBox="0 0 24 24"><path d="M7 5l12 7-12 7V5z"/></svg>
        </button>
        <button class="key" aria-label="Fast forward">
          <svg viewBox="0 0 24 24"><path d="M13 6l7 6-7 6V6zM4 6l7 6-7 6V6z"/></svg>
        </button>
        <button class="key back" aria-label="Back">
          <svg viewBox="0 0 24 24"><path d="M19 12H6"/><path d="M11 7l-5 5 5 5"/></svg>
        </button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <input type="file" id="picker" accept="image/*">
  </div>

<script>
  const API = location.hostname === 'localhost' ? 'http://localhost:8787' : 'https://pangolin-rc.edward-m-willett.workers.dev';
  const $ = id => document.getElementById(id);

  // DEMO = the showcase build (dummy data); MVP = the clean first-run product.
  const DEMO = location.hostname.split('.').includes('demo') || new URLSearchParams(location.search).has('demo');
  $('member').textContent = DEMO ? 'MEMBER' : 'BRAVE FOUNDING MEMBER';
  if(!DEMO){
    $('stShows').textContent='0'; $('stEps').textContent='0';
    $('stThird').textContent='0'; $('stThirdLbl').textContent='MINUTES';
  }

  // ---- avatar photo (client-side for now; DB/R2 photo is a follow-up) ----
  const avatar=$('avatar'), picker=$('picker'), initial=$('initial'), cam=avatar.querySelector('.cam');
  let hasPhoto=false;
  // The add/change icon only shows when there is no photo; once set, hide it
  // (long-hold on the name plate brings the change affordance back).
  function setAvatar(url){ avatar.style.backgroundImage="url('"+url+"')"; initial.classList.add('hidden'); hasPhoto=true; cam.classList.add('hidden'); }
  try{ const saved=localStorage.getItem('pg_avatar'); if(saved) setAvatar(saved); }catch(_){}
  avatar.addEventListener('click', ()=>{ if(!cam.classList.contains('hidden')) picker.click(); });
  picker.addEventListener('change', e=>{
    const file=e.target.files&&e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{ const img=new Image(); img.onload=()=>{
      const sz=240,c=document.createElement('canvas'); c.width=c.height=sz; const ctx=c.getContext('2d');
      const s=Math.min(img.width,img.height); ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,sz,sz);
      const url=c.toDataURL('image/jpeg',0.85); setAvatar(url); try{localStorage.setItem('pg_avatar',url);}catch(_){}
    }; img.src=ev.target.result; };
    r.readAsDataURL(file);
  });

  // ---- toast ----
  const toast=$('toast'); let toastTimer;
  function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('show'),2200); }

  // ---- account + devices, backed by D1 via the Worker ----
  function session(){ try{ return localStorage.getItem('pg_user')||''; }catch(_){ return ''; } }
  function nav(face, payload){
    if(window.parent===window){ showToast('Pierre handles this in the cube'); return; }
    if(typeof window.parent.cubeRotateTo==='function') window.parent.cubeRotateTo(face, payload||{});
    else window.parent.postMessage({type:'cube:rotateTo', face, payload:payload||{}}, '*');
  }
  // The devices we can actually drive today. "Other" devices are collected
  // against the profile (supported:false) but kept out of this picker until we
  // add support and reach out to the people who asked for them.
  const SUPPORTED_TYPES=['LG TV','Amazon Fire Cube'];
  // DEMO shows a static device alongside the always-present This Phone.
  const DEMO_DEVICES=[{id:'demo-fire', type:'Amazon Fire Cube', location:'Home Gym', ip:'192.168.1.50'}];

  // Device-picker state. `selected` is a device id or the 'phone' sentinel for
  // the always-present This Phone (one selection at a time).
  const state={ email:'', devices:[], selected:'phone' };

  function devIcon(type){
    const t=(type||'').toLowerCase();
    if(t==='phone'||t.includes('mobile')||t.includes('this phone'))
      return '<svg viewBox="0 0 24 24"><rect x="7" y="2.5" width="10" height="19" rx="2.5"/><line x1="11" y1="18.6" x2="13" y2="18.6"/></svg>';
    if(t.includes('fire')||t.includes('cube'))
      return '<svg viewBox="0 0 24 24"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M4 7.5l8 4.5 8-4.5"/><line x1="12" y1="12" x2="12" y2="21"/></svg>';
    return '<svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="12" rx="2"/><line x1="8" y1="20" x2="16" y2="20"/></svg>';
  }
  // This Phone is always first; stored devices follow in order.
  function deviceCards(){
    return [{id:'phone', isPhone:true, type:'This Phone', location:'This Phone'},
            ...state.devices.map(d=>({...d, isPhone:false}))];
  }
  function isSelected(dv){ return dv.isPhone ? (state.selected==='phone'||!state.selected) : state.selected===dv.id; }
  // Each device is an inline row; tapping it expands an inline action strip
  // (Select · Edit · Delete as text links) directly beneath — no popout sheet.
  function renderDevices(){
    const list=$('deviceList'); list.innerHTML='';
    deviceCards().forEach(dv=>{
      const sel=isSelected(dv);
      const row=document.createElement('div'); row.className='dev'+(sel?' sel':'');

      const main=document.createElement('button'); main.className='dev-main';
      main.innerHTML='<span class="dev-ic">'+devIcon(dv.isPhone?'phone':dv.type)+'</span>'
        +'<span class="meta"><span class="nm"></span><span class="sub"></span></span>'
        +(sel?'<span class="state">active</span>':'<span class="caret"></span>');
      main.querySelector('.nm').textContent = dv.isPhone ? 'This Phone' : (dv.location || dv.type);
      main.querySelector('.sub').textContent = dv.isPhone ? 'this device'
        : (dv.type + (dv.ip ? (' · '+dv.ip) : ''));
      main.onclick=()=>{ const open=row.classList.contains('open'); closeAllRows(); if(!open) row.classList.add('open'); };
      row.appendChild(main);

      const acts=document.createElement('div'); acts.className='dev-actions';
      if(!sel) acts.appendChild(devAct('Select', ()=>doSelect(dv)));
      if(!dv.isPhone){
        acts.appendChild(devAct('Edit', ()=>{ row.classList.add('editing'); row.querySelector('.de-in').focus(); }));
        acts.appendChild(devAct('Delete', ()=>doDelete(dv), 'danger'));
      }
      if(!acts.children.length){
        const n=document.createElement('span'); n.className='dev-note'; n.textContent='your active device'; acts.appendChild(n);
      }
      row.appendChild(acts);

      if(!dv.isPhone) row.appendChild(buildEdit(dv, row));
      list.appendChild(row);
    });
    cacheSelectedDevice();
  }
  // Mirror the selected device's nickname into localStorage so the cube shell can
  // label its play button ("📺 Living Room · Peacock") without re-fetching the
  // profile. Uses the member's nickname (location); falls back to the device type
  // only when unnamed. The shell hears the write as a storage event and re-renders.
  function cacheSelectedDevice(){
    const sel=deviceCards().find(dv=>isSelected(dv));
    const label=(sel && !sel.isPhone)
      ? (sel.location || (sel.type||'Device').replace(/^Amazon\s+/,''))
      : 'This Phone';
    try{ localStorage.setItem('pg_device', label); }catch(_){}
  }
  // SHOWS / EPISODES / MINUTES from the member's watch data (MVP only; DEMO keeps
  // its showcase numbers). EPISODES = sum of watched counts; MINUTES = sum of the
  // logged minute position across every tracked episode.
  async function loadStats(email){
    if(DEMO) return;
    try{
      const r=await fetch(API+'/profile/'+encodeURIComponent(email)+'/watch');
      if(!r.ok) return;
      const shows=(await r.json()).shows||[];
      let eps=0, mins=0;
      shows.forEach(s=>{ eps+=(s.watched||0); const ep=s.episodes||{}; for(const k in ep) mins+=Math.round(ep[k].min||0); });
      $('stShows').textContent=String(shows.length);
      $('stEps').textContent=eps.toLocaleString();
      $('stThird').textContent=mins.toLocaleString(); $('stThirdLbl').textContent='MINUTES';
    }catch(_){}
  }
  async function refresh(){
    const email=session(); state.email=email;
    if(DEMO){ state.devices=DEMO_DEVICES; state.selected='phone'; renderDevices(); }
    if(!email){
      $('pname').textContent='Guest'; $('phandle').textContent='not signed in';
      $('authBtn').textContent='log in'; $('authBtn').onclick=()=>nav('pierre',{intent:'join'});
      if(!DEMO){ state.devices=[]; state.selected='phone'; renderDevices();
        $('stShows').textContent='0'; $('stEps').textContent='0'; $('stThird').textContent='0'; }  // signed out → zeros
      return;
    }
    $('authBtn').textContent='log out';
    $('authBtn').onclick=()=>{ try{localStorage.removeItem('pg_user');}catch(_){} refresh(); };
    $('phandle').textContent=email;
    if(!DEMO) loadStats(email);
    try{
      const r=await fetch(API+'/profile/'+encodeURIComponent(email));
      if(r.status===404){ try{localStorage.removeItem('pg_user');}catch(_){} return refresh(); }  // account gone -> sign out
      if(r.ok){ const d=await r.json(); if(d.user&&d.user.username) $('pname').textContent=d.user.username;
        if(!DEMO){ state.devices=d.devices||[]; state.selected=(d.user&&d.user.selected_device)||'phone'; renderDevices(); } }
    }catch(_){}
  }

  // ---- inline device actions: select / edit / delete --------------------
  function closeAllRows(){ document.querySelectorAll('.dev.open,.dev.editing').forEach(r=>r.classList.remove('open','editing')); }
  function devAct(label, onClick, cls){
    const b=document.createElement('button'); b.className='dev-act'+(cls?(' '+cls):''); b.textContent=label;
    b.onclick=(e)=>{ e.stopPropagation(); onClick(); }; return b;
  }
  // Inline edit, mirroring the name-plate edit: underline fields, no boxes.
  function buildEdit(dv, row){
    const ed=document.createElement('div'); ed.className='dev-edit';
    ed.innerHTML=
       '<div class="de-field"><div class="de-lbl">Label</div><input class="de-in lbl" placeholder="e.g. living room" autocomplete="off"></div>'
      +'<div class="de-field"><div class="de-lbl">IP address</div><input class="de-in ip" placeholder="e.g. 192.168.1.42" inputmode="decimal" autocomplete="off"></div>'
      +'<div class="de-field"><div class="de-lbl">Device</div><div class="de-types"></div></div>'
      +'<div class="de-row"><button class="de-save">Save</button><button class="dev-act muted cancel">Cancel</button></div>';
    const lbl=ed.querySelector('.lbl'), ip=ed.querySelector('.ip'), types=ed.querySelector('.de-types');
    lbl.value=dv.location||''; ip.value=dv.ip||'';
    let chosen=dv.type;
    SUPPORTED_TYPES.forEach(t=>{
      const b=document.createElement('button'); b.className='de-type'+(t===chosen?' on':''); b.textContent=t;
      b.onclick=()=>{ chosen=t; [...types.children].forEach(c=>c.classList.toggle('on',c===b)); };
      types.appendChild(b);
    });
    ed.querySelector('.cancel').onclick=()=>row.classList.remove('editing');
    ed.querySelector('.de-save').onclick=()=>saveEdit(dv,{location:lbl.value.trim(), ip:ip.value.trim(), type:chosen});
    return ed;
  }
  async function doSelect(dv){
    state.selected=dv.id; renderDevices();
    const label=dv.isPhone?'This Phone':(dv.location||dv.type);
    if(!DEMO && state.email){
      try{ await fetch(API+'/profile/'+encodeURIComponent(state.email)+'/select',{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify({device:dv.id})}); }catch(_){}
    }
    showToast(label+' · selected');
  }
  async function doDelete(dv){
    if(DEMO || !state.email){ closeAllRows(); showToast('Not available in the demo'); return; }
    closeAllRows();
    try{ await fetch(API+'/profile/'+encodeURIComponent(state.email)+'/devices/'+encodeURIComponent(dv.id),{method:'DELETE'}); }catch(_){}
    showToast('Removed'); refresh();
  }
  async function saveEdit(dv, body){
    if(DEMO || !state.email){ closeAllRows(); showToast('Not available in the demo'); return; }
    closeAllRows();
    try{ await fetch(API+'/profile/'+encodeURIComponent(state.email)+'/devices/'+encodeURIComponent(dv.id),{method:'PATCH',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }catch(_){}
    showToast('Saved'); refresh();
  }

  $('addDevice').addEventListener('click', ()=> nav('pierre', session()?{intent:'device'}:{intent:'join'}) );

  // ---- Following: follow members by email; a mutual pair is a friend ----
  const escF = s => String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function flMsg(t, err){ const m=$('followMsg'); if(m){ m.textContent=t||''; m.classList.toggle('err', !!err); } }
  function renderFollows(list){
    const box=$('followList'); if(!box) return;
    if(!session()){ box.innerHTML='<div class="fl-empty">Sign in to follow people.</div>'; return; }
    if(!list || !list.length){ box.innerHTML='<div class="fl-empty">Not following anyone yet. Add a friend’s email below — once you follow each other, you’re friends.</div>'; return; }
    box.innerHTML=list.map(f=>{
      const nm=f.username||String(f.email).split('@')[0];
      return `<div class="fl-row"><div class="fl-av">${escF(nm.charAt(0).toUpperCase())}</div>`
        +`<div class="fl-name">${escF(nm)}<small>${escF(f.email)}</small></div>`
        +(f.friend?'<span class="fl-friend">friend</span>':'')
        +`<button class="fl-x" data-unfollow="${escF(f.email)}" aria-label="Unfollow">×</button></div>`;
    }).join('');
  }
  async function loadFollows(){
    if(!session()){ renderFollows(null); return; }
    try{ const r=await fetch(API+'/profile/'+encodeURIComponent(session())+'/follows');
      if(r.ok){ const d=await r.json(); renderFollows(d.following||[]); } }catch(_){}
  }
  async function doFollow(){
    const email=session(), inp=$('followEmail'); if(!email){ flMsg('Sign in first', true); return; }
    const target=((inp&&inp.value)||'').trim().toLowerCase(); if(!target) return;
    const btn=$('followBtn'); if(btn) btn.disabled=true; flMsg('');
    try{
      const r=await fetch(API+'/profile/'+encodeURIComponent(email)+'/follow',{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify({target})});
      const d=await r.json().catch(()=>({}));
      if(r.ok){ if(inp) inp.value='';
        flMsg(d.friend ? ('You’re friends with '+(d.username||target)) : ('Following '+(d.username||target)));
        loadFollows(); }
      else flMsg(d.error||'Could not follow', true);
    }catch(_){ flMsg('Could not follow', true); }
    finally{ if(btn) btn.disabled=false; }
  }
  document.addEventListener('click', e=>{ const x=e.target.closest('[data-unfollow]'); if(!x||!session()) return;
    fetch(API+'/profile/'+encodeURIComponent(session())+'/follow/'+encodeURIComponent(x.getAttribute('data-unfollow')),{method:'DELETE'})
      .then(()=>loadFollows()).catch(()=>{}); });
  (function wireFollow(){
    const btn=$('followBtn'), inp=$('followEmail');
    if(btn) btn.onclick=doFollow;
    if(inp) inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doFollow(); } });
    loadFollows();
  })();
  window.addEventListener('storage', e=>{ if(e.key==='pg_user'||e.key==='pg_refresh') refresh(); });
  refresh();
  try{ const u=localStorage.getItem('pg_username'); if(u && !session()) $('pname').textContent=u; }catch(_){}

  // ---- long-hold the name plate: reveal the change-photo icon + edit username ----
  const idBlock=document.querySelector('.id'), pname=$('pname');
  let holdTimer=null;
  function revealEdit(){
    cam.classList.remove('hidden');                 // bring back the change-photo affordance
    if(pname.dataset.editing) return;
    pname.dataset.editing='1'; pname.classList.add('editing');
    pname.contentEditable='true'; pname.focus();
    const r=document.createRange(); r.selectNodeContents(pname);
    const sel=getSelection(); sel.removeAllRanges(); sel.addRange(r);
  }
  function commitName(){
    if(!pname.dataset.editing) return;
    delete pname.dataset.editing; pname.classList.remove('editing'); pname.contentEditable='false';
    const name=(pname.textContent||'').trim()||'Guest'; pname.textContent=name;
    if(hasPhoto) cam.classList.add('hidden');       // re-hide the icon if a photo is set
    try{ localStorage.setItem('pg_username', name); }catch(_){}
    const email=session();
    if(email) fetch(API+'/profile/signup',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, username:name})}).catch(()=>{});
  }
  pname.addEventListener('blur', commitName);
  pname.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); pname.blur(); } });
  idBlock.addEventListener('pointerdown', e=>{
    if(e.target.closest('.avatar,.authbtn')) return;   // avatar + auth button own their taps
    holdTimer=setTimeout(revealEdit, 500);
  });
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>
    idBlock.addEventListener(ev, ()=>clearTimeout(holdTimer)));

  // ---- cube embedding: hide phone chrome, fill the face, pinch back ----
  if (window.parent !== window) {
    const sb=document.querySelector('.statusbar'), dock=document.querySelector('.dock'),
          dev=document.querySelector('.device'), stage=document.querySelector('.stage'), face=document.querySelector('.face');
    if(sb) sb.style.display='none';
    if(dock) dock.style.display='none';
    document.documentElement.style.height='100%'; document.body.style.height='100%';
    if(dev){ dev.style.minHeight='100%'; dev.style.height='100%'; dev.style.maxWidth='none'; }
    if(stage){ stage.style.padding='0'; }
    if(face){ face.style.width='100%'; face.style.height='100%'; face.style.maxWidth='none'; face.style.aspectRatio='unset'; face.style.borderRadius='0'; }
    if(face){
      let s=0,a=false;
      face.addEventListener('touchstart',e=>{ if(e.touches.length===2){ s=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY); a=true; } },{passive:true});
      face.addEventListener('touchmove',e=>{ if(!a||e.touches.length<2)return; const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY); if(d<s*0.72){a=false;window.parent.postMessage({type:'pangolin-back'},'*');} },{passive:true});
      face.addEventListener('touchend',()=>{a=false;},{passive:true});
      let _dt=0;
      document.addEventListener('click',e=>{
        if(e.target.closest("button,a,input,textarea,select,label,[role=button],[contenteditable],.id,.tile,.crow,.savings,.res")){ _dt=0; return; }
        const n=Date.now(); if(n-_dt<350){ _dt=0; window.parent.postMessage({type:"pangolin-back"},"*"); } else _dt=n;
      }, true);
    }
  }
</script>
</body>
</html>
