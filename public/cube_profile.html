<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --base:#17120e; --panel:#211a13; --panel-2:#2b2218; --line:#3a2f22;
    --amber:#e89f3d; --text:#f3ebe0; --muted:#a7967f;
    --display:"Space Grotesk",system-ui,sans-serif; --body:"Inter",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0c0907}
  body{display:flex;align-items:center;justify-content:center;padding:16px;font-family:var(--body);color:var(--text)}
  .face{position:relative;width:min(92vw,420px);height:min(92vw,420px);
    background:radial-gradient(120% 80% at 50% -10%, #241b12 0%, var(--base) 60%);
    border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column}
  .head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;flex-shrink:0}
  .label{font-family:var(--mono);font-size:12px;letter-spacing:.18em;color:var(--muted)}
  .badge{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--amber);border:1px solid var(--line);padding:3px 8px;border-radius:999px}
  .body{flex:1;overflow:auto;padding:6px 16px 14px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .who{display:flex;align-items:center;gap:13px;margin:6px 0 16px}
  .avatar{width:60px;height:60px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 35% 30%,#f2b457,var(--amber));
    display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:25px;color:#1a130b}
  .name{font-family:var(--display);font-weight:700;font-size:20px;line-height:1.1}
  .handle{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center}
  .stat .n{font-family:var(--display);font-weight:700;font-size:18px;color:var(--amber)}
  .stat .k{font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:var(--muted);margin-top:3px;text-transform:uppercase}
  .section{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin:4px 0 6px}
  .row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .row .dot{width:8px;height:8px;border-radius:2px;background:var(--amber);flex:0 0 auto}
  .row .t{font-size:13px}
  .row .v{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .stub{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--muted);opacity:.55;text-align:center;padding:7px;flex-shrink:0}
</style>
</head>
<body>
<div class="face">
  <div class="head"><span class="label">PROFILE</span><span class="badge">MEMBER</span></div>
  <div class="body">
    <div class="who">
      <div class="avatar">T</div>
      <div><div class="name">Ted</div><div class="handle">@ted . joined 2026</div></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="n">128</div><div class="k">Shows</div></div>
      <div class="stat"><div class="n">1,340</div><div class="k">Episodes</div></div>
      <div class="stat"><div class="n">$284</div><div class="k">Saved</div></div>
    </div>
    <div class="section">Your taste</div>
    <div class="row"><span class="dot"></span><span class="t">Dark, slow, character-driven</span><span class="v">core</span></div>
    <div class="row"><span class="dot"></span><span class="t">Tense reality competition</span><span class="v">rising</span></div>
    <div class="row"><span class="dot"></span><span class="t">Prestige sci-fi</span><span class="v">steady</span></div>
    <div class="section" style="margin-top:16px">Status</div>
    <div class="row"><span class="dot"></span><span class="t">Pangolin Score contributor</span><span class="v">tier 2</span></div>
    <div class="row"><span class="dot"></span><span class="t">Subsidy active</span><span class="v">5 services</span></div>
  </div>
  <div class="stub">DUMMY . profile face placeholder</div>
</div>
<script>
if (window.parent !== window) {
  document.documentElement.style.height = "100%";
  document.body.style.padding = "0";
  document.body.style.height = "100%";
  document.body.style.alignItems = "stretch";
  const face = document.querySelector(".face");
  if (face) {
    face.style.width = "100%"; face.style.height = "100%"; face.style.borderRadius = "0"; face.style.border = "0";
    let s = 0, a = false;
    face.addEventListener("touchstart", e => { if (e.touches.length === 2) { s = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY); a = true; } }, { passive: true });
    face.addEventListener("touchmove", e => { if (!a || e.touches.length < 2) return; const d = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY); if (d < s * 0.72) { a = false; window.parent.postMessage({ type: "pangolin-back" }, "*"); } }, { passive: true });
    face.addEventListener("touchend", () => { a = false; }, { passive: true });
  }
}
</script>
</body>
</html>
