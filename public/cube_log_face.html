  } else if(!nested){
    const lock=document.createElement('div');
    lock.style.cssText='width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.12);color:var(--dim);font-size:18px;flex-shrink:0;';
    lock.innerHTML='<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
    line.appendChild(lock);
  }

  const txt=document.createElement('div');
  txt.style.flex='1'; txt.style.minWidth='0'; txt.style.color=tier;   // friend=orange, reply=green
  const who=`<span style="color:${tier};font-weight:600;">${escHtml(c.author)}</span>`;
  const when=`<strong>${escHtml(c.epCode)} ${c.time}</strong>`;
  if(!c.revealed){
    txt.innerHTML=`${when} · ${who} — <em style="opacity:.6;">reveals at ${c.time}</em>`;
  } else if(nested){
    txt.innerHTML=`${who} — ${escHtml(c.text)}`;
  } else {
    // Audio is the default; the words sit behind a tap (audio default + per-comment text).
    const repliedTag = replied.has(c.id) ? ` <span style="color:${tier};opacity:.8;">· ✓ replied</span>` : '';
    txt.innerHTML=`${when} · ${who}${repliedTag} — <a href="#" style="color:var(--amber);text-decoration:none;">show text ▾</a><span style="display:none;">${escHtml(c.text)}</span>`;
    const a=txt.querySelector('a'), span=txt.querySelector('span:last-child');
    a.onclick=(e)=>{ e.preventDefault(); const open=span.style.display!=='none';
      span.style.display=open?'none':'inline'; a.textContent=open?'show text ▾':'hide text ▴'; };
  }
  line.appendChild(txt);
  return line;
}

// "Friend watched & commented" banner — distinct from the friend picker. Lists
// the co-viewers who actually have comments on this episode and how many.
function coviewIndicator(container){
  const byAuthor = {};
  coviewComments.forEach(c=>{ if(!c.replyTo) byAuthor[c.author]=(byAuthor[c.author]||0)+1; });
  const names = Object.keys(byAuthor);
  if(!names.length) return;
  const b=document.createElement('div');
  b.style.cssText='margin-bottom:14px;padding:8px 12px;border-radius:8px;background:rgba(108,192,112,.12);border:1px solid rgba(108,192,112,.35);color:#6cc070;font-size:12px;';
  const parts=names.map(n=>`${escHtml(n)} · ${byAuthor[n]} comment${byAuthor[n]>1?'s':''}`);
  b.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6cc070;margin-right:7px;vertical-align:baseline;"></span>watched &amp; commented — ${parts.join(' · ')}`;
  container.appendChild(b);
}

// Pull this member's saved audio comments for the current show and render them.
// Called on show load so the Transcripts panel survives reloads.
async function loadComments(){
  transcripts = [];
  const email = (typeof acctEmail==='function' ? acctEmail() : '');
  if(!curShowId || !email){ paintTranscripts(); return; }
  try{
    const r = await fetch(`${API_BASE}/transcribe/comments?showId=${encodeURIComponent(curShowId)}&email=${encodeURIComponent(email)}`);
    if(!r.ok){ paintTranscripts(); return; }
    const d = await r.json();
    transcripts = (d.comments||[]).map(c=>{
      const m = Math.round((c.timestampMs||0)/60000);
      return {
        id: c.id,
        edited: !!c.edited,
        replyTo: c.replyTo || null,   // reply → excluded from the per-episode comment cap
        hasText: !!(c.transcription && c.transcription.trim()),
        epCode: c.episodeId || '',
        time: `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`,
        audioUrl: c.audioUrl,
        text: (c.transcription && c.transcription.trim()) || 'Audio recorded'
      };
    });
  }catch(_){ /* leave whatever we have */ }
  paintTranscripts();
}

// Branded edit dialog: a multi-line textarea (unlike native prompt(), which
// truncates to one line) prefilled with the full text. Resolves the new text, or
// null on cancel.
function txEditDialog(current){
  return new Promise((resolve)=>{
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.62);';
    const card=document.createElement('div');
    card.style.cssText='width:100%;max-width:420px;box-sizing:border-box;background:#191410;border:1px solid rgba(240,169,59,.28);border-radius:14px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);';
    card.innerHTML='<div style="font-weight:700;color:var(--text);margin-bottom:10px;font-size:1.02em;">Fix the transcription <span style="color:var(--dim);font-weight:400;">(you can do this once)</span></div>';
    const ta=document.createElement('textarea');
    ta.value=current;
    ta.style.cssText='width:100%;min-height:130px;resize:vertical;box-sizing:border-box;padding:10px 12px;border-radius:10px;border:1px solid rgba(240,169,59,.3);background:#0f0c08;color:var(--text);font-family:var(--body);font-size:1em;line-height:1.4;';
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:10px;justify-content:flex-end;margin-top:12px;';
    const cancel=document.createElement('button');
    cancel.textContent='Cancel';
    cancel.style.cssText='padding:10px 16px;border-radius:9px;border:1px solid rgba(255,255,255,.22);background:transparent;color:var(--text);cursor:pointer;font-family:var(--body);font-size:1em;';
    const save=document.createElement('button');
    save.textContent='Save';
    save.style.cssText='padding:10px 20px;border-radius:9px;border:none;background:var(--amber);color:var(--amber-deep);font-weight:700;cursor:pointer;font-family:var(--body);font-size:1em;';
    let done=false; const close=(v)=>{ if(done) return; done=true; try{ov.remove();}catch(_){ } resolve(v); };
    cancel.onclick=()=>close(null);
    save.onclick=()=>close(ta.value);
    ov.addEventListener('click',(e)=>{ if(e.target===ov) close(null); });   // tap the scrim → cancel
    row.appendChild(cancel); row.appendChild(save);
    card.appendChild(ta); card.appendChild(row);
    ov.appendChild(card);
    document.body.appendChild(ov);
    setTimeout(()=>{ try{ ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }catch(_){ } }, 30);
  });
}

// One-time transcription fix. Prefill the dialog with Whisper's attempt; on save
// PATCH it and lock the pencil (the server enforces the once-only rule too).
async function editTranscript(t){
  if(!t || !t.id) return;
  const email = (typeof acctEmail==='function' ? acctEmail() : '');
  if(!email) return;
  const current = t.hasText ? t.text : '';
  const next = await txEditDialog(current);
  if(next==null) return;
  const text = next.trim();
  if(!text || text===current){ return; }
  try{
    const r = await fetch(`${API_BASE}/transcribe/${encodeURIComponent(t.id)}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, text }) });
    if(r.ok){ t.text=text; t.hasText=true; t.edited=true; paintTranscripts(); }
    else if(r.status===409){ t.edited=true; paintTranscripts(); alert('This comment was already corrected once.'); }
    else { alert('Could not save the correction.'); }
  }catch(_){ alert('Could not save the correction.'); }
}

// A small icon button (SVG, stroke-based) for the transcript control toolbar.
function txIconBtn(kind, title, wide){
  const paths = {
    edit:   '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>',
    cancel: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    delete: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>'
  };
  const b = document.createElement('button');
  b.type = 'button';
  b.title = title;
  b.setAttribute('aria-label', title);
  // Action buttons stretch to share the row equally (wide, hard to mistap, one line);
  // the toggle stays a compact 26px square.
  const size = wide ? 'flex:1 1 0;min-width:0;height:32px;' : 'width:26px;height:26px;flex-shrink:0;';
  b.style.cssText = size + 'padding:0;display:inline-flex;align-items:center;justify-content:center;vertical-align:-0.35em;border-radius:.3em;background:var(--dred);border:none;color:var(--text);cursor:pointer;';
  b.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[kind]}</svg>`;
  return b;
}

// The per-comment toolbar: a pencil toggle that opens three options —
// cancel (collapse), edit (one-time transcription fix), delete (remove for good).
function txControls(t){
  // display:contents → the wrap adds no box, so the toggle flows inline at the end
  // of the text (floated right) while the open bar drops onto its own row below.
  const wrap = document.createElement('span');
  wrap.style.cssText = 'display:contents;';

  const toggle = txIconBtn('edit', 'Edit or delete');
  toggle.style.float = 'right';        // sit at the right end of the comment text
  toggle.style.marginLeft = '.4em';
  const bar = document.createElement('span');
  bar.style.cssText = 'gap:6px;width:100%;clear:both;margin-top:6px;';   // full-width row below the text
  bar.style.display = 'none';

  const cancel = txIconBtn('cancel', 'Cancel', true);
  const edit   = txIconBtn('edit', t.edited ? 'Transcription already corrected' : 'Fix transcription (once)', true);
  const del    = txIconBtn('delete', 'Delete comment', true);
  if(t.edited){ edit.disabled = true; edit.style.opacity = '.4'; edit.style.cursor = 'default'; }

  toggle.onclick = ()=>{ toggle.style.display='none'; bar.style.display='flex'; };
  cancel.onclick = ()=>{ bar.style.display='none'; toggle.style.display='inline-flex'; };
  edit.onclick   = ()=>{ if(!t.edited) editTranscript(t); };
  del.onclick    = ()=>{ deleteTranscript(t); };

  bar.appendChild(cancel); bar.appendChild(edit); bar.appendChild(del);
  wrap.appendChild(toggle); wrap.appendChild(bar);
  return wrap;
}

// Delete one of your own comments for good (server drops the row + R2 audio and
// any replies threaded under it). Optimistically remove it from the panel.
async function deleteTranscript(t){
  if(!t || !t.id) return;
  const email = (typeof acctEmail==='function' ? acctEmail() : '');
  if(!email) return;
  if(!confirm('Delete this comment? This cannot be undone.')) return;
  try{
    const r = await fetch(`${API_BASE}/transcribe/${encodeURIComponent(t.id)}`, {
      method:'DELETE', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email }) });
    if(r.ok || r.status===404){
      transcripts = transcripts.filter(x=> x.id !== t.id);
      paintTranscripts();
    } else if(r.status===403){ alert('That comment is not yours to delete.'); }
    else { alert('Could not delete the comment.'); }
  }catch(_){ alert('Could not delete the comment.'); }
}

// ─── Co-viewing: friends' comments, spoiler-gated by your own progress ────────
// who + when render immediately; the words unlock as your minute mark passes
// each comment. Opt-in per show, stored in pg_coview:<showId>. Gating is enforced
// server-side (it withholds text/audio until seenMs >= the mark), so we re-fetch
// when you cross the next locked mark to pull the newly-revealed content.
let coviewComments = [];        // [{author, epCode, time, ms, revealed, text, audioUrl}]
let coviewNextLock = Infinity;  // smallest still-locked mark (ms), for live re-fetch
let coviewFriends  = [];        // [{email, username}] — all mutual follows, auto-included
let _coviewFocus   = -1;        // episode the loaded co-view comments belong to
let _announcedKey   = '';       // show#episode of the last load — tells a first load from a live crossing
// Furthest-watched position in the focused episode, in ms — the reveal watermark.
function coviewSeenMs(){
  const m = epDone[focus] ? runtimeOf(focus)
          : (minPreview!=null ? minPreview : (epMin[focus]||0));
  return Math.round(Math.max(0, m) * 60000);
}

// Pull the mutual-follow list, then load their comments. Every confirmed friend is
// auto-included — no per-show opt-in. Drives loadCoview once the list is in hand.
async function loadFriends(){
  const email = (typeof acctEmail==='function' ? acctEmail() : '');
  if(!email){ coviewFriends=[]; return; }
  try{
    const r = await fetch(`${API_BASE}/profile/${encodeURIComponent(email)}/follows`);
    if(r.ok){ const d=await r.json(); coviewFriends=(d.friends||[]).map(f=>({email:f.email, username:f.username||f.email})); }
  }catch(_){ /* no friends list → nothing to co-view */ }
  loadCoview();
}

// Fetch friends' comments for the focused episode at the current watermark.
// All mutual friends are included; the server re-checks the follow both ways.
async function loadCoview(){
  coviewComments=[]; coviewNextLock=Infinity; _coviewFocus=focus;
  const email = (typeof acctEmail==='function' ? acctEmail() : '');
  const set = coviewFriends.map(f=>f.email), e = eps[focus];
  if(!curShowId || !email || !e || !set.length){ paintTranscripts(); return; }
  try{
    const u = new URL(`${API_BASE}/transcribe/coview`);
    u.search = new URLSearchParams({ showId:curShowId, episodeId:epCode(e), email,
      with:set.join(','), seenMs:String(coviewSeenMs()) }).toString();
    const r = await fetch(u); if(!r.ok){ paintTranscripts(); return; }
    const d = await r.json();
    coviewComments = (d.comments||[]).map(c=>{
      // The comment surfaces 30 seconds after its mark — gate, lock and the
      // "reveals at" clock all run off revealMs, not the raw timestamp.
      const reveal = (c.revealMs!=null) ? c.revealMs : ((c.timestampMs||0)+30000);
      const rm = Math.round(reveal/60000);
      if(!c.revealed) coviewNextLock = Math.min(coviewNextLock, reveal);
      return { id:c.id, author:c.author||'friend', authorEmail:c.authorEmail||'',
        epCode:c.episodeId||epCode(e),
        time:`${Math.floor(rm/60)}:${String(rm%60).padStart(2,'0')}`,
        ms:c.timestampMs||0, revealMs:reveal, replyTo:c.replyTo||null, phone:c.phone||null,
        revealed:!!c.revealed, audioUrl:c.audioUrl||null,
        text:(c.transcription && c.transcription.trim()) || 'Audio recorded' };
    });
    // Surface a friend's comment as a top-bar notification. Any revealed comment you
    // haven't been notified about (persistent "heard" set) pops the banner — on first
    // load OR as you reach it. A comment that crosses the line during a LIVE watch also
    // tries to autoplay; otherwise one tap on the banner plays it (the reliable path
    // where browsers block autoplay). Each comment notifies at most once, ever.
    const epKey = (curShowId||'')+'#'+focus;
    const firstForEp = (_announcedKey !== epKey);
    _announcedKey = epKey;
    const heard = coviewHeardSet();
    const fresh = coviewComments.filter(c=>!c.replyTo && c.revealed && c.audioUrl && !heard.has(c.id));
    if(fresh.length){
      surfaceCoview(fresh[fresh.length-1], !firstForEp);   // latest unheard; autoplay only on a live crossing
      fresh.forEach(c=> coviewMarkHeard(c.id));
    }
    updateMicMode();
  }catch(_){ /* leave whatever we have */ }
  paintTranscripts();
}
// Called from the minute-bar tick: once you pass the next locked mark, re-fetch
// so the newly-reached comments unlock. Cheap — bounded by one fetch per crossing.
function coviewCheckReveal(){
  if(_coviewFocus!==focus){ loadCoview(); return; }     // switched episodes → reload
  if(coviewNextLock===Infinity) return;                 // nothing left to unlock
  if(coviewSeenMs() >= coviewNextLock) loadCoview();
}

// ─── Co-view replies: the green REPLY mic + the sms: hand-off ─────────────────
// Once a friend's comment has surfaced (passed mark + 30s), the centre mic
// flips to REPLY mode — green ring, "REPLY" sublabel — targeting the most recent
// unanswered comment. Tapping records the reply in-app and opens a native SMS
// draft to the friend (no text server: it's an sms: deep link). Replied ids are
// remembered locally so the mic reverts and the row shows "✓ replied".
function coviewRepliedKey(){ const e=(typeof acctEmail==='function'?acctEmail():''); return (curShowId && e) ? 'pg_coview_replied:'+e+':'+curShowId : null; }
function coviewRepliedSet(){ try{ return new Set(JSON.parse(localStorage.getItem(coviewRepliedKey())||'[]')); }catch(_){ return new Set(); } }
function coviewMarkReplied(id){ const k=coviewRepliedKey(); if(!k||!id) return;
  const s=coviewRepliedSet(); s.add(id); try{ localStorage.setItem(k, JSON.stringify([...s])); }catch(_){} }

// The reply window. A friend's comment is only answerable while it's *current*:
// a flat 15 second countdown, shown as 15 green ticks around the REPLY mic, one
// blinking out per second. The countdown only advances while the app is live —
// the tick interval skips while document.hidden, so sleep just pauses the clock
// and the remaining seconds resume on wake (no collapse) — and it also pauses
// while a recording is in flight. Live crossing and catch-up get the same 15s.
// Outside the window the mic is a plain record button again.
const REPLY_WINDOW_S = 15;   // seconds = ticks on the REPLY mic; only runs while visible
let activeReply = null;      // { c } — the one comment currently answerable
let replySecsLeft = 0;       // seconds remaining; only ticks while the app is visible
let _replyInterval = null;

function armReplyWindow(c, secs){
  activeReply = { c };
  replySecsLeft = secs;
  if(!_replyInterval){
    _replyInterval = setInterval(()=>{
      if(!activeReply){ clearInterval(_replyInterval); _replyInterval=null; return; }
      if(document.hidden || isRecording) return;   // sleep + recording don't count
      replySecsLeft--;
      if(replySecsLeft<=0){ closeReplyWindow(); return; }
      _syncReplySegs();
    }, 1000);
  }
  updateMicMode(); _buildReplyRing();
}
function closeReplyWindow(){
  activeReply = null; replySecsLeft = 0;
  if(_replyInterval){ clearInterval(_replyInterval); _replyInterval=null; }
  updateMicMode();
}
// The segmented green countdown ring around the REPLY mic: one arc per second of
// window when armed, blinking out as time runs down (same geometry as the REC
// ring: r=46 in a 100 viewBox → C≈289.03).
let _replyRingTotal = 0;
function _buildReplyRing(){
  const btn=$('micBtn'); if(!btn) return;
  btn.querySelector('.reply-ring')?.remove();
  _replyRingTotal = replySecsLeft;
  if(!activeReply || _replyRingTotal<=0) return;
  const C=289.03, step=C/_replyRingTotal, seg=Math.max(4, step-6);   // arc + 6px gap per segment
  let segs='';
  for(let i=0;i<_replyRingTotal;i++){
    segs += `<circle class="reply-seg" data-i="${i}" cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-dasharray="${seg.toFixed(2)} ${(C-seg).toFixed(2)}" stroke-dashoffset="${(-step*i).toFixed(2)}" transform="rotate(-90 50 50)"/>`;
  }
  btn.insertAdjacentHTML('beforeend', `<svg class="reply-ring" viewBox="0 0 100 100" aria-hidden="true">${segs}</svg>`);
}
function _syncReplySegs(){
  const svg=$('micBtn')?.querySelector('.reply-ring'); if(!svg) return;
  svg.querySelectorAll('.reply-seg').forEach(s=>{
    s.style.opacity = (+s.getAttribute('data-i') < replySecsLeft) ? '1' : '0';
  });
}
// "Heard" = comments you've already been notified about, persisted per account+show so
// the banner shows once and doesn't re-nag on every reload.
function coviewHeardKey(){ const e=(typeof acctEmail==='function'?acctEmail():''); return (curShowId && e) ? 'pg_coview_heard:'+e+':'+curShowId : null; }
function coviewHeardSet(){ try{ return new Set(JSON.parse(localStorage.getItem(coviewHeardKey())||'[]')); }catch(_){ return new Set(); } }
function coviewMarkHeard(id){ const k=coviewHeardKey(); if(!k||!id) return; const s=coviewHeardSet(); s.add(id); try{ localStorage.setItem(k, JSON.stringify([...s])); }catch(_){} }

// Surface a friend's comment: arm the reply window, show the banner, and (on a live
// crossing) try to autoplay. Both a live crossing and a catch-up (it surfaced while
// you were away) get the full 15s window; on autoplay it's restarted when the clip
// finishes so the whole countdown is usable after hearing it.
function surfaceCoview(c, autoplay){
  if(!c || !c.audioUrl) return;
  armReplyWindow(c, REPLY_WINDOW_S);
  showCoviewToast(c);
  if(autoplay){
    playClip(c.audioUrl, null, { silent:true, onEnded:()=>{
      if(activeReply && activeReply.c.id===c.id) armReplyWindow(c, REPLY_WINDOW_S);
    }});
  }
}

// A friend's comment just reached its mark → slide a notification in from the top.
// Tapping it plays the clip (a user tap guarantees audio even where autoplay is
// blocked) and leaves the REPLY mic armed; ✕ or a timeout dismisses it.
let _toastTimer = null;
function showCoviewToast(c){
  const t=$('coviewToast'); if(!t || !c) return;
  t.querySelector('.ct-who').textContent = c.author || 'friend';
  const preview = (c.text && c.text !== 'Audio recorded') ? c.text : 'voice comment';
  t.querySelector('.ct-txt').textContent = `${c.epCode} ${c.time} · ${preview}`;
  t.style.display='flex';
  requestAnimationFrame(()=> t.classList.add('show'));
  t.onclick=(e)=>{
    if(e.target.classList.contains('ct-x')){ hideCoviewToast(); return; }
    // Explicit tap → audio is guaranteed; re-arm the full window so the mic goes green.
    armReplyWindow(c, REPLY_WINDOW_S);
    playClip(c.audioUrl, null, { onEnded:()=>{
      if(activeReply && activeReply.c.id===c.id) armReplyWindow(c, REPLY_WINDOW_S);
    }});
    hideCoviewToast();
  };
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(hideCoviewToast, 9000);
}
function hideCoviewToast(){
  const t=$('coviewToast'); if(!t) return;
  t.classList.remove('show');
  if(_toastTimer){ clearTimeout(_toastTimer); _toastTimer=null; }
  setTimeout(()=>{ if(!t.classList.contains('show')) t.style.display='none'; }, 360);
}
// The comment the REPLY mic points at: whatever's inside its (still-open) window
// and that you haven't already answered.
function coviewReplyTarget(){
  if(!activeReply || replySecsLeft<=0) return null;
  if(coviewRepliedSet().has(activeReply.c.id)) return null;
  return activeReply.c;
}

// Reflect the reply target on the mic: green + "REPLY" when one is pending, plain
// record mic otherwise. Never fights the recording countdown.
function updateMicMode(){
  const btn=$('micBtn'), label=$('micLabel');
  if(!btn) return;
  if(isRecording){ btn.classList.remove('replymode'); return; }
  const t=coviewReplyTarget();
  if(t){ btn.classList.add('replymode'); if(label){ label.style.display='block'; label.textContent='REPLY'; } btn.setAttribute('aria-label','Reply to '+t.author); }
  else { btn.classList.remove('replymode'); btn.querySelector('.reply-ring')?.remove();
    if(label){ label.style.display='none'; label.textContent=''; } btn.setAttribute('aria-label','Record audio comment'); }
}

// OTT = the show is on another screen (TV/device), so the phone is free to
// record an audio reply. When the phone IS the screen we can't, so we fall back
// to the SMS text hand-off. (A full native app would push a banner instead.)
function isOTT(){ try{ return (localStorage.getItem('pg_device_kind')||'phone') !== 'phone'; }catch(_){ return false; } }

let pendingReply = null;   // the comment an in-flight audio recording is replying to

// Tap on the green REPLY mic. OTT → record an audio reply; on-device → text+SMS.
function replyTap(target){
  if(!target) return;
  if(isOTT()){
    pendingReply = target;                 // tag the next recording as a reply
    recordAudioComment();
  } else {
    replyFlow(target);
  }
}

async function replyFlow(target){
  if(!target) return;
  const body = prompt(`Reply to ${target.author} (${target.epCode} ${target.time}) — sends a text:`);
  if(body==null) return;
  const text=body.trim(); if(!text){ return; }
  const email = (typeof acctEmail==='function' ? acctEmail() : '');
  // Record the reply in-app so the original commenter sees it; best-effort, the
  // SMS draft opens regardless so the reply still reaches them.
  if(email && target.id){
    try{
      await fetch(`${API_BASE}/transcribe/reply`, { method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, showId:curShowId, episodeId:target.epCode, replyTo:target.id, text }) });
    }catch(_){ /* the SMS draft below is the fallback path */ }
  }
  coviewMarkReplied(target.id);
  // Reload co-view so the reply threads in under the friend's comment (the audio
  // path already does this; the text path used to skip it, so the reply appeared
  // to vanish).
  loadCoview(); closeReplyWindow();
  // Native text hand-off — no SMS server, just the OS Messages compose sheet.
  const intro=`re: ${target.epCode} ${target.time} — `;
  if(target.phone){ openExternal('sms:'+target.phone+'?&body='+encodeURIComponent(intro+text)); }
  else { alert('Reply saved — '+target.author+" hasn't added a phone number, so no text was sent."); }
}

// Same iframe caveat as the profile face: sms:/mailto: must be driven from the top
// window, not the embedded face's own location, or the hand-off is swallowed.
function openExternal(url){
  try{ (window.top||window).location.href=url; }
  catch(_){ window.location.href=url; }
}

// Show a segment for each remaining second; fade out those already elapsed.
function _syncRecSegs(){
  const svg=$('micBtn')?.querySelector('.rec-ring'); if(!svg) return;
  svg.querySelectorAll('.rec-seg').forEach(s=>{
    s.style.opacity = (+s.getAttribute('data-i') < recordingCountdown) ? '1' : '0';
  });
}

async function startRecording(){
  isRecording = true;
  recordingCountdown = 7;
  audioChunks = [];

  try {
    console.log('Requesting microphone access...');
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log('Microphone access granted');

    // Try WAV format for Whisper compatibility, fallback to browser default
    const options = { mimeType: 'audio/wav' };
    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
      console.log('WAV not supported, using browser default');
      delete options.mimeType;
    }

    mediaRecorder = new MediaRecorder(stream, options);
    mediaRecorder.ondataavailable = (e) => {
      audioChunks.push(e.data);
      console.log('Audio chunk recorded:', e.data.size, 'bytes');
    };
    mediaRecorder.start();
  } catch(err){
    console.error('Microphone error:', err);
    isRecording = false;
    alert('Microphone access denied: ' + err.message);
    return;
  }

  const micBtn = $('micBtn');
  const micLabel = $('micLabel');
  if(micBtn){
    micBtn.classList.remove('replymode');   // recording overrides any pending REPLY prompt
    micBtn.classList.add('recording');      // a reply records red (REC) same as a comment
    if(micLabel){
      micLabel.style.display = 'flex';   // column layout for the stacked REC + seconds
      micLabel.innerHTML = `<span class="rec-word">REC</span>`;   // ring is the countdown; no number
    }
    // Segmented countdown ring: one arc per second, blinking out as time runs down.
    micBtn.querySelector('.rec-ring')?.remove();
    const C=289.03, step=C/recordingCountdown, seg=Math.max(6, step-11);   // arc + gap per segment
    let segs='';
    for(let i=0;i<recordingCountdown;i++){
      segs += `<circle class="rec-seg" data-i="${i}" cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-dasharray="${seg.toFixed(2)} ${(C-seg).toFixed(2)}" stroke-dashoffset="${(-step*i).toFixed(2)}" transform="rotate(-90 50 50)"/>`;
    }
    micBtn.insertAdjacentHTML('beforeend', `<svg class="rec-ring" viewBox="0 0 100 100" aria-hidden="true">${segs}</svg>`);
  }
  recordingInterval = setInterval(()=>{
    recordingCountdown--;
    _syncRecSegs();   // hide one more segment for each second elapsed
    if(recordingCountdown <= 0) stopRecording();
  }, 1000);
  console.log('Recording started');
}

function stopRecording(){
  console.log('stopRecording called, audioChunks:', audioChunks.length);
  isRecording = false;
  if(recordingInterval) clearInterval(recordingInterval);
  recordingCountdown = 0;
  const micBtn = $('micBtn');
  const micLabel = $('micLabel');
  if(micBtn){
    micBtn.classList.remove('recording');
    micBtn.querySelector('.rec-ring')?.remove();
    if(micLabel){
      micLabel.style.display = 'none';
      micLabel.textContent = '';
    }
  }
  updateMicMode();   // restore REPLY prompt if a friend comment is still waiting

  // Stop recording and wait for all chunks to be collected
  if(!mediaRecorder || mediaRecorder.state === 'inactive'){
    console.log('No active recording to stop');
    return;
  }

  // Use a Promise to wait for the stop event
  mediaRecorder.onstop = async () => {
    console.log('MediaRecorder stopped, audioChunks:', audioChunks.length);
    mediaRecorder.stream.getTracks().forEach(track => track.stop());

    // Post audio to Worker for transcription
    const e = eps[focus];
    console.log('After stop: episode exists:', !!e, 'audioChunks:', audioChunks.length);
    if(!e || audioChunks.length === 0){
      console.log('Skipping transcription: no episode or no chunks');
      return;
    }

    // If this recording is an audio reply, the server re-anchors it at the
    // parent's mark; we just tag it. Capture + clear so the next recording is clean.
    const rTgt = pendingReply; pendingReply = null;

    const code = epCode(e);
    const mins = Math.round((epMin[focus]||0));
    const timeStr = `${Math.floor(mins/60)}:${String(mins%60).padStart(2,'0')}`;

    // Detect the actual audio format from the first chunk
    let audioType = 'audio/webm';
    if(audioChunks.length > 0) {
      const firstChunk = audioChunks[0];
      // WAV files start with RIFF header
      if(firstChunk instanceof Blob) {
        audioType = firstChunk.type || 'audio/webm';
      }
    }
    console.log('Audio format detected:', audioType);

    const audioBlob = new Blob(audioChunks, { type: audioType });
    console.log('Audio blob created:', audioBlob.size, 'bytes, type:', audioBlob.type);
    const formData = new FormData();
    formData.append('audio', audioBlob);
    formData.append('episodeId', code);
    if(curShowId) formData.append('showId', curShowId);
    formData.append('timestampMs', mins * 60000);

    // Single identity of record: localStorage pg_user — the SAME source loadComments
    // lists by. Falling back to window.parent.currentUser here let a comment be written
    // under one account but listed under another, which read as "comments paired to the
    // device." The server FKs user_email → users(email); a missing email is guarded below.
    const userEmail = (typeof acctEmail==='function' ? acctEmail() : '');
    if(!userEmail){
      transcripts.unshift({ epCode: code, time: timeStr, text: '[not signed in — sign in to save audio]' });
      paintTranscripts();
      return;
    }
    formData.append('userEmail', userEmail);
    if(rTgt && rTgt.id) formData.append('replyTo', rTgt.id);

    try {
      console.log('Sending transcription request for', code);
      const res = await fetch('https://pangolin-rc.edward-m-willett.workers.dev/transcribe', {
        method: 'POST',
        body: formData,
        mode: 'cors'
      });
      console.log('Transcribe response:', res.status, res.statusText);

      if(!res.ok){
        const errText = await res.text();
        console.error('Transcribe error:', res.status, errText);
        // Cap reached (server-enforced 409 on an original comment): brief notice,
        // no error row. The mic normally blocks this, so a 409 here is a race.
        if(res.status===409 && !rTgt){ notifyCommentCap(); return; }
        transcripts.unshift({
          epCode: code,
          time: timeStr,
          text: `[error ${res.status}: ${errText.substring(0, 50)}]`
        });
        paintTranscripts();
        return;
      }

      const data = await res.json();
      console.log('Audio upload complete:', data);

      if(rTgt){
        // An audio reply: don't list it among your own comments — mark the target
        // replied and reload co-view so it threads under the friend's comment.
        coviewMarkReplied(rTgt.id);
        closeReplyWindow();
        loadCoview();
      } else {
        // A normal comment: store the playback URL + transcript, persisted now.
        // Carry the server's comment id (+ edit state) so the one-time ✎ pencil
        // renders immediately — without id the pencil only appeared after a reload.
        const txt = (data.transcription && data.transcription.trim()) || '';
        transcripts.unshift({
          id: data.id,
          edited: false,
          hasText: !!txt,
          epCode: code,
          time: timeStr,
          audioUrl: data.audioUrl,
          text: txt || 'Audio recorded'
        });
        paintTranscripts();
      }
    } catch(err){
      console.error('Transcription fetch error:', err.message);
      transcripts.unshift({
        epCode: code,
        time: timeStr,
        text: `[error: ${err.message}]`
      });
      paintTranscripts();
    }
  };

  console.log('Calling mediaRecorder.stop()');
  mediaRecorder.stop();
}

function recordAudioComment(){
  console.log('recordAudioComment called, isRecording:', isRecording);
  if(isRecording) {
    stopRecording();
  } else {
    startRecording().catch(err => {
      console.error('startRecording error:', err);
      isRecording = false;
    });
  }
}

// Force-advance / skip: the episode is logged "BP" (Before PangolinRC) and we jump on.
function forceAdvance(){
  const rt=runtimeOf(focus);
  epDone[focus]=true; epBp[focus]=true; epPreApp[focus]=true; epMin[focus]=rt; minPreview=null; awaitingLog=false; cooled=false;  // BP = pre-app
  markWatchedThrough(focus);
  logSession(focus,{minutes:rt,finished:true,bp:true});
  emitProgress(focus, true, true, 0);
  finaleCheck(); advanceFocus(); paint();
}

// START / CONTINUE: begin (or resume) a watch. This is the ONLY entry point that
// puts the episode into the animated "watching" state.
function startEpisode(){
  startedAt[focus]=Date.now(); sessionBase[focus]=epMin[focus]||0; minPreview=null; awaitingLog=false;
  watchingLive[focus]=true;   // enter the animated "watching" state
  _lastLoggedMin[focus]=Math.floor(epMin[focus]||0);   // baseline so the next whole minute persists
  openWatchViewing(focus);    // persist the open watching viewing (survives reload)
  emitProgress(focus, false, false, Math.round(epMin[focus]||0));
  paint();
}
// The latest finish timestamp across this show's logged viewings, capped at `before`.
// Used to back-date a click-FINISH without overlapping (crashing into) a prior watch.
function latestFinishBefore(before){
  let m=0;
  for(const k in epSessions){ const arr=epSessions[k]||[];
    for(const s of arr){ if(typeof s.finishTs==='number' && s.finishTs<before && s.finishTs>m) m=s.finishTs; } }
  return m;
}
// Runtime-mismatch check. When a member completes an episode after a real live watch
// that ran well short of the stored runtime, the stored runtime is probably too long
// (e.g. "Ghosts" stored at 30 min but episodes run ~22). We accept the completion
// instantly (the override) and hand the actual watched minutes to the server, which
// asks TMDB for a second opinion: if TMDB sits closer to what was logged it corrects
// the catalog runtime, otherwise it files a mismatch for the admin. Debounced via
// pg_rt_warned:<key> so re-watches don't re-ping the server.
function reportRuntimeMismatch(i, watchedMin, rt){
  try{
    const e = eps[i] || {};
    const key = 'pg_rt_warned:'+(curShowId||'?')+':'+epCode(e);
    if(localStorage.getItem(key)) return;            // already checked this episode
    localStorage.setItem(key, '1');
    fetch(`${API_BASE}/catalog/runtime-check`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email:(typeof acctEmail==='function'?acctEmail():''),
        title_id:curShowId, season:(e.season||1), number:(e.number||0),
        watched_min:Math.round(watchedMin) }) }).catch(()=>{});
  }catch(_){ /* best-effort; never block completion */ }
}

// FINISH: logs the episode fully watched and advances.
//  · With a live watch open, tapping done inside a minute is a tap-through, not a
//    sitting → BP.
//  · With no live watch, back-date a full runtime, but never earlier than this user's
//    previous logged watch. If that clamp leaves LESS than a runtime of room (you
//    just finished something), there was no time for a real watch here → BP. A
//    standalone finish with a full runtime of room stays a legitimate watch.
// BP never counts toward a binge and renders grey with no date.
function finishEpisode(){
  const rt=runtimeOf(focus), now=Date.now();
  // Capture the real live-watched span BEFORE the backdate branch overwrites startedAt,
  // so the runtime-mismatch check below sees true elapsed (not a synthesized full runtime).
  const liveElapsed = startedAt[focus]!=null ? (now-startedAt[focus])/60000 : null;
  let bp;
  if(startedAt[focus]!=null){
    bp = (now - startedAt[focus]) < 60000;
  } else {
    startedAt[focus]=Math.max(now-rt*60000, latestFinishBefore(now));
    // 15% wiggle: skipping the intro and cutting the credits can turn a 60-min episode
    // into ~50, so anything down to 85% of runtime still counts as a real watch; less
    // room than that since the previous log → it couldn't be a real sitting → BP.
    bp = (now - startedAt[focus]) < rt*60000*0.85;
  }
  epMin[focus]=rt; epDone[focus]=true; epBp[focus]=bp; epPreApp[focus]=bp; minPreview=null; awaitingLog=false; cooled=false; watchingLive[focus]=false;
  try{ localStorage.removeItem('pg_launch'); }catch(_){}
  markWatchedThrough(focus);
  logSession(focus,{minutes:rt,finished:true,bp:bp});
  emitProgress(focus, true, bp, rt);
  // Completing after a genuine live watch that ran short of the stored runtime (watched
  // ≥ half, yet ≥ 5 min still "remaining") points at a too-long catalog runtime → warn admin.
  if(liveElapsed!=null && liveElapsed>=5 && liveElapsed>=rt*0.5 && (rt-liveElapsed)>=5){
    reportRuntimeMismatch(focus, liveElapsed, rt);
  }
  const _noteIdx=focus;
  _routedToPierre=false;
  finaleCheck(); advanceFocus(); paint();
  // Pierre catches the reaction while the credits roll — unless the finale or
  // season-wrap handoff already rotated the cube (they run their own Pierre flows).
  if(!_routedToPierre) pierreFinishedNote(_noteIdx);
}

// Every finished watch routes to Pierre: he hosts the thought (and the share
// offer) on his own face — no in-face entry overlay.
let _routedToPierre=false;   // set by finaleCheck / forceSeasonNote within a finish
function pierreFinishedNote(idx){
  if(DEMO || window.parent===window) return;
  const e=eps[idx]||{};
  const payload={ intent:'note', finished:true, kind:isMovie?'movie':'show',
                  show:curShowName, ep:isMovie?'':epCode(e), titleId:curShowId };
  if(typeof window.parent.cubeRotateTo==='function') window.parent.cubeRotateTo('pierre', payload);
  else window.parent.postMessage({type:'cube:rotateTo', face:'pierre', payload}, '*');
}

function paint(){
  const total=eps.length, rel=eps.filter(released).length;
  $('face').classList.toggle('binge', bingeLive());

  // ----- season + episode readout (top bar) -----
  renderSeasons();

  // ----- minute bar (position inside the focused episode) -----
  paintMinute();

  const f=eps[focus]||{};
  $('epNo').textContent= isMovie ? 'FILM' : `S ${sNum(f)} EP ${focus+1} / ${total}`;
  // top-bar episode readout (tap → picker). Hidden for films and single-episode seasons.
  const er=$('epReadout');
  if(er){ const showEr = !isMovie && total>1; er.style.display = showEr ? 'inline-flex' : 'none';
    if(showEr) $('epReadoutTxt').textContent = 'EP '+(focus+1)+'/'+total; }
  $('epTtl').textContent=f.name||(isMovie?'Film':('Episode '+(focus+1)));
  $('epAired').textContent= isMovie ? (f.airdate?String(f.airdate).slice(0,4):'') : (f.airdate?fmt(f.airdate):'');
  $('syn').textContent=strip(f.summary)||strip(titleSummary)||'No synopsis available yet.';

  // Live status sits inline on the EP line (right side), not in the list below.
  const watching = !!watchingLive[focus];
  const inProgress = !epDone[focus] && (startedAt[focus] || (epMin[focus]||0)>0);
  const st=$('epStatus');
  if(st){
    if(watching){ st.className='epstatus watching'; st.innerHTML='(WATCHING<span class="live-dots"></span>)'; }
    else if(inProgress){ st.className='epstatus waiting'; st.innerHTML='(WAITING<span class="wait-dots"></span>)'; }
    else { st.className='epstatus'; st.textContent=''; }
  }
  // Left button state machine. Four crisp states, each carrying an explicit action in
  // dataset.action so the click handler never has to parse the (dynamic) label:
  //   scrubbed (awaitingLog) → LOG <n> min   (commit the scrubbed position)
  //   watching               → LOG PARTIAL    (commit the live position)
  //   in progress, paused    → CONTINUE       (re-arm the timer)
  //   not started            → START
  const stBtn=$('startEpBtn');
  if(stBtn){
    stBtn.disabled = false;
    stBtn.classList.remove('logpart', 'continue');
    if(awaitingLog) {
      // A scrubbed preview is staged → the button itself commits it (no tap-elsewhere).
      const pv = Math.round(minPreview!=null ? minPreview : (epMin[focus]||0));
      stBtn.textContent = `LOG ${pv} min`;
      stBtn.classList.add('logpart');
      stBtn.dataset.action = 'log';
    } else if(watching) {
      stBtn.textContent = 'LOG PARTIAL';
      stBtn.classList.add('logpart');
      stBtn.dataset.action = 'log';
    } else if(inProgress) {
      stBtn.textContent = 'CONTINUE';
      stBtn.classList.add('continue');
      stBtn.dataset.action = 'continue';
    } else {
      stBtn.textContent = (epMin[focus]||0) > 0 ? 'CONTINUE' : 'START';
      if((epMin[focus]||0) > 0) stBtn.classList.add('continue');
      stBtn.dataset.action = 'start';
    }
  }
  // Update the elapsed time display with animation frames if watching
  paintMinute();
  const fnBtn=$('finishEpBtn'); if(fnBtn) fnBtn.disabled = false;
  updateTheaterUI();   // keep the FINISH/TICKET label in sync after any repaint

  // Watchlist: the CURRENT episode only (the focused one). The LOG face is "right
  // now" — its row carries that episode's sessions, tickets and note. The full
  // per-episode history lives on the WATCH face.
  const epRows=[];
  for(let i=0;i<eps.length;i++){
    if(i!==focus) continue;                       // current episode only
    const sess=epSessions[i]||[];
    if(!sess.length && !epDone[i]) continue;
    // Recency for sorting: a live session has no finishTs yet, so also count its
    // startTs (and the on-device start) — otherwise the episode you're watching
    // right now reads as ts=0 and sinks to the bottom.
    let lastTs=0; sess.forEach(s=>{ const t=Math.max(s.finishTs||0, s.startTs||0); if(t>lastTs) lastTs=t; });
    if(startedAt[i]) lastTs=Math.max(lastTs, startedAt[i]);
    if(epDone[i] && watchDate[i]) lastTs=Math.max(lastTs,+watchDate[i]);
    epRows.push({ i, e:eps[i]||{}, sess, lastTs });
  }
  // In-progress (not yet finished) floats above finished history; within each
  // group, newest activity first — so the episode you're mid-watch sits at top.
  epRows.sort((a,b)=>{
    const pa=!epDone[a.i], pb=!epDone[b.i];
    if(pa!==pb) return pa?-1:1;
    return b.lastTs-a.lastTs;
  });
  $('wlLabel').textContent='This Episode';
  const wl=$('watchlist'); wl.innerHTML='';
  if(!epRows.length) wl.innerHTML='<div class="empty">Nothing logged yet.</div>';
  epRows.forEach(({i,e,sess})=>{
    const row=document.createElement('div'); row.className='wrow';
    let badge;
    if(epDone[i]){ const fin=sess.filter(s=>s.finished).pop();
      const stamp = epBp[i] ? '(BP)' : '('+(fin?fin.date:(watchDate[i]?mdFmt(+watchDate[i]):''))+' ✓)';
      badge=`<span class="wdate${epBp[i]?' bp':(binged[i]?' binged':'')}">${stamp}</span>`; }
    else { const last=sess[sess.length-1];
      badge=`<span class="wdate">(${last?last.date+', '+last.minutes+'m':'in progress'})</span>`; }
    let kids;
    if(sess.length){ kids=sess.slice().reverse().map(s=>{   // newest activity on top, matching the episode list
      const base = s.bp ? 'BP · before Pierre' : (s.state==='watching' ? 'watching' : (s.finished ? 'finished · '+s.minutes+'m' : 'paused · '+s.minutes+'m'));
      const lbl = base + (s.validated===false ? ' · offered' : '');   // offered = the timer's placement, not yet confirmed
      // BP carries no real clock time — drop the date and the in→out span.
      const datePart = s.bp ? '' : s.date+' · ';
      const ts = (s.bp || !s.startTs) ? '' : ' · '+hmFmt(s.startTs)+'→'+(s.finishTs?hmFmt(s.finishTs):'…');
      return `<div class="sess${s.bp?' bp':''}">${datePart}${lbl}<span class="ts">${ts}</span></div>`; }).join(''); }
    else kids = epBp[i] ? `<div class="sess bp">BP · before Pierre</div>`
                        : `<div class="sess">${watchDate[i]?mdFmt(+watchDate[i]):''} · finished</div>`;
    const note = (notes[i]&&notes[i].trim()) ? `<div class="note">“${escHtml(notes[i].trim())}”</div>` : '';
    const tickets = ticketsByEp[epCode(e)]||[];
    const tix = tickets.map(t=>`<img class="wtix" src="${escHtml(t.ticketUrl)}" alt="ticket stub">`).join('');
    const tixCaps = tickets.map(t=>`<div class="sess">${escHtml(ticketCaption(t))}</div>`).join('');
    row.innerHTML=`<div class="wmain"><span class="wt">${escHtml(epCode(e)+' '+(e.name||('Episode '+(i+1))))}</span>
      ${badge}${tix}</div>
      <div class="wdetail">${tixCaps}${kids}${note}</div>`;
    row.onclick=()=>row.classList.toggle('open');
    row.querySelectorAll('.wtix').forEach(img=>img.onclick=e=>{ e.stopPropagation(); window.open(img.src,'_blank'); });
    wl.appendChild(row);
  });
  // Focus changed → re-scope the Comments panel to the new current episode. If the
  // co-view set belongs to a different episode, reload it (it repaints on return);
  // otherwise just re-filter our own comments.
  if(_lastPaintFocus!==focus){ _lastPaintFocus=focus;
    if(_coviewFocus!==focus) loadCoview(); else paintTranscripts(); }
  reportCurrent();
}

// Season dots, colored by the episode convention.
// Top-bar indicator: just the season you are in. The popcorn (current marker) now
// lives on the time slider below, so this is a plain "SEASON N" readout.
function renderSeasons(){
  const host=$('seasonInd'); if(!host) return;
  if(isMovie){ host.innerHTML='<span class="seasonlabel">FILM</span>'; return; }   // a film has no seasons
  const seasons=[...new Set(allEps.map(sNum))].filter(s=>s>=1).sort((a,b)=>a-b);
  if(!seasons.length){ host.innerHTML=''; return; }
  const curSeason = eps.length ? sNum(eps[0]) : seasons[0];
  host.innerHTML='<span class="seasonlabel">SEASON '+curSeason+'</span>';
}

// Episode picker: the top-bar EP readout opens this. Lists the current season's
// episodes (the loaded `eps`); the amber chip marks the focused one; tap any to jump focus there
// (same effect as tapping the episode bar — selects, records nothing).
function openEpSheet(){
  if(isMovie || eps.length<2) return;
  const grid=$('epSheetGrid'); grid.innerHTML='';
  $('epSheetTitle').textContent='SEASON '+sNum(eps[0]||{});
  eps.forEach((e,i)=>{
    const num=(e.number!=null)?e.number:(i+1);
    const b=document.createElement('button'); b.type='button';
    b.className='epchip'+(i===focus?' cur':'');
    b.textContent='E'+num;
    b.addEventListener('click',()=>{ focus=i; awaitingLog=false; minPreview=null; paint(); closeEpSheet(); });
    grid.appendChild(b);
  });
  $('epSheet').classList.add('show');
}
function closeEpSheet(){ $('epSheet').classList.remove('show'); }
$('epReadout').addEventListener('click', openEpSheet);
$('epSheetX').addEventListener('click', closeEpSheet);
$('epSheet').addEventListener('click', e=>{ if(e.target===$('epSheet')) closeEpSheet(); });

// Minute bar for the focused episode (yellow track, elapsed darkens left→right).
function paintMinute(){
  const rt=runtimeOf(focus);
  // While a live watch is armed the bar reads straight off the wall clock (liveMin),
  // so every repaint shows true elapsed time even between the 5s persistence ticks
  // and immediately on return from background. minPreview (scrubbing) still wins.
  const base = watchingLive[focus] ? liveMin(focus) : (epMin[focus]||0);
  const cur=Math.max(0,Math.min(rt, minPreview!=null?minPreview:base));
  const pct=rt>0?cur/rt*100:0;
  $('minFill').style.width=pct+'%';
  $('minHandle').style.left=pct+'%';
  // Left: elapsed time with animation frames after the number when watching
  const elapsedText = Math.round(cur)+' min';
  $('minElapsed').textContent = watchingLive[focus] ? elapsedText + ' ' + buildFrames[buildFrame % buildFrames.length] : elapsedText;
  $('minRem').textContent=Math.max(0,Math.round(rt-cur))+' min';      // right: remaining
  coviewCheckReveal();   // unlock friends' comments as your mark passes theirs
  const mid=$('minMid');                                              // middle: total / prompt / BP
  if(awaitingLog){ mid.textContent='press LOG to save · grab again to adjust'; mid.classList.add('phrase'); }
  else { mid.classList.remove('phrase'); mid.textContent = epBp[focus] ? 'BP' : (Math.round(rt)+' min'); }
}

$('noteBtn').addEventListener('click', noteToPierre);
$('cool').onclick=()=>{ cooled=true; paint(); };
$('reset').onclick=()=>{
  // Full reset across ALL seasons: drop the saved per-episode detail too, so
  // switching seasons later can't re-restore old progress, then reload season 1.
  savedDetail=null;
  watched=0; watchTs=[]; watchDate={}; binged={}; notes={}; cooled=false;
  epMin={}; epDone={}; epBp={}; startedAt={}; epPreApp={}; epSessions={}; sessionBase={}; minPreview=null; awaitingLog=false; watchingLive={}; _lastLoggedMin={};
  const real=[...new Set(allEps.map(sNum))].filter(s=>s>=1);
  const s1=real.length?Math.min(...real):1;
  eps=allEps.filter(e=>sNum(e)===s1); if(!eps.length) eps=allEps;
  focus=0; paint();
};
