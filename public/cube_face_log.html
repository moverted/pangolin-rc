<!--
  Cube Face: LOG  (v4)
  v4 changes:
   - Orphan fix: titles with "Show: Subtitle" break at the colon, never leave
     a one-word last line. text-wrap:pretty handles the rest.
   - Comfort is now a different object: a paired row. Poster tile on the left,
     the rewatch PLAN on the right (label + a barcode bar + episode count).
     The barcode shows which episodes the plan includes, in a new palette
     colour (--plan). Clicking adopts the plan onto the Episodes face (stubbed
     as a flash here; the small Pierre to reset/edit/re-cut lives on Episodes).
   - Pierre always offers a Top 10 / Top 5. SVU carries a Pierre-generated
     "Top 10" to show the auto-offer next to the human-curated plans.
   - Plan kinds: all (complete), seasons (first N), seasonsScatter (e.g. Logan
     episodes), top (Pierre's top-N). Demo subsets, labelled as such.

  Data: TVMaze live. Plans, watched counts, prices, return dates = seeds.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --base:#181210; --base-2:#211915; --line:#352a23;
    --amber:#E9A23C; --watched:#1c5a37; --avail:#46c46f; --unrel:#463d36;
    --countdown:#caa15e; --ash:#6b5d52; --plan:#bb8ae6; --text:#f5efe9; --muted:#b3a193;
    --display:"Space Grotesk",sans-serif; --body:"Inter",sans-serif; --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0c0907;color:var(--text);font-family:var(--body);min-height:100%;
    display:flex;align-items:center;justify-content:center;padding:16px}

  .face{width:min(92vw,460px);aspect-ratio:1/1;background:var(--base);border:1px solid var(--line);
    border-radius:18px;overflow:hidden;display:flex;flex-direction:column;position:relative}

  .head{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 15px 8px;flex-shrink:0}
  .label{font-family:var(--mono);font-size:12px;letter-spacing:.18em;color:var(--muted)}
  .savings{text-align:right;line-height:1;cursor:pointer;user-select:none}
  .savings .amt{font-family:var(--display);font-weight:700;font-size:17px;color:var(--amber)}
  .savings .cap{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;color:var(--muted);margin-top:2px}
  .savings:hover .amt{filter:drop-shadow(0 0 6px rgba(233,162,60,.55))}
  .headright{display:flex;align-items:center;gap:11px}
  .addbtn{flex-shrink:0;padding:6px 11px;border:1px solid var(--line);border-radius:999px;
    background:var(--base-2);color:var(--amber);font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.04em;line-height:1;
    white-space:nowrap;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s ease,box-shadow .15s ease,transform .1s ease}
  .addbtn:hover{border-color:var(--amber);box-shadow:0 0 6px rgba(233,162,60,.35)}
  .addbtn:active{transform:scale(.92)}

  .pierre{flex-shrink:0;padding:6px 15px 9px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--line)}
  .pierre .read{display:flex;align-items:center;gap:8px;min-height:16px}
  .pierre .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;box-shadow:0 0 6px rgba(233,162,60,.7)}
  .pierre .line{font-size:11.5px;color:var(--text);line-height:1.25}
  .pierre .line b{font-weight:600} .pierre .line .q{color:var(--muted)}
  .pierre .chips{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .pierre .chip{background:transparent;border:1px solid var(--line);color:var(--muted);font-family:var(--mono);
    font-size:9px;letter-spacing:.02em;padding:4px 8px;border-radius:999px;cursor:pointer;transition:all .15s ease}
  .pierre .chip.on{color:var(--amber);border-color:var(--amber)}
  .pierre .chip.demo{border-style:dashed} .pierre .spacer{flex:1}
  /* CURRENT-tab action buttons: grey until a show is selected, then orange */
  .pierre .chip.act{color:var(--muted);border-color:var(--line)}
  .pierre .chip.act.lit{color:var(--amber);border-color:var(--amber);box-shadow:0 0 6px rgba(233,162,60,.35)}

  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 15px;scrollbar-width:thin;scrollbar-color:var(--line) transparent;
    overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y}
  .scroll::-webkit-scrollbar{width:5px} .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid.list{grid-template-columns:1fr;gap:12px}

  /* Poster tiles (current / returning / completed) */
  .tile{aspect-ratio:1/1;border-radius:12px;overflow:hidden;position:relative;background:var(--base-2);cursor:pointer;border:1px solid var(--line)}
  .tile.selected{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber),0 0 16px rgba(233,162,60,.5)}
  /* CURRENT-tab tap: the tapped tile stays put; a panel (buttons + synopsis)
     opens in the OTHER column of its row. The synopsis grows the row and pushes
     the tiles below it down. Tile keeps its side: left tile → panel right, and
     right tile → panel left (panel rendered first in source for that case). */
  .exp-row{grid-column:1/-1;display:flex;gap:10px;align-items:flex-start}
  .exp-row > .tile{flex:0 0 calc(50% - 5px);aspect-ratio:1/1;
    border-color:var(--amber);box-shadow:0 0 0 2px var(--amber),0 0 16px rgba(233,162,60,.5)}
  .exp-row > .ex-panel{flex:1;min-width:0;display:flex;flex-direction:column;gap:9px;padding:2px 2px 4px}
  .exp-row .ex-title{font-family:var(--display);font-weight:700;font-size:16px;line-height:1.1;color:var(--text)}
  .exp-row .ex-watch{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;
    font-family:var(--display);font-weight:700;font-size:15px;color:#1a130b;
    background:linear-gradient(135deg,#f2b457,#e89f3d);border:none;border-radius:10px;padding:10px 22px;
    cursor:pointer;box-shadow:0 8px 20px -10px rgba(232,159,61,.85)}
  .exp-row .ex-watch:active{transform:scale(.96)}
  .exp-row .ex-syn{font-size:11.5px;line-height:1.45;color:var(--muted)}
  .exp-row .ex-stop{align-self:flex-start;margin-top:2px;font-family:var(--mono);font-size:11px;
    letter-spacing:.04em;color:var(--muted);background:transparent;border:1px solid var(--line);
    border-radius:8px;padding:6px 12px;cursor:pointer}
  .exp-row .ex-stop:active{color:#ff8a8a;border-color:#ff8a8a}
  /* Selected-show expanded card: snaps to the top, poster left, two-line buttons. */
  .exp-card{grid-column:1/-1;background:var(--base-2);border:1px solid var(--amber);border-radius:14px;
    box-shadow:0 0 0 1px var(--amber),0 10px 26px -14px rgba(233,162,60,.7);padding:12px;
    display:flex;flex-direction:column;gap:11px;cursor:pointer}
  .exc-top{display:flex;gap:12px;align-items:flex-start}
  .exc-poster{flex:0 0 84px;width:84px;height:84px;border-radius:10px;background-size:cover;
    background-position:center top;background-color:#16100c}
  .exc-info{min-width:0;display:flex;flex-direction:column;gap:5px}
  .exc-title{font-family:var(--display);font-weight:700;font-size:17px;line-height:1.1;color:var(--text)}
  .exc-meta{font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--muted)}
  .exc-syn{font-size:11.5px;line-height:1.45;color:var(--muted);max-height:4.4em;overflow:hidden}
  .exc-btns{display:flex;gap:10px}
  .exc-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:11px;
    padding:11px 8px;cursor:pointer;font-family:var(--display);font-weight:700;font-size:12.5px;line-height:1.05}
  .exc-btn .ic{font-size:15px;line-height:1}
  .exc-btn .lbl{text-align:left}
  .exc-btn.watch{color:#1a130b;background:linear-gradient(135deg,#f2b457,#e89f3d);box-shadow:0 8px 20px -10px rgba(232,159,61,.85)}
  .exc-btn.watch:active{transform:scale(.97)}
  .exc-btn.stop{color:#e9b9b9;background:transparent;border:1px solid var(--line)}
  .exc-btn.stop:active{color:#ff8a8a;border-color:#ff8a8a;transform:scale(.97)}
  .tile .poster,.pcell .poster{position:absolute;inset:0;background-size:cover;background-position:center top}
  .tile .scrim,.pcell .scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,7,5,.94) 0%,rgba(10,7,5,.55) 40%,rgba(10,7,5,.04) 72%)}
  .tile .body{position:absolute;left:0;right:0;bottom:0;padding:10px;display:flex;flex-direction:column;gap:7px}
  .tile .title,.pcell .ctitle{font-family:var(--display);font-weight:700;line-height:1.08;text-shadow:0 1px 4px rgba(0,0,0,.6);
    text-wrap:pretty;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
  .tile .title{font-size:13.5px;-webkit-line-clamp:2}
  .tile .meta,.tile .ret{font-family:var(--mono);font-size:9px;letter-spacing:.02em;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:4px}
  .tile .meta .done{color:var(--amber);display:flex;align-items:center;gap:3px}
  .tile .ret .soon{color:var(--amber)}
  .tile .newflag{position:absolute;top:8px;left:8px;z-index:2;background:var(--amber);color:#1a1206;
    font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.12em;padding:3px 7px;border-radius:5px;
    box-shadow:0 1px 4px rgba(0,0,0,.5)}

  .bars{display:flex;flex-direction:column;gap:3px}
  .bar{position:relative;height:5px;border-radius:3px;display:flex;background:var(--unrel)}
  .bar .seg{height:100%}
  .bar .seg.w{background:var(--watched)} .bar .seg.a{background:var(--avail)} .bar .seg.u{background:var(--unrel)}
  .bar .seg:first-child{border-radius:3px 0 0 3px} .bar .seg:last-child{border-radius:0 3px 3px 0}
  .bar.cd .fill{height:100%;background:var(--countdown);border-radius:3px}
  .bar.cd .fill.soon{background:var(--amber);box-shadow:0 0 5px rgba(233,162,60,.7)}
  .pop{position:absolute;top:50%;width:11px;height:11px;transform:translate(-50%,-50%);font-size:11px;line-height:11px;filter:drop-shadow(0 0 3px rgba(233,162,60,.8));pointer-events:none}

  .tile.completed .poster{filter:saturate(.6) brightness(.74)}
  .tile.stopped{opacity:.62} .tile.stopped .poster{filter:grayscale(.85) brightness(.6)}
  .tryagain{align-self:flex-start;background:transparent;border:none;color:var(--muted);font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;cursor:pointer;padding:0;opacity:.85}
  .tryagain:hover{color:var(--amber)}
  .divider{grid-column:1/-1;font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--muted);margin:6px 0 2px;display:flex;align-items:center;gap:8px}
  .divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .state{grid-column:1/-1;text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;padding:34px 10px}

  /* Comfort paired rows */
  .crow{display:flex;gap:12px;cursor:pointer}
  .crow .pcell{position:relative;flex:0 0 138px;width:138px;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--base-2);border:1px solid var(--line)}
  .crow .ctitle{position:absolute;left:0;right:0;bottom:0;padding:9px;font-size:12.5px;-webkit-line-clamp:3}
  .crow .pinfo{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:9px}
  .crow .planlabel{font-family:var(--display);font-weight:700;font-size:14px;line-height:1.14;color:var(--text);text-wrap:pretty}
  .crow .barcode{display:flex;gap:1px;height:24px;align-items:stretch;width:100%}
  .crow .barcode .tk{flex:1 1 0;min-width:0;background:rgba(255,255,255,.09);border-radius:1px}
  .crow .barcode .tk.on{background:var(--plan);box-shadow:0 0 4px rgba(187,138,230,.45)}
  .crow .pmeta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted)}
  .crow .pmeta .edit{color:var(--amber)}
  .crow:hover .planlabel{color:var(--plan)}

  .tabbar{flex-shrink:0;display:flex;border-top:1px solid var(--line);background:var(--base-2)}
  .tab{flex:1;background:transparent;border:none;border-right:1px solid var(--line);color:var(--muted);font-family:var(--mono);
    font-size:8.5px;letter-spacing:.04em;padding:9px 3px;cursor:pointer;transition:background .15s ease,color .15s ease;display:flex;align-items:center;justify-content:center;gap:4px}
  .tab:last-child{border-right:none}
  .tab .ct{opacity:.6;font-size:8px}
  .tab.on{background:rgba(233,162,60,.16);color:var(--amber)} .tab.on .ct{opacity:.9}
  .tab.pulse{animation:tabpulse .7s ease}
  @keyframes tabpulse{0%,100%{background:rgba(233,162,60,.16)}45%{background:rgba(233,162,60,.42)}}

  .fx{position:absolute;inset:0;pointer-events:none;z-index:40;overflow:hidden}
  .particle{position:absolute;transform:translate(-50%,-50%);animation:fly var(--dur) ease-out forwards;will-change:transform,opacity}
  .particle.dot{width:6px;height:6px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px rgba(233,162,60,.8)}
  @keyframes fly{0%{transform:translate(-50%,-50%) translate(0,0) rotate(0);opacity:1}
    100%{transform:translate(-50%,-50%) translate(var(--dx),calc(var(--dy) + 240px)) rotate(var(--rot));opacity:0}}
  .ash{position:absolute;width:5px;height:5px;background:var(--ash);border-radius:1px;transform:translate(-50%,-50%);animation:ashfall var(--dur) ease-in forwards}
  @keyframes ashfall{0%{opacity:.85}100%{transform:translate(-50%,-50%) translate(var(--dx),var(--dy));opacity:0}}
  .tile.dusting{filter:grayscale(1) blur(2px);opacity:0;transform:scale(.96);transition:all .6s ease}

  .flash{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    background:rgba(12,9,7,.6);opacity:0;pointer-events:none;transition:opacity .2s ease;padding:24px;text-align:center}
  .flash.show{opacity:1}
  .flash .flabel{font-family:var(--mono);font-size:14px;letter-spacing:.14em;color:var(--amber)}
  .flash .fsub{font-family:var(--display);font-weight:700;font-size:18px;line-height:1.1;text-wrap:pretty}
  .flash .fnote{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--muted);margin-top:2px}

  .savpop{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(8,6,4,.8);padding:22px}
  .savpop.show{display:flex}
  .sav-card{width:100%;max-width:344px;background:var(--base-2);border:1px solid var(--line);border-radius:14px;padding:16px}
  .sav-card h4{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--muted);margin-bottom:11px;font-weight:500}
  .sav-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:baseline;padding:5px 0;font-family:var(--mono);font-size:12px}
  .sav-row .svc{color:var(--text)} .sav-row .full{color:var(--muted);text-decoration:line-through;font-size:11px} .sav-row .paid b{color:var(--amber);font-weight:500}
  .sav-total{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line);margin-top:9px;padding-top:11px}
  .sav-total .t{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em}
  .sav-total .v{font-family:var(--display);font-weight:700;font-size:18px;color:var(--amber)}
  .sav-foot{font-family:var(--body);font-size:10px;color:var(--muted);margin-top:10px;line-height:1.35}
  /* Floating cube — back to cube navigation (shared across trunk sides) */
  .cubeback{ position:fixed; right:16px; bottom:16px; z-index:60;
    width:46px; height:46px; border:0; background:rgba(10,12,16,.55);
    border-radius:13px; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    box-shadow:0 4px 14px rgba(0,0,0,.4); cursor:pointer; opacity:.5;
    display:flex; align-items:center; justify-content:center;
    perspective:120px; -webkit-tap-highlight-color:transparent;
    transition:transform .12s ease, background .12s ease, opacity .15s ease; }
  .cubeback:hover{ background:rgba(20,24,30,.7); opacity:1; }
  .cubeback:active{ transform:scale(.9); }
  .cb-cube{ position:relative; width:20px; height:20px; transform-style:preserve-3d;
    transform:rotateX(-22deg) rotateY(-38deg); animation:cbspin 11s linear infinite; }
  @keyframes cbspin{ from{ transform:rotateX(-22deg) rotateY(0deg); }
                     to  { transform:rotateX(-22deg) rotateY(360deg); } }
  .cb-face{ position:absolute; width:20px; height:20px; box-sizing:border-box;
    border:1.5px solid var(--amber, #f0a93b); background:rgba(240,169,59,.12); }
  .cb-front { transform:translateZ(10px);                 background:rgba(240,169,59,.16); }
  .cb-back  { transform:rotateY(180deg) translateZ(10px); background:rgba(240,169,59,.08); }
  .cb-right { transform:rotateY(90deg)  translateZ(10px); background:rgba(240,169,59,.06); }
  .cb-left  { transform:rotateY(-90deg) translateZ(10px); background:rgba(240,169,59,.10); }
  .cb-top   { transform:rotateX(90deg)  translateZ(10px); background:rgba(240,169,59,.24); }
  .cb-bottom{ transform:rotateX(-90deg) translateZ(10px); background:rgba(240,169,59,.04); }
</style>
</head>
<body>
<div class="face" id="face">
  <div class="head">
    <div class="label">WATCH</div>
    <div class="headright">
      <div class="savings" id="savingsBtn"><div class="amt" id="savings">$0</div><div class="cap">SAVED IN PROGRAM</div></div>
      <button class="addbtn" id="addBtn" aria-label="Add a show or movie">+ Show/Movie</button>
    </div>
  </div>

  <div class="pierre">
    <div class="read"><span class="dot"></span><span class="line" id="pierreLine"><span class="q">asking Pierre...</span></span></div>
    <div class="chips">
      <button class="chip on" data-q="last">last watched</button>
      <button class="chip" data-q="watching">watching now</button>
      <span class="spacer"></span>
      <button class="chip demo" id="finishBtn">&#8629; finished</button>
    </div>
  </div>

  <div class="scroll"><div class="grid" id="grid"><div class="state">loading your log...</div></div></div>

  <div class="tabbar">
    <button class="tab on" data-tab="current">CURRENT<span class="ct" id="n-current"></span></button>
    <button class="tab" data-tab="returning">RETURNING<span class="ct" id="n-returning"></span></button>
    <button class="tab" data-tab="comfort">COMFORT<span class="ct" id="n-comfort"></span></button>
    <button class="tab" data-tab="completed">COMPLETED<span class="ct" id="n-completed"></span></button>
  </div>

  <div class="fx" id="fx"></div>
  <div class="flash" id="flash"><div class="flabel">&#8594; EPISODES</div><div class="fsub"></div><div class="fnote"></div></div>
  <div class="savpop" id="savpop"><div class="sav-card" id="savCard"></div></div>
</div>

<script>
const SEED=[
  {id:"severance", q:"Severance",      watched:14,      lastDate:"2026-06-12"},
  {id:"slowhorses",q:"Slow Horses",    watched:12,      lastDate:"2026-06-08"},
  {id:"silo",      q:"Silo",           watchedAll:true, lastDate:"2026-05-30", returnDate:"2026-06-19"},
  {id:"thebear",   q:"The Bear",       watchedAll:true, lastDate:"2026-06-02", returnDate:"2026-07-15"},
  {id:"tlou",      q:"The Last of Us", watchedAll:true, lastDate:"2026-05-20", returnDate:"2026-09-01"},
  {id:"mrrobot",   q:"Mr. Robot",      watchedAll:true, lastDate:"2026-04-30"},
  {id:"andor",     q:"Andor",          watchedAll:true, lastDate:"2026-04-14"},
  {id:"goodplace", q:"The Good Place", watchedAll:true, lastDate:"2026-02-02"},
  {id:"westwing",  q:"The West Wing",  watchedAll:true, comfort:true, lastDate:"2026-06-11", plan:{label:"Complete Series Rewatch", kind:"all"}},
  {id:"psych",     q:"Psych",          watchedAll:true, comfort:true, lastDate:"2026-06-01", plan:{label:"Top 10 Episodes", kind:"top", n:10}},
  {id:"gilmore",   q:"Gilmore Girls",  watchedAll:true, comfort:true, lastDate:"2026-05-25", plan:{label:"Logan Huntzberger Episodes", kind:"seasonsScatter", seasons:[5,6,7]}},
  {id:"homicide",  q:"Homicide Life on the Street",       watchedAll:true, comfort:true, lastDate:"2026-05-18", plan:{label:"Only the First 4 Seasons", kind:"seasons", max:4}},
  {id:"svu",       q:"Law and Order Special Victims Unit", watchedAll:true, comfort:true, lastDate:"2026-05-10", plan:{label:"Pierre's Top 10", kind:"top", n:10}}
];

const SUBS=[
  {name:"Disney+",     full:18.99, paid:9.49,  months:4},
  {name:"Netflix",     full:26.99, paid:13.49, months:4},
  {name:"Peacock",     full:16.99, paid:8.49,  months:3},
  {name:"Prime Video", full:13.98, paid:6.98,  months:2},
  {name:"Paramount+",  full:13.99, paid:6.99,  months:1}
];
const TOTAL_SAVED=SUBS.reduce((a,s)=>a+(s.full-s.paid)*s.months,0);

const NOW=new Date();
let LOG=[], activeTab="current", pierreQ="last", addSeq=0, selectedId=null;
const face=document.getElementById("face");

// DEMO = showcase build (dummy savings + "finished" chip); MVP = clean product.
const DEMO = location.hostname.split('.').includes('demo') || new URLSearchParams(location.search).has('demo');
if(!DEMO){
  const fb=document.getElementById("finishBtn"); if(fb) fb.style.display="none";   // MVP finishes via the Episode finale tap

// Member persistence: the Log is the single writer to the account. Signed-in
// members load their tracked shows on open and we POST each show on change.
const API = location.hostname==='localhost' ? 'http://localhost:8787' : 'https://pangolin-rc.edward-m-willett.workers.dev';
const acct = () => { try{ return localStorage.getItem('pg_user')||''; }catch(_){ return ''; } };
const fmtDate=(iso)=>new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const daysTo=(iso)=>Math.round((new Date(iso)-NOW)/86400000);
const money=(n)=>"$"+n.toFixed(2);
const esc=(t)=>(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* Orphan fix: break "Show: Subtitle" at the colon. */
function titleHTML(name){
  const i=name.indexOf(": ");
  if(i>0) return esc(name.slice(0,i+1))+"<br>"+esc(name.slice(i+2));
  return esc(name);
}

function relDate(iso){const d=Math.round((NOW-new Date(iso))/86400000);
  if(d<=0)return"today"; if(d===1)return"yesterday"; if(d<7)return d+" days ago";
  if(d<14)return"last week"; if(d<60)return Math.round(d/7)+" weeks ago"; return Math.round(d/30)+" months ago";}

async function hydrate(seed){
  const base={...seed,name:seed.q,poster:null,status:"Unknown",failed:false,episodes:[],
    total:0,released:0,watched:0,lastWatched:null,forceCompleted:false,stopped:false};
  try{
    const url="https://api.tvmaze.com/singlesearch/shows?q="+encodeURIComponent(seed.q)+"&embed=episodes";
    const res=await fetch(url); if(!res.ok)throw new Error(res.status);
    const show=await res.json();
    const eps=(show._embedded?.episodes||[]).filter(e=>e.season>=1).sort((a,b)=>a.season-b.season||a.number-b.number);
    const released=eps.filter(e=>e.airdate&&new Date(e.airdate)<=NOW);
    const total=eps.length;
    let watched=seed.watchedAll?released.length:Math.min(seed.watched||0,released.length);
    const lw=watched>0?released[watched-1]:null;
    return {...base,name:show.name||seed.q,tvmazeId:show.id,poster:show.image?.original||show.image?.medium||null,
      platform:show.webChannel?.name||show.network?.name||"",
      summary:(show.summary||"").replace(/<[^>]*>/g,"").trim(),
      status:show.status||"Unknown",episodes:eps,total,released:released.length,watched,
      lastWatched:lw?{season:lw.season,number:lw.number,title:lw.name,at:seed.lastDate}:null};
  }catch(e){return {...base,failed:true};}
}

function bucketOf(s){
  if(s.stopped) return "completed";
  if(s.forceCompleted) return "completed";
  if(s.failed) return "current";
  if(s.comfort) return "comfort";
  const ended=s.status==="Ended"||s.status==="Canceled";
  if(ended && s.watched>=s.total && s.total>0) return "completed";
  if(s.watched < s.released) return "current";
  if(s.returnDate) return daysTo(s.returnDate)<=7 ? "current" : "returning";
  return ended ? "completed" : "returning";
}

/* Which episodes a rewatch plan includes. Demo subsets. */
function planSet(s){
  const set=new Set(), eps=s.episodes, p=s.plan||{kind:"all"};
  const key=(e)=>e.season+"-"+e.number;
  if(p.kind==="all"){eps.forEach(e=>set.add(key(e)));}
  else if(p.kind==="seasons"){eps.filter(e=>e.season<=p.max).forEach(e=>set.add(key(e)));}
  else if(p.kind==="seasonsScatter"){const inS=eps.filter(e=>p.seasons.includes(e.season));inS.forEach((e,i)=>{if(i%2===0)set.add(key(e));});}
  else if(p.kind==="top"){const n=p.n||10,step=Math.max(1,Math.floor(eps.length/n));for(let i=0;i<eps.length&&set.size<n;i+=step)set.add(key(eps[i]));}
  return set;
}

const Pierre={
  lastEpisodeWatched(){const w=LOG.filter(s=>s.lastWatched&&!s.failed&&!s.forceCompleted&&!s.stopped);
    if(!w.length)return null; w.sort((a,b)=>new Date(b.lastWatched.at)-new Date(a.lastWatched.at)); return w[0];},
  currentlyWatching(){return LOG.filter(s=>bucketOf(s)==="current"&&!s.failed&&s.watched<s.released)
    .sort((a,b)=>new Date(b.lastDate)-new Date(a.lastDate));}
};

function renderPierre(){
  const el=document.getElementById("pierreLine");
  if(pierreQ==="last"){
    const s=Pierre.lastEpisodeWatched(); if(!s){el.innerHTML='<span class="q">nothing logged yet</span>';return;}
    const e=s.lastWatched;
    const where = s.kind==='movie' ? ' <span class="q">&middot; film</span>' : (" S"+e.season+" E"+e.number);
    el.innerHTML='<span class="q">Last:</span> <b>'+esc(s.name)+"</b>"+where+' <span class="q">&middot; '+relDate(e.at)+"</span>";
  }else{
    const list=Pierre.currentlyWatching(); if(!list.length){el.innerHTML='<span class="q">all caught up</span>';return;}
    const names=list.slice(0,2).map(s=>"<b>"+esc(s.name)+"</b>").join(", ");
    el.innerHTML='<span class="q">Mid:</span> '+names+(list.length>2?' <span class="q">+'+(list.length-2)+"</span>":"");
  }
}

function episodeBar(s){
  if(s.failed||s.total===0)return '<div class="bar"></div>';
  const w=(s.watched/s.total)*100,a=((s.released-s.watched)/s.total)*100,u=((s.total-s.released)/s.total)*100;
  let h='<div class="bar">';
  if(w>0)h+='<div class="seg w" style="width:'+w+'%"></div>';
  if(a>0)h+='<div class="seg a" style="width:'+a+'%"></div>';
  if(u>0)h+='<div class="seg u" style="width:'+u+'%"></div>';
  if(bucketOf(s)!=="completed"&&s.watched>0&&s.watched<s.total&&!s.returnDate)h+='<div class="pop" style="left:'+w+'%">&#127871;</div>';
  return h+"</div>";
}
function countdownBar(s){
  const span=(new Date(s.returnDate)-new Date(s.lastDate))/86400000,elapsed=(NOW-new Date(s.lastDate))/86400000;
  const pct=Math.max(0,Math.min(100,(elapsed/span)*100)),soon=daysTo(s.returnDate)<=7;
  return '<div class="bar cd"><div class="fill'+(soon?' soon':'')+'" style="width:'+pct+'%"></div></div>';
}
function returnLine(s){const d=daysTo(s.returnDate);
  if(d<=7) return '<div class="ret"><span class="soon">&#128276; new season</span><span class="soon">in '+d+'d</span></div>';
  return '<div class="ret"><span>returns '+fmtDate(s.returnDate)+'</span><span>'+d+'d</span></div>';}
function metaFor(s){
  if(s.failed)return '<span>data unavailable</span>';
  if(s.kind==='movie'){
    if(bucketOf(s)==="completed")return '<span class="done">&#10003; watched</span><span>film</span>';
    return "<span>&#127909; film</span><span>"+(s.lastMinute>0?'in progress':'not started')+"</span>";
  }
  if(bucketOf(s)==="completed")return '<span class="done">&#10003; done</span><span>'+s.total+'ep</span>';
  const left=s.released-s.watched,pos=s.lastWatched?"S"+s.lastWatched.season+" E"+s.lastWatched.number:"";
  return "<span>"+pos+"</span><span>"+(left>0?left+" left":"caught up")+"</span>";
}
function posterDiv(s){return s.poster?'<div class="poster" style="background-image:url('+s.poster+')"></div>'
  :'<div class="poster" style="background:linear-gradient(150deg,#2a201a,#16100c)"></div>';}

function tileFor(s,asStopped){
  const b=bucketOf(s);
  const cls="tile"+(b==="completed"?" completed":"")+(s.failed?" failed":"")+(asStopped?" stopped":"");
  let bars='<div class="bars">'+episodeBar(s);
  if(s.returnDate&&b!=="completed")bars+=countdownBar(s);
  bars+="</div>";
  let footer;
  if(asStopped) footer='<button class="tryagain" data-act="resume" data-id="'+s.id+'">&#8635; try again</button>';
  else if(s.returnDate&&b!=="completed") footer=returnLine(s);
  else footer='<div class="meta">'+metaFor(s)+"</div>";
  return '<div class="'+cls+'" data-id="'+s.id+'">'+posterDiv(s)+'<div class="scrim"></div>'+
    (s.isNew?'<div class="newflag">NEW</div>':'')+
    '<div class="body"><div class="title">'+titleHTML(s.name)+"</div>"+bars+footer+"</div></div>";
}

// Selected-show expanded card (CURRENT + COMPLETED). Snaps to the top of the grid
// and expands in place — poster left, info right, two two-line action buttons.
function expandedCard(s, mode){
  const syn = s.summary ? esc(s.summary) : 'No synopsis yet.';
  const isMovie = s.kind==='movie';
  const pos = isMovie ? 'Film' : (s.lastWatched ? ('S'+s.lastWatched.season+' E'+s.lastWatched.number) : '');
  let metaTxt;
  if(mode==='completed'){ metaTxt = isMovie ? '&#10003; watched &middot; film' : ('&#10003; done &middot; '+(s.total||0)+' episodes'); }
  else if(isMovie){ metaTxt = '&#127909; film &middot; '+(s.lastMinute>0?'in progress':'not started'); }
  else { const left=s.released-s.watched; metaTxt=(pos?pos+' &middot; ':'')+(left>0?left+' left':'caught up'); }
  const poster = s.poster ? 'style="background-image:url('+s.poster+')"'
                          : 'style="background:linear-gradient(150deg,#2a201a,#16100c)"';
  const btn=(cls,act,ic,l1,l2)=>'<button class="exc-btn '+cls+'" data-act="'+act+'" data-id="'+s.id+'">'+
    '<span class="ic">'+ic+'</span><span class="lbl">'+l1+'<br>'+l2+'</span></button>';
  const btns = mode==='completed'
    ? btn('watch','tryagain','&#9654;&#65039;','TRY','AGAIN')+btn('stop','remove','&#10060;','REMOVE','PERMANENTLY')
    : btn('watch','watch','&#9654;&#65039;',s.kind==='movie'?'WATCH':'WATCH',s.kind==='movie'?'FILM':'NEXT')+btn('stop','stop','&#128721;','STOP','WATCHING');
  return '<div class="exp-card" data-id="'+s.id+'">'+
      '<div class="exc-top"><div class="exc-poster" '+poster+'></div>'+
        '<div class="exc-info"><div class="exc-title">'+titleHTML(s.name)+'</div>'+
          '<div class="exc-meta">'+metaTxt+'</div><div class="exc-syn">'+syn+'</div></div></div>'+
      '<div class="exc-btns">'+btns+'</div></div>';
}
// Grid for a selectable tab: the selected show becomes a full-width expanded card
// at the top, the rest follow as tiles.
function gridWithSelection(list, mode){
  const sel = selectedId ? list.find(s=>s.id===selectedId) : null;
  if(!sel){ if(selectedId) selectedId=null; return list.map(s=>tileFor(s,false)).join(""); }
  let html = expandedCard(sel, mode);
  list.forEach(s=>{ if(s.id!==sel.id) html+=tileFor(s,false); });
  return html;
}

function barcode(s,sel){
  if(!s.episodes.length)return '<div class="barcode"></div>';
  const ticks=s.episodes.map(e=>'<i class="tk'+(sel.has(e.season+"-"+e.number)?" on":"")+'"></i>').join("");
  return '<div class="barcode">'+ticks+"</div>";
}
function crowFor(s){
  const sel=planSet(s),total=s.episodes.length;
  const meta=(s.plan&&s.plan.kind==="all")?("all "+total+" episodes"):(sel.size+" of "+total+" episodes");
  return '<div class="crow" data-id="'+s.id+'">'+
    '<div class="pcell">'+posterDiv(s)+'<div class="scrim"></div><div class="ctitle">'+titleHTML(s.name)+'</div></div>'+
    '<div class="pinfo"><div class="planlabel">'+esc(s.plan?s.plan.label:"Rewatch")+'</div>'+
      barcode(s,sel)+
      '<div class="pmeta"><span>'+meta+'</span><span class="edit">&#9998; Pierre</span></div></div></div>';
}

function counts(){
  const c={current:0,returning:0,comfort:0,completed:0};
  LOG.forEach(s=>{c[bucketOf(s)]++;});
  for(const k in c)document.getElementById("n-"+k).textContent=c[k];
}

function render(){
  counts();
  publishLog();
  const grid=document.getElementById("grid");
  if(activeTab==="comfort" || activeTab==="returning"){
    // Comfort + Returning are being reworked: under-construction notice for now.
    grid.classList.remove("list");
    grid.innerHTML='<div class="state">&#128679; under construction</div>';
    return;
  }
  grid.classList.remove("list");
  if(activeTab==="completed"){
    const list=LOG.filter(s=>bucketOf(s)==="completed");
    grid.innerHTML=list.length?gridWithSelection(list,"completed"):'<div class="state">nothing finished yet</div>';
  }else{
    const list=LOG.filter(s=>bucketOf(s)===activeTab);
    list.sort((a,b)=>{
      const an=a.isNew?0:1, bn=b.isNew?0:1;
      if(an!==bn) return an-bn;                                 // NEW shows first
      if(an===0) return (a.addedSeq||0)-(b.addedSeq||0);        // NEW: order requested
      return new Date(b.lastDate)-new Date(a.lastDate);         // rest: recently active
    });
    grid.innerHTML=list.length?gridWithSelection(list,"current"):'<div class="state">nothing here yet</div>';
  }
  // Tiles: CURRENT + COMPLETED tap to expand in place (other tabs handled above).
  grid.querySelectorAll(".tile").forEach(t=>t.addEventListener("click",()=>{
    const s=LOG.find(x=>x.id===t.dataset.id); if(!s||s.failed)return;
    selectCurrent(s.id);
  }));
  // Tap the expanded card (outside its buttons) to collapse it.
  grid.querySelectorAll(".exp-card").forEach(c=>c.addEventListener("click",ev=>{
    if(ev.target.closest("[data-act]"))return;
    selectCurrent(c.dataset.id);
  }));
  // Expanded-card actions: Watch next / Stop watching (CURRENT) · Try again / Remove (COMPLETED).
  grid.querySelectorAll(".exp-card [data-act]").forEach(el=>el.addEventListener("click",ev=>{
    ev.stopPropagation();
    const act=el.dataset.act, id=el.dataset.id, s=LOG.find(x=>x.id===id); if(!s)return;
    if(act==="watch"){ if(s.isNew){s.isNew=false;s.lastDate=new Date().toISOString().slice(0,10);} cube.rotateTo("episodes",episodesPayload(s)); render(); renderPierre(); }
    else if(act==="stop"){ selectedId=null; setTimeout(()=>stopShow(id),60); }
    else if(act==="tryagain"){ tryAgain(id); }
    else if(act==="remove"){ removePermanently(id); }
  }));
}

/* CURRENT-tab selection: tap a show to open its action panel in place, tap its
   poster (or the show again) to collapse. Re-render swaps tile ⇄ expanded card. */
function selectCurrent(id){
  selectedId = (selectedId===id) ? null : id;
  render();
  if(selectedId){ const sc=document.querySelector(".scroll"); if(sc) sc.scrollTop=0; }   // snap the expanded card to the top
}

/* Cross-face contract. In production the cube shell provides window.cube and
   window.viewingLog. Standalone (no shell) we shim them so this face still runs:
   rotateTo falls back to the on-screen flash, on/emit are a tiny local bus, and
   viewingLog reads and writes the in-file LOG array (the one store). */
const _bus={};
if(!window.cube){
  window.cube={
    rotateTo(face,payload){
      // Embedded: call the shell directly so the tap's activation carries through
      // (lets Pierre raise the keyboard). Standalone: the on-screen flash.
      if(window.parent!==window){
        if(typeof window.parent.cubeRotateTo==="function") window.parent.cubeRotateTo(face, payload||{});
        else window.parent.postMessage({type:"cube:rotateTo",face,payload:payload||{}},"*");
      } else { flashFallback(face,payload||{}); }
    },
    on(evt,handler){ (_bus[evt]=_bus[evt]||[]).push(handler); },
    emit(evt,payload){ (_bus[evt]||[]).forEach(h=>h(payload)); }
  };
}
if(!window.viewingLog){
  window.viewingLog={
    all(){ return LOG; },
    get(showId){ return LOG.find(s=>s.id===showId)||null; },
    upsert(record){ const i=LOG.findIndex(s=>s.id===record.id);
      if(i>=0)LOG[i]={...LOG[i],...record}; else LOG.push(record); },
    recordWatch(showId,{season,number,at}){ const s=LOG.find(x=>x.id===showId); if(!s)return;
      const idx=s.episodes.findIndex(e=>e.season===season&&e.number===number);
      if(idx>=0)s.watched=Math.max(s.watched,idx+1);
      s.lastWatched={season,number,title:(s.episodes[idx]&&s.episodes[idx].title)||"",at:at||new Date().toISOString()}; },
    setStopped(showId,bool){ const s=LOG.find(x=>x.id===showId); if(s)s.stopped=!!bool; },
    setPlan(showId,plan){ const s=LOG.find(x=>x.id===showId); if(s)s.plan=plan; }
  };
}

/* Episodes-to-Log lifecycle events (episode:logged, show:finished, show:stopped,
   show:resumed) are intentionally not subscribed yet. The finish and stop
   animations stay driven by the demo chips for now. Wire cube.on to these once
   the Episodes face emits them. */

/* Standalone fallback for cube.rotateTo: the existing on-screen flash. */
function flashFallback(face,payload){
  const o=document.getElementById("flash"),lbl=o.querySelector(".flabel");
  if(face==="pierre"){
    lbl.innerHTML="&#8594; PIERRE";
    o.querySelector(".fsub").textContent="Add a show";
    o.querySelector(".fnote").textContent="Pierre checks your history first";
    o.classList.add("show"); setTimeout(()=>o.classList.remove("show"),900);
    return;
  }
  const s=payload.showId?LOG.find(x=>x.id===payload.showId):null;
  const name=(payload.show&&payload.show.name)||(s?s.name:(payload.name||""));
  const planLabel=payload.plan?payload.plan.label:null;
  lbl.innerHTML="&#8594; "+(face||"episodes").toUpperCase();
  o.querySelector(".fsub").innerHTML=planLabel?esc(planLabel):esc(name);
  o.querySelector(".fnote").textContent=planLabel?("plan adopted \u00b7 "+name):"";
  o.classList.add("show"); setTimeout(()=>o.classList.remove("show"),planLabel?1050:850);
}

/* Add a show: route to Pierre with an add intent. Never creates a record. */
function addShow(){ cube.rotateTo("pierre",{intent:"add"}); }

/* Publish a snapshot of the store to the cube shell so Pierre and Episodes can
   read the user's real history (status branch, resume position). Name + TVMaze
   id let other faces match a typed show against what is already tracked. */
function publishLog(){
  if(window.parent===window) return;
  // The most-recently-watched show, as a ready-to-load Episodes payload, so the
  // Watch face can resume the last thing watched when it opens.
  const last=Pierre.lastEpisodeWatched();
  window.parent.postMessage({type:"log:data", shows: LOG.map(s=>({
    id:s.id, tvmazeId:s.tvmazeId||null, kind:s.kind||'show', name:s.name, status:s.status,
    total:s.total, released:s.released, watched:s.watched, lastWatched:s.lastWatched,
    stopped:!!s.stopped, forceCompleted:!!s.forceCompleted, comfort:!!s.comfort,
    returnDate:s.returnDate||null, bucket:bucketOf(s)
  })), resume: last ? episodesPayload(last,false) : null }, "*");
}

/* ---- Account persistence (signed-in members) ----------------------------- */
// Title-level state lives server-side now (watch_title); episode progress flows
// through POST /episodes. PATCH a title's bucket or run a bulk op (finish/reset).
function patchTitle(s, body){
  const email=acct(); if(!email || !s || !s.titleId) return Promise.resolve();
  return fetch(API+"/profile/"+encodeURIComponent(email)+"/titles/"+encodeURIComponent(s.titleId),
    {method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body||{})}).catch(()=>{});
}

// Build a LOG record from a /titles row. The catalog already carries name, poster,
// counts and bucket — no TVmaze fetch needed. The full title_id ('tvmaze:81110' /
// 'tmdb:123') is the key everywhere (carried in tvmazeId for message compatibility).
function recordFromTitle(t){
  const today=new Date(t.updated_at||Date.now()).toISOString().slice(0,10);
  const isMovie=t.kind==='movie';
  return { id:"acct-"+t.title_id, titleId:t.title_id, tvmazeId:t.title_id, kind:t.kind,
    q:t.name, name:t.name, poster:t.poster||null, platform:t.platform||"",
    status:t.title_status||(isMovie?"Film":"Unknown"), failed:false,
    episodes:[], total:t.total||0, released:t.released||0, watched:t.watched||0,
    lastWatched: t.last_season ? {season:t.last_season,number:t.last_number,title:"",at:today} : null,
    lastDate:today, returnDate:null,
    comfort:t.status==="comfort", forceCompleted:t.status==="completed", stopped:t.status==="stopped",
    plan:null, isNew:false, addedSeq:0,
    lastMinute:0, startedAt:t.started_at||null, epDetail:{}, currentEpisodeId:t.current_episode_id||null };
}

// Load the signed-in member's tracked titles from the catalog-backed endpoint.
async function loadAccount(email){
  try{
    const r=await fetch(API+"/profile/"+encodeURIComponent(email)+"/titles"); if(!r.ok) return [];
    const data=await r.json();
    return (data.titles||[]).map(recordFromTitle);
  }catch(e){ return []; }
}

// Episode face reported progress within an episode (minutes / done / BP). Writes
// the single watch_episode row; the server recomputes the bucket + resume pointer,
// then we refresh the title's counts from the authoritative list.
function applyProgress(pr){
  const s=LOG.find(x=>x.tvmazeId===pr.tvmazeId); if(!s || !s.titleId) return;
  const email=acct(); if(!email) return;
  const episodeId = s.titleId+":s"+(pr.season||1)+"e"+(pr.number||1);
  s.lastWatched={season:pr.season||1,number:pr.number||1,title:"",at:new Date().toISOString().slice(0,10)};
  s.lastMinute = pr.done ? 0 : (pr.minute||0);
  if(pr.started_at!=null) s.startedAt=pr.started_at;
  s.lastDate=new Date().toISOString().slice(0,10); s.isNew=false;
  render(); renderPierre();
  fetch(API+"/profile/"+encodeURIComponent(email)+"/episodes/"+encodeURIComponent(episodeId),
    {method:"POST", headers:{"Content-Type":"application/json"},
     body:JSON.stringify({done:!!pr.done, minute:pr.minute||0, bp:!!pr.bp, sessions:pr.sessions||[]})})
    .then(()=>refreshTitle(s.titleId)).catch(()=>{});
}

// Pull one title's authoritative counts/bucket back into its LOG record.
async function refreshTitle(titleId){
  const email=acct(); if(!email) return;
  try{
    const r=await fetch(API+"/profile/"+encodeURIComponent(email)+"/titles"); if(!r.ok) return;
    const t=((await r.json()).titles||[]).find(x=>x.title_id===titleId);
    const s=LOG.find(x=>x.titleId===titleId); if(!t || !s) return;
    s.watched=t.watched||0; s.total=t.total||0; s.released=t.released||0;
    s.forceCompleted=t.status==="completed"; s.stopped=t.status==="stopped"; s.comfort=t.status==="comfort";
    s.lastWatched = t.last_season ? {season:t.last_season,number:t.last_number,title:"",at:s.lastDate} : s.lastWatched;
    s.currentEpisodeId = t.current_episode_id || s.currentEpisodeId;
    render(); renderPierre();
  }catch(_){}
}

/* Selecting a show on Log loads it on Episodes at the user's position (resume to
   last watched if there is one, otherwise from the beginning). The Watch face now
   loads episodes from the catalog by title_id. */
function episodesPayload(s, fromStart){
  const pat = (!fromStart && !s.comfort && s.lastWatched && s.watched>0)
    ? {kind:"resume", season:s.lastWatched.season, number:s.lastWatched.number}
    : {kind:"beginning"};
  return { titleId:s.titleId, kind:s.kind, name:s.name, pattern:pat };
}

// Map whatever Pierre/Join hands us (bare tvmaze id, bare tmdb id, or a prefixed
// id) onto a canonical title_id.
function toTitleId(show){
  const id=String(show.id||"");
  if(id.startsWith('tvmaze:')||id.startsWith('tmdb:')) return id;
  return (show.kind==='movie') ? ('tmdb:'+id) : ('tvmaze:'+id);
}

/* Pierre's add flow asks the shell to add the picked title here too. The server
   materializes the catalog + per-user episode rows (/catalog/initiate); we then
   reload the list. Idempotent: an already-tracked title is not duplicated. */
async function addToLog(show, pattern){
  const titleId=toTitleId(show);
  const norm=(show.name||"").toLowerCase();
  const existing=LOG.find(s=>s.titleId===titleId || (s.name&&s.name.toLowerCase()===norm));
  if(existing){
    if(existing.stopped){ existing.stopped=false; patchTitle(existing,{status:'current'}); }
    existing.lastDate=new Date().toISOString().slice(0,10); render(); renderPierre(); return;
  }
  const email=acct(); if(!email) return;   // signed-out: nothing to materialize against
  try{
    const r=await fetch(API+"/catalog/initiate",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email, title_id:titleId, pattern:pattern||{kind:"beginning"}})});
    if(!r.ok) return;
    LOG = await loadAccount(email);                       // bring in the new title with real counts
    const s=LOG.find(x=>x.titleId===titleId); if(s){ s.isNew=true; s.addedSeq=++addSeq; }
    render(); renderPierre();
  }catch(e){ /* Pierre validated the title; ignore transient failures */ }
}

window.addEventListener("message",(e)=>{
  if(e.data && e.data.type==="cube:payload" && e.data.face==="log"){
    const p=e.data.payload||{};
    if(p.addShow && p.addShow.id) addToLog(p.addShow, p.pattern);
    if(p.progress && p.progress.tvmazeId) applyProgress(p.progress);   // Episode minute log
    // Episode finale tap (MVP): finish the matching show and land back on CURRENT.
    if(p.finishShow && p.finishShow.tvmazeId){
      const s=LOG.find(x=>x.tvmazeId===p.finishShow.tvmazeId);
      if(s && bucketOf(s)!=="completed"){
        if(activeTab!=="current") switchTab("current");
        setTimeout(()=>finishShow(s.id,"current"),80);
      }
    }
  }
});

function burst(cx,cy){const fx=document.getElementById("fx");
  for(let i=0;i<40;i++){const p=document.createElement("div");p.className="particle";
    const ang=Math.random()*Math.PI*2,vel=50+Math.random()*170;
    p.style.left=cx+"px";p.style.top=cy+"px";
    p.style.setProperty("--dx",Math.cos(ang)*vel+"px");p.style.setProperty("--dy",(Math.sin(ang)*vel-(70+Math.random()*90))+"px");
    p.style.setProperty("--rot",(Math.random()*720-360)+"deg");p.style.setProperty("--dur",(0.9+Math.random()*0.7)+"s");
    if(Math.random()<0.62){p.textContent="\u{1F37F}";p.style.fontSize=(11+Math.random()*11)+"px";}else p.classList.add("dot");
    fx.appendChild(p);setTimeout(()=>p.remove(),1800);}}
function dustParticles(rect,fr){const fx=document.getElementById("fx");
  for(let i=0;i<60;i++){const p=document.createElement("div");p.className="ash";
    p.style.left=(rect.left-fr.left+Math.random()*rect.width)+"px";p.style.top=(rect.top-fr.top+Math.random()*rect.height)+"px";
    p.style.setProperty("--dx",(Math.random()*30-15)+"px");p.style.setProperty("--dy",(50+Math.random()*120)+"px");p.style.setProperty("--dur",(0.7+Math.random()*0.6)+"s");
    fx.appendChild(p);setTimeout(()=>p.remove(),1500);}}

// ---- Finale share card ----------------------------------------------------
// When a show is finished (after the popcorn burst), build a square PNG card
// — Pierre in the lower-left, the profile picture circle in the upper-right —
// and hand it to the native share sheet, falling back to a download.
const PIERRE_IMG=new Image(); PIERRE_IMG.src="pierre.png";
function avatarURL(){ try{ return localStorage.getItem("pg_avatar")||""; }catch(_){ return ""; } }
function userInitial(){ try{ return (localStorage.getItem("pg_username")||"").trim().charAt(0).toUpperCase(); }catch(_){ return ""; } }
function loadImg(src,cors){ return new Promise(res=>{ if(!src) return res(null);
  const im=new Image();
  if(cors){ im.crossOrigin="anonymous";
    // Distinct cache key from the plain CSS-background load of the same poster —
    // otherwise the browser serves the cached non-CORS copy and taints the canvas.
    src += (src.includes('?')?'&':'?') + '_cors=1'; }
  im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; }); }
// rounded-rect path helper for the poster card
function rrect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function wrapLines(ctx,text,maxW){ const words=text.split(" "),lines=[]; let line="";
  for(const w of words){ const t=line?line+" "+w:w;
    if(ctx.measureText(t).width>maxW && line){ lines.push(line); line=w; } else line=t; }
  if(line) lines.push(line); return lines; }

async function buildFinaleCard(title,posterUrl,platform){
  const S=1080,c=document.createElement("canvas"); c.width=c.height=S;
  const ctx=c.getContext("2d");
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,S,S);
  const rg=ctx.createRadialGradient(S*0.5,S*0.14,40,S*0.5,S*0.14,S*0.8);
  rg.addColorStop(0,"rgba(233,162,60,.10)"); rg.addColorStop(1,"rgba(233,162,60,0)");
  ctx.fillStyle=rg; ctx.fillRect(0,0,S,S);

  // profile picture circle, upper-right
  const av=await loadImg(avatarURL());
  const R=86,cx=S-70-R,cy=72+R;
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.closePath();
  ctx.fillStyle="#efe7df"; ctx.fill(); ctx.clip();
  if(av) ctx.drawImage(av,cx-R,cy-R,R*2,R*2);
  else { ctx.fillStyle="#E9A23C"; ctx.font='700 82px "Space Grotesk",sans-serif';
    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(userInitial()||"?",cx,cy+4); }
  ctx.restore();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.lineWidth=5; ctx.strokeStyle="#E9A23C"; ctx.stroke();

  // headline
  ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillStyle="#1b1714"; ctx.font='700 68px "Space Grotesk",sans-serif';
  const lines=wrapLines(ctx,"I just finished watching "+title+" with Pierre!",S-140);
  let y=300; for(const ln of lines){ ctx.fillText(ln,70,y); y+=84; }

  // platform pill — "ON {PLATFORM}"
  if(platform){
    const label="ON "+platform.toUpperCase();
    ctx.font='500 26px "JetBrains Mono",monospace';
    const tw=ctx.measureText(label).width, padX=22, ph2=50, pill_y=y+10;
    rrect(ctx,70,pill_y,tw+padX*2,ph2,ph2/2);
    ctx.fillStyle="rgba(233,162,60,.14)"; ctx.fill();
    rrect(ctx,70,pill_y,tw+padX*2,ph2,ph2/2); ctx.lineWidth=2; ctx.strokeStyle="rgba(233,162,60,.55)"; ctx.stroke();
    ctx.fillStyle="#b07d22"; ctx.textBaseline="middle"; ctx.fillText(label,70+padX,pill_y+ph2/2+2);
    ctx.textBaseline="top"; y=pill_y+ph2+12;
  }
  ctx.fillStyle="#E9A23C"; ctx.font='600 52px "Space Grotesk",sans-serif';
  ctx.fillText("Have you seen it?",70,y+18);

  // show poster, lower-right (rounded card with a soft shadow)
  const poster=await loadImg(posterUrl,true);
  if(poster){
    const pw=300,ph=pw*1.47,px=S-70-pw,py=S-64-ph,rad=22;
    ctx.save();
    ctx.shadowColor="rgba(0,0,0,.55)"; ctx.shadowBlur=34; ctx.shadowOffsetY=14;
    rrect(ctx,px,py,pw,ph,rad); ctx.fillStyle="#000"; ctx.fill();
    ctx.restore();
    ctx.save(); rrect(ctx,px,py,pw,ph,rad); ctx.clip();
    const s=Math.max(pw/poster.naturalWidth,ph/poster.naturalHeight);   // cover
    const dw=poster.naturalWidth*s,dh=poster.naturalHeight*s;
    ctx.drawImage(poster,px+(pw-dw)/2,py+(ph-dh)/2,dw,dh);
    ctx.restore();
    rrect(ctx,px,py,pw,ph,rad); ctx.lineWidth=3; ctx.strokeStyle="rgba(233,162,60,.55)"; ctx.stroke();
  }

  // Pierre, lower-left
  if(PIERRE_IMG.complete && PIERRE_IMG.naturalWidth){
    const pw=440,ph=pw*(PIERRE_IMG.naturalHeight/PIERRE_IMG.naturalWidth);
    ctx.drawImage(PIERRE_IMG,30,S-ph-36,pw,ph);
  }
  return c;
}

async function shareFinale(title,poster,platform,comment){
  let canvas; try{ if(document.fonts) await document.fonts.ready; }catch(_){}
  try{ canvas=await buildFinaleCard(title,poster,platform); }catch(_){ return; }
  const note=(comment||'').trim();
  const text = note
    ? '"'+note+'" — just finished '+title+' with Pierre. Have you seen it?'
    : "I just finished watching "+title+" with Pierre! Have you seen it?";
  canvas.toBlob(async(blob)=>{ if(!blob) return;
    const file=new File([blob],"pangolin-finale.png",{type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],text}); return; }
      catch(err){ if(err && err.name==="AbortError") return; }   // cancelled — don't also download
    }
    const url=URL.createObjectURL(blob);                          // fallback: download the card
    const a=document.createElement("a"); a.href=url; a.download="pangolin-finale.png";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
  },"image/png");
}

function finishShow(id, land){
  const tileEl=document.querySelector('.tile[data-id="'+id+'"]'),s=LOG.find(x=>x.id===id); if(!s)return;
  const fr=face.getBoundingClientRect();
  if(tileEl){const tr=tileEl.getBoundingClientRect();
    burst(tr.left-fr.left+tr.width/2,tr.top-fr.top+tr.height/2);
    const tab=document.querySelector('.tab[data-tab="completed"]').getBoundingClientRect();
    tileEl.style.transition="transform .75s cubic-bezier(.5,0,.2,1),opacity .75s ease";
    tileEl.style.transform="translate("+((tab.left+tab.width/2)-(tr.left+tr.width/2))+"px,"+((tab.top+tab.height/2)-(tr.top+tr.height/2))+"px) scale(.1)";
    tileEl.style.opacity="0";}else burst(fr.width/2,fr.height/2);
  s.forceCompleted=true;s.watched=s.total; patchTitle(s,{op:'finish'});
  const tabEl=document.querySelector('.tab[data-tab="completed"]');tabEl.classList.add("pulse");setTimeout(()=>tabEl.classList.remove("pulse"),700);
  setTimeout(()=>{render();renderPierre();},780); setTimeout(()=>switchTab(land||"completed"),1300);
  // After the popcorn: share the finale card. A FILM gets a skippable comment first
  // (it rides along on the share); a series shares straight away as before.
  if(s.kind==='movie')
    setTimeout(()=>askFinaleComment(s.name, c=>shareFinale(s.name,s.poster,s.platform,c)),900);
  else
    setTimeout(()=>shareFinale(s.name,s.poster,s.platform),900);
}

// Skippable one-line comment before a movie's finale share. Resolves with the
// typed text on Share, or '' on Skip / dismiss — either way the card still shares.
function askFinaleComment(title, done){
  const ov=document.getElementById('fcOverlay'); if(!ov){ done(''); return; }
  const t=document.getElementById('fcTitle'), box=document.getElementById('fcText');
  t.textContent='Finished '+title;
  box.value='';
  ov.classList.add('show'); setTimeout(()=>{ try{ box.focus(); }catch(_){} },60);
  let settled=false;
  const finish=(val)=>{ if(settled) return; settled=true; ov.classList.remove('show'); done(val); };
  document.getElementById('fcShare').onclick=()=>finish(box.value||'');
  document.getElementById('fcSkip').onclick=()=>finish('');
  ov.onclick=e=>{ if(e.target===ov) finish(''); };   // tap the backdrop to skip
}
function stopShow(id){
  const tileEl=document.querySelector('.tile[data-id="'+id+'"]'),s=LOG.find(x=>x.id===id); if(!s)return;
  const fr=face.getBoundingClientRect();
  if(tileEl){dustParticles(tileEl.getBoundingClientRect(),fr);tileEl.classList.add("dusting");}
  s.stopped=true; patchTitle(s,{status:'stopped'}); setTimeout(()=>{render();renderPierre();},640);
}

const OWNER_EMAIL='edward.m.willett@gmail.com';
// COMPLETED → "try again": reset progress and send the show back to CURRENT.
function tryAgain(id){
  const s=LOG.find(x=>x.id===id); if(!s)return;
  s.forceCompleted=false; s.stopped=false; s.watched=0; s.lastWatched=null;
  s.lastMinute=0; s.startedAt=null; s.epDetail={}; s.isNew=false;
  s.lastDate=new Date().toISOString().slice(0,10);
  selectedId=null; patchTitle(s,{op:'reset'}); switchTab("current"); renderPierre();
}
// COMPLETED → "remove permanently": the owner account gets a real delete (show +
// all its data); everyone else just hides it locally for the session.
function removePermanently(id){
  const s=LOG.find(x=>x.id===id); if(!s)return;
  const i=LOG.indexOf(s); if(i>=0) LOG.splice(i,1);
  selectedId=null;
  const email=acct();
  if(email && email.toLowerCase()===OWNER_EMAIL && s.titleId)
    fetch(API+"/profile/"+encodeURIComponent(email)+"/titles/"+encodeURIComponent(s.titleId),{method:"DELETE"}).catch(()=>{});
  render(); renderPierre();
}

function switchTab(name){activeTab=name; selectedId=null;
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.tab===name));render();}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchTab(t.dataset.tab)));
document.querySelectorAll(".chip[data-q]").forEach(c=>c.addEventListener("click",()=>{

function firstCurrent(){return LOG.filter(s=>bucketOf(s)==="current"&&!s.failed&&!s.forceCompleted&&!s.stopped&&s.watched<s.released)[0]
  || LOG.filter(s=>bucketOf(s)==="current"&&!s.failed&&!s.forceCompleted&&!s.stopped)[0];}
document.getElementById("finishBtn").addEventListener("click",()=>{const t=firstCurrent();if(t){if(activeTab!=="current")switchTab("current");setTimeout(()=>finishShow(t.id),60);}});

/* Pinch to contract back to the cube. The face overlay captures touches when
   active, so it needs its own way out, like the other faces. */
if(window.parent!==window){
  // Fill the cube face edge to edge: no card, no rounded corners, no black margin.
  // With the face at full height its flex layout pins the head/tabbar and only
  // the shows pane (.scroll) scrolls.
  const _de=document.documentElement, _b=document.body;
  _de.style.height="100%"; _de.style.padding="0"; _de.style.display="block"; _de.style.overflow="hidden";
  _b.style.height="100%"; _b.style.minHeight="100%"; _b.style.padding="0"; _b.style.margin="0";
  _b.style.display="block"; _b.style.overflow="hidden";
  face.style.width="100%"; face.style.height="100%"; face.style.maxWidth="none";
  face.style.aspectRatio="unset"; face.style.borderRadius="0"; face.style.border="0";
  // Back navigation is the floating cube button only (double-tap / pinch removed).
  // Keep native momentum scrolling responsive: nudge .scroll a hair off its top/
  // bottom edge as each drag begins so the first up-swipe isn't eaten by overscroll
  // chaining ("had to scroll down a little first").
  const _sc=document.querySelector(".scroll");
  if(_sc) document.addEventListener("touchstart",()=>{
    const max=_sc.scrollHeight-_sc.clientHeight; if(max<=0) return;
    if(_sc.scrollTop<=0) _sc.scrollTop=1; else if(_sc.scrollTop>=max) _sc.scrollTop=max-1;
  },{passive:true});
}
