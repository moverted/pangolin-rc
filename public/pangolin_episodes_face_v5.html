<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>PangolinRC — Episodes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --dgreen:#2E6B45; --green:#5BBF7B; --grey:#5A5149;
    --dred:#7E2A24; --amber:#F0A93B; --amber-deep:#1a1206;
    --text:#F8F2E8; --dim:#D2C8B8; --faint:#A29684;
    --sheet:rgba(13,10,7,.66);
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'Space Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{ background:#0c0a08; color:var(--text); font-family:var(--body);
    -webkit-font-smoothing:antialiased; display:flex; justify-content:center;
    align-items:flex-start; padding:24px 12px; min-height:100vh; }

  .face{ position:relative; width:min(94vw,500px); aspect-ratio:1/1;
    border-radius:20px; overflow:hidden; border:1px solid rgba(255,255,255,.06);
    box-shadow:0 24px 70px rgba(0,0,0,.6); display:flex; flex-direction:column; }
  .bg{ position:absolute; inset:0; background-size:cover; background-position:center top;
    filter:blur(9px) saturate(.92) brightness(.52); transform:scale(1.1); }
  .bg-fallback{ background:radial-gradient(120% 90% at 30% 8%, #3c5566, #11100b 72%); }
  .scrim{ position:absolute; inset:0; pointer-events:none;
    background:
      linear-gradient(180deg, rgba(8,6,4,.5) 0%, rgba(8,6,4,.4) 26%,
        rgba(8,6,4,.72) 56%, rgba(8,6,4,.92) 100%),
      radial-gradient(140% 80% at 50% 120%, rgba(8,6,4,.5), transparent 60%); }
  .scroll{ position:relative; z-index:1; flex:1; min-height:0; overflow-y:auto; overflow-x:hidden;
    -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .scroll::-webkit-scrollbar{ width:0; }

  /* fixed top bar (like the Feed face): WATCH · SEASONS — never scrolls */
  .topbar{ position:relative; z-index:2; flex:none; padding:13px 16px 11px;
    background:linear-gradient(180deg, rgba(8,6,4,.88) 0%, rgba(8,6,4,.5) 72%, transparent 100%); }
  .seasonlabel{ font-family:var(--mono); font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--faint); flex:0 0 auto; }

  .hero{ padding:16px 18px 18px; min-height:50%; display:flex; flex-direction:column; }
  /* one row: WATCH (left) · SEASONS (centered) */
  .facebar{ display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:10px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--faint); }
  .facebar .facelabel{ font-size:12px; letter-spacing:.18em; color:var(--faint); }
  .fb-left{ flex:1 1 0; min-width:0; display:flex; align-items:center; gap:8px; }
  .fb-mid{ flex:0 0 auto; display:flex; align-items:center; gap:8px; }
  .fb-right{ flex:1 1 0; min-width:0; display:flex; justify-content:flex-end; }
  .dots{ display:flex; gap:4px; align-items:center; }
  .dots i{ width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,.3); }
  .dots i.on{ background:var(--amber); box-shadow:0 0 0 3px rgba(240,169,59,.2); }
  .cube{ color:var(--amber); font-size:12px; }

  .herofoot{ margin-top:auto; }
  .name{ font-family:var(--display); font-weight:700; font-size:33px; line-height:1.0;
    letter-spacing:-.02em; margin:0 0 8px; text-shadow:0 2px 22px rgba(0,0,0,.85), 0 0 4px rgba(0,0,0,.5);
    transition:color .25s, opacity .25s; }
  /* greyed when you're watching on a streamer other than the one the show lists */
  .name.offsvc{ color:#857c72; opacity:.78; text-shadow:0 2px 16px rgba(0,0,0,.7); }
  .ymeta{ font-family:var(--mono); font-size:11px; color:var(--dim);
    letter-spacing:.05em; margin-bottom:12px; text-shadow:0 1px 10px rgba(0,0,0,.7); }
  .ymeta .sep{ color:rgba(255,255,255,.35); margin:0 7px; }
  .ymeta .svc-lit{ color:var(--amber); font-weight:700; text-shadow:0 0 10px rgba(240,169,59,.5); }
  /* when the streamer can be launched, it becomes a tappable pill button */
  .ymeta .svc-lit.live{ cursor:pointer; padding:2px 9px; border:1px solid var(--amber); border-radius:999px; text-shadow:none; }
  .ymeta .svc-lit.live:active{ background:rgba(240,169,59,.18); }

  .scorepill{ display:inline-flex; align-items:center; gap:7px; cursor:pointer;
    background:rgba(0,0,0,.36); border:1px solid rgba(255,255,255,.14); border-radius:999px;
    padding:5px 12px 5px 7px; margin-bottom:20px; align-self:flex-start; }
  .scorepill:hover{ border-color:var(--amber); }
  .scorepill .dot{ width:15px; height:15px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd98a, var(--amber)); flex:0 0 15px; }
  .scorepill .v{ font-family:var(--display); font-weight:700; font-size:14px; }
  .scorepill small{ font-family:var(--mono); font-size:8.5px; color:var(--faint);
    letter-spacing:.08em; text-transform:uppercase; }

  /* seasons bar (slim, above the episode bar) */
  .seasonsbar{ position:relative; height:19px; border-radius:7px; background:var(--grey);
    overflow:hidden; margin-bottom:10px; cursor:pointer; box-shadow:inset 0 1px 2px rgba(0,0,0,.42); }
  .ss{ position:absolute; top:0; bottom:0; transition:width .3s cubic-bezier(.2,.8,.2,1),left .3s; }
  .ss.w{ left:0; background:var(--dgreen); }
  .ss.a{ background:var(--green); }
  .sscopy{ position:absolute; inset:0; display:flex; align-items:center; justify-content:space-between;
    padding:0 11px; pointer-events:none; font-family:var(--mono); font-size:9px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; }
  .sscopy .l{ color:rgba(255,255,255,.9); text-shadow:0 1px 2px rgba(0,0,0,.55); }
  .sscopy .r{ color:#f0dcb0; text-shadow:0 1px 2px rgba(0,0,0,.55); }

  .barzone{ position:relative; }
  .pop{ position:absolute; top:-4px; transform:translateX(-50%); text-align:center;
    transition:left .32s cubic-bezier(.2,.8,.2,1); pointer-events:none; z-index:4; }
  .pop .corn{ font-size:23px; line-height:1; filter:drop-shadow(0 2px 5px rgba(0,0,0,.7)); display:block; }
  .pop .fire{ position:absolute; left:50%; top:-12px; transform:translateX(-50%);
    font-size:16px; opacity:0; transition:opacity .2s; filter:drop-shadow(0 0 7px rgba(255,120,0,.9)); }
  .binge .pop .fire{ opacity:1; animation:flick .35s infinite alternate; }
  @keyframes flick{ from{transform:translateX(-50%) scale(1) rotate(-4deg);opacity:.8}
    to{transform:translateX(-52%) scale(1.14) rotate(4deg);opacity:1} }

  .bar{ position:relative; height:15px; border-radius:999px;
    background:var(--grey); overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.45); }
  .seg{ position:absolute; top:0; bottom:0;
    transition:width .32s cubic-bezier(.2,.8,.2,1),left .32s,background .4s; }
  .seg.watched{ left:0; background:var(--dgreen); }
  .seg.avail{ background:var(--green); cursor:pointer; }
  .seg.avail.lit{ box-shadow:0 0 14px rgba(91,191,123,.6) inset; animation:pulse 1.6s infinite; }
  @keyframes pulse{ 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }
  .binge .seg.watched{ background:linear-gradient(90deg,#ffd24a,#ff8c1a,#ff3b1a,#ff8c1a,#ffd24a);
    background-size:280% 100%; animation:flow 1.1s linear infinite; }
  @keyframes flow{ from{background-position:0 0} to{background-position:280% 0} }

  .barfoot{ display:flex; align-items:center; justify-content:space-between;
    margin-top:12px; font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; }
  .barfoot .d{ color:var(--dim); white-space:nowrap; }
  .barfoot .d.faint{ color:var(--faint); }
  .barfoot .center{ flex:1; text-align:center; padding:0 8px; }
  .binge-tag{ display:none; font-family:var(--display); font-weight:700; font-size:13px;
    letter-spacing:.03em; color:#ffb347; text-shadow:0 0 14px rgba(255,120,0,.8); }
  .binge .binge-tag{ display:inline-block; animation:pin .3s ease; }
  .hint{ color:var(--faint); font-size:9.5px; }
  .binge .hint{ display:none; }
  @keyframes pin{ from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }

  /* season dots (display-only) */
  .seasondots{ display:flex; gap:9px; align-items:center; min-height:16px; }
  .seasondots .sd{ width:11px; height:11px; border-radius:50%; background:var(--grey); position:relative; flex:0 0 auto; }
  .seasondots .sd.done{ background:var(--dgreen); }
  .seasondots .sd.avail{ background:var(--green); }
  .seasondots .sd.cur{ background:transparent; width:16px; height:16px; }
  .seasondots .sd.cur::after{ content:"🍿"; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:14px; line-height:1; }
  .scorn{ font-size:13px; }   /* popcorn inside the ">6 seasons" count indicator */

  /* minute bar: position inside the current episode (yellow track, elapsed darkens L→R) */
  .minzone{ margin-top:4px; }
  .minbar{ position:relative; height:14px; border-radius:999px; background:rgba(240,169,59,.24);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.42); cursor:pointer; touch-action:none; }
  .minfill{ position:absolute; left:0; top:0; bottom:0; width:0; border-radius:999px;
    background:linear-gradient(90deg,#caa15e,#7a5410); }
  .minhandle{ position:absolute; top:50%; left:0; width:7px; height:26px; border-radius:4px;
    background:var(--amber); transform:translate(-50%,-50%); box-shadow:0 2px 8px rgba(0,0,0,.55); cursor:grab; }
  .minhandle:active{ cursor:grabbing; }
  .minfoot{ display:flex; align-items:center; justify-content:space-between; margin-top:11px;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; }
  .minfoot .d{ color:var(--dim); white-space:nowrap; font-size:15.75px; font-weight:700; display:flex; align-items:center; gap:4px; }
  .minfoot .d.faint{ color:var(--faint); font-weight:400; font-size:10.5px; }
  .minfoot .d.bp{ color:#ff9d5c; font-weight:700; letter-spacing:.1em; }
  .minfoot .center{ flex:1; text-align:center; padding:0 8px; color:var(--dim); font-size:10.5px; }
  .minfoot .center.phrase{ color:var(--amber); font-size:9px; letter-spacing:.03em; }
  /* manual Start / Log Partial / Finish (fallback when the episode-end timer doesn't fire) */
  .startfin{ display:flex; gap:10px; margin-top:14px; align-items:center; }
  .sfbtn{ flex:1; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.1em;
    padding:11px; border-radius:10px; cursor:pointer; background:rgba(0,0,0,.32);
    border:1px solid rgba(255,255,255,.16); color:var(--dim); }
  .sfbtn:active{ transform:translateY(1px); }
  .sfbtn.start{ --accent:var(--amber); --flipfg:var(--amber-deep); border-color:var(--accent); color:var(--accent); }
  .sfbtn.logpart{ --accent:var(--text);  --flipfg:#1a1206;         border-color:var(--accent); color:var(--accent); }
  .sfbtn.continue{ --accent:var(--text); --flipfg:#1a1206;         border-color:var(--accent); color:var(--accent); }
  .sfbtn.finish{ --accent:var(--green); --flipfg:#06140b;          border-color:var(--accent); color:var(--accent); }
  /* Mic button in the center of the button row */
  .mic-center{ flex:0 0 auto; width:44px; height:44px; padding:0; display:flex; align-items:center;
    justify-content:center; font-size:16px; font-family:var(--mono); font-weight:700;
    border:1px solid rgba(255,255,255,.16); border-radius:10px; background:rgba(0,0,0,.32);
    cursor:pointer; color:var(--amber); transition:all .2s ease; }
  .mic-center:active{ transform:translateY(1px); }
  .mic-center.recording{ background:var(--amber); color:var(--amber-deep); border-color:var(--amber);
    font-size:12px; }
  /* Mic for audio comments: narrow, sits at the end of the logging row */
  .sfbtn.mic{ flex:0 0 auto; padding-left:15px; padding-right:15px; font-size:14px;
    --accent:var(--amber); border-color:var(--accent); color:var(--accent); }
  /* tap feedback: flip the button to a filled state, then flip back */
  @keyframes sfflip{
    0%,100%{ background:rgba(0,0,0,.32); color:var(--accent); box-shadow:none; }
    35%,65%{ background:var(--accent);   color:var(--flipfg); box-shadow:0 0 16px -3px var(--accent); }
  }
  .sfbtn.flip{ animation:sfflip .52s ease both; }
  /* inactive button: greyed out, not clickable, no flip */
  .sfbtn:disabled{ opacity:.32; cursor:default; background:rgba(0,0,0,.32);
    border-color:rgba(255,255,255,.12); color:var(--faint); box-shadow:none; }
  .sfbtn:disabled:active{ transform:none; }

  /* Empty state: nothing has ever been watched. One line; tap swings to the Log. */
  .emptyface{ position:absolute; inset:0; z-index:6; display:none; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:34px; cursor:pointer;
    background:radial-gradient(120% 90% at 50% 18%, #1b1410 0%, #0c0a08 70%); }
  .emptyface.show{ display:flex; }
  .emptyface .emsg{ font-family:var(--display); font-weight:700; font-size:21px; line-height:1.35; color:var(--text); }

  .sheet{ background:var(--sheet); backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px); border-top:1px solid rgba(255,255,255,.08);
    border-radius:22px 22px 0 0; padding:20px 18px 24px; margin-top:8px; min-height:44%; }
  .catalog{ display:flex; align-items:center; gap:6px; margin-bottom:20px;
    background:rgba(0,0,0,.34); border:1px solid rgba(255,255,255,.13);
    border-radius:12px; padding:3px 3px 3px 12px; }
  .catalog .mag{ color:var(--amber); font-size:15px; }
  .catalog input{ flex:1; background:transparent; border:none; color:var(--text);
    font-family:var(--body); font-size:13px; padding:9px 4px; }
  .catalog input:focus{ outline:none; }
  .catalog input::placeholder{ color:var(--faint); }
  .catalog button{ background:var(--amber); color:var(--amber-deep); border:none;
    border-radius:9px; padding:9px 14px; font-family:var(--mono); font-size:11px;
    font-weight:700; cursor:pointer; }
  .catalog button:active{ transform:translateY(1px); }

  .epline{ font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--amber);
    text-transform:uppercase; margin-bottom:9px; display:flex; gap:9px; align-items:baseline; }
  .epline .sep{ color:rgba(255,255,255,.3); }
  .epline .ttl{ color:var(--text); text-transform:none; font-family:var(--display);
    font-weight:600; font-size:15px; letter-spacing:0;
    min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .epline .aired{ color:var(--faint); font-family:var(--mono); font-size:10px;
    letter-spacing:.04em; white-space:nowrap; flex:0 0 auto; }
  .epline .aired:empty{ display:none; }
  /* live status, right-aligned on the EP line (replaces the old bottom-list badge) */
  .epline .epstatus{ margin-left:auto; padding-left:9px; white-space:nowrap; font-size:10px;
    letter-spacing:.06em; font-weight:700; align-self:center; display:none; }
  .epline .epstatus.watching{ color:var(--amber); }
  .epline .epstatus.waiting{ color:var(--faint); }
  .syn{ font-size:13.5px; color:var(--dim); margin:0 0 18px; line-height:1.55; }

  /* Floating cube — back to cube navigation. Small isometric cube, bottom-right. */
  .cubeback{ position:fixed; right:16px; bottom:16px; z-index:60;
    width:46px; height:46px; border:0; background:rgba(10,12,16,.55);
    border-radius:13px; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    box-shadow:0 4px 14px rgba(0,0,0,.4); cursor:pointer; opacity:.5;
    display:flex; align-items:center; justify-content:center;
    perspective:120px; -webkit-tap-highlight-color:transparent;
    transition:transform .12s ease, background .12s ease, opacity .15s ease; }
  .cubeback:hover{ background:rgba(20,24,30,.7); opacity:1; }   /* full opacity on hover for affordance */
  .cubeback:active{ transform:scale(.9); }
  .cb-cube{ position:relative; width:20px; height:20px; transform-style:preserve-3d;
    transform:rotateX(-26deg) rotateY(-38deg);
    animation:cbspin 11s linear infinite; }                    /* slow continuous spin */
  @keyframes cbspin{ from{ transform:rotateX(-22deg) rotateY(0deg); }
                     to  { transform:rotateX(-22deg) rotateY(360deg); } }
  .cb-face{ position:absolute; width:20px; height:20px; box-sizing:border-box;
    border:1.5px solid var(--amber); background:rgba(240,169,59,.12); }
  .cb-front { transform:translateZ(10px);                 background:rgba(240,169,59,.16); }
  .cb-back  { transform:rotateY(180deg) translateZ(10px); background:rgba(240,169,59,.08); }
  .cb-right { transform:rotateY(90deg)  translateZ(10px); background:rgba(240,169,59,.06); }
  .cb-left  { transform:rotateY(-90deg) translateZ(10px); background:rgba(240,169,59,.10); }
  .cb-top   { transform:rotateX(90deg)  translateZ(10px); background:rgba(240,169,59,.24); }
  .cb-bottom{ transform:rotateX(-90deg) translateZ(10px); background:rgba(240,169,59,.04); }

  .block-label{ font-family:var(--mono); font-size:9.5px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--faint); margin:0 0 10px; }
  .rank{ display:flex; gap:5px; flex-wrap:wrap; margin-bottom:16px; }
  .rank b{ width:30px; height:30px; border-radius:8px; display:flex; align-items:center;
    justify-content:center; font-family:var(--mono); font-size:12px; font-weight:700;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09);
    color:var(--dim); cursor:pointer; transition:.12s; }
  .rank b:hover{ border-color:var(--amber); color:var(--text); }
  .rank b.sel{ background:var(--amber); color:var(--amber-deep); border-color:var(--amber); }
  .notebtn{ display:inline-flex; align-items:center; gap:9px; margin-bottom:24px;
    background:rgba(0,0,0,.32); border:1px solid rgba(240,169,59,.4); border-radius:12px;
    padding:11px 18px; color:var(--amber); font-family:var(--display); font-weight:600;
    font-size:14px; cursor:pointer; -webkit-tap-highlight-color:transparent;
    transition:background .15s, border-color .15s, transform .1s; }
  .notebtn:active{ transform:scale(.97); background:rgba(240,169,59,.12); border-color:var(--amber); }

  .wlhead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .wlctl{ display:flex; gap:14px; }
  .ctl{ font-family:var(--mono); font-size:10px; color:var(--faint); cursor:pointer; letter-spacing:.04em; }
  .ctl:hover{ color:var(--amber); }
  .ctl.cool{ display:none; color:#ff9d5c; }
  .binge .ctl.cool{ display:inline; }
  .wrow{ border-bottom:1px solid rgba(255,255,255,.06); cursor:pointer; }
  .wrow .wmain{ display:flex; align-items:center; gap:11px; padding:9px 0; }
  .wrow .wdetail{ display:none; font-family:var(--mono); font-size:10px; color:var(--faint); padding:0 0 9px; }
  .wrow.open .wdetail{ display:block; }
  .wrow .wt{ flex:1; min-width:0; font-family:var(--display); font-weight:500; font-size:13.5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wdate{ font-family:var(--mono); font-size:10px; background:rgba(46,107,69,.9);
    color:#cdebd6; padding:4px 9px; border-radius:999px; white-space:nowrap; letter-spacing:.03em; }
  .wdate.binged{ background:rgba(126,42,36,.92); color:#f4c9c4; }
  .wdate.bp{ background:rgba(122,122,128,.28); color:#b9b9bf; }   /* BP: grey, no green check */
  .wscore{ font-family:var(--mono); font-size:11px; color:var(--amber); font-weight:700; width:34px; text-align:right; }
  .empty{ font-family:var(--mono); font-size:11px; color:var(--faint); padding:6px 0 2px; }
  /* WATCHING continuously cycles the build-up marker; WAITING is static. */
  .live-dots::after{ content:'>..'; animation:build 1.6s steps(1,end) infinite; }
  .wait-dots::after{ content:'...'; letter-spacing:.08em; }
  @keyframes build{ 0%{content:'>..'} 17%{content:'>>.'} 33%{content:'>>>'}
                    50%{content:'.>>'} 67%{content:'..>'} 83%{content:'...'} 100%{content:'>..'} }
  /* expanded children: one viewing session per line, plus the episode note */
  .wrow .wdetail .sess{ padding:1px 0; }
  .wrow .wdetail .sess.bp{ color:var(--dim); }
  .wrow .wdetail .ts{ color:var(--faint); }
  .wrow .wdetail .note{ margin-top:6px; color:var(--dim); font-family:var(--body); font-style:italic; font-size:11.5px; }

  /* ===== streamer guesser / picker ===== */
  /* A logo is a brand-coloured wordmark chip — self-contained, no image assets. */
  .svclogo{ display:inline-flex; align-items:center; justify-content:center;
    font-family:var(--display); line-height:1; white-space:nowrap;
    padding:.34em .58em; border-radius:.42em; font-size:13px;
    box-shadow:0 1px 4px rgba(0,0,0,.45); }
  /* the best-guess badge that lives in the top-right corner */
  .svccorner{ display:inline-flex; align-items:center; gap:6px; cursor:pointer;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  .svccorner .cap{ font-family:var(--mono); font-size:8px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--faint); }

  .svccorner.holding .svclogo{ box-shadow:0 0 0 2px var(--amber), 0 1px 7px rgba(0,0,0,.5);
    transform:scale(1.04); }

  /* the rolling wheel overlay */

  .svcwheel.show{ display:block; }
  .swback{ position:absolute; inset:0; background:rgba(6,5,3,.74);

  .swpanel{ position:absolute; left:0; right:0; bottom:0; padding:22px 18px 24px;

  .swwin{ position:relative; width:100%; max-width:262px; height:220px; overflow:hidden;
    touch-action:none; -webkit-tap-highlight-color:transparent;
    -webkit-mask-image:linear-gradient(180deg, transparent, #000 26%, #000 74%, transparent);
    mask-image:linear-gradient(180deg, transparent, #000 26%, #000 74%, transparent); }
  .swreel{ position:absolute; left:0; right:0; top:0; will-change:transform; }
  .switem{ height:44px; display:flex; align-items:center; justify-content:center; }
  /* the fixed centre window where the chosen streamer settles */
  .swsel{ position:absolute; left:8px; right:8px; top:88px; height:44px; pointer-events:none;
    border-radius:11px; border:1px solid rgba(240,169,59,.6); background:rgba(240,169,59,.07);
    box-shadow:0 0 18px rgba(240,169,59,.18) inset; }
  .swset{ font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:.14em;
    padding:12px 34px; border-radius:999px; cursor:pointer; border:none;

  .swset:active{ transform:translateY(1px); }
  .swcancel{ font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--faint); cursor:pointer; padding:4px 10px; }
</style>

<body>
<div class="face" id="face">
  <div class="bg bg-fallback" id="bg"></div>
  <div class="scrim"></div>

  <!-- fixed top bar (Feed-style): stays put while the content below scrolls -->
  <div class="topbar">
    <div class="facebar">
      <div class="fb-left">
        <span class="facelabel">LOG</span>
        <span class="dots" id="epDots"><i></i><i></i><i></i><i class="on"></i><i></i><i></i></span>
      </div>
      <!-- season dots (display-only): dark-green done · 🍿 current · green future-available · grey unaired -->
      <div class="fb-mid" id="seasonInd"></div>
      <!-- best-guess streamer; hold it to roll the picker wheel -->
      <div class="fb-right"><div class="svccorner" id="svcCorner" style="display:none"></div></div>
    </div>
  </div>

  <div class="scroll">

    <!-- Shown only when nothing has ever been watched. Tapping (or simply landing
         on this face) swings over to the Log so you can log a show. -->
    <div class="emptyface" id="emptyFace">
      <div class="emsg">Log a show to watch</div>
    </div>

    <div class="hero">
      <div class="herofoot">
        <h1 class="name" id="name">Loading…</h1>

        <!-- episode progress: popcorn marks the current episode. tap the bar to force-advance (logs BP) -->

    </div>

    <div class="sheet">

      <div class="wlhead">
        <div class="block-label" style="margin:0" id="wlLabel">Watched · 0</div>
        <div class="wlctl">
          <span class="ctl cool" id="cool">⏭ 24h later</span>
          <span class="ctl" id="reset">↺ reset</span>
        </div>
      </div>
      <div id="watchlist"></div>

      <!-- Audio comment transcripts: displays recorded comments with timestamp -->
      <div style="margin-top:24px; border-top:1px solid rgba(255,255,255,.1); padding-top:16px;">
        <div class="block-label" style="margin-bottom:12px;" id="transcriptLabel">Transcripts · 0</div>
        <div id="transcripts" style="font-size:12px; font-family:var(--body); color:var(--dim); line-height:1.6;"></div>
      </div>

  </div>

  <!-- Streamer picker: hold the corner badge to roll this wheel to where you watch. -->
  <div class="svcwheel" id="svcWheel">
    <div class="swback" id="svcBack"></div>
    <div class="swpanel">
      <div class="swcap">Where are you watching?<small>roll to your streamer</small></div>
      <div class="swwin" id="svcWin">
        <div class="swreel" id="svcReel"></div>
        <div class="swsel"></div>
      </div>
      <button class="swset" id="svcSet">SET</button>
      <div class="swcancel" id="svcCancel">cancel</div>
    </div>
  </div>

  <!-- Floating cube: back to cube navigation (replaces double-tap / pinch) -->
  <button class="cubeback" id="cubeBack" aria-label="Back to cube">
    <span class="cb-cube">
      <span class="cb-face cb-front"></span>
      <span class="cb-face cb-back"></span>
      <span class="cb-face cb-right"></span>
      <span class="cb-face cb-left"></span>
      <span class="cb-face cb-top"></span>
      <span class="cb-face cb-bottom"></span>
    </span>
  </button>
</div>

<script>
const NOW=new Date(); const DAY=864e5;
let allEps=[], eps=[], watched=0, watchTs=[], watchDate={}, binged={}, ranks={}, notes={}, focus=0, cooled=false;
let seasonStatus='', curShowId=null, curShowName='', curService='', svcLaunchable=false;
// A film loads as a one-episode "show" so all the minute-bar / start-finish /
// logging machinery works unchanged; isMovie just hides the season/episode chrome
// and relabels. curShowId is then 'tmdb:<id>' and progress carries kind='movie'.
let isMovie=false;
// Per-episode minute progress. epMin[i]=logged minutes, epDone[i]=watched,
// epBp[i]=force-advanced (end stamp "BP"), startedAt[i]=on-device start ts.
let epMin={}, epDone={}, epBp={}, startedAt={}, avgRuntime=45, minPreview=null, awaitingLog=false, pendingRestore=null;
// watchingLive[i]=true → episode i is in the animated "watching" state, entered ONLY
// by the START/CONTINUE button. A plain log action drops it to static "waiting".
let watchingLive={};
// Per-episode viewing-session log entries: [{date,minutes,finished,bp,startTs,finishTs}].
// sessionBase[i] = the scrubber position when the current START session began.
let epSessions={}, sessionBase={};
// The full saved per-episode detail (keyed "season-number") for THIS show, kept
// so a season-wrap can re-apply the next season's history. Null = none saved.
let savedDetail=null;
// preApp: watched before the app existed (seed / Pierre catch-up / pick / BP).
// These are data, not behavior — they never count toward binge. Real in-app
// watches (logging the minute bar to the end) set preApp=false.
let epPreApp={};

// DEMO = showcase build; MVP = clean product. The "Episodes" 6-dot indicator is DEMO-only.
const DEMO = location.hostname.split('.').includes('demo') || new URLSearchParams(location.search).has('demo');
if(!DEMO){ const d=document.getElementById('epDots'); if(d) d.style.display='none'; }

const $=id=>document.getElementById(id);
const strip=s=>{const d=document.createElement('div');d.innerHTML=s||'';return (d.textContent||'').trim();};
const fmt=d=>d?new Date(typeof d==='string'?d+'T12:00:00':d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
const released=e=>e.airdate && new Date(e.airdate+'T23:59:59')<=NOW;
const sNum=e=>e.season||1;

function boot(show,list,isDefault){
  hideEmpty();                       // a show is loading — clear the empty state
  allEps=list;
  curShowId=show.id||null; curShowName=show.name||'';
  const aired=[...new Set(allEps.filter(released).map(sNum))];
  const cur=aired.length?Math.max(...aired):(allEps.length?Math.max(...allEps.map(sNum)):1);
  eps=allEps.filter(e=>sNum(e)===cur); if(!eps.length) eps=allEps;

  const img=show.image&&(show.image.original||show.image.medium);
  if(img){ $('bg').style.backgroundImage=`url("${img}")`; $('bg').classList.remove('bg-fallback'); }
  else { $('bg').classList.add('bg-fallback'); $('bg').style.backgroundImage=''; }
  $('name').textContent=show.name||'';
  const yr=(show.premiered||'').slice(0,4);
  const svc=(show.webChannel&&show.webChannel.name)||(show.network&&show.network.name)||'';
  curService=svc;   // the streamer to launch from the play button
  setServiceGuess(svc);   // light up the corner with the viewer's pin, else the data network
  resolveCrowdGuess();    // then adopt the crowd's latest pick if they haven't pinned one
  const g=(show.genres&&show.genres[0])||'';
  // The streamer lights up so the platform is always clear (especially when the
  // play button can't deep-link it and is greyed out).
  $('ymeta').innerHTML=[yr, svc?'<span class="svc-lit">'+svc+'</span>':'', g].filter(Boolean).join('<span class="sep">|</span>');
  applySvcState();   // re-apply the launch-button state to the new streamer span

  avgRuntime = show.averageRuntime || show.runtime || 45;
  watched=Math.min(2,eps.filter(released).length);
  watchTs=[]; watchDate={}; binged={}; ranks={}; notes={}; cooled=false;
  epMin={}; epDone={}; epBp={}; startedAt={}; epPreApp={}; epSessions={}; sessionBase={}; minPreview=null; awaitingLog=false; watchingLive={};
  savedDetail=null;                  // a fresh boot; applyPattern sets the real detail
  // Seed watches are pre-app data: dark green on the bar, but never binge.
  for(let i=0;i<watched;i++){ const t=Date.now()-(watched-i)*45*6e4; watchTs.push(t); watchDate[i]=new Date(t); epDone[i]=true; epMin[i]=runtimeOf(i); epPreApp[i]=true; }
  focus=Math.min(watched, eps.length-1);
  paint();
  // If the Episode is showing a real show, make sure the Log is tracking it too
  // (so its progress can be saved). MVP only — DEMO's Log is a curated showcase.
  if(!DEMO && curShowId && window.parent!==window)
    window.parent.postMessage({type:'episode:track', tvmazeId:curShowId, name:curShowName, kind:isMovie?'movie':'show', poster:img||null}, '*');
}

// Timestamps of real in-app watches only (preApp false). Pre-app data is skipped.
function inAppTimes(){
  const t=[];
  for(const k in epDone){ if(epDone[k] && epPreApp[k]===false && watchDate[k]) t.push(+watchDate[k]); }
  return t.sort((a,b)=>a-b);
}
// Binge: three in-app watches within 24h. The flame only ever fires on real
// in-app behavior, never on seed / catch-up / pick / BP.
const isBinge=()=>{ const t=inAppTimes(); return t.length>=3 && (t[t.length-1]-t[t.length-3])<=DAY; };
const bingeLive=()=>isBinge() && !cooled;

function runtimeOf(i){ return (eps[i]&&eps[i].runtime) || avgRuntime || 45; }

// Does the show have a season after the one currently loaded? If so, finishing
// this season wraps onward rather than ending the show.
function hasLaterSeason(){
  if(!eps.length) return false;
  const cur=sNum(eps[0]);
  return allEps.some(e=>sNum(e)>cur);
}
// Logging the last episode of a fully-aired current season = the season finale.
// With more seasons ahead this wraps to the next season; only the LAST season's
// finale hands off to the Log to finish the show. MVP only; DEMO keeps its chip.
function finaleCheck(){
  const total=eps.length;
  if(total>0 && watched>=total && hasLaterSeason()) return;   // season finale → wrap, not show finale
  if(!DEMO && window.parent!==window && total>0 && watched>=total && curShowId)
    window.parent.postMessage({type:'episode:finishedFinale', tvmazeId:curShowId, name:curShowName, kind:isMovie?'movie':'show'}, '*');
}
function markWatchedThrough(i){
  if(i+1>watched) watched=i+1;
  if(!watchDate[i]) watchDate[i]=new Date();
  if(isBinge()){ const t=inAppTimes(), latest=t[t.length-1];
    for(const k in epDone){ if(epDone[k] && epPreApp[k]===false && watchDate[k] && latest-(+watchDate[k])<=DAY) binged[k]=true; } }
}
// Apply the saved per-episode detail (keyed "season-number") onto the loaded eps.
function applySavedDetail(){
  if(!savedDetail) return;
  eps.forEach((e,i)=>{ const d=savedDetail[sNum(e)+'-'+e.number]; if(!d) return;
    if(d.done){ epDone[i]=true; epPreApp[i]=true; if(i+1>watched) watched=i+1; }   // restored history: not a fresh binge
    if(typeof d.min==='number') epMin[i]=d.min;
    if(d.bp) epBp[i]=true;
    if(Array.isArray(d.sessions)) epSessions[i]=d.sessions; });                     // restore the session log
}
function advanceFocus(){
  // Resume at the first episode past everything watched (max watched + 1), not just
  // the next index — so finishing an earlier episode out of order (e.g. ep2 then
  // ep1) still lands on ep3, never back on an already-watched one. `watched` is
  // maintained as highest-done + 1 by markWatchedThrough / applySavedDetail.
  if(watched<eps.length){ focus=watched; return; }
  loadNextSeason();                  // past the last episode of this season → wrap onward
}
// Load the next season of the show into the face, carrying its saved history.
function loadNextSeason(){
  if(!eps.length) return false;
  const cur=sNum(eps[0]);
  const later=[...new Set(allEps.map(sNum))].filter(s=>s>cur).sort((a,b)=>a-b);
  if(!later.length) return false;    // already the last season — real finale
  switchToSeason(later[0]);
  forceSeasonNote(cur);              // wrapped a season in-app → force a note in Pierre
  return true;
}
// A deliberate in-app season finish routes to Pierre for a forced thought on the
// season just wrapped (reliable trigger; the return-from-launch prompt is not).
function forceSeasonNote(finishedSeason){
  if(window.parent===window || !curShowId) return;
  const payload={ intent:'season-note', show:curShowName, ep:'Season '+finishedSeason };
  if(typeof window.parent.cubeRotateTo==='function') window.parent.cubeRotateTo('pierre', payload);
  else window.parent.postMessage({type:'cube:rotateTo', face:'pierre', payload}, '*');
}
function switchToSeason(season){
  const next=allEps.filter(e=>sNum(e)===season);
  if(!next.length) return;
  eps=next; watched=0;
  watchTs=[]; watchDate={}; binged={}; ranks={}; notes={}; cooled=false;
  epMin={}; epDone={}; epBp={}; startedAt={}; epPreApp={}; epSessions={}; sessionBase={};
  minPreview=null; awaitingLog=false; watchingLive={};
  applySavedDetail();                // bring back any saved progress for this season
  focus=Math.min(watched, eps.length-1);
  paint();
}

function emitProgress(i, done, bp, minute){
  if(window.parent===window || !curShowId) return;
  const e=eps[i]; if(!e) return;
  window.parent.postMessage({type:'episode:progress', tvmazeId:curShowId, kind:isMovie?'movie':'show',
    name:curShowName, season:sNum(e), number:e.number, minute:minute||0, done:!!done, bp:!!bp,
    started_at: startedAt[i]||null, sessions: epSessions[i]||[]}, '*');
}

// ---- viewing-session helpers ----
const escHtml=(s)=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function epCode(e){ return isMovie ? '🎬' : ('S'+String(e.season||1).padStart(2,'0')+'E'+String(e.number||0).padStart(2,'0')); }
const mdFmt=(ts)=>{ const d=new Date(ts); return (d.getMonth()+1)+'/'+d.getDate(); };
const dayKey=(ts)=>{ const d=new Date(ts); return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); };
const hmFmt=(ts)=> ts ? new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '—';
// A Viewing record: one watch of a fraction-to-full episode, with time in/out, a
// state (watching | paused | done) and a validated flag. Validated = the viewer
// deliberately confirmed it (LOG IT / FINISH / skip); unvalidated = the timer's
// own placement offer, pending confirmation.
//
// Open a watching viewing for episode i (the live, ticking one). One per episode.
function openWatchViewing(i){
  epSessions[i]=epSessions[i]||[];
  const arr=epSessions[i], last=arr[arr.length-1];
  if(last && last.state==='watching') return;      // already open
  const now=Date.now();
  arr.push({dk:dayKey(now), date:mdFmt(now), minutes:Math.round(epMin[i]||0),
            finished:false, bp:false, state:'watching', validated:false, startTs:now, finishTs:null});
}
// Close (or append) a viewing for episode i. opts.validated defaults true (a user
// action); the timer's placement passes false.
function logSession(i, opts){
  epSessions[i]=epSessions[i]||[];
  const arr=epSessions[i], now=Date.now(), dk=dayKey(now);
  const validated = opts.validated!==false, finished=!!opts.finished;
  const state = finished ? 'done' : 'paused';
  const last=arr[arr.length-1];
  // 1) Close the open live (watching) viewing in place.
  if(last && last.state==='watching'){
    last.minutes=opts.minutes; last.finishTs=now;
    last.finished=finished; last.bp=!!opts.bp; last.state=state; last.validated=validated;
    return;
  }
  // 2) A user confirmation upgrades this episode's latest unvalidated placement
  //    in place, rather than stacking a duplicate next to the offer.
  if(validated && last && last.state!=='watching' && last.validated===false && !last.bp){
    last.minutes=opts.minutes; last.finishTs=now;
    last.finished=finished; last.bp=!!opts.bp; last.state=state; last.validated=true;
    return;
  }
  // 3) Roll up today's still-open partial of the same validation.
  if(!finished && last && last.state==='paused' && !last.bp && last.dk===dk && last.validated===validated){
    last.minutes=opts.minutes; last.finishTs=now; return;
  }
  // 4) Otherwise append a fresh viewing.
  arr.push({dk, date:mdFmt(now), minutes:opts.minutes, finished, bp:!!opts.bp,
            state, validated, startTs:startedAt[i]||null, finishTs:now});
}

// LOG IT: record the current scrubber position. Reaching the runtime finishes it.
function logMinute(){
  const rt=runtimeOf(focus);
  const val=Math.round(Math.min(rt, minPreview!=null?minPreview:(epMin[focus]||0)));
  epMin[focus]=val; minPreview=null; awaitingLog=false; cooled=false; epPreApp[focus]=false;
  try{ localStorage.removeItem('pg_launch'); }catch(_){}
  const done=val>=rt-1;
  watchingLive[focus]=false;   // logging pauses the watch → "waiting" (static), never animates
  if(done){ epDone[focus]=true; epBp[focus]=false; markWatchedThrough(focus); logSession(focus,{minutes:rt,finished:true,bp:false}); }
  else logSession(focus,{minutes:val,finished:false,bp:false});
  emitProgress(focus, done, false, val);
  if(done){ finaleCheck(); advanceFocus(); }
  paint();
}
const logIt=logMinute;

// Animation frames for the watching indicator (cycles through every ~270ms)
const buildFrames = ['>..', '>>.', '>>>', '.>>', '..>', '...'];
let buildFrame = 0;

// Audio comment: record, transcribe, and save to the episode with timestamp.
// Phase 1: record with 5-second timeout + countdown timer on button.
// Phase 2: post to Workers AI Whisper, save audio + transcript to watch_comment table.
//          Display in feed as: "S01E01 12:34 - <transcript text>"
let isRecording = false;
let recordingCountdown = 0;
let recordingInterval = null;
let transcripts = [];  // [{epCode, time, text}, ...]
let mediaRecorder = null;
let audioChunks = [];

function paintTranscripts(){
  const label=$('transcriptLabel');
  const container=$('transcripts');
  if(!label || !container) return;
  label.textContent=`Transcripts · ${transcripts.length}`;
  container.innerHTML='';
  transcripts.forEach(t=>{
    const line=document.createElement('div');
    line.style.marginBottom='8px';
    line.innerHTML=`<strong>${t.epCode} ${t.time}</strong> — ${t.text}`;
    container.appendChild(line);
  });
}

async function startRecording(){
  // Only allow recording while timer is running
  if(!watchingLive[focus]){
    console.log('Recording only available while watching');
    alert('Start watching an episode first (click START)');
    return;
  }

  isRecording = true;
  recordingCountdown = 7;
  audioChunks = [];

  try {
    console.log('Requesting microphone access...');
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log('Microphone access granted');
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => {
      audioChunks.push(e.data);
      console.log('Audio chunk recorded:', e.data.size, 'bytes');
    };
    mediaRecorder.start();
  } catch(err){
    console.error('Microphone error:', err);
    isRecording = false;
    alert('Microphone access denied: ' + err.message);
    return;
  }

  const micBtn = $('micBtn');
  if(micBtn){
    micBtn.classList.add('recording');
    micBtn.textContent = `${recordingCountdown}s`;
  }
  recordingInterval = setInterval(()=>{
    recordingCountdown--;
    const btn = $('micBtn');
    if(btn) btn.textContent = recordingCountdown > 0 ? `${recordingCountdown}s` : 'DONE';
    if(recordingCountdown <= 0) stopRecording();
  }, 1000);
  console.log('Recording started, watchingLive[focus]:', watchingLive[focus]);
}

async function stopRecording(){
  isRecording = false;
  if(recordingInterval) clearInterval(recordingInterval);
  recordingCountdown = 0;
  const micBtn = $('micBtn');
  if(micBtn){
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎙️';
  }

  if(mediaRecorder && mediaRecorder.state !== 'inactive'){
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(track => track.stop());
  }

  // Post audio to Worker for transcription via Workers AI Whisper
  const e = eps[focus];
  if(e && audioChunks.length > 0){
    const code = epCode(e);
    const mins = Math.round((epMin[focus]||0));
    const timeStr = `${Math.floor(mins/60)}:${String(mins%60).padStart(2,'0')}`;

    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    const formData = new FormData();
    formData.append('audio', audioBlob);
    formData.append('episodeId', code);
    formData.append('timestampMs', mins * 60000);

    // Try to get user email from parent window or use empty string
    try {
      const userEmail = window.parent?.currentUser?.email ||
                       (typeof currentUser !== 'undefined' ? currentUser.email : '') ||
                       (typeof currentEmail !== 'undefined' ? currentEmail : '');
      if(userEmail) formData.append('userEmail', userEmail);
    } catch(e) { /* ignore */ }

    try {
      console.log('Sending transcription request...');
      const res = await fetch('/transcribe', { method: 'POST', body: formData });
      console.log('Transcribe response:', res.status);

      if(!res.ok){
        const errText = await res.text();
        console.error('Transcribe error response:', errText);
        transcripts.unshift({
          epCode: code,
          time: timeStr,
          text: `[transcription failed: ${res.status}]`
        });
        paintTranscripts();
        return;
      }

      const data = await res.json();
      console.log('Transcription result:', data);
      transcripts.unshift({
        epCode: code,
        time: timeStr,
        text: data.transcription || '[no transcription]'
      });
      paintTranscripts();
    } catch(err){
      console.error('Transcription error:', err);
      transcripts.unshift({
        epCode: code,
        time: timeStr,
        text: `[error: ${err.message}]`
      });
      paintTranscripts();
    }
  }
}

// Force-advance / skip: the episode is logged "BP" (Before PangolinRC) and we jump on.
function forceAdvance(){
  const rt=runtimeOf(focus);
  epDone[focus]=true; epBp[focus]=true; epPreApp[focus]=true; epMin[focus]=rt; minPreview=null; awaitingLog=false; cooled=false;  // BP = pre-app
  markWatchedThrough(focus);
  logSession(focus,{minutes:rt,finished:true,bp:true});
  emitProgress(focus, true, true, 0);
  finaleCheck(); advanceFocus(); paint();
}

// START / CONTINUE: begin (or resume) a watch. This is the ONLY entry point that
// puts the episode into the animated "watching" state.
function startEpisode(){
  startedAt[focus]=Date.now(); sessionBase[focus]=epMin[focus]||0; minPreview=null; awaitingLog=false;
  watchingLive[focus]=true;   // enter the animated "watching" state
  openWatchViewing(focus);    // persist the open watching viewing (survives reload)
  emitProgress(focus, false, false, Math.round(epMin[focus]||0));
  paint();
}
// The latest finish timestamp across this show's logged viewings, capped at `before`.
// Used to back-date a click-FINISH without overlapping (crashing into) a prior watch.
function latestFinishBefore(before){
  let m=0;
  for(const k in epSessions){ const arr=epSessions[k]||[];
    for(const s of arr){ if(typeof s.finishTs==='number' && s.finishTs<before && s.finishTs>m) m=s.finishTs; } }
  return m;
}
// FINISH: logs the episode fully watched and advances.
//  · With a live watch open, tapping done inside a minute is a tap-through, not a
//    sitting → BP.
//  · With no live watch, back-date a full runtime, but never earlier than this user's
//    previous logged watch. If that clamp leaves LESS than a runtime of room (you
//    just finished something), there was no time for a real watch here → BP. A
//    standalone finish with a full runtime of room stays a legitimate watch.
// BP never counts toward a binge and renders grey with no date.
function finishEpisode(){
  const rt=runtimeOf(focus), now=Date.now();
  let bp;
  if(startedAt[focus]!=null){
    bp = (now - startedAt[focus]) < 60000;
  } else {
    startedAt[focus]=Math.max(now-rt*60000, latestFinishBefore(now));
    // 15% wiggle: skipping the intro and cutting the credits can turn a 60-min episode
    // into ~50, so anything down to 85% of runtime still counts as a real watch; less
    // room than that since the previous log → it couldn't be a real sitting → BP.
    bp = (now - startedAt[focus]) < rt*60000*0.85;
  }
  epMin[focus]=rt; epDone[focus]=true; epBp[focus]=bp; epPreApp[focus]=bp; minPreview=null; awaitingLog=false; cooled=false; watchingLive[focus]=false;
  try{ localStorage.removeItem('pg_launch'); }catch(_){}
  markWatchedThrough(focus);
  logSession(focus,{minutes:rt,finished:true,bp:bp});
  emitProgress(focus, true, bp, rt);
  finaleCheck(); advanceFocus(); paint();
}

function paint(){

  // Live status sits inline on the EP line (right side), not in the list below.
  const watching = !!watchingLive[focus];
  const inProgress = !epDone[focus] && (startedAt[focus] || (epMin[focus]||0)>0);
  const st=$('epStatus');
  if(st){

  }
  // Left button state machine: START → LOG PARTIAL (while watching) → CONTINUE (when paused/scrubbed)
  // The center indicator shows WATCHING>>. animation only while actively watching.
  const stBtn=$('startEpBtn');
  if(stBtn){
    if(watching) {
      // Actively watching → show LOG PARTIAL button
      stBtn.textContent = 'LOG PARTIAL';
      stBtn.classList.add('logpart');
      stBtn.classList.remove('continue');
      stBtn.disabled = false;
    } else if(inProgress) {
      // In progress but not watching → show CONTINUE (paused or scrubbed)
      stBtn.textContent = 'CONTINUE';
      stBtn.classList.add('continue');
      stBtn.classList.remove('logpart');
      stBtn.disabled = false;
    } else {
      // Not started → show START (only if progress is 0, i.e. not scrubbed)
      stBtn.textContent = (epMin[focus]||0) > 0 ? 'CONTINUE' : 'START';
      stBtn.classList.remove('logpart', 'continue');
      stBtn.disabled = false;
    }
  }
  // Update the elapsed time display with animation frames if watching
  paintMinute();
  const fnBtn=$('finishEpBtn'); if(fnBtn) fnBtn.disabled = false;

  // Watchlist: ONE row per episode (history only), newest activity first. Tapping a
  // row expands its children — every viewing session for that episode plus the note.
  const epRows=[];
  for(let i=0;i<eps.length;i++){
    const sess=epSessions[i]||[];
    if(!sess.length && !epDone[i]) continue;
    let lastTs=0; sess.forEach(s=>{ if((s.finishTs||0)>lastTs) lastTs=s.finishTs||0; });
    if(epDone[i] && watchDate[i]) lastTs=Math.max(lastTs,+watchDate[i]);
    epRows.push({ i, e:eps[i]||{}, sess, lastTs });
  }
  epRows.sort((a,b)=>b.lastTs-a.lastTs);
  $('wlLabel').textContent='Watched · '+watched;
  const wl=$('watchlist'); wl.innerHTML='';
  if(!epRows.length) wl.innerHTML='<div class="empty">Nothing logged yet.</div>';
  epRows.forEach(({i,e,sess})=>{
    const row=document.createElement('div'); row.className='wrow';
    let badge;
    if(epDone[i]){ const fin=sess.filter(s=>s.finished).pop();
      const stamp = epBp[i] ? '(BP)' : '('+(fin?fin.date:(watchDate[i]?mdFmt(+watchDate[i]):''))+' ✅)';
      badge=`<span class="wdate${epBp[i]?' bp':(binged[i]?' binged':'')}">${stamp}</span>`; }
    else { const last=sess[sess.length-1];
      badge=`<span class="wdate">(${last?last.date+', '+last.minutes+'m':'in progress'})</span>`; }
    const score = ranks[i]!==undefined ? ranks[i]+'/10' : '';
    let kids;
    if(sess.length){ kids=sess.slice().reverse().map(s=>{   // newest activity on top, matching the episode list
      const base = s.bp ? 'BP · before Pierre' : (s.state==='watching' ? 'watching' : (s.finished ? 'finished · '+s.minutes+'m' : 'paused · '+s.minutes+'m'));
      const lbl = base + (s.validated===false ? ' · offered' : '');   // offered = the timer's placement, not yet confirmed
      // BP carries no real clock time — drop the date and the in→out span.
      const datePart = s.bp ? '' : s.date+' · ';
      const ts = (s.bp || !s.startTs) ? '' : ' · '+hmFmt(s.startTs)+'→'+(s.finishTs?hmFmt(s.finishTs):'…');
      return `<div class="sess${s.bp?' bp':''}">${datePart}${lbl}<span class="ts">${ts}</span></div>`; }).join(''); }
    else kids = epBp[i] ? `<div class="sess bp">BP · before Pierre</div>`
                        : `<div class="sess">${watchDate[i]?mdFmt(+watchDate[i]):''} · finished</div>`;
    const note = (notes[i]&&notes[i].trim()) ? `<div class="note">“${escHtml(notes[i].trim())}”</div>` : '';
    row.innerHTML=`<div class="wmain"><span class="wt">${escHtml(epCode(e)+' '+(e.name||('Episode '+(i+1))))}</span>
      ${badge}<span class="wscore">${score}</span></div>
      <div class="wdetail">${kids}${note}</div>`;
    row.onclick=()=>row.classList.toggle('open');
    wl.appendChild(row);
  });
  reportCurrent();
}

// Season dots, colored by the episode convention.
function renderSeasons(){
  const host=$('seasonInd'); if(!host) return;
  if(isMovie){ host.innerHTML='<span class="seasonlabel">FILM</span>'; return; }   // a film has no seasons
  const seasons=[...new Set(allEps.map(sNum))].filter(s=>s>=1).sort((a,b)=>a-b);
  const N=seasons.length;
  if(N===0){ host.innerHTML=''; return; }
  const curSeason = eps.length ? sNum(eps[0]) : seasons[0];

  // 1 season: grey "1 SEASON", no counter / no dots.
  if(N===1){ host.innerHTML='<span class="seasonlabel">1 SEASON</span>'; return; }

  // 2-6 seasons: "SEASONS" + one colored dot per season.
  if(N<=6){
    const airedBy={}; allEps.filter(released).forEach(e=>airedBy[sNum(e)]=(airedBy[sNum(e)]||0)+1);
    const dots=seasons.map(se=>{
      let c='sd';
      if(se===curSeason)     c+=' cur';     // 🍿 current
      else if(se<curSeason)  c+=' done';    // dark green: completed
      else if(airedBy[se]>0) c+=' avail';   // green: future, aired
      return '<span class="'+c+'"></span>'; // else grey (unaired)
    }).join('');
    host.innerHTML='<span class="seasonlabel">SEASONS</span><span class="seasondots">'+dots+'</span>';
    return;
  }

  // >6 seasons: count + the popcorn positioned by which third the current season
  // falls in (e.g. 18 seasons -> 1-6 left, 7-12 middle, 13-18 right).
  const third=Math.min(3, Math.max(1, Math.ceil(curSeason/(N/3))));
  const corn='<span class="scorn">🍿</span>';
  const inner = third===1 ? corn+N+' SEASONS'
              : third===2 ? N+corn+'SEASONS'
              :             N+' SEASONS'+corn;
  host.innerHTML='<span class="seasonlabel">'+inner+'</span>';
}

// Minute bar for the focused episode (yellow track, elapsed darkens left→right).
function paintMinute(){
  const rt=runtimeOf(focus);
  const cur=Math.max(0,Math.min(rt, minPreview!=null?minPreview:(epMin[focus]||0)));
  const pct=rt>0?cur/rt*100:0;
  $('minFill').style.width=pct+'%';
  $('minHandle').style.left=pct+'%';
  // Left: elapsed time with animation frames after the number when watching
  const elapsedText = Math.round(cur)+' min';
  $('minElapsed').textContent = watchingLive[focus] ? elapsedText + ' ' + buildFrames[buildFrame % buildFrames.length] : elapsedText;
  $('minRem').textContent=Math.max(0,Math.round(rt-cur))+' min';      // right: remaining
  const mid=$('minMid');                                              // middle: total / prompt / BP
  if(awaitingLog){ mid.textContent='tap to log · grab again to adjust'; mid.classList.add('phrase'); }
  else { mid.classList.remove('phrase'); mid.textContent = epBp[focus] ? 'BP' : (Math.round(rt)+' min'); }
}
