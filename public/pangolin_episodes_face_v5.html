<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>PangolinRC — Episodes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --dgreen:#2E6B45; --green:#5BBF7B; --grey:#5A5149;
    --dred:#7E2A24; --amber:#F0A93B; --amber-deep:#1a1206;
    --text:#F8F2E8; --dim:#D2C8B8; --faint:#A29684;
    --sheet:rgba(13,10,7,.66);
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'Space Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{ background:#0c0a08; color:var(--text); font-family:var(--body);
    -webkit-font-smoothing:antialiased; display:flex; justify-content:center;
    align-items:flex-start; padding:24px 12px; min-height:100vh; }

  .face{ position:relative; width:min(94vw,500px); aspect-ratio:1/1;
    border-radius:20px; overflow:hidden; border:1px solid rgba(255,255,255,.06);
    box-shadow:0 24px 70px rgba(0,0,0,.6); display:flex; flex-direction:column; }
  .bg{ position:absolute; inset:0; background-size:cover; background-position:center top;
    filter:blur(9px) saturate(.92) brightness(.52); transform:scale(1.1); }
  .bg-fallback{ background:radial-gradient(120% 90% at 30% 8%, #3c5566, #11100b 72%); }
  .scrim{ position:absolute; inset:0; pointer-events:none;
    background:
      linear-gradient(180deg, rgba(8,6,4,.5) 0%, rgba(8,6,4,.4) 26%,
        rgba(8,6,4,.72) 56%, rgba(8,6,4,.92) 100%),
      radial-gradient(140% 80% at 50% 120%, rgba(8,6,4,.5), transparent 60%); }
  .scroll{ position:relative; z-index:1; flex:1; min-height:0; overflow-y:auto; overflow-x:hidden;
    -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .scroll::-webkit-scrollbar{ width:0; }

  /* fixed top bar (like the Feed face): EPISODE · SEASONS · + Show — never scrolls */
  .topbar{ position:relative; z-index:2; flex:none; padding:13px 16px 11px;
    background:linear-gradient(180deg, rgba(8,6,4,.88) 0%, rgba(8,6,4,.5) 72%, transparent 100%); }
  .seasonlabel{ font-family:var(--mono); font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--faint); flex:0 0 auto; }

  .hero{ padding:16px 18px 18px; min-height:50%; display:flex; flex-direction:column; }
  /* one row: EPISODE (left) · SEASONS (centered) · + Show (right) */
  .facebar{ display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:10px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--faint); }
  .facebar .facelabel{ font-size:12px; letter-spacing:.18em; color:var(--faint); }
  .fb-left{ flex:1 1 0; min-width:0; display:flex; align-items:center; gap:8px; }
  .fb-mid{ flex:0 0 auto; display:flex; align-items:center; gap:8px; }
  .fb-right{ flex:1 1 0; min-width:0; display:flex; justify-content:flex-end; }
  .dots{ display:flex; gap:4px; align-items:center; }
  .dots i{ width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,.3); }
  .dots i.on{ background:var(--amber); box-shadow:0 0 0 3px rgba(240,169,59,.2); }
  .cube{ color:var(--amber); font-size:12px; }

  .herofoot{ margin-top:auto; }
  .name{ font-family:var(--display); font-weight:700; font-size:33px; line-height:1.0;
    letter-spacing:-.02em; margin:0 0 8px; text-shadow:0 2px 22px rgba(0,0,0,.85), 0 0 4px rgba(0,0,0,.5); }
  .ymeta{ font-family:var(--mono); font-size:11px; color:var(--dim);
    letter-spacing:.05em; margin-bottom:12px; text-shadow:0 1px 10px rgba(0,0,0,.7); }
  .ymeta .sep{ color:rgba(255,255,255,.35); margin:0 7px; }
  .ymeta .svc-lit{ color:var(--amber); font-weight:700; text-shadow:0 0 10px rgba(240,169,59,.5); }
  /* when the streamer can be launched, it becomes a tappable pill button */
  .ymeta .svc-lit.live{ cursor:pointer; padding:2px 9px; border:1px solid var(--amber); border-radius:999px; text-shadow:none; }
  .ymeta .svc-lit.live:active{ background:rgba(240,169,59,.18); }

  .scorepill{ display:inline-flex; align-items:center; gap:7px; cursor:pointer;
    background:rgba(0,0,0,.36); border:1px solid rgba(255,255,255,.14); border-radius:999px;
    padding:5px 12px 5px 7px; margin-bottom:20px; align-self:flex-start; }
  .scorepill:hover{ border-color:var(--amber); }
  .scorepill .dot{ width:15px; height:15px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd98a, var(--amber)); flex:0 0 15px; }
  .scorepill .v{ font-family:var(--display); font-weight:700; font-size:14px; }
  .scorepill small{ font-family:var(--mono); font-size:8.5px; color:var(--faint);
    letter-spacing:.08em; text-transform:uppercase; }

  /* seasons bar (slim, above the episode bar) */
  .seasonsbar{ position:relative; height:19px; border-radius:7px; background:var(--grey);
    overflow:hidden; margin-bottom:10px; cursor:pointer; box-shadow:inset 0 1px 2px rgba(0,0,0,.42); }
  .ss{ position:absolute; top:0; bottom:0; transition:width .3s cubic-bezier(.2,.8,.2,1),left .3s; }
  .ss.w{ left:0; background:var(--dgreen); }
  .ss.a{ background:var(--green); }
  .sscopy{ position:absolute; inset:0; display:flex; align-items:center; justify-content:space-between;
    padding:0 11px; pointer-events:none; font-family:var(--mono); font-size:9px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; }
  .sscopy .l{ color:rgba(255,255,255,.9); text-shadow:0 1px 2px rgba(0,0,0,.55); }
  .sscopy .r{ color:#f0dcb0; text-shadow:0 1px 2px rgba(0,0,0,.55); }

  .barzone{ position:relative; }
  .pop{ position:absolute; top:-4px; transform:translateX(-50%); text-align:center;
    transition:left .32s cubic-bezier(.2,.8,.2,1); pointer-events:none; z-index:4; }
  .pop .corn{ font-size:23px; line-height:1; filter:drop-shadow(0 2px 5px rgba(0,0,0,.7)); display:block; }
  .pop .fire{ position:absolute; left:50%; top:-12px; transform:translateX(-50%);
    font-size:16px; opacity:0; transition:opacity .2s; filter:drop-shadow(0 0 7px rgba(255,120,0,.9)); }
  .binge .pop .fire{ opacity:1; animation:flick .35s infinite alternate; }
  @keyframes flick{ from{transform:translateX(-50%) scale(1) rotate(-4deg);opacity:.8}
    to{transform:translateX(-52%) scale(1.14) rotate(4deg);opacity:1} }

  .bar{ position:relative; height:15px; border-radius:999px;
    background:var(--grey); overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.45); }
  .seg{ position:absolute; top:0; bottom:0;
    transition:width .32s cubic-bezier(.2,.8,.2,1),left .32s,background .4s; }
  .seg.watched{ left:0; background:var(--dgreen); }
  .seg.avail{ background:var(--green); cursor:pointer; }
  .seg.avail.lit{ box-shadow:0 0 14px rgba(91,191,123,.6) inset; animation:pulse 1.6s infinite; }
  @keyframes pulse{ 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }
  .binge .seg.watched{ background:linear-gradient(90deg,#ffd24a,#ff8c1a,#ff3b1a,#ff8c1a,#ffd24a);
    background-size:280% 100%; animation:flow 1.1s linear infinite; }
  @keyframes flow{ from{background-position:0 0} to{background-position:280% 0} }

  .barfoot{ display:flex; align-items:center; justify-content:space-between;
    margin-top:12px; font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; }
  .barfoot .d{ color:var(--dim); white-space:nowrap; }
  .barfoot .d.faint{ color:var(--faint); }
  .barfoot .center{ flex:1; text-align:center; padding:0 8px; }
  .binge-tag{ display:none; font-family:var(--display); font-weight:700; font-size:13px;
    letter-spacing:.03em; color:#ffb347; text-shadow:0 0 14px rgba(255,120,0,.8); }
  .binge .binge-tag{ display:inline-block; animation:pin .3s ease; }
  .hint{ color:var(--faint); font-size:9.5px; }
  .binge .hint{ display:none; }
  @keyframes pin{ from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }

  /* season dots (display-only) */
  .seasondots{ display:flex; gap:9px; align-items:center; min-height:16px; }
  .seasondots .sd{ width:11px; height:11px; border-radius:50%; background:var(--grey); position:relative; flex:0 0 auto; }
  .seasondots .sd.done{ background:var(--dgreen); }
  .seasondots .sd.avail{ background:var(--green); }
  .seasondots .sd.cur{ background:transparent; width:16px; height:16px; }
  .seasondots .sd.cur::after{ content:"🍿"; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:14px; line-height:1; }
  .scorn{ font-size:13px; }   /* popcorn inside the ">6 seasons" count indicator */

  /* minute bar: position inside the current episode (yellow track, elapsed darkens L→R) */
  .minzone{ margin-top:4px; }
  .minbar{ position:relative; height:14px; border-radius:999px; background:rgba(240,169,59,.24);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.42); cursor:pointer; touch-action:none; }
  .minfill{ position:absolute; left:0; top:0; bottom:0; width:0; border-radius:999px;
    background:linear-gradient(90deg,#caa15e,#7a5410); }
  .minhandle{ position:absolute; top:50%; left:0; width:7px; height:26px; border-radius:4px;
    background:var(--amber); transform:translate(-50%,-50%); box-shadow:0 2px 8px rgba(0,0,0,.55); cursor:grab; }
  .minhandle:active{ cursor:grabbing; }
  .minfoot{ display:flex; align-items:center; justify-content:space-between; margin-top:11px;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; }
  .minfoot .d{ color:var(--dim); white-space:nowrap; }
  .minfoot .d.faint{ color:var(--faint); }
  .minfoot .d.bp{ color:#ff9d5c; font-weight:700; letter-spacing:.1em; }
  .minfoot .center{ flex:1; text-align:center; padding:0 8px; color:var(--dim); }
  .minfoot .center.phrase{ color:var(--amber); font-size:9px; letter-spacing:.03em; }

  /* MVP empty state: no shows in the Log → nothing on the Episode side yet */
  .emptyface{ position:absolute; inset:0; z-index:6; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; text-align:center; padding:34px;
    background:radial-gradient(120% 90% at 50% 18%, #1b1410 0%, #0c0a08 70%); }
  .emptyface.show{ display:flex; }
  .emptyface .emsg{ font-family:var(--display); font-weight:700; font-size:21px; line-height:1.35; color:var(--text); }
  .emptyface .esub{ font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; color:var(--faint); text-transform:uppercase; }
  .emptyface .empill{ background:var(--amber); color:var(--amber-deep); border:none; border-radius:999px;
    font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:.04em; padding:11px 22px; cursor:pointer; }
  .emptyface .empill:active{ transform:translateY(1px); }

  .sheet{ background:var(--sheet); backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px); border-top:1px solid rgba(255,255,255,.08);
    border-radius:22px 22px 0 0; padding:20px 18px 24px; margin-top:8px; min-height:44%; }
  .catalog{ display:flex; align-items:center; gap:6px; margin-bottom:20px;
    background:rgba(0,0,0,.34); border:1px solid rgba(255,255,255,.13);
    border-radius:12px; padding:3px 3px 3px 12px; }
  .catalog .mag{ color:var(--amber); font-size:15px; }
  .catalog input{ flex:1; background:transparent; border:none; color:var(--text);
    font-family:var(--body); font-size:13px; padding:9px 4px; }
  .catalog input:focus{ outline:none; }
  .catalog input::placeholder{ color:var(--faint); }
  .catalog button{ background:var(--amber); color:var(--amber-deep); border:none;
    border-radius:9px; padding:9px 14px; font-family:var(--mono); font-size:11px;
    font-weight:700; cursor:pointer; }
  .catalog button:active{ transform:translateY(1px); }
  .addpill{ background:rgba(0,0,0,.34); border:1px solid rgba(255,255,255,.18); color:var(--amber);
    font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:.04em; line-height:1;
    padding:5px 10px; border-radius:999px; cursor:pointer; }
  .addpill:active{ transform:translateY(1px); }

  .epline{ font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--amber);
    text-transform:uppercase; margin-bottom:9px; display:flex; gap:9px; align-items:baseline; }
  .epline .sep{ color:rgba(255,255,255,.3); }
  .epline .ttl{ color:var(--text); text-transform:none; font-family:var(--display);
    font-weight:600; font-size:15px; letter-spacing:0; }
  .syn{ font-size:13.5px; color:var(--dim); margin:0 0 18px; line-height:1.55; }

  .block-label{ font-family:var(--mono); font-size:9.5px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--faint); margin:0 0 10px; }
  .rank{ display:flex; gap:5px; flex-wrap:wrap; margin-bottom:16px; }
  .rank b{ width:30px; height:30px; border-radius:8px; display:flex; align-items:center;
    justify-content:center; font-family:var(--mono); font-size:12px; font-weight:700;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09);
    color:var(--dim); cursor:pointer; transition:.12s; }
  .rank b:hover{ border-color:var(--amber); color:var(--text); }
  .rank b.sel{ background:var(--amber); color:var(--amber-deep); border-color:var(--amber); }
  .comment{ width:100%; min-height:54px; resize:vertical; background:rgba(0,0,0,.32);
    border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:11px 13px;
    color:var(--text); font-family:var(--body); font-size:13px; line-height:1.5; margin-bottom:24px; }
  .comment::placeholder{ color:var(--faint); }
  .comment:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(240,169,59,.12); }

  .wlhead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .wlctl{ display:flex; gap:14px; }
  .ctl{ font-family:var(--mono); font-size:10px; color:var(--faint); cursor:pointer; letter-spacing:.04em; }
  .ctl:hover{ color:var(--amber); }
  .ctl.cool{ display:none; color:#ff9d5c; }
  .binge .ctl.cool{ display:inline; }
  .wrow{ display:flex; align-items:center; gap:11px; padding:9px 0;
    border-bottom:1px solid rgba(255,255,255,.06); cursor:pointer; }
  .wrow .wt{ flex:1; min-width:0; font-family:var(--display); font-weight:500; font-size:13.5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wdate{ font-family:var(--mono); font-size:10px; background:rgba(46,107,69,.9);
    color:#cdebd6; padding:4px 9px; border-radius:999px; white-space:nowrap; letter-spacing:.03em; }
  .wdate.binged{ background:rgba(126,42,36,.92); color:#f4c9c4; }
  .wscore{ font-family:var(--mono); font-size:11px; color:var(--amber); font-weight:700; width:34px; text-align:right; }
  .empty{ font-family:var(--mono); font-size:11px; color:var(--faint); padding:6px 0 2px; }
</style>
</head>
<body>
<div class="face" id="face">
  <div class="bg bg-fallback" id="bg"></div>
  <div class="scrim"></div>

  <!-- fixed top bar (Feed-style): stays put while the content below scrolls -->
  <div class="topbar">
    <div class="facebar">
      <div class="fb-left">
        <span class="facelabel">EPISODE</span>
        <span class="dots" id="epDots"><i></i><i></i><i></i><i class="on"></i><i></i><i></i></span>
      </div>
      <!-- season dots (display-only): dark-green done · 🍿 current · green future-available · grey unaired -->
      <div class="fb-mid" id="seasonInd"></div>
      <div class="fb-right">
        <button id="addShowBtn" class="addpill">+ Show</button>
      </div>
    </div>
  </div>

  <div class="scroll">

    <!-- MVP: shown when the Log is empty (nothing handed to the Episode face) -->
    <div class="emptyface" id="emptyFace">
      <div class="emsg">Nothing on yet</div>
      <div class="esub">your room is empty</div>
      <button class="empill" id="emPierre">See Pierre</button>
    </div>

    <div class="hero">
      <div class="herofoot">
        <h1 class="name" id="name">Loading…</h1>
        <div class="ymeta" id="ymeta"></div>
        <span class="scorepill" id="scorePill" title="Tap to enter the @betterscreenscore value">
          <span class="dot"></span><span class="v" id="scoreVal">—</span><small>Screen Score</small>
        </span>

        <!-- episode progress: popcorn marks the current episode. tap the bar to force-advance (logs BP) -->
        <div class="barzone">
          <div class="pop" id="pop"><span class="fire">🔥</span><span class="corn">🍿</span></div>
          <div class="bar" id="bar">
            <div class="seg watched" id="segW" style="width:0"></div>
            <div class="seg avail" id="segA" style="left:0;width:0"></div>
          </div>
        </div>

        <!-- minute bar: where you are inside the current episode (yellow, elapsed darkens L→R) -->
        <div class="minzone">
          <div class="minbar" id="minBar">
            <div class="minfill" id="minFill"></div>
            <div class="minhandle" id="minHandle"></div>
          </div>
          <!-- elapsed · total (or the log prompt when touched) · remaining -->
          <div class="minfoot">
            <span class="d" id="minElapsed">0 min</span>
            <span class="center" id="minMid">— min</span>
            <span class="d faint" id="minRem">— min</span>
          </div>
        </div>
      </div>
    </div>

    <div class="sheet">
      <div class="epline"><span id="epNo">EP — / —</span><span class="sep">|</span><span class="ttl" id="epTtl"></span></div>
      <p class="syn" id="syn"></p>

      <div class="block-label">Your rank</div>
      <div class="rank" id="rank"></div>

      <div class="block-label">Note</div>
      <textarea class="comment" id="comment" placeholder="what won the room? (optional)"></textarea>

      <div class="wlhead">
        <div class="block-label" style="margin:0" id="wlLabel">Watched · 0</div>
        <div class="wlctl">
          <span class="ctl cool" id="cool">⏭ 24h later</span>
          <span class="ctl" id="reset">↺ reset</span>
        </div>
      </div>
      <div id="watchlist"></div>
    </div>

  </div>
</div>

<script>
const NOW=new Date(); const DAY=864e5;
let allEps=[], eps=[], watched=0, watchTs=[], watchDate={}, binged={}, ranks={}, notes={}, focus=0, cooled=false;
let seasonStatus='', score='', curShowId=null, curShowName='', curService='', svcLaunchable=false;
// Per-episode minute progress. epMin[i]=logged minutes, epDone[i]=watched,
// epBp[i]=force-advanced (end stamp "BP"), startedAt[i]=on-device start ts.
let epMin={}, epDone={}, epBp={}, startedAt={}, avgRuntime=45, minPreview=null, awaitingLog=false, pendingRestore=null;
// preApp: watched before the app existed (seed / Pierre catch-up / pick / BP).
// These are data, not behavior — they never count toward binge. Real in-app
// watches (logging the minute bar to the end) set preApp=false.
let epPreApp={};

// DEMO = showcase build; MVP = clean product. The "Episodes" 6-dot indicator is DEMO-only.
const DEMO = location.hostname.split('.').includes('demo') || new URLSearchParams(location.search).has('demo');
if(!DEMO){ const d=document.getElementById('epDots'); if(d) d.style.display='none'; }

const $=id=>document.getElementById(id);
const strip=s=>{const d=document.createElement('div');d.innerHTML=s||'';return (d.textContent||'').trim();};
const fmt=d=>d?new Date(typeof d==='string'?d+'T12:00:00':d).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
const released=e=>e.airdate && new Date(e.airdate+'T23:59:59')<=NOW;
const sNum=e=>e.season||1;

function boot(show,list,isDefault){
  hideEmpty();                       // a show is loading — clear the empty state
  allEps=list;
  curShowId=show.id||null; curShowName=show.name||'';
  const aired=[...new Set(allEps.filter(released).map(sNum))];
  const cur=aired.length?Math.max(...aired):(allEps.length?Math.max(...allEps.map(sNum)):1);
  eps=allEps.filter(e=>sNum(e)===cur); if(!eps.length) eps=allEps;

  const img=show.image&&(show.image.original||show.image.medium);
  if(img){ $('bg').style.backgroundImage=`url("${img}")`; $('bg').classList.remove('bg-fallback'); }
  else { $('bg').classList.add('bg-fallback'); $('bg').style.backgroundImage=''; }
  $('name').textContent=show.name||'';
  const yr=(show.premiered||'').slice(0,4);
  const svc=(show.webChannel&&show.webChannel.name)||(show.network&&show.network.name)||'';
  curService=svc;   // the streamer to launch from the play button
  const g=(show.genres&&show.genres[0])||'';
  // The streamer lights up so the platform is always clear (especially when the
  // play button can't deep-link it and is greyed out).
  $('ymeta').innerHTML=[yr, svc?'<span class="svc-lit">'+svc+'</span>':'', g].filter(Boolean).join('<span class="sep">|</span>');
  applySvcState();   // re-apply the launch-button state to the new streamer span

  score = '';                                    // tap the pill to enter the @betterscreenscore value
  avgRuntime = show.averageRuntime || show.runtime || 45;
  watched=Math.min(2,eps.filter(released).length);
  watchTs=[]; watchDate={}; binged={}; ranks={}; notes={}; cooled=false;
  epMin={}; epDone={}; epBp={}; startedAt={}; epPreApp={}; minPreview=null; awaitingLog=false;
  // Seed watches are pre-app data: dark green on the bar, but never binge.
  for(let i=0;i<watched;i++){ const t=Date.now()-(watched-i)*45*6e4; watchTs.push(t); watchDate[i]=new Date(t); epDone[i]=true; epMin[i]=runtimeOf(i); epPreApp[i]=true; }
  focus=Math.min(watched, eps.length-1);
  paint();
  // If the Episode is showing a real show, make sure the Log is tracking it too
  // (so its progress can be saved). MVP only — DEMO's Log is a curated showcase.
  if(!DEMO && curShowId && window.parent!==window)
    window.parent.postMessage({type:'episode:track', tvmazeId:curShowId, name:curShowName}, '*');
}

// Timestamps of real in-app watches only (preApp false). Pre-app data is skipped.
function inAppTimes(){
  const t=[];
  for(const k in epDone){ if(epDone[k] && epPreApp[k]===false && watchDate[k]) t.push(+watchDate[k]); }
  return t.sort((a,b)=>a-b);
}
// Binge: three in-app watches within 24h. The flame only ever fires on real
// in-app behavior, never on seed / catch-up / pick / BP.
const isBinge=()=>{ const t=inAppTimes(); return t.length>=3 && (t[t.length-1]-t[t.length-3])<=DAY; };
const bingeLive=()=>isBinge() && !cooled;

function runtimeOf(i){ return (eps[i]&&eps[i].runtime) || avgRuntime || 45; }

// Logging the last episode of a fully-aired current season = the season finale.
// MVP hands off to the Log to finish the show; DEMO keeps the Log's own chip.
function finaleCheck(){
  const total=eps.length;
  if(!DEMO && window.parent!==window && total>0 && watched>=total && curShowId)
    window.parent.postMessage({type:'episode:finishedFinale', tvmazeId:curShowId, name:curShowName}, '*');
}
function markWatchedThrough(i){
  if(i+1>watched) watched=i+1;
  if(!watchDate[i]) watchDate[i]=new Date();
  if(isBinge()){ const t=inAppTimes(), latest=t[t.length-1];
    for(const k in epDone){ if(epDone[k] && epPreApp[k]===false && watchDate[k] && latest-(+watchDate[k])<=DAY) binged[k]=true; } }
}
function advanceFocus(){ if(focus<eps.length-1) focus++; }

function emitProgress(i, done, bp, minute){
  if(window.parent===window || !curShowId) return;
  const e=eps[i]; if(!e) return;
  window.parent.postMessage({type:'episode:progress', tvmazeId:curShowId,
    season:sNum(e), number:e.number, minute:minute||0, done:!!done, bp:!!bp,
    started_at: startedAt[i]||null}, '*');
}

// Log your minute position in the focused episode. Reaching the runtime marks it
// done and advances to the next episode.
function logMinute(){
  const rt=runtimeOf(focus);
  const val=Math.round(minPreview!=null?minPreview:(epMin[focus]||0));
  epMin[focus]=val; minPreview=null; awaitingLog=false; cooled=false;
  try{ localStorage.removeItem('pg_launch'); }catch(_){}   // launch guess consumed
  const done=val>=rt-1;
  if(done){ epDone[focus]=true; epBp[focus]=false; epPreApp[focus]=false; markWatchedThrough(focus); }  // real in-app watch
  emitProgress(focus, done, false, val);
  if(done){ finaleCheck(); advanceFocus(); }
  paint();
}

// Force-advance: skip precise logging — the episode is marked watched with a
// "BP" (Before PangolinRC) end stamp and we jump to the next one.
function forceAdvance(){
  const rt=runtimeOf(focus);
  epDone[focus]=true; epBp[focus]=true; epPreApp[focus]=true; epMin[focus]=rt; minPreview=null; awaitingLog=false; cooled=false;  // BP = pre-app
  markWatchedThrough(focus);
  emitProgress(focus, true, true, 0);
  finaleCheck(); advanceFocus(); paint();
}

function paint(){
  const total=eps.length, rel=eps.filter(released).length;
  $('face').classList.toggle('binge', bingeLive());

  // ----- season dots (display-only) -----
  renderSeasons();

  // ----- score pill -----
  $('scoreVal').textContent=score||'—';

  // ----- episode bar (popcorn marks the focused episode) -----
  $('segW').style.width=(watched/total*100)+'%';
  $('segA').style.left=(watched/total*100)+'%';
  $('segA').style.width=((rel-watched)/total*100)+'%';
  $('segA').classList.toggle('lit', rel>watched && !bingeLive());
  $('pop').style.left=Math.max(4,Math.min(96,(focus+0.5)/total*100))+'%';

  // ----- minute bar (position inside the focused episode) -----
  paintMinute();

  const f=eps[focus]||{};
  $('epNo').textContent=`EP ${focus+1} / ${total}`;
  $('epTtl').textContent=f.name||('Episode '+(focus+1));
  $('syn').textContent=strip(f.summary)||'No synopsis available yet.';

  const rk=$('rank'); rk.innerHTML='';
  for(let n=0;n<=10;n++){ const b=document.createElement('b'); b.textContent=n;
    if(ranks[focus]===n) b.classList.add('sel');
    b.onclick=()=>{ ranks[focus]=n; paint(); }; rk.appendChild(b); }
  $('comment').value=notes[focus]||'';

  // List anything with progress — completed AND in-progress (partial) episodes —
  // so a partial can be tapped to resume its minute marker.
  const logged=[]; for(let i=0;i<eps.length;i++){ if(epDone[i] || epMin[i]>0) logged.push(i); }
  $('wlLabel').textContent='Watched · '+watched;
  const wl=$('watchlist'); wl.innerHTML='';
  if(!logged.length) wl.innerHTML='<div class="empty">Nothing logged yet.</div>';
  for(let x=logged.length-1;x>=0;x--){ const i=logged[x], e=eps[i]; const row=document.createElement('div'); row.className='wrow';
    const partial = !epDone[i] && epMin[i]>0;
    const stamp = epBp[i] ? 'BP' : (epMin[i]>0 ? Math.round(epMin[i])+'m' : fmt(watchDate[i]));
    row.innerHTML=`<span class="wt">${e.name||('Episode '+(i+1))}${partial?' · watching':''}</span>
      <span class="wdate${binged[i]?' binged':''}">${stamp}</span>
      <span class="wscore">${ranks[i]!==undefined?ranks[i]+'/10':''}</span>`;
    row.onclick=()=>{ focus=i; awaitingLog=false; minPreview=null; paint(); };
    wl.appendChild(row);
  }
  reportCurrent();
}

// Season dots, colored by the episode convention.
function renderSeasons(){
  const host=$('seasonInd'); if(!host) return;
  const seasons=[...new Set(allEps.map(sNum))].filter(s=>s>=1).sort((a,b)=>a-b);
  const N=seasons.length;
  if(N===0){ host.innerHTML=''; return; }
  const curSeason = eps.length ? sNum(eps[0]) : seasons[0];

  // 1 season: grey "1 SEASON", no counter / no dots.
  if(N===1){ host.innerHTML='<span class="seasonlabel">1 SEASON</span>'; return; }

  // 2-6 seasons: "SEASONS" + one colored dot per season.
  if(N<=6){
    const airedBy={}; allEps.filter(released).forEach(e=>airedBy[sNum(e)]=(airedBy[sNum(e)]||0)+1);
    const dots=seasons.map(se=>{
      let c='sd';
      if(se===curSeason)     c+=' cur';     // 🍿 current
      else if(se<curSeason)  c+=' done';    // dark green: completed
      else if(airedBy[se]>0) c+=' avail';   // green: future, aired
      return '<span class="'+c+'"></span>'; // else grey (unaired)
    }).join('');
    host.innerHTML='<span class="seasonlabel">SEASONS</span><span class="seasondots">'+dots+'</span>';
    return;
  }

  // >6 seasons: count + the popcorn positioned by which third the current season
  // falls in (e.g. 18 seasons -> 1-6 left, 7-12 middle, 13-18 right).
  const third=Math.min(3, Math.max(1, Math.ceil(curSeason/(N/3))));
  const corn='<span class="scorn">🍿</span>';
  const inner = third===1 ? corn+N+' SEASONS'
              : third===2 ? N+corn+'SEASONS'
              :             N+' SEASONS'+corn;
  host.innerHTML='<span class="seasonlabel">'+inner+'</span>';
}

// Minute bar for the focused episode (yellow track, elapsed darkens left→right).
function paintMinute(){
  const rt=runtimeOf(focus);
  const cur=Math.max(0,Math.min(rt, minPreview!=null?minPreview:(epMin[focus]||0)));
  const pct=rt>0?cur/rt*100:0;
  $('minFill').style.width=pct+'%';
  $('minHandle').style.left=pct+'%';
  $('minElapsed').textContent=Math.round(cur)+' min';                 // left: elapsed
  $('minRem').textContent=Math.max(0,Math.round(rt-cur))+' min';      // right: remaining
  const mid=$('minMid');                                              // middle: total / prompt / BP
  if(awaitingLog){ mid.textContent='tap to log · grab again to adjust'; mid.classList.add('phrase'); }
  else { mid.classList.remove('phrase'); mid.textContent = epBp[focus] ? 'BP' : (Math.round(rt)+' min'); }
}

$('comment').addEventListener('input',e=>{ notes[focus]=e.target.value; });
$('cool').onclick=()=>{ cooled=true; paint(); };
$('reset').onclick=()=>{
  // Clear to zero so the binge sequence can be replayed fresh from real in-app taps.
  watched=0; watchTs=[]; watchDate={}; binged={}; cooled=false;
  epMin={}; epDone={}; epBp={}; startedAt={}; epPreApp={}; minPreview=null; awaitingLog=false;
  eps=allEps.filter(e=>sNum(e)===1); if(!eps.length) eps=allEps;
  focus=0; paint();
};
$('scorePill').onclick=()=>{ const v=prompt('Screen Score from @betterscreenscore (e.g. 87):', score);
  if(v!==null){ score=v.trim(); paint(); } };
$('addShowBtn').onclick=()=>{ if(window.parent===window) return;
  if(typeof window.parent.cubeRotateTo==='function') window.parent.cubeRotateTo('pierre',{intent:'add'});
  else window.parent.postMessage({type:'cube:rotateTo',face:'pierre',payload:{intent:'add'}},'*'); };

// ----- minute bar interaction -----
const minBar=$('minBar');
function minFromX(clientX){ const r=minBar.getBoundingClientRect();
  return Math.max(0,Math.min(1,(clientX-r.left)/r.width))*runtimeOf(focus); }
let minDragging=false;
minBar.addEventListener('pointerdown',ev=>{ ev.preventDefault(); minBar.setPointerCapture(ev.pointerId);
  minDragging=true; if(!startedAt[focus]) startedAt[focus]=Date.now();
  minPreview=minFromX(ev.clientX); awaitingLog=false; paintMinute(); });
minBar.addEventListener('pointermove',ev=>{ if(!minDragging)return; minPreview=minFromX(ev.clientX); paintMinute(); });
minBar.addEventListener('pointerup',ev=>{ if(!minDragging)return; minDragging=false; awaitingLog=true; paintMinute(); });
minBar.addEventListener('pointercancel',()=>{ minDragging=false; });

// Tapping the episode bar jumps to that episode and resumes its minute marker.
// Skipping forward over unwatched episodes marks the gap "BP" (Before PangolinRC).
function bgo(clientX){
  const r=$('bar').getBoundingClientRect();
  const ratio=Math.max(0,Math.min(0.9999,(clientX-r.left)/r.width));
  goToEpisode(Math.floor(ratio*eps.length));
}
function goToEpisode(idx){
  idx=Math.max(0,Math.min(eps.length-1, idx));
  for(let k=0;k<idx;k++){ if(!epDone[k]){ epDone[k]=true; epBp[k]=true; epPreApp[k]=true; epMin[k]=runtimeOf(k);
    markWatchedThrough(k); emitProgress(k,true,true,0); } }     // forced skips → BP (pre-app)
  focus=idx; awaitingLog=false; minPreview=null; paint();
}
$('bar').addEventListener('click',e=>{ e.stopPropagation(); bgo(e.clientX); });

// "tap anywhere to log it": one tap outside the controls commits the staged minute.
document.querySelector('.face').addEventListener('click',e=>{
  if(!awaitingLog) return;
  if(e.target.closest('.minbar,.minhandle,.bar,.addpill,.scorepill,.rank,.comment,.ctl,.wrow,.seasondots,.svc-lit')) return;
  e.stopPropagation(); logMinute();
}, true);

// Pierre hands off a picked show + watch pattern. Load it and set the position.
async function loadShowWithPattern(id,pattern){
  try{ const r=await fetch(`https://api.tvmaze.com/shows/${id}?embed=episodes`); if(!r.ok) throw 0;
    const s=await r.json(); boot(s,(s._embedded&&s._embedded.episodes)||[],false); applyPattern(pattern||{kind:'beginning'});
  }catch(e){ $('name').textContent='Show not found'; }
}
function applyPattern(p){
  const seasons=[...new Set(allEps.map(sNum))]; if(!seasons.length) return;
  if(p.kind==='live'){
    const aired=[...new Set(allEps.filter(released).map(sNum))];
    const cur=aired.length?Math.max(...aired):Math.max(...seasons);
    eps=allEps.filter(e=>sNum(e)===cur); if(!eps.length) eps=allEps;
    watched=eps.filter(released).length;
  } else if(p.kind==='resume' && p.season){
    eps=allEps.filter(e=>sNum(e)===p.season); if(!eps.length) eps=allEps;
    const idx=eps.findIndex(e=>(e.number||0)===p.number);
    watched=idx>=0?idx+1:0;
  } else if(p.kind==='at' && p.season){
    // Land ON a specific episode (the one being watched): earlier episodes count
    // as done, the target itself is the partial/current one.
    eps=allEps.filter(e=>sNum(e)===p.season); if(!eps.length) eps=allEps;
    const idx=eps.findIndex(e=>(e.number||0)===p.number);
    watched=idx>=0?idx:0;
  } else {                                  // beginning, pick, or resume with no position
    const real=seasons.filter(s=>s>=1);     // skip season 0 specials
    const s1=Math.min(...(real.length?real:seasons));
    eps=allEps.filter(e=>sNum(e)===s1); if(!eps.length) eps=allEps;
    watched=0;
  }
  watchTs=[]; watchDate={}; binged={}; ranks={}; notes={}; cooled=false;
  epMin={}; epDone={}; epBp={}; startedAt={}; epPreApp={}; minPreview=null; awaitingLog=false;
  // Pierre "Catch up live" / "Pick an episode" pre-mark watches: pre-app, never binge.
  for(let i=0;i<watched;i++){ const t=Date.now()-(watched-i)*45*6e4; watchTs.push(t); watchDate[i]=new Date(t); epDone[i]=true; epMin[i]=runtimeOf(i); epPreApp[i]=true; }
  // Restore saved per-episode detail (minutes / done / BP) from the account.
  const det=pendingRestore&&pendingRestore.episodes;
  if(det) eps.forEach((e,i)=>{ const d=det[sNum(e)+'-'+e.number]; if(!d) return;
    if(d.done){ epDone[i]=true; epPreApp[i]=true; if(i+1>watched) watched=i+1; }   // restored history: not a fresh binge
    if(typeof d.min==='number') epMin[i]=d.min;
    if(d.bp) epBp[i]=true; });
  focus=Math.min(watched, eps.length-1);
  // Restore the partial current episode (saved minutes, or an on-device guess).
  if(pendingRestore && !epDone[focus]){
    if(typeof pendingRestore.minute==='number' && pendingRestore.minute>0) epMin[focus]=pendingRestore.minute;
    if(pendingRestore.startedAt){ startedAt[focus]=pendingRestore.startedAt;
      const guess=Math.min(runtimeOf(focus),(Date.now()-pendingRestore.startedAt)/60000);
      if(guess>(epMin[focus]||0)) epMin[focus]=guess; }
  }
  pendingRestore=null;
  paint();
}
window.addEventListener('message',(e)=>{
  if(e.data && e.data.type==='cube:payload' && e.data.face==='episodes'){
    const p=e.data.payload||{};
    if(p.show && p.show.id){ pendingRestore={minute:p.minute, startedAt:p.startedAt, episodes:p.episodes}; loadShowWithPattern(p.show.id, p.pattern); }
  }
  // Deep-link return: load the launched title at S1E1 with the minute guess.
  if(e.data && e.data.type==='cube:launch' && e.data.launch) launchShow(e.data.launch);
  // Shell tells us whether the current streamer can be launched (deep-linked).
  if(e.data && e.data.type==='cube:launchable'){ svcLaunchable=!!e.data.ok; applySvcState(); }
});

// The lit streamer name acts as a launch button when it's deep-linkable.
function applySvcState(){ const b=document.querySelector('#ymeta .svc-lit'); if(b) b.classList.toggle('live', svcLaunchable); }
$('ymeta').addEventListener('click',(ev)=>{
  if(svcLaunchable && ev.target.closest('.svc-lit') && window.parent!==window)
    window.parent.postMessage({type:'episode:launch'}, '*');   // open the app + start the episode timer
});

// Deep-link launch: load the launched title at the episode that was playing so
// the minute bar can guess your position from elapsed time. Cleared once you log.
function launchShow(L){
  if(!L || !L.tvmazeId) return;
  pendingRestore = { minute:0, startedAt:L.startedAt, episodes:{} };
  // Resume to the exact episode that was launched (the one you tapped play on).
  const pat = (L.season && L.number) ? {kind:'at', season:L.season, number:L.number} : {kind:'beginning'};
  loadShowWithPattern(L.tvmazeId, pat);
}
function showEmpty(){ const e=$('emptyFace'); if(e) e.classList.add('show'); reportCurrent(); }
function hideEmpty(){ const e=$('emptyFace'); if(e) e.classList.remove('show'); }
// Tell the shell which show/episode is loaded so the play button can launch it.
function reportCurrent(){
  if(window.parent===window) return;
  const e=eps[focus];
  window.parent.postMessage({type:'episode:current', show:(curShowId && e) ? {
    tvmazeId:curShowId, name:curShowName, season:sNum(e), number:e.number, runtime:runtimeOf(focus), service:curService
  } : null}, '*');
}
$('emPierre').onclick=()=>{ if(window.parent===window) return;
  if(typeof window.parent.cubeRotateTo==='function') window.parent.cubeRotateTo('pierre',{intent:'add'});
  else window.parent.postMessage({type:'cube:rotateTo',face:'pierre',payload:{intent:'add'}},'*'); };

// No default show. The Episode stays empty until the Log/Pierre hands one over
// (or a deep-link launch loads one), on both builds.
const _launch = (()=>{ try{ return JSON.parse(localStorage.getItem('pg_launch')||'null'); }catch(_){ return null; } })();
if(_launch && _launch.tvmazeId) launchShow(_launch);
else showEmpty();

// Double-tap the hero image area to return to cube
let dblTapTime = 0;
document.querySelector('.hero').addEventListener('click', (e) => {
  if (window.parent === window) return;
  if (e.target.closest('.facebar, .scorepill, .seasonsbar, .barzone, .herofoot')) return;
  const now = Date.now();
  if (now - dblTapTime < 350) {
    window.parent.postMessage({type:'pangolin-back'}, '*');
    dblTapTime = 0;
  } else {
    dblTapTime = now;
  }
});

// Pinch-to-contract anywhere in the face returns to cube navigation
let _pinchStart = 0, _pinchActive = false;
document.querySelector('.face').addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    _pinchStart = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY
    );
    _pinchActive = true;
  }
}, { passive: true });
document.querySelector('.face').addEventListener('touchmove', (e) => {
  if (!_pinchActive || e.touches.length < 2 || window.parent === window) return;
  const d = Math.hypot(
    e.touches[1].clientX - e.touches[0].clientX,
    e.touches[1].clientY - e.touches[0].clientY
  );
  if (d < _pinchStart * 0.72) {
    _pinchActive = false;
    window.parent.postMessage({type:'pangolin-back'}, '*');
  }
}, { passive: true });
document.querySelector('.face').addEventListener('touchend', () => { _pinchActive = false; }, { passive: true });

// When running inside the cube face overlay, fill the iframe completely
if (window.parent !== window) {
  document.documentElement.style.height = '100%';
  document.body.style.padding = '0';
  document.body.style.minHeight = '100%';
  document.body.style.height = '100%';
  document.body.style.alignItems = 'stretch';
  const face = document.querySelector('.face');
  if (face) {
    face.style.width = '100%';
    face.style.height = '100%';
    face.style.aspectRatio = 'unset';
  }
}
</script>
</body>
