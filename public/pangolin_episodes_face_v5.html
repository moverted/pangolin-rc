// Stop-and-return: when the phone IS the device, time away from the app is time
// spent watching. On return we OFFER a placement for all of that missing time,
// walking it forward across episode boundaries: a long gap can complete several
// episodes and land you partway into a later one. Every viewing the walk creates
// is UNVALIDATED — an offer you confirm with LOG IT / FINISH. The live timer then
// stops; CONTINUE re-arms it from where the offer left you.
//
// Walk `awayMin` of viewing forward from the focused episode's current position.
// A long gap can finish the rest of a season AND cross into the next one, landing
// you on S(N+1)E1 (or partway in) — not stalling at the season finale.
function placeAwayTime(awayMin){
  if(!(awayMin>0) || !eps.length) return;
  // Away-time fills only the CURRENT episode. Wall-clock time elapsed since a
  // launch/start is NOT evidence the member kept watching later episodes — letting
  // it cascade across episode boundaries is what auto-completed whole seasons when
  // the app was reopened hours later. Complete the launched episode if enough time
  // passed (an unvalidated "offer"), else stage it as a partial; land focus on the
  // next episode but never mark that one watched.
  let i=focus, pos=(epMin[i]||0);
  const rt=runtimeOf(i), needed=Math.max(0, rt-pos);
  if(awayMin>=needed){
    epMin[i]=rt; epDone[i]=true; epBp[i]=false; epPreApp[i]=false;
    markWatchedThrough(i);
    logSession(i, {minutes:Math.round(rt), finished:true, validated:false});  // offered completion
    emitProgress(i, true, false, Math.round(rt));
    if(i < eps.length-1) i++;                            // land on the next episode, not-started
  } else {
    pos=Math.min(rt, pos+awayMin); epMin[i]=pos; epPreApp[i]=false;
    logSession(i, {minutes:Math.round(pos), finished:false, validated:false});  // offered partial
    emitProgress(i, false, false, Math.round(pos));
  }
  focus=Math.min(i, eps.length-1);
  watchingLive[focus]=false; startedAt[focus]=null; sessionBase[focus]=epMin[focus]||0;  // live timer stops; CONTINUE re-arms
  emitProgress(focus, !!epDone[focus], false, Math.round(epMin[focus]||0));               // persist the stop (started_at cleared)
  paint();
}
let hiddenAt=null;
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){ hiddenAt=Date.now(); return; }
  const wasHidden=hiddenAt; hiddenAt=null;
  if(!startedAt[focus] || !wasHidden) return;
  // While actively WATCHING the live timer owns the clock: time away IS watch time
  // (the bar is recomputed from startedAt), so we stay in WATCHING and just catch
  // the bar up — never flip to WAITING. The tick completes this one episode if its
  // full runtime elapsed while we were gone (one episode only, no season cascade).
  if(watchingLive[focus]){ tickWatch(); return; }
  // Not actively watching in-app (e.g. a streamer launch left a start ts): keep the
  // existing "offer a placement for the time away" behaviour.
  placeAwayTime((Date.now()-wasHidden)/60000);
});

// ---- live watch timer ----------------------------------------------------------
// START / CONTINUE arms the animated WATCHING state. From there the minute bar
// advances in real time off the start timestamp — surviving sleep and backgrounding
// because it is always recomputed from wall-clock, not an in-page counter. Reaching
// the runtime completes that one episode and lands focus on the next (still stopped),
// so a long gap can never run away and complete a whole season.
const liveMin=(i)=> startedAt[i]!=null ? (sessionBase[i]||0)+(Date.now()-startedAt[i])/60000 : (epMin[i]||0);
function completeWatch(i){
  const rt=runtimeOf(i);
  epMin[i]=rt; epDone[i]=true; epBp[i]=false; epPreApp[i]=false;
  watchingLive[i]=false; startedAt[i]=null; sessionBase[i]=rt;
  try{ localStorage.removeItem('pg_launch'); }catch(_){}
  markWatchedThrough(i);
  logSession(i,{minutes:rt,finished:true,validated:true});  // a real watch: started in-app and run to the end
  emitProgress(i, true, false, rt);
  if(i===focus){ finaleCheck(); advanceFocus(); }
  paint();
}
function tickWatch(){
  const i=focus;
  if(!watchingLive[i] || startedAt[i]==null) return;
  const rt=runtimeOf(i), live=Math.min(rt, liveMin(i));
  epMin[i]=live;
  const arr=epSessions[i]||[], last=arr[arr.length-1];
  if(last && last.state==='watching') last.minutes=Math.round(live);   // keep the open viewing in step
  if(live>=rt-1e-6) completeWatch(i);
  else paintMinute();
}
setInterval(tickWatch, 5000);

// Animation frame cycling: updates every ~270ms (1.6s / 6 frames)
setInterval(()=>{
  if(watchingLive[focus]){
    buildFrame++;
    paintMinute();
  }
}, 270);

// ----- minute bar interaction -----
const minBar=$('minBar');
function minFromX(clientX){ const r=minBar.getBoundingClientRect();
  return Math.max(0,Math.min(1,(clientX-r.left)/r.width))*runtimeOf(focus); }
let minDragging=false;
minBar.addEventListener('pointerdown',ev=>{ ev.preventDefault(); minBar.setPointerCapture(ev.pointerId);
  // Scrubbing only PREVIEWS a position — it must not anchor a live watch. Setting
  // startedAt here made an idle episode look "started", so backgrounding the app
  // after a scrub let the visibility handler log time-away as a watch. The live
  // anchor belongs solely to START / CONTINUE (startEpisode).
  minDragging=true;
  minPreview=minFromX(ev.clientX); awaitingLog=false; paintMinute(); });
minBar.addEventListener('pointermove',ev=>{ if(!minDragging)return; minPreview=minFromX(ev.clientX); paintMinute(); });
minBar.addEventListener('pointerup',ev=>{ if(!minDragging)return; minDragging=false; awaitingLog=true; paintMinute(); });
minBar.addEventListener('pointercancel',()=>{ minDragging=false; });

// The episode bar is a PREVIEW slider: drag the popcorn across the season to scan
// each episode's number/title/air-date/synopsis. It records nothing — sliding over
// unwatched episodes no longer marks them watched. Releasing selects (focuses) the
// previewed episode so START / CONTINUE / FINISH then act on it.
function barIdxFromX(clientX){
  const r=$('bar').getBoundingClientRect();
  const ratio=Math.max(0,Math.min(0.9999,(clientX-r.left)/r.width));
  return Math.max(0,Math.min(eps.length-1, Math.floor(ratio*eps.length)));
}
// Update only the popcorn position + the header preview — no state, no writes.
function previewEpisode(idx){
  const total=eps.length||1, e=eps[idx]||{};
  $('pop').style.left=Math.max(4,Math.min(96,(idx+0.5)/total*100))+'%';
  $('epNo').textContent= isMovie ? 'FILM' : `S ${sNum(e)} EP ${idx+1} / ${total}`;
  $('epTtl').textContent=e.name||(isMovie?'Film':('Episode '+(idx+1)));
  $('epAired').textContent= isMovie ? (e.airdate?String(e.airdate).slice(0,4):'') : (e.airdate?fmt(e.airdate):'');
  $('syn').textContent=strip(e.summary)||'No synopsis available yet.';
}
let barDragging=false;
$('bar').addEventListener('pointerdown',e=>{ e.stopPropagation(); e.preventDefault();
  barDragging=true; $('bar').setPointerCapture(e.pointerId); previewEpisode(barIdxFromX(e.clientX)); });
$('bar').addEventListener('pointermove',e=>{ if(!barDragging)return; previewEpisode(barIdxFromX(e.clientX)); });
$('bar').addEventListener('pointerup',e=>{ if(!barDragging)return; barDragging=false;
  focus=barIdxFromX(e.clientX); awaitingLog=false; minPreview=null; paint(); });   // select; records nothing
$('bar').addEventListener('pointercancel',()=>{ if(barDragging){ barDragging=false; paint(); } });   // snap back to real focus

// "tap anywhere to log it": one tap outside the controls commits the staged minute.
document.querySelector('.face').addEventListener('click',e=>{
  if(!awaitingLog) return;
  if(e.target.closest('.minbar,.minhandle,.bar,.rank,.notebtn,.ctl,.wrow,.seasondots,.svc-lit')) return;
  e.stopPropagation(); logMinute();
}, true);

const acctEmail = () => { try{ return localStorage.getItem('pg_user')||''; }catch(_){ return ''; } };

// Load a title from the shared catalog (+ the member's per-episode progress) and
// place the watch position per the pattern. Replaces the old client TVmaze/TMDB
// fetches: episodes are server-materialized now.
//   opts.startedAt — a launch's start ts; placed as away-time unless suppressed
//   opts.autoFinish / opts.partial — suppress the away-time walk
async function loadTitle(titleId, pattern, opts){
  opts = opts || {};
  const email = acctEmail();
  const fetchDetail = async () => {
    try{
      if(email){ const r=await fetch(`${API_BASE}/profile/${encodeURIComponent(email)}/titles/${encodeURIComponent(titleId)}`); if(r.ok){ const d=await r.json(); if(d && d.title) return d; } }
      const r=await fetch(`${API_BASE}/catalog/titles/${encodeURIComponent(titleId)}/episodes`); if(r.ok){ const d=await r.json(); if(d && d.title) return {title:d.title, episodes:d.episodes}; }
    }catch(_){}
    return null;
  };
  let detail = await fetchDetail();
  // Not in the catalog yet → this load IS the initiation: materialize server-side
  // (idempotent) and read it back. Keeps "build the data when watch starts" true no
  // matter which face triggered the load.
  if((!detail || !detail.title) && email){
    try{ await fetch(`${API_BASE}/catalog/initiate`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, title_id:titleId, pattern:pattern||{kind:'beginning'}})}); }catch(_){}
    detail = await fetchDetail();
  }
  if(!detail || !detail.title){ $('name').textContent='Title not found'; return; }
  const t = detail.title; isMovie = t.kind==='movie';
  const eps0 = detail.episodes || [];
  const show = { id:titleId, name:t.name||'', image: t.poster?{original:t.poster, medium:t.poster}:null,
    premiered:t.premiered||'', webChannel:{name:t.platform||''}, network:null,
    averageRuntime:(eps0[0]&&eps0[0].runtime)||45, genres: isMovie?['Film']:[], status:t.status||'' };
  const list = eps0.map(e=>({season:e.season,number:e.number,name:e.name,runtime:e.runtime,airdate:e.airdate}));
  // The member's per-episode progress, keyed "season-number", so applyPattern's
  // applySavedDetail restores done/minute/bp/sessions exactly.
  const saved = {};
  eps0.forEach(e=>{ if(e.done||e.minute||e.bp||(e.sessions&&e.sessions.length))
    saved[e.season+'-'+e.number] = { done:!!e.done, min:e.minute||0, bp:!!e.bp, sessions:e.sessions||[] }; });
  boot(show, list, false);
  const suppressWalk = opts.autoFinish || opts.partial;
  pendingRestore = { minute:0, startedAt: suppressWalk ? null : (opts.startedAt||null), episodes:saved };
  applyPattern(pattern||{kind:'beginning'});
}

// Pierre hands off a picked show + watch pattern. Load it and set the position.
async function loadShowWithPattern(id,pattern){
  isMovie=false;
  try{ const r=await fetch(`https://api.tvmaze.com/shows/${id}?embed=episodes`); if(!r.ok) throw 0;
    const s=await r.json(); boot(s,(s._embedded&&s._embedded.episodes)||[],false); applyPattern(pattern||{kind:'beginning'});
  }catch(e){ $('name').textContent='Show not found'; }
}

// Load a FILM as a single-unit "show": one synthetic episode carrying the film's
// runtime. Search cards lack runtime, so fetch /tmdb/movie/:id to fill it in when
// missing (also covers a bare resume payload that only kept the id + title).
async function loadMovie(m,pattern){
  if(!m || m.id==null){ $('name').textContent='Film not found'; return; }
  let movie=m;
  const rawId=String(m.id).replace(/^tmdb:/,'');
  if(movie.runtime==null){
    try{ const r=await fetch(`${API_BASE}/tmdb/movie/${encodeURIComponent(rawId)}`);
      if(r.ok){ const d=await r.json(); if(d.movie) movie={...movie, ...d.movie}; } }catch(_){}
  }
  isMovie=true;
  const rt=movie.runtime||120;
  const day=(movie.year?String(movie.year):'2000')+'-01-01';
  const show={ id:'tmdb:'+rawId, name:movie.title||movie.name||'',
    image: movie.poster?{original:movie.poster, medium:movie.poster}:null,
    premiered:day, genres:['Film'], averageRuntime:rt, runtime:rt };
  const ep={ season:1, number:1, name:movie.title||movie.name||'', runtime:rt,
    airdate:day, summary:movie.overview||'' };
  boot(show,[ep],false);
  applyPattern(pattern||{kind:'beginning'});
}
function applyPattern(p){
  const seasons=[...new Set(allEps.map(sNum))]; if(!seasons.length) return;
  let bpFill=false;   // 'at' records the earlier episodes as BP (Before Pierre), not Pierre watches
  if(p.kind==='live'){
    const aired=[...new Set(allEps.filter(released).map(sNum))];
    const cur=aired.length?Math.max(...aired):Math.max(...seasons);
    eps=allEps.filter(e=>sNum(e)===cur); if(!eps.length) eps=allEps;
    watched=eps.filter(released).length;
  } else if(p.kind==='resume' && p.season){
    eps=allEps.filter(e=>sNum(e)===p.season); if(!eps.length) eps=allEps;
    const idx=eps.findIndex(e=>(e.number||0)===p.number);
    watched=idx>=0?idx+1:0;
  } else if(p.kind==='at' && p.season){
    // "Watch from this episode": land ON the pick. You're dropping into the middle,
    // so every earlier episode (this season and the ones before) is recorded as BP.
    eps=allEps.filter(e=>sNum(e)===p.season); if(!eps.length) eps=allEps;
    const idx=eps.findIndex(e=>(e.number||0)===p.number);
    watched=idx>=0?idx:0; bpFill=true;
  } else {                                  // beginning, pick, or resume with no position
    const real=seasons.filter(s=>s>=1);     // skip season 0 specials
    const s1=Math.min(...(real.length?real:seasons));
    eps=allEps.filter(e=>sNum(e)===s1); if(!eps.length) eps=allEps;
    watched=0;
  }
  watchTs=[]; watchDate={}; binged={}; ranks={}; notes={}; cooled=false;
  epMin={}; epDone={}; epBp={}; startedAt={}; epPreApp={}; epSessions={}; sessionBase={}; minPreview=null; awaitingLog=false; watchingLive={};
  // Pierre "Catch up live" / "Pick an episode" pre-mark watches: pre-app, never binge.
  // For a "watch from this episode" (bpFill), the earlier ones are flagged BP.
  for(let i=0;i<watched;i++){ const t=Date.now()-(watched-i)*45*6e4; watchTs.push(t); watchDate[i]=new Date(t); epDone[i]=true; epMin[i]=runtimeOf(i); epPreApp[i]=true; if(bpFill) epBp[i]=true; }
  // Restore saved per-episode detail (minutes / done / BP) from the account, and
  // keep it so a later season-wrap can re-apply the next season's history.
  savedDetail=(pendingRestore&&pendingRestore.episodes)||null;
  applySavedDetail();
  focus=Math.min(watched, eps.length-1);
  // Restore the partial current episode, then — if a watch was left open (saved
  // started_at) — offer placement for all the time since, exactly like a return:
  // it can span episodes and is unvalidated until confirmed.
  if(pendingRestore && !epDone[focus]){
    if(typeof pendingRestore.minute==='number' && pendingRestore.minute>0) epMin[focus]=pendingRestore.minute;
    if(pendingRestore.startedAt){
      startedAt[focus]=pendingRestore.startedAt; watchingLive[focus]=true;
      placeAwayTime((Date.now()-pendingRestore.startedAt)/60000);
    }
  }
  pendingRestore=null;
  paint();
}
window.addEventListener('message',(e)=>{
  if(e.data && e.data.type==='cube:payload' && e.data.face==='episodes'){
    const p=e.data.payload||{};
    // The Log hands off a title_id; the Watch face loads episodes + the member's
    // progress from the catalog. (Legacy movie/show payloads still resolve.)
    if(p.titleId){ loadTitle(p.titleId, p.pattern); }
    else if(p.movie && p.movie.id!=null){ loadTitle('tmdb:'+String(p.movie.id).replace(/^tmdb:/,''), p.pattern); }
    else if(p.show && p.show.id){ loadTitle(String(p.show.id).startsWith('tvmaze:')?p.show.id:'tvmaze:'+p.show.id, p.pattern); }
  }
  // Deep-link return: load the launched title at S1E1 with the minute guess.
  if(e.data && e.data.type==='cube:launch' && e.data.launch) launchShow(e.data.launch);
  // Shell has no last-watched show to resume → fall back to the empty prompt.
  if(e.data && e.data.type==='cube:noLast') showEmpty();
  // Shell tells us whether the current streamer can be launched (deep-linked).
  if(e.data && e.data.type==='cube:launchable'){ svcLaunchable=!!e.data.ok; applySvcState(); }
});

// The lit streamer name acts as a launch button when it's deep-linkable.
function applySvcState(){ const b=document.querySelector('#ymeta .svc-lit'); if(b) b.classList.toggle('live', svcLaunchable); }
$('ymeta').addEventListener('click',(ev)=>{
  if(svcLaunchable && ev.target.closest('.svc-lit') && window.parent!==window)
    window.parent.postMessage({type:'episode:launch'}, '*');   // open the app + start the episode timer
});

// Deep-link launch: load the launched title at the episode that was playing so
// the minute bar can guess your position from elapsed time. Cleared once you log.
// Pierre's "Did you finish …?" choices set one of:
//   L.autoFinish — "Log it": finish the launched episode outright and advance.
//   L.partial    — "Partial Log": land on the scrubber staged at the elapsed
//                  guess (capped below runtime) so the member sets the real minute.
async function launchShow(L){
  if(!L || !L.tvmazeId) return;   // L.tvmazeId is the title_id ('tvmaze:…' / 'tmdb:…')
  // Resume to the exact episode launched. autoFinish / partial suppress the
  // away-time walk; otherwise the elapsed time since L.startedAt is placed.
  const pat = (L.season && L.number) ? {kind:'at', season:L.season, number:L.number} : {kind:'beginning'};
  await loadTitle(L.tvmazeId, pat, {startedAt:L.startedAt, autoFinish:L.autoFinish, partial:L.partial});
  if(L.autoFinish){ finishEpisode(); return; }   // full-finish the launched episode + advance focus
  if(L.partial){
    // Stage the elapsed-time guess on the scrubber, capped below runtime so it
    // reads as a partial. "tap anywhere to log it" (awaitingLog) commits it.
    const rt=runtimeOf(focus);
    const guess=Math.max(0, Math.min(rt-1, Math.round((Date.now()-(L.startedAt||Date.now()))/60000)));
    if(!startedAt[focus]) startedAt[focus]=L.startedAt||Date.now();
    minPreview=guess; awaitingLog=true; paintMinute();
  }
}
function showEmpty(){ const e=$('emptyFace'); if(e) e.classList.add('show'); reportCurrent(); }
function hideEmpty(){ const e=$('emptyFace'); if(e) e.classList.remove('show'); }
// Tell the shell which show/episode is loaded so the play button can launch it.
function reportCurrent(){
  if(window.parent===window) return;
  const e=eps[focus];
  window.parent.postMessage({type:'episode:current', show:(curShowId && e) ? {
    tvmazeId:curShowId, name:curShowName, kind:isMovie?'movie':'show', season:sNum(e), number:e.number, runtime:runtimeOf(focus), service:viewServiceName()
  } : null}, '*');
}
// Tapping the empty prompt swings over to the Log so you can log something.
function gotoLog(){ if(window.parent===window) return;
  if(typeof window.parent.cubeRotateTo==='function') window.parent.cubeRotateTo('log',{});
  else window.parent.postMessage({type:'cube:rotateTo',face:'log',payload:{}},'*'); }
$('emptyFace').onclick=gotoLog;

// On open, resume the last thing watched. A deep-link launch wins; otherwise ask
// the shell for the most-recently-watched show (it owns the Log snapshot) and the
// shell answers with a cube:payload or cube:noLast. Standalone preview just shows
// the empty prompt.
const _launch = (()=>{ try{ return JSON.parse(localStorage.getItem('pg_launch')||'null'); }catch(_){ return null; } })();
// A launch older than 6h is stale (matches the shell's resumeLaunch guard): the
// member is reopening the app, not returning from a watch. Drop it so the away-time
// restore can't replay an ancient start across the season.
const _launchStale = _launch && (Date.now() - (_launch.startedAt||0) > 6*3600*1000);
if(_launchStale){ try{ localStorage.removeItem('pg_launch'); }catch(_){} }
if(_launch && _launch.tvmazeId && !_launchStale) launchShow(_launch);
else if(window.parent!==window){
  window.parent.postMessage({type:'episode:requestLast'}, '*');
  // Fallback: if the shell never answers, settle on the empty prompt.
  setTimeout(()=>{ if(!curShowId) showEmpty(); }, 4000);
}
else showEmpty();

// Back to cube navigation: a small floating cube button, bottom-right. This
// replaces the old double-tap and pinch gestures on this face.
const cubeBackBtn = document.getElementById('cubeBack');
if (cubeBackBtn) cubeBackBtn.addEventListener('click', () => {
  if (window.parent !== window) window.parent.postMessage({type:'pangolin-back'}, '*');
});

// ===================== Streamer guesser / picker =====================
// Brand-coloured wordmark "logos" — no image assets, fully self-contained. `aka`
// holds the lowercase fragments matched against the show's webChannel/network name.
const SERVICES = [
  {label:'NETFLIX',     bg:'#000000', fg:'#E50914', wght:800, ls:'-.04em', aka:['netflix']},
  {label:'max',         bg:'#0046FF', fg:'#ffffff', wght:800, ls:'-.05em', aka:['hbo max','max']},
  {label:'HBO',         bg:'#000000', fg:'#ffffff', wght:800, ls:'.02em',  aka:['hbo']},
  {label:'Disney+',     bg:'#0B1A6E', fg:'#ffffff', wght:700, ls:'-.01em', aka:['disney']},
  {label:'hulu',        bg:'#1CE783', fg:'#0a0a0a', wght:800, ls:'-.04em', aka:['hulu']},
  {label:'prime video', bg:'#1399FF', fg:'#ffffff', wght:700, ls:'-.02em', aka:['prime','amazon']},
  {label:'tv+',         bg:'#000000', fg:'#ffffff', wght:700, ls:'-.02em', aka:['apple']},
  {label:'peacock',     bg:'#050505', fg:'#ffffff', wght:700, ls:'-.02em', aka:['peacock','nbc']},
  {label:'P+',          bg:'#0064FF', fg:'#ffffff', wght:800, ls:'0',      aka:['paramount','cbs','showtime','mtv','comedy central','nickelodeon']},
  {label:'AMC+',        bg:'#000000', fg:'#ffffff', wght:800, ls:'.02em',  aka:['amc']},
  {label:'STARZ',       bg:'#000000', fg:'#ffffff', wght:800, ls:'.06em',  aka:['starz']},
  {label:'crunchyroll', bg:'#F47521', fg:'#ffffff', wght:700, ls:'-.02em', aka:['crunchyroll','funimation']},
  {label:'FX',          bg:'#101018', fg:'#ffffff', wght:800, ls:'.02em',  aka:['fx','fxx']},
  {label:'YouTube',     bg:'#ffffff', fg:'#FF0000', wght:800, ls:'-.03em', aka:['youtube']},
  {label:'abc',         bg:'#000000', fg:'#ffffff', wght:600, ls:'-.03em', aka:['abc']},
  {label:'FOX',         bg:'#16162a', fg:'#ffffff', wght:800, ls:'.04em',  aka:['fox']},
  {label:'BBC',         bg:'#000000', fg:'#ffffff', wght:800, ls:'.06em',  aka:['bbc']},
  {label:'PBS',         bg:'#2638C4', fg:'#ffffff', wght:800, ls:'.04em',  aka:['pbs']},
];
function svcMatch(name){
  const n=(name||'').toLowerCase().trim(); if(!n) return null;
  for(const s of SERVICES){ for(const a of s.aka){ if(n.includes(a)) return s; } }
  return null;
}
// Worker API base (mirrors the shell): crowd-guess streamer lives server-side.
const API_BASE = location.hostname==='localhost'
  ? 'http://localhost:8787'
  : 'https://pangolin-rc.edward-m-willett.workers.dev';

let guessSvc=null,        // the streamer the show's own data points at (the ymeta word)
    chosenSvc=null,       // what the corner shows = user pin · crowd guess · data
    userPinned=false;     // this viewer SET their own streamer for this show
function svcLogoHTML(s){
  return '<span class="svclogo" style="background:'+s.bg+';color:'+s.fg
    +';font-weight:'+(s.wght||700)+';letter-spacing:'+(s.ls||0)+'">'+escHtml(s.label)+'</span>';
}
// Build a streamer object from a saved/crowd label: a catalogue match if we know it,
// else a neutral chip so any label still renders and is pickable.
function svcByLabel(label){
  if(!label) return null;
  const m=SERVICES.find(s=>s.label===label); if(m) return m;
  return {label, bg:'#26201a', fg:'#F0A93B', wght:700, ls:'.02em', aka:[label.toLowerCase()], _raw:true};
}
const svcKey=()=>curShowId ? 'pg_svc:'+curShowId : null;   // per-viewer pin (this device)

// Pick the corner's starting streamer the moment a show loads: the viewer's own
// saved pin wins; otherwise the show's data network. The crowd guess arrives async
// (resolveCrowdGuess) and only fills in when the viewer hasn't pinned their own.
function setServiceGuess(name){
  const m=svcMatch(name);
  guessSvc = m || (name ? {label:name, bg:'#26201a', fg:'#F0A93B', wght:700, ls:'.02em', aka:[(name||'').toLowerCase()], _raw:true} : null);
  let pinned=null; const k=svcKey();
  if(k){ try{ const lbl=localStorage.getItem(k); if(lbl) pinned=svcByLabel(lbl); }catch(_){} }
  userPinned=!!pinned;
  chosenSvc = pinned || guessSvc;
  renderSvcCorner();
}
// Adopt the crowd's latest pick as the default — but never override the viewer's own
// pin, and never touch a show that's already been swapped out from under us.
async function resolveCrowdGuess(){
  const id=curShowId; if(!id || userPinned) return;
  try{
    const r=await fetch(API_BASE+'/streamer/'+encodeURIComponent(id)); if(!r.ok) return;
    const j=await r.json();
    if(j && j.service && !userPinned && curShowId===id){
      chosenSvc=svcByLabel(j.service); renderSvcCorner(); reportCurrent();
    }
  }catch(_){}
}
const viewServiceName=()=>(chosenSvc&&chosenSvc.label) || curService || '';
// The streamer the show's data lists (the lit word under the title).
const dataServiceLabel=()=>{ const m=svcMatch(curService); return m?m.label:(curService||''); };
// Grey the title when the chosen streamer differs from that data word.
function applyTitleTint(){
  const n=$('name'); if(!n) return;
  n.classList.toggle('offsvc', !!(chosenSvc && curService && chosenSvc.label!==dataServiceLabel()));
}
function renderSvcCorner(){
  const host=$('svcCorner'); if(!host){ applyTitleTint(); return; }
  if(!chosenSvc){
    // A film carries no streamer from TMDB — still offer the picker so the viewer
    // can pin where they're watching (which lights the play button). Shows with no
    // data keep hiding the corner as before.
    if(isMovie){ host.style.display='inline-flex'; host.innerHTML='<span class="cap">on</span><span class="svcpick">+ set</span>'; }
    else { host.style.display='none'; host.innerHTML=''; }
    applyTitleTint(); return;
  }
  host.style.display='inline-flex';
  host.innerHTML='<span class="cap">on</span>'+svcLogoHTML(chosenSvc);
  applyTitleTint();
}

// ----- the rolling reel -----
const SW_ITEM=44, SW_C=2, SW_COPIES=5;   // 5 visible rows, selection centred at row 2
let reelList=[], reelLen=0, reelY=0, swDragging=false, swStartY=0, swBaseY=0, swMoved=false;
// An unrecognised streamer rides at the head of the catalogue so it stays pickable.
function reelServices(){ return (guessSvc&&guessSvc._raw) ? [guessSvc, ...SERVICES] : SERVICES.slice(); }
const reelIdxToY=i=>SW_ITEM*(SW_C-i);
function setReelY(y, anim, dur){ const r=$('svcReel');
  r.style.transition = anim ? 'transform '+(dur||220)+'ms cubic-bezier(.18,.7,.2,1)' : 'none';
  r.style.transform='translateY('+y+'px)'; reelY=y; }
function buildReel(){
  reelList=reelServices(); reelLen=reelList.length;
  let h=''; for(let c=0;c<SW_COPIES;c++) for(let i=0;i<reelLen;i++) h+='<div class="switem">'+svcLogoHTML(reelList[i])+'</div>';
  $('svcReel').innerHTML=h;
}
// Which catalogue entry is under the centre window right now.
function currentRealIdx(){ const i=Math.round(SW_C - reelY/SW_ITEM); return ((i%reelLen)+reelLen)%reelLen; }
// Snap back to the middle copy (without animating) so there's always room to drag.
function recenter(){ const real=currentRealIdx(); setReelY(reelIdxToY(2*reelLen+real), false); }
function openWheel(){
  if(!curShowId) return;            // nothing loaded; a film with no pin is fine (gi defaults to 0)
  buildReel();
  let gi=chosenSvc?reelList.findIndex(s=>s.label===chosenSvc.label):0; if(gi<0) gi=0;
  $('svcWheel').classList.add('show');
  // Start a couple of copies up, then roll down through ~2 full sets onto the guess.
  setReelY(reelIdxToY(gi), false);
  void $('svcReel').offsetWidth;
  setReelY(reelIdxToY(2*reelLen+gi), true, 1100);
  setTimeout(()=>{ if($('svcWheel').classList.contains('show')) recenter(); }, 1160);
}
function closeWheel(){ $('svcWheel').classList.remove('show'); }
function setFromWheel(){
  chosenSvc=reelList[currentRealIdx()]; userPinned=true;
  const k=svcKey(); if(k){ try{ localStorage.setItem(k, chosenSvc.label); }catch(_){} }   // stays for this viewer
  if(curShowId){ try{ fetch(API_BASE+'/streamer/'+encodeURIComponent(curShowId),     // becomes the next viewer's guess
    {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({service:chosenSvc.label})}); }catch(_){} }
  renderSvcCorner(); reportCurrent(); closeWheel();
}

const swWin=$('svcWin');
swWin.addEventListener('pointerdown',e=>{ swDragging=true; swMoved=false; swStartY=e.clientY; swBaseY=reelY;
  setReelY(reelY,false); try{ swWin.setPointerCapture(e.pointerId); }catch(_){} });
swWin.addEventListener('pointermove',e=>{ if(!swDragging) return; const dy=e.clientY-swStartY;
  if(Math.abs(dy)>4) swMoved=true; setReelY(swBaseY+dy,false); });
swWin.addEventListener('pointerup',e=>{ if(!swDragging) return; swDragging=false;
  const lim=reelLen*SW_COPIES-1;
  if(!swMoved){
    // tap a logo to roll it to the centre
    const rect=swWin.getBoundingClientRect();
    const idx=Math.max(0,Math.min(lim, Math.floor(((e.clientY-rect.top)-reelY)/SW_ITEM)));
    setReelY(reelIdxToY(idx),true,260); setTimeout(recenter,270); return;
  }
  // released after a drag → snap to the nearest row
  const idx=Math.max(0,Math.min(lim, Math.round(SW_C - reelY/SW_ITEM)));
  setReelY(reelIdxToY(idx),true,200); setTimeout(recenter,210);
});
swWin.addEventListener('pointercancel',()=>{ swDragging=false; });

$('svcSet').onclick=e=>{ e.stopPropagation(); setFromWheel(); };
$('svcCancel').onclick=e=>{ e.stopPropagation(); closeWheel(); };
$('svcBack').onclick=e=>{ e.stopPropagation(); closeWheel(); };

// Hold (or tap) the corner badge to open the picker.
let _holdT=null, _holdFired=false;
const svcCorner=$('svcCorner');
function holdCancel(){ if(_holdT){ clearTimeout(_holdT); _holdT=null; } svcCorner.classList.remove('holding'); }
svcCorner.addEventListener('pointerdown',e=>{ if(!chosenSvc && !isMovie) return; e.stopPropagation();
  _holdFired=false; svcCorner.classList.add('holding');
  _holdT=setTimeout(()=>{ _holdFired=true; holdCancel(); openWheel(); }, 420); });
svcCorner.addEventListener('pointerup',e=>{ e.stopPropagation(); const fired=_holdFired; holdCancel();
  if(!fired && (chosenSvc || isMovie)) openWheel(); });           // a plain tap opens it too
svcCorner.addEventListener('pointerleave',holdCancel);
svcCorner.addEventListener('pointercancel',holdCancel);
svcCorner.addEventListener('click',e=>e.stopPropagation());   // never trip the log-it tap handler

// When running inside the cube face overlay, fill the iframe completely
if (window.parent !== window) {
  document.documentElement.style.height = '100%';
  document.body.style.padding = '0';
  document.body.style.minHeight = '100%';
  document.body.style.height = '100%';
  document.body.style.alignItems = 'stretch';
  const face = document.querySelector('.face');
  if (face) {
    face.style.width = '100%';
    face.style.height = '100%';
    face.style.aspectRatio = 'unset';
  }
}
</script>
