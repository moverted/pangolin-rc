<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Pierre</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --burrow:#17110c;        /* warm near-black, the dark room */
    --burrow-2:#211711;      /* raised surface */
    --burrow-3:#2c2017;      /* user bubble */
    --amber:#efb14e;         /* Pierre's scales, the popcorn, anything active */
    --amber-deep:#c87f2e;    /* scale shadow */
    --screen:#5fd6e0;        /* the TV glow, the only cold light here */
    --ink:#f3e9da;           /* warm off-white text */
    --ink-dim:#9d8c79;       /* muted labels */
    --line:#3a2c20;          /* hairlines */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:#0d0a07;
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    display:grid;
    place-items:center;
    min-height:100vh;
    padding:16px;
  }

  /* the cube face: a square */
  .face{
    position:relative;
    width:min(92vw,480px);
    aspect-ratio:1/1;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(95,214,224,.16), transparent 55%),
      linear-gradient(180deg,var(--burrow-2),var(--burrow));
    border:1px solid var(--line);
    border-radius:22px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
  }

  /* the screen glow, the signature: cold light spilling from an off-frame TV */
  .glow{
    position:absolute;left:0;right:0;top:0;height:42%;
    background:radial-gradient(80% 100% at 50% 0%, rgba(95,214,224,.22), transparent 70%);
    pointer-events:none;
    animation:breathe 7s ease-in-out infinite;
  }
  @keyframes breathe{50%{opacity:.6;}}

  header{
    position:relative;z-index:2;
    display:flex;align-items:center;gap:8px;
    padding:14px 18px 6px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber);}
  .wordmark{font-family:'Space Mono',monospace;font-weight:400;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);}
  .eyebrow{font-family:'Space Mono';font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);margin-left:auto;}

  /* chat */
  .log{
    position:relative;z-index:2;
    flex:1;overflow-y:auto;
    padding:8px 16px 120px;   /* bottom clearance keeps text above Pierre */
    display:flex;flex-direction:column;gap:12px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  }
  .log::-webkit-scrollbar{width:6px;}
  .log::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

  .msg{max-width:82%;font-size:14.5px;line-height:1.5;animation:rise .35s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}}
  .msg.pierre{align-self:flex-start;}
  .msg.user{align-self:flex-end;}
  .bubble{padding:10px 13px;border-radius:14px;}
  .pierre .bubble{
    background:linear-gradient(180deg,rgba(239,177,78,.13),rgba(239,177,78,.06));
    border:1px solid rgba(239,177,78,.22);
    border-bottom-left-radius:5px;
  }
  .user .bubble{
    background:var(--burrow-3);
    border:1px solid var(--line);
    border-bottom-right-radius:5px;
    color:var(--ink);
  }
  .who{font-family:'Space Mono';font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin:0 0 4px 2px;}
  .user .who{text-align:right;}

  /* routing chips under a Pierre message */
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .chip{
    font-family:'Space Mono';font-size:11px;letter-spacing:.04em;
    background:transparent;color:var(--amber);
    border:1px solid rgba(239,177,78,.45);
    padding:6px 11px;border-radius:999px;cursor:pointer;
    transition:background .15s,transform .1s;
  }
  .chip:hover{background:rgba(239,177,78,.14);}
  .chip:active{transform:translateY(1px);}

  .typing{display:flex;gap:4px;align-items:center;padding:4px 2px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--amber);opacity:.4;animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.25;}30%{opacity:.9;}}

  /* Pierre sits in the corner, in the warm dark, below the glow */
  .pierre-art{
    position:absolute;left:-4px;bottom:0;z-index:1;
    width:38%;max-width:170px;
    pointer-events:none;
    filter:drop-shadow(0 6px 16px rgba(0,0,0,.5));
    opacity:.97;
  }

  /* turnstile runs in invisible mode — present in the DOM but no visible UI */
  .ts-widget{ position:absolute;width:0;height:0;overflow:hidden; }

  /* input */
  .composer{
    position:relative;z-index:3;
    display:flex;gap:8px;align-items:center;
    padding:10px 12px 12px;
    margin-left:22%;            /* covers part of Pierre's tail, not the whole bottom */
  }
  .composer input{
    flex:1;min-width:0;
    background:var(--burrow);
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'Inter';font-size:14px;
    padding:11px 14px;border-radius:999px;
    outline:none;
  }
  .composer input::placeholder{color:var(--ink-dim);}
  .composer input:focus{border-color:rgba(239,177,78,.55);box-shadow:0 0 0 3px rgba(239,177,78,.12);}
  .send{
    flex:none;width:42px;height:42px;border-radius:50%;
    border:none;cursor:pointer;
    background:linear-gradient(160deg,var(--amber),var(--amber-deep));
    color:#241606;display:grid;place-items:center;
    transition:transform .1s,filter .15s;
  }
  .send:hover{filter:brightness(1.07);}
  .send:active{transform:scale(.94);}
  .send:disabled{opacity:.4;cursor:default;}
  .send svg{width:18px;height:18px;}

  .toast{
    position:absolute;left:50%;bottom:80px;transform:translateX(-50%) translateY(8px);
    z-index:5;
    background:var(--burrow-3);border:1px solid rgba(95,214,224,.4);
    color:var(--ink);font-family:'Space Mono';font-size:11px;letter-spacing:.04em;
    padding:8px 13px;border-radius:10px;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){
    .glow{animation:none;}
    .msg{animation:none;}
    .typing span{animation:none;opacity:.6;}
  }
</style>
</head>
<body>
  <main class="face" role="application" aria-label="Pierre, your TV companion">
    <div class="glow" aria-hidden="true"></div>
    <header>
      <span class="dot" aria-hidden="true"></span>
      <span class="wordmark">Pierre</span>
    </header>

    <div class="log" id="log" aria-live="polite" aria-label="Conversation with Pierre"></div>

    <img class="pierre-art" id="art" alt="Pierre, a pangolin holding a TV remote" />

    <div class="toast" id="toast" role="status"></div>

    <div id="ts-widget" class="ts-widget"></div>

    <div class="composer">
      <input id="input" type="text" autocomplete="off" placeholder="Ask Pierre what to watch..." aria-label="Message Pierre" />
      <button class="send" id="send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 12L20 12M20 12L13 5M20 12L13 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </main>

  // Pierre's persona, the seed context, and the Anthropic key all live in the
  // Worker now (POST /pierre/chat). The client sends only the conversation.
  const API = location.hostname === 'localhost'
    ? 'http://localhost:8787'
    : 'https://pangolin-rc.edward-m-willett.workers.dev';

  // Demo build (remote.demo.pangolinrc.com, or ?demo=1 preview): Pierre's chat is closed.
  const IS_DEMO = location.hostname.split('.').includes('demo') || new URLSearchParams(location.search).has('demo');

  // Cloudflare Turnstile bot check. Each token is single-use, so we render the
  // widget once and reset it after every send to mint a fresh token.
  const TURNSTILE_SITEKEY = '0x4AAAAAADk1FhcGAkmQohVa';
  let tsWidgetId = null, tsToken = '';
  (function renderTurnstile(){
    if(!TURNSTILE_SITEKEY) return;
    if(!window.turnstile){ return setTimeout(renderTurnstile, 100); } // wait for async api.js
    tsWidgetId = turnstile.render('#ts-widget', {
      sitekey: TURNSTILE_SITEKEY,
      action: 'turnstile-spin-v1',
      callback: t => { tsToken = t; },
      'error-callback':   () => { tsToken = ''; },
      'expired-callback': () => { tsToken = ''; },
    });
  })();
  async function turnstileToken(){
    if(!TURNSTILE_SITEKEY) return '';
    for(let i=0; i<50 && !tsToken; i++) await new Promise(r=>setTimeout(r,100)); // wait for solve
    return tsToken;
  }
  function turnstileReset(){
    if(tsWidgetId !== null && window.turnstile){ tsToken=''; turnstile.reset(tsWidgetId); }
  }

  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const toast = document.getElementById('toast');

  let history = [];      // {role, content} for the API
  let busy = false;

  function showToast(text){
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove('show'), 2200);
  }

  function addUser(text){
    const wrap = document.createElement('div');
    wrap.className = 'msg user';
    wrap.innerHTML = '<div class="who">You</div><div class="bubble"></div>';
    wrap.querySelector('.bubble').textContent = text;
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function parseRoute(text){
    // [ROUTE: Face | Chip label] with an optional third field carrying the exact
    // show title, so a "put it on" handoff can load that show on the show face.
    const m = text.match(/\[ROUTE:\s*([^|\]]+)\|\s*([^|\]]+)(?:\|\s*([^\]]+))?\]/i);
    if(!m) return {clean:text.trim(), route:null};
    const clean = text.replace(m[0], '').trim();
    return {clean, route:{face:m[1].trim(), label:m[2].trim(), show:(m[3]||'').trim()}};
  }

  // Map Pierre's ROUTE face names to the cube's face ids.
  const ROUTE_FACE = {'episodes':'episodes', 'show detail':'episodes', 'log':'log',
                      'feed':'feed', 'profile':'profile', 'join':'join', 'movie':'episodes'};
  // Act on a tapped route chip. A show-specific handoff runs the deterministic add
  // flow (validate → pattern chips → pop over loaded/highlighted); a plain face
  // handoff just rotates the cube; Letterboxd lives off the cube.
  function takeRoute(route){
    const key=(route.face||'').toLowerCase();
    if(route.show && key==='movie'){ input.blur(); resolveMovieName(route.show); return; }
    if(route.show && (key==='episodes' || key==='show detail')){ input.blur(); resolveShowName(route.show); return; }
    const face=ROUTE_FACE[key];
    if(face){ if(window.parent!==window) window.parent.postMessage({type:'cube:rotateTo', face, payload:{}}, '*'); return; }
    showToast('→ '+route.face+' lives off the cube');
  }

  function addPierre(text){
    const {clean, route} = parseRoute(text);
    const wrap = document.createElement('div');
    wrap.className = 'msg pierre';
    wrap.innerHTML = '<div class="who">Pierre</div><div class="bubble"></div>';
    wrap.querySelector('.bubble').textContent = clean;
    if(route){
      const chips = document.createElement('div');
      chips.className = 'chips';
      const b = document.createElement('button');
      b.className = 'chip';
      b.textContent = route.label;
      b.onclick = ()=>{ chips.querySelectorAll('button').forEach(x=>x.disabled=true); takeRoute(route); };
      chips.appendChild(b);
      wrap.appendChild(chips);
    }
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function showTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'msg pierre';
    wrap.id = 'typing';
    wrap.innerHTML = '<div class="who">Pierre</div><div class="typing"><span></span><span></span><span></span></div>';
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }
  function clearTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

  // Recall: notes the member auto-journaled on the WATCH/LOG face live in a shared
  // same-origin journal (pg_journal). Surface the recent ones to Pierre once, as
  // background on the first turn, so he can bring them up when relevant.
  function journalContext(){
    let j; try{ j = JSON.parse(localStorage.getItem('pg_journal')||'[]'); }catch(_){ return ''; }
    if(!Array.isArray(j) || !j.length) return '';
    const lines = j.slice(-6).reverse()
      .map(n => `• ${n.show||'a show'}${n.ep?(' '+n.ep):''}: "${String(n.text||'').replace(/"/g,'”')}"`).join('\n');
    return `(Background — notes I jotted while watching; weave in only if relevant, don't recite them:\n${lines}\n)\n\n`;
  }

  // Note → Pierre: the Watch face's "Note to Pierre" button hands off the current
  // show/episode. Pierre opens the door — names it and asks — then takes whatever
  // you type as a normal chat turn.
  function enterNoteFlow(p){
    if(IS_DEMO) return;
    const where = p && p.show ? (p.show + (p.ep ? (' '+p.ep) : '')) : 'what you just watched';
    addPierre('Noting ' + where + '. What did you make of it?');
    input.placeholder = '';   // blank — the "what to watch" hint conflicts with a note
    input.focus();
  }

  /* ---- Episode-finish flow ---------------------------------------------------
     The shell routes here when the member returns after an episode would have
     ended. Pierre asks "Did you finish …?" with three choices; once one is
     picked he asks for any thoughts (reusing the note flow), persists them to the
     shared journal, then tells the shell to commit the log + navigation. */
  let epFinishPending=null, epNoteFlow=false;
  function epCodeOf(L){
    return 'S'+String(L&&L.season||1).padStart(2,'0')+'E'+String(L&&L.number||0).padStart(2,'0');
  }
  function enterEpisodeFinishFlow(L){
    if(IS_DEMO || !L || !L.tvmazeId) return;
    addFlow=null; acctFlow=null; joinFlow=null;
    const code=epCodeOf(L);
    pierreSay('Did you finish '+(L.name||'that one')+' '+code+'?', [
      {label:'Partial Log',         onClick:()=>chooseFinish(L,'partial')},
      {label:'Log it & Browse',     onClick:()=>chooseFinish(L,'browse')},
      {label:'Log it & Watch Next', onClick:()=>chooseFinish(L,'next')}]);
  }
  function chooseFinish(L, choice){
    epFinishPending={L, choice};
    epNoteFlow=true;
    pierreSay('Any thoughts on '+epCodeOf(L)+'? Tell me, or skip.', [
      {label:'Skip', onClick:()=>commitFinish()}]);
    input.placeholder=''; input.focus();
  }
  function commitFinish(){
    const pend=epFinishPending; epFinishPending=null; epNoteFlow=false;
    input.placeholder="Ask Pierre what to watch...";
    if(!pend) return;
    if(window.parent!==window)
      window.parent.postMessage({type:'episodeFinish:commit', choice:pend.choice, launch:pend.L}, '*');
  }
  // Persist a typed thought to the shared journal Pierre recalls (journalContext).
  function pushJournal(show, ep, text){
    let j; try{ j=JSON.parse(localStorage.getItem('pg_journal')||'[]'); }catch(_){ j=[]; }
    if(!Array.isArray(j)) j=[];
    j.push({show:show||'', ep:ep||'', text:String(text||''), ts:Date.now()});
    try{ localStorage.setItem('pg_journal', JSON.stringify(j.slice(-50))); }catch(_){}
  }
  function saveJournalNote(L, text){ pushJournal(L&&L.name||'', epCodeOf(L), text); }

  /* ---- Forced season-turn note ----------------------------------------------
     When a season wraps on the Watch face, the shell routes here so Pierre asks
     for a thought before the next season. Saved to the shared journal. */
  let seasonNoteFlow=false, seasonNote=null;
  function enterSeasonNoteFlow(p){
    if(IS_DEMO) return;
    addFlow=null; acctFlow=null; joinFlow=null; epNoteFlow=false; epFinishPending=null;
    seasonNote={ show:(p&&p.show)||'that one', ep:(p&&p.ep)||'' };
    seasonNoteFlow=true;
    const where = seasonNote.show + (seasonNote.ep?(' '+seasonNote.ep):'');
    pierreSay('You wrapped '+where+'. Any thoughts before the next season? Tell me, or skip.', [
      {label:'Skip', onClick:()=>{ seasonNoteFlow=false; seasonNote=null; input.placeholder="Ask Pierre what to watch..."; }}]);
    input.placeholder=''; input.focus();
  }

  async function ask(text){
    const content = (history.length === 0) ? (journalContext() + text) : text;
    history.push({role:'user', content});
    busy = true; send.disabled = true;
    showTyping();
    try{
      const token = await turnstileToken();
      const res = await fetch(`${API}/pierre/chat`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ messages: history, token })
      });
      const data = await res.json();
      const reply = ((data && data.reply) || "").trim();
      clearTyping();
      if(reply){
        addPierre(reply);
        history.push({role:'assistant', content:reply});
      }else{
        addPierre("The signal dropped. Say that again?");
      }

      clearTyping();
      addPierre("The signal dropped. Say that again?");
    }finally{
      busy = false; send.disabled = false; input.focus();
      turnstileReset();   // single-use token consumed; mint a fresh one
    }

    if(!text || busy) return;

    // the chosen log + navigation. Not an LLM turn.
    if(epNoteFlow){ const L=epFinishPending&&epFinishPending.L; saveJournalNote(L, text); addPierre('Noted. Logged it.'); commitFinish(); return; }
    // Season-turn note: save the thought to the journal. Not an LLM turn.
    if(seasonNoteFlow){ pushJournal(seasonNote.show, seasonNote.ep, text); seasonNoteFlow=false; seasonNote=null; input.placeholder="Ask Pierre what to watch..."; addPierre('Noted. Onto the next season.'); return; }
    // Account flow (login / signup / add device): typed lines feed the step.
    if(acctFlow){ input.focus(); acctStep(text); return; }
    // Join / Login: the email step branches; the picking step searches shows.
    if(joinFlow==='auth-email'){ input.focus(); joinAuthEmail(text); return; }
    if(joinFlow==='login-pw'){ joinLoginPw(text); return; }
    if(joinFlow==='set-pw'){ joinSetPw(text); return; }
    if(joinFlow==='picking'){ input.focus(); joinSearch(text); return; }
    // Add flow: if they type before tapping Series/Movie, assume a series.
    if(addFlow==='kind'){ input.blur(); addKind='show'; addFlow='name'; resolveShowName(text); return; }
    // Name step: the typed line is a title, not a chat turn. Route by kind (TMDB
    // for a film, TVmaze for a series). Drop the keyboard so results show full-face.
    if(addFlow==='name'){ input.blur(); (addKind==='movie'?resolveMovieName:resolveShowName)(text); return; }
    input.focus();   // keep the keyboard up / stay pinned in the chat
    ask(text);
  }

  // Don't let tapping Send blur the input (which would close the keyboard and
  // pop us out of the pinned chat). preventDefault on mousedown keeps focus.
  send.addEventListener('mousedown', e => e.preventDefault());
  send.addEventListener('click', submit);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });

  // Tell the parent cube when the chat input is focused, so it can pin this
  // square above the soft keyboard instead of letting the page pan it off-screen.
  if (window.parent !== window) {
    input.addEventListener('focus', () => window.parent.postMessage({ type:'pierre-chat-focus', focused:true  }, '*'));

  }

  /* ---- Add-show flow ---------------------------------------------------------
     Deterministic by design: the show is validated against TVMaze and the watch
     pattern is captured with chips, so nothing here is guessed. Pierre's free
     chat (the LLM) is untouched; this only runs when the cube hands over an add
     intent. If a lookup fails, Pierre owns it as a pangolin and offers Ted. */
  let addFlow=null, addHistory=[], addFailCount=0, addKind='show';   // addKind: series vs film, chosen first

  function tod(){ const h=new Date().getHours();
    if(h<5||h>=22) return "Late one"; if(h<12) return "Morning"; if(h<17) return "Afternoon"; return "Evening"; }

  // A Pierre line with optional choice chips. Chips disable once one is tapped.
  function pierreSay(text, chips, keepFocus){
    const wrap=document.createElement('div'); wrap.className='msg pierre';
    wrap.innerHTML='<div class="who">Pierre</div><div class="bubble"></div>';
    wrap.querySelector('.bubble').textContent=text;
    if(chips && chips.length){
      const c=document.createElement('div'); c.className='chips';
      chips.forEach(ch=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=ch.label;
        if(keepFocus) b.addEventListener('mousedown', e=>e.preventDefault());  // don't blur the input
        b.onclick=()=>{ c.querySelectorAll('button').forEach(x=>x.disabled=true); ch.onClick(); };
        c.appendChild(b); });
      wrap.appendChild(c);
    }
    log.appendChild(wrap); log.scrollTop=log.scrollHeight;
  }
  const tedChip=()=>[{label:'Get Ted', onClick:getTed}];
  function getTed(){ pierreSay("Pinging Ted. He is the human in this operation, he can pick up what I cannot."); }

  function enterAddFlow(vlog){
    addHistory=Array.isArray(vlog)?vlog:[];
    addFlow='kind'; addKind='show'; addFailCount=0; joinFlow=null; acctFlow=null;
    history.length=0;                 // fresh slate for the LLM history too
    log.innerHTML='';
    // First thing: series or movie. The pick routes the name lookup (TVmaze vs TMDB).
    pierreSay(tod()+". A series or a movie?", [
      {label:'Series', onClick:()=>chooseAddKind('show')},
      {label:'Movie',  onClick:()=>chooseAddKind('movie')},
    ]);
  }
  function chooseAddKind(kind){
    addKind=kind; addFlow='name';
    pierreSay(kind==='movie'
      ? "A movie. Which one, or just put one on now?"
      : "A series. What do you want to add, or just put on right now?");
  }

  function candLabel(s){
    const yr=(s.premiered||'').slice(0,4);
    const net=(s.network&&s.network.name)||(s.webChannel&&s.webChannel.name)||'';
    const tail=[yr,net].filter(Boolean).join(', ');
    return tail ? (s.name+' ('+tail+')') : s.name;
  }
  function findInHistory(show){
    return addHistory.find(h=>(h.tvmazeId&&h.tvmazeId===show.id)||
      (h.name&&show.name&&h.name.toLowerCase()===show.name.toLowerCase()))||null;
  }

  async function resolveShowName(text){
    showTyping();
    let results=[];
    try{ const r=await fetch('https://api.tvmaze.com/search/shows?q='+encodeURIComponent(text));
      results = r.ok ? await r.json() : []; }
    catch(e){ results=null; }
    clearTyping();
    if(results===null){
      addFlow='name';
      pierreSay("Something hiccuped looking that up. I am a pangolin working a remote, so honestly it is a small miracle this works at all. Try again?", tedChip());
      return;
    }
    results=(results||[]).filter(x=>x&&x.show);
    if(!results.length){
      addFailCount++; addFlow='name';
      if(addFailCount>=2){ pierreSay("Still cannot place it, and I will not pretend I can. I am a pangolin, that I read at all is amazing. Let me get Ted, he is the human here.", tedChip()); return; }
      pierreSay("I cannot find that one. Try the full title?");
      return;
    }
    addFailCount=0;
    const cands=results.slice(0,4).map(x=>x.show);
    if(cands.length===1){ resolveShow(cands[0]); return; }
    addFlow='disambig';
    pierreSay("More than one of those. Which?", cands.map(s=>({label:candLabel(s), onClick:()=>resolveShow(s)})));
  }

  function resolveShow(show){
    addFlow='pattern';
    const h=findInHistory(show);
    const lw=h&&h.lastWatched;
    const pos=lw?(' at S'+lw.season+' E'+lw.number):'';
    const resumePat={kind:'resume', season:lw&&lw.season, number:lw&&lw.number};
    if(h && h.stopped){
      pierreSay("You stopped "+show.name+pos+". Pick up where you left off, or start fresh?", [
        {label:'Pick up where I left off', onClick:()=>handoff(show,resumePat)},
        {label:'Start over', onClick:()=>handoff(show,{kind:'beginning'})}]);
    } else if(h && (h.bucket==='current'||h.bucket==='returning'||(h.watched>0&&!h.forceCompleted))){
      pierreSay("You are already mid "+show.name+pos+". Jump back in?", [
        {label:'Jump back in', onClick:()=>handoff(show,resumePat)},
        {label:'From the beginning', onClick:()=>handoff(show,{kind:'beginning'})}]);
    } else if(h && (h.forceCompleted||h.bucket==='completed'||h.comfort)){
      pierreSay("You have finished "+show.name+" before. A rewatch? From the top, or pick episodes?", [
        {label:'From the top', onClick:()=>handoff(show,{kind:'beginning'})},
        {label:'Pick episodes', onClick:()=>pickEpisodeFlow(show)}]);
    } else {
      pierreSay(show.name+", new to you. From the start, a specific episode, or catch up to live?", [
        {label:'From the beginning', onClick:()=>handoff(show,{kind:'beginning'})},
        {label:'Pick an episode', onClick:()=>pickEpisodeFlow(show)},
        {label:'Catch up live', onClick:()=>handoff(show,{kind:'live'})}]);
    }
  }

  // "Pick an episode": pull the show's episodes and let Ted choose season then
  // episode. Hands off landing ON that episode (kind:'at' — earlier ones in the
  // season count as already seen, the pick is the current/partial one).
  async function pickEpisodeFlow(show){
    showTyping();
    let list=[];
    try{ const r=await fetch('https://api.tvmaze.com/shows/'+show.id+'/episodes');
      list = r.ok ? await r.json() : []; }
    catch(e){ list=[]; }
    clearTyping();
    list=(list||[]).filter(e=>e&&e.season>=1);
    if(!list.length){ handoff(show,{kind:'beginning'}); return; }  // no episode data → just start it
    const seasons=[...new Set(list.map(e=>e.season))].sort((a,b)=>a-b);
    const askEpisode=(season)=>{
      const eps=list.filter(e=>e.season===season).sort((a,b)=>(a.number||0)-(b.number||0));
      pierreSay("Season "+season+" — which episode?",
        eps.map(e=>({label:'E'+e.number+(e.name?' · '+e.name:''),
          onClick:()=>handoff(show,{kind:'at', season:season, number:e.number})})));
    };
    if(seasons.length===1){ askEpisode(seasons[0]); return; }
    pierreSay("Which season of "+show.name+"?",
      seasons.map(s=>({label:'Season '+s, onClick:()=>askEpisode(s)})));
  }

  function handoff(show, pattern){
    addFlow=null;
    pierreSay("Putting on "+show.name+". Over to the screen.");
    if(window.parent!==window)
      window.parent.postMessage({type:'cube:rotateTo', face:'episodes',
        payload:{show:{id:show.id,name:show.name}, pattern, addToLog:true}}, '*');
  }

  // FILM handoff: TMDB instead of TVmaze, single unit, loads via the movie payload.
  async function resolveMovieName(text){
    showTyping();
    let results=[];
    try{ const r=await fetch(`${API}/tmdb/search?q=`+encodeURIComponent(text));
      results = r.ok ? ((await r.json()).results||[]) : []; }
    catch(e){ results=null; }
    clearTyping();
    if(results===null){
      pierreSay("Something hiccuped looking that film up. I am a pangolin working a remote, so it is a small miracle this works at all. Try again?", tedChip());
      return;
    }
    if(!results.length){
      addFailCount++;
      if(addFailCount>=2){ pierreSay("Still cannot place that film, and I will not pretend I can. Let me get Ted.", tedChip()); return; }
      pierreSay("I cannot find that film. Try the full title?");
      return;
    }
    addFailCount=0;
    const cands=results.slice(0,4);
    if(cands.length===1){ handoffMovie(cands[0]); return; }
    pierreSay("More than one of those. Which?",
      cands.map(m=>({label:m.title+(m.year?' ('+m.year+')':''), onClick:()=>handoffMovie(m)})));
  }
  function handoffMovie(m){
    addFlow=null;
    pierreSay("Putting on "+m.title+". Over to the screen.");
    if(window.parent!==window)
      window.parent.postMessage({type:'cube:rotateTo', face:'episodes',
        payload:{movie:{id:m.id,title:m.title,year:m.year,poster:m.poster,overview:m.overview,runtime:m.runtime},
                 pattern:{kind:'beginning'}, addToLog:true}}, '*');
  }

  /* ---- Join / Login flow -----------------------------------------------------
     The cube's Join/Login button hands off here. Pierre asks for an email first
     and branches: a known email logs in; a new email runs the intake (five
     favorites, three current, optional "waiting on"), then creates the account
     and populates the Log. TVMaze-validated picks. */
  let joinFlow=null, joinStep=0, joinPicks=[[],[],[]], joinEmail="";
  const JOIN_STEPS=[
    {key:"favorites", target:5, bubble:"Let's build your room. Drop five all time favorites, one at a time."},
    {key:"current",   target:3, bubble:"Nice. Now three you are watching this week."},
    {key:"future",    target:0, bubble:"Anything you are waiting on? Add a few, or say skip."}
  ];

  function enterJoinFlow(){
    addFlow=null; acctFlow=null; joinFlow='auth-email'; joinStep=0; joinPicks=[[],[],[]]; joinEmail="";
    history.length=0; log.innerHTML='';
    input.type='text'; input.placeholder="you@email.com";
    pierreSay(tod()+". New here or returning? Drop your email and I will know.");
  }
  async function joinAuthEmail(text){
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(text)){ input.focus(); pierreSay("That email looks off. Try again?"); return; }
    joinEmail=text.toLowerCase();
    showTyping();
    let user=null;
    try{ const r=await fetch(API+'/profile/'+encodeURIComponent(joinEmail)); if(r.ok){ user=(await r.json()).user; } }
    catch(e){}
    clearTyping();
    if(user){                          // returning member -> greet by name, ask password
      joinFlow='login-pw'; input.type='password'; input.placeholder='your password';
      pierreSay("Welcome back, "+(user.username||joinEmail)+". What's your password?");
      input.focus(); return;
    }
    // new email -> claim a spot (server enforces the 10-member cap; password set at the end)
    let res=null;
    try{ const r=await fetch(API+'/profile/signup',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:joinEmail, username:joinEmail.split('@')[0]})}); if(r.ok) res=await r.json(); }
    catch(e){}
    if(res && res.status==='member'){
      pgSet(joinEmail); joinFlow='picking'; joinStep=0;
      pierreSay("New here, and you made the cut. Let's build your room.");
      promptJoinStep(); return;
    }
    if(res && res.status==='waitlist'){
      joinFlow=null; input.blur(); input.placeholder="Ask Pierre what to watch...";
      pierreSay("We are full right now, the first ten are in. You are on the waitlist. Look around in demo mode, and text the team if you want a spot.");
      if(window.parent!==window) window.parent.postMessage({type:'pg-demo'}, '*');
      return;
    }
    pierreSay("Could not reach the front desk. I am a pangolin, the wires are past me sometimes. Try again, or get Ted?", tedChip());
  }
  async function joinLoginPw(text){
    showTyping();
    let ok=false;
    try{ const r=await fetch(API+'/profile/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:joinEmail, password:text})}); if(r.ok){ ok=(await r.json()).ok; } }
    catch(e){}
    clearTyping();
    if(ok){ pgSet(joinEmail); joinFlow=null; input.type='text'; input.placeholder="Ask Pierre what to watch...";
      pierreSay("In you go. Taking you to your profile."); setTimeout(()=>nav('profile'),1200); return; }
    pierreSay("That's not the password. Try again?"); input.focus();
  }
  function promptJoinStep(){
    const cfg=JOIN_STEPS[joinStep];
    input.placeholder="Type a show, one at a time";
    const have=joinPicks[joinStep].length, need=cfg.target;
    const count = need ? (have+" of "+need) : (have+" added, optional");
    const chips = need ? null : [{label:(have?'Done':'Skip'), onClick:advanceJoin}];
    pierreSay(cfg.bubble+"  ("+count+")", chips, true);
  }
  function advanceJoin(){
    joinStep++;
    if(joinStep>=JOIN_STEPS.length){ joinAskPassword(); return; }
    promptJoinStep();
  }
  function joinAskPassword(){
    joinFlow='set-pw'; input.type='password'; input.placeholder='create a password';
    pierreSay("Last thing. Set a password so you can get back in.");
    input.focus();
  }
  async function joinSetPw(text){
    if(text.length<4){ input.focus(); pierreSay("Make it at least 4 characters."); return; }
    showTyping();
    try{ await fetch(API+'/profile/signup',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:joinEmail, password:text})}); }catch(e){}
    clearTyping(); input.type='text';
    joinFinalize();
  }
  async function joinSearch(text){
    showTyping();
    let results=[];
    try{ const r=await fetch('https://api.tvmaze.com/search/shows?q='+encodeURIComponent(text)); results=r.ok?await r.json():[]; }
    catch(e){ results=null; }
    clearTyping();
    if(results===null){ pierreSay("Search hiccuped. I am a pangolin on a remote, so a small miracle it works at all. Try again?", tedChip(), true); return; }
    results=(results||[]).filter(x=>x&&x.show);
    if(!results.length){ pierreSay("I cannot find that one. Try the full title?", null, true); return; }
    const chosen=new Set(joinPicks[joinStep].map(p=>p.id));
    const cands=results.map(x=>x.show).filter(s=>!chosen.has(s.id)).slice(0,4);
    if(!cands.length){ pierreSay("Already on your list. Another?", null, true); return; }
    pierreSay("Which one?", cands.map(s=>({label:candLabel(s), onClick:()=>addJoinPick(s)})), true);
  }
  function addJoinPick(show){
    const cfg=JOIN_STEPS[joinStep];
    if(cfg.target && joinPicks[joinStep].length>=cfg.target) return;
    if(!joinPicks[joinStep].some(p=>p.id===show.id)) joinPicks[joinStep].push({id:show.id, name:show.name});
    input.focus();
    const have=joinPicks[joinStep].length, need=cfg.target;
    if(need && have>=need){ pierreSay("Got your "+need+"."); advanceJoin(); return; }
    pierreSay("Added "+show.name+". "+(need?(have+" of "+need+", keep going"):(have+" so far, add more or say skip")),
      need?null:[{label:'Done', onClick:advanceJoin}], true);
  }
  async function joinFinalize(){
    joinFlow=null; input.blur(); input.type='text'; input.placeholder="Ask Pierre what to watch...";
    const f=joinPicks[0].length, c=joinPicks[1].length, w=joinPicks[2].length;
    // Account was already created (and logged in) at the email step.
    // Populate the Log (and thereby Episodes) with the named shows.
    const out=[];
    joinPicks[0].forEach(s=>out.push({id:s.id,name:s.name,pattern:{kind:'live'}}));      // favorites: caught up
    joinPicks[1].forEach(s=>out.push({id:s.id,name:s.name,pattern:{kind:'beginning'}}));  // current
    joinPicks[2].forEach(s=>out.push({id:s.id,name:s.name,pattern:{kind:'beginning'}}));  // waiting
    if(out.length && window.parent!==window) window.parent.postMessage({type:'pierre:addToLog', shows:out}, '*');
    pierreSay("You're in. "+f+" favorites, "+c+" current, "+w+" waiting. Taking you to your Log now.");
    if(window.parent!==window) setTimeout(()=>nav('log'), 1400);
  }

  /* ---- Account flow: login / signup and add-device, backed by D1 ------------
     Email is the key (SEAM:identity, no password yet). Signup captures email,
     username, cell phone; the device skill captures type + location. Both write
     through the Worker /profile API and nudge the Profile face to refresh. */
  let acctFlow=null, acctThen=null, acctEmail='', acctUser='', pendDevType=null, pendDevLoc='', pendDevSupported=true;
  function pgSession(){ try{ return localStorage.getItem('pg_user')||''; }catch(_){ return ''; } }
  function pgSet(email){ try{ localStorage.setItem('pg_user',email); localStorage.setItem('pg_refresh',String(Date.now())); }catch(_){} }
  function pgRefresh(){ try{ localStorage.setItem('pg_refresh',String(Date.now())); }catch(_){} }
  function nav(face,payload){
    if(window.parent===window) return;
    if(typeof window.parent.cubeRotateTo==='function') window.parent.cubeRotateTo(face,payload||{});
    else window.parent.postMessage({type:'cube:rotateTo',face,payload:payload||{}},'*');
  }

  function enterLoginFlow(then){
    addFlow=null; joinFlow=null; acctThen=then||null; acctEmail=''; acctUser='';
    acctFlow='login-email'; history.length=0; log.innerHTML='';
    input.placeholder='you@email.com';
    pierreSay(tod()+". Let's set you up. What email should I use?");
  }
  function enterDeviceFlow(){
    addFlow=null; joinFlow=null;
    if(pgSession()){ log.innerHTML=''; pierreSay(tod()+". Let's connect a device."); deviceTypePrompt(); }
    else enterJoinFlow();   // must log in first (password-aware JOIN flow)
  }
  function deviceTypePrompt(){
    acctFlow='dev-type';
    pierreSay("What are we connecting?", [
      {label:'LG TV',            onClick:()=>pickDevType('LG TV', true)},
      {label:'Amazon Fire Cube', onClick:()=>pickDevType('Amazon Fire Cube', true)},
      {label:'Other',            onClick:()=>pickDevType('Other', false)}
    ], true);
  }
  // Supported types go straight into the picker. "Other" is collected against
  // the profile so we can size demand and reach out once we can drive it.
  function pickDevType(t, supported){
    pendDevType=t; pendDevSupported=supported;
    if(!supported){
      acctFlow='dev-other'; input.placeholder='e.g. Roku, Apple TV, Samsung TV';
      pierreSay("I can't drive that one just yet — but tell me exactly what it is and I'll note it against your profile. The more people ask for a device, the sooner I learn it.");
      input.focus(); return;
    }
    acctFlow='dev-location'; input.placeholder='e.g. living room';
    pierreSay("Where does the "+t+" live?"); input.focus();
  }
  async function storeDevice(ip){
    const email=pgSession();
    showTyping();
    try{
      const r=await fetch(API+'/profile/'+encodeURIComponent(email)+'/devices',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:pendDevType, location:pendDevLoc, ip:ip||undefined, supported:pendDevSupported})});
      clearTyping(); if(!r.ok) throw 0; pgRefresh();
    }catch(e){ clearTyping(); pierreSay("Could not store that device. Try again, or get Ted?", tedChip()); return; }
    acctFlow=null; input.placeholder='Ask Pierre what to watch...';
    if(pendDevSupported)
      pierreSay("Done. "+pendDevType+" in "+pendDevLoc+", saved to your account. Taking you to your profile.");
    else
      pierreSay("Got it down — "+pendDevType+", on file. I'll reach out the moment I can drive it. Taking you to your profile.");
    setTimeout(()=>nav('profile'),1400);
  }

  async function acctStep(text){
    if(acctFlow==='login-email'){
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(text)){ input.focus(); pierreSay("That email looks off. Try again?"); return; }
      acctEmail=text.toLowerCase(); acctFlow='login-username'; input.placeholder='your name';
      pierreSay("Got it. What should I call you?"); input.focus(); return;
    }
    if(acctFlow==='login-username'){
      acctUser=text; acctFlow='login-phone'; input.placeholder='cell number';
      pierreSay("And a cell number, so I can ping you when a show you are waiting on comes back?"); input.focus(); return;
    }
    if(acctFlow==='login-phone'){
      showTyping();
      try{
        const r=await fetch(API+'/profile/signup',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({email:acctEmail, username:acctUser, phone:text})});
        clearTyping(); if(!r.ok) throw 0; pgSet(acctEmail);
      }catch(e){ clearTyping(); pierreSay("Could not save that just now. The database is past me sometimes, I am only a pangolin. Try again, or get Ted?", tedChip()); return; }
      if(acctThen==='device'){ acctThen=null; pierreSay("You're in, "+acctUser+"."); deviceTypePrompt(); return; }
      acctFlow=null; input.placeholder='Ask Pierre what to watch...';
      pierreSay("You're in, "+acctUser+". Taking you to your profile.");
      setTimeout(()=>nav('profile'),1200); return;
    }
    if(acctFlow==='dev-other'){
      pendDevType=text;                       // the device they actually named
      acctFlow='dev-location'; input.placeholder='e.g. living room';
      pierreSay("Noted: "+text+". Where does it live?"); input.focus(); return;
    }
    if(acctFlow==='dev-location'){
      pendDevLoc=text;
      if(pendDevSupported){
        acctFlow='dev-ip'; input.placeholder='e.g. 192.168.1.42  (or skip)';
        pierreSay("Last thing — what's its IP address on your network? It's in the device's network settings. Type skip and I'll ask later.");
        input.focus(); return;
      }
      return storeDevice('');                  // unsupported: nothing to drive yet
    }
    if(acctFlow==='dev-ip'){
      return storeDevice(/^skip$/i.test(text.trim()) ? '' : text.trim());
    }
  }

  window.addEventListener('message',(e)=>{
    if(e.data && e.data.type==='cube:payload' && e.data.face==='pierre'){
      if(IS_DEMO) return;   // demo: Pierre's flows are off
      const p=e.data.payload||{};
      if(p.intent==='add') enterAddFlow(p.history||[]);
      else if(p.intent==='join') enterJoinFlow();
      else if(p.intent==='login') enterJoinFlow();
      else if(p.intent==='device') enterDeviceFlow();
      else if(p.intent==='note') enterNoteFlow(p);
      else if(p.intent==='episode-finish') enterEpisodeFinishFlow(p.launch);
      else if(p.intent==='season-note') enterSeasonNoteFlow(p);
    }
  });

  /* Pierre opens. Seed line so the room is never empty. Yours to rewrite. */
  window.addEventListener('load', ()=>{
    if (IS_DEMO) {
      addPierre("Evening. I am Pierre. I am off the clock for this demo, so the chat is closed. Have a look around the other faces.");
      input.disabled = true; send.disabled = true; input.placeholder = "chat closed for the demo";
      return;
    }
    addPierre("Evening. I am Pierre. Tell me what you are in the mood for and I will keep your queue moving. Or just tell me what you watched last, I have opinions.");
    // Standalone only. When embedded in the cube, the parent focuses this input
    // inside the selecting gesture so iOS raises the keyboard (a load-time focus
    // here would pre-focus it and suppress that).
    if (window.parent === window) input.focus();
  });

  // ── embedded in cube face ──
  if (window.parent !== window) {
    // fill the face square
    document.documentElement.style.height = '100%';
    document.body.style.cssText += ';padding:0;min-height:100%;height:100%;';
    const face = document.querySelector('.face');
    if (face) {
      face.style.width = '100%';
      face.style.height = '100%';
      face.style.aspectRatio = 'unset';
      face.style.borderRadius = '0';
    }

    // Keyboard lock: with the chat open, iOS pans the page to keep the input
    // visible, which slides the whole face (and the cube behind it) up and down.
    // Pin the page so only the message log scrolls — the parent already keeps
    // this square glued above the keyboard.
    document.documentElement.style.cssText += ';overflow:hidden;overscroll-behavior:none;';
    document.body.style.cssText += ';overflow:hidden;overscroll-behavior:none;position:fixed;inset:0;';
    if (log) { log.style.overscrollBehavior = 'contain'; log.style.touchAction = 'pan-y'; }

    // iOS decides at the first touchmove whether a gesture scrolls, and it ignores
    // overscroll-behavior — so we nudge the log a hair off its exact top/bottom
    // edge as each drag begins. That keeps native momentum scrolling working while
    // never letting the overscroll chain out to the page (which drags the cube).
    document.addEventListener('touchstart', (ev) => {
      if (ev.touches.length !== 1 || !log) return;
      const max = log.scrollHeight - log.clientHeight;
      if (max <= 0) return;                                           // nothing to scroll
      if (log.scrollTop <= 0)        log.scrollTop = 1;
      else if (log.scrollTop >= max) log.scrollTop = max - 1;
    }, { passive: true });

    document.addEventListener('touchmove', (ev) => {
      if (ev.touches.length > 1) return;                              // leave pinch-to-exit alone
      const inLog     = ev.target.closest && ev.target.closest('.log');
      const canScroll = log && (log.scrollHeight - log.clientHeight > 1);
      if (inLog && canScroll) return;                                 // real overrun → let it scroll
      ev.preventDefault();                                            // no overrun / outside log → swallow
    }, { passive: false });

    // (no back button — pinch or double-tap exits the chat)

    // pinch-to-exit
    let _pinchStart = 0, _pinchActive = false;
    document.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        _pinchStart = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
        _pinchActive = true;
      }
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      if (!_pinchActive || e.touches.length < 2) return;
      const d = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
      if (d < _pinchStart * 0.72) {
        _pinchActive = false;
        window.parent.postMessage({type:'pangolin-back'}, '*');
      }
    }, { passive: true });
    document.addEventListener('touchend', () => { _pinchActive = false; }, { passive: true });

    // double-tap Pierre art to exit
    let _dblTap = 0;
    const art = document.getElementById('art');
    if (art) {
      art.addEventListener('click', () => {
        const now = Date.now();
        if (now - _dblTap < 350) { window.parent.postMessage({type:'pangolin-back'}, '*'); _dblTap = 0; }
        else _dblTap = now;
      });
    }
    // double-tap empty chat area to exit too
    let _dt2 = 0;
    document.addEventListener('click', e => {
      if (e.target.closest('button,a,input,textarea,select,label,[role=button],.chip,.chips,.send')) { _dt2 = 0; return; }
      const n = Date.now(); if (n - _dt2 < 350) { _dt2 = 0; window.parent.postMessage({type:'pangolin-back'}, '*'); } else _dt2 = n;
    }, true);
  }
</script>
</body>
</html>
