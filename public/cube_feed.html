<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --base:#17120e; --panel:#211a13; --panel-2:#2b2218; --line:#3a2f22;
    --amber:#e89f3d; --text:#f3ebe0; --muted:#a7967f;
    --display:"Space Grotesk",system-ui,sans-serif; --body:"Inter",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0c0907}
  body{display:flex;align-items:center;justify-content:center;padding:16px;font-family:var(--body);color:var(--text)}
  .face{position:relative;width:min(92vw,420px);height:min(92vw,420px);
    background:radial-gradient(120% 80% at 50% -10%, #241b12 0%, var(--base) 60%);
    border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column}
  .head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;flex-shrink:0}
  .label{font-family:var(--mono);font-size:12px;letter-spacing:.18em;color:var(--muted)}
  .badge{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--amber);border:1px solid var(--line);padding:3px 8px;border-radius:999px}
  .body{flex:1;overflow:auto;padding:6px 14px 14px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  /* activity card: who / what / when / where — light clipping on the dark face */
  .card{display:flex;align-items:stretch;gap:10px;background:linear-gradient(160deg,#fbf6ef,#f1e6d6);color:#1c1a17;
    border-radius:14px;padding:11px 11px 11px 5px;margin-top:11px;overflow:hidden;box-shadow:0 10px 24px -16px rgba(0,0,0,.8)}
  .card:first-child{margin-top:2px}
  .c-date{writing-mode:vertical-rl;transform:rotate(180deg);font-family:var(--mono);font-size:8px;font-weight:600;
    letter-spacing:.06em;color:#6b5f4f;text-align:center;flex:0 0 auto;padding:2px 0}
  .c-av{width:44px;height:44px;border-radius:12px;flex:0 0 auto;align-self:center;background:linear-gradient(160deg,#caa46f,#7a5a3a)
    center/cover;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:16px;color:#1c1a17}
  .c-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px}
  .c-who{font-family:var(--display);font-weight:700;font-size:14px;line-height:1.1;display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
  .c-rel{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:#6b5f4f;border:1px solid #d8c7ad;border-radius:999px;padding:1px 6px}
  .c-rel.friend{color:#1c1a17;border-color:#caa46f;background:#f0e2cb}
  .c-head{font-family:var(--display);font-weight:600;font-size:12.5px;line-height:1.2;color:#3a342b}
  .c-quote{font-family:var(--display);font-weight:700;font-size:12.5px;line-height:1.2}
  .c-poster{width:42px;height:58px;border-radius:6px;flex:0 0 auto;align-self:center;background:#16110d center/cover;
    box-shadow:0 5px 12px rgba(0,0,0,.28)}
  .empty{border:1px dashed var(--line);border-radius:12px;padding:18px;color:var(--muted);font-size:13px;line-height:1.55;margin-top:8px}
  .empty b{color:var(--text);font-weight:600}
  /* Floating cube — back to cube navigation (shared across trunk sides) */
  .cubeback{ position:fixed; right:16px; bottom:16px; z-index:60;
    width:46px; height:46px; border:0; background:rgba(10,12,16,.55);
    border-radius:13px; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    box-shadow:0 4px 14px rgba(0,0,0,.4); cursor:pointer; opacity:.5;
    display:flex; align-items:center; justify-content:center;
    perspective:120px; -webkit-tap-highlight-color:transparent;
    transition:transform .12s ease, background .12s ease, opacity .15s ease; }
  .cubeback:hover{ background:rgba(20,24,30,.7); opacity:1; }
  .cubeback:active{ transform:scale(.9); }
  .cb-cube{ position:relative; width:20px; height:20px; transform-style:preserve-3d;
    transform:rotateX(-22deg) rotateY(-38deg); animation:cbspin 11s linear infinite; }
  @keyframes cbspin{ from{ transform:rotateX(-22deg) rotateY(0deg); }
                     to  { transform:rotateX(-22deg) rotateY(360deg); } }
  .cb-face{ position:absolute; width:20px; height:20px; box-sizing:border-box;
    border:1.5px solid var(--amber, #f0a93b); background:rgba(240,169,59,.12); }
  .cb-front { transform:translateZ(10px);                 background:rgba(240,169,59,.16); }
  .cb-back  { transform:rotateY(180deg) translateZ(10px); background:rgba(240,169,59,.08); }
  .cb-right { transform:rotateY(90deg)  translateZ(10px); background:rgba(240,169,59,.06); }
  .cb-left  { transform:rotateY(-90deg) translateZ(10px); background:rgba(240,169,59,.10); }
  .cb-top   { transform:rotateX(90deg)  translateZ(10px); background:rgba(240,169,59,.24); }
  .cb-bottom{ transform:rotateX(-90deg) translateZ(10px); background:rgba(240,169,59,.04); }
</style>
</head>
<body>
<div class="face">
  <div class="head"><span class="label">FEED</span><span class="badge">ACTIVITY</span></div>
  <div class="body" id="feed"></div>
</div>
<script>
// FEED posts the who / what / when / where of REAL activity: the member's own
// watch log (server truth from /profile/{email}/watch), newest first. No composer —
// every card is a real event you generated by finishing / watching / logging a show.
const API = location.hostname === 'localhost' ? 'http://localhost:8787'
          : 'https://pangolin-rc.edward-m-willett.workers.dev';
const _esc  = s => String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const acct  = () => { try{ return localStorage.getItem('pg_user')||''; }catch(_){ return ''; } };
const uname = () => { try{ return (localStorage.getItem('pg_username')||'').trim(); }catch(_){ return ''; } };
function pad2(n){ n = parseInt(n,10); if(isNaN(n)) return ''; return (n<10?'0':'')+n; }
function verbFor(status, kind){
  const s = String(status||'').toLowerCase();
  if(kind === 'movie'){
    switch(s){
      case 'completed': return 'watched';
      case 'comfort':   return 'is rewatching';
      case 'stopped':   return 'bailed on';
      default:          return 'is watching';
    }
  }
  switch(s){
    case 'completed': return 'finished';
    case 'comfort':   return 'is rewatching';
    case 'stopped':   return 'stopped';
    case 'returning': return 'caught up on';
    case 'current':   return 'is watching';
    default:          return 'is logging';
  }
}
function fmtDate(ts){
  let n = Number(ts); if(!n) return ''; if(n < 1e12) n *= 1000;   // seconds → ms
  const d = new Date(n); if(isNaN(d.getTime())) return '';
  const wd = ['Sun','Mon','Tues','Wed','Thurs','Fri','Sat'][d.getDay()];
  const mo = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()];
  return `${wd}, ${d.getDate()} ${mo} ${d.getFullYear()}`;
}
function feedCard(it){
  const ep = it.ep ? (_esc(it.ep) + ' of ') : '';
  const chip = it.rel === 'friend' ? '<span class="c-rel friend">friend</span>'
             : it.rel === 'following' ? '<span class="c-rel">following</span>' : '';
  return `<div class="card">
    <div class="c-date">${_esc(it.date)}</div>
    <div class="c-av">${_esc((it.who||'?').charAt(0).toUpperCase())}</div>
    <div class="c-body">
      <div class="c-who">${_esc(it.who)}${chip}</div>
      <div class="c-head">${_esc(it.verb)} ${ep}<b>${_esc(it.show)}</b><span class="c-where"></span></div>
    </div>
    <div class="c-poster"></div>
  </div>`;
}
function emptyState(msg){ return `<div class="empty"><b>Activity posts here.</b><br>${_esc(msg)}</div>`; }

const _meta = {};   // show_id -> { img, where }  (TVMaze: poster + streamer)
async function showMeta(id){
  if(id == null) return null;
  if(_meta[id] !== undefined) return _meta[id];
  try{
    // A film: poster comes from TMDB (our proxy), not TVmaze.
    if(String(id).startsWith('tmdb:')){
      const rid = String(id).replace(/^tmdb:/, '');
      const r = await fetch(API + '/tmdb/movie/' + encodeURIComponent(rid));
      if(!r.ok){ _meta[id] = null; return null; }
      const d = await r.json();
      _meta[id] = { img:(d.movie && d.movie.poster) || '', where:'' };
      return _meta[id];
    }
    const r = await fetch('https://api.tvmaze.com/shows/' + encodeURIComponent(id));
    if(!r.ok){ _meta[id] = null; return null; }
    const d = await r.json();
    _meta[id] = { img:(d.image && (d.image.medium || d.image.original)) || '',
                  where:(d.network && d.network.name) || (d.webChannel && d.webChannel.name) || '' };
  }catch(_){ _meta[id] = null; }
  return _meta[id];
}

let _loading = false;
async function loadFeed(){
  const el = document.getElementById('feed'); if(!el || _loading) return;
  _loading = true;
  try{
    const email = acct();
    if(!email){ el.innerHTML = emptyState('Sign in and your feed — yours, friends’, and people you follow — shows up here.'); return; }
    let feed = [];
    try{ const r = await fetch(API + '/profile/' + encodeURIComponent(email) + '/feed');
      if(r.ok){ const d = await r.json(); feed = (d && d.feed) || []; } }catch(_){}
    if(!feed.length){ el.innerHTML = emptyState('No activity yet. Follow people in Profile, or log a show — yours and theirs lands here. Nothing faked.'); return; }
    const me = uname() || 'You';
    const items = feed.map(row => ({
      who: row.relationship === 'self' ? me : (row.actor || String(row.actor_email||'').split('@')[0] || 'Someone'),
      rel: row.relationship, verb: verbFor(row.status, row.kind),
      ep: (row.kind !== 'movie' && row.last_season && row.last_number) ? ('S' + pad2(row.last_season) + 'E' + pad2(row.last_number)) : '',
      show: row.show_name || (row.kind === 'movie' ? 'a film' : 'a show'), date: fmtDate(row.updated_at), id: row.show_id
    }));
    el.innerHTML = items.map(feedCard).join('');
    const cards = el.querySelectorAll('.card');
    items.forEach(async (it, i) => {
      const meta = await showMeta(it.id), card = cards[i]; if(!meta || !card) return;
      if(meta.img){ const p = card.querySelector('.c-poster'); if(p) p.style.backgroundImage = `url('${meta.img}')`; }
      if(meta.where){ const w = card.querySelector('.c-where'); if(w) w.textContent = ' on ' + meta.where; }
    });
  } finally { _loading = false; }
}
loadFeed();
// The shell nudges FEED when the log changes (a show logged/finished on another face).
window.addEventListener('message', e => {
  const t = e.data && e.data.type;
  if(t === 'feed:refresh' || (t === 'cube:payload' && e.data.face === 'feed')) loadFeed();
});

if (window.parent !== window) {
  document.documentElement.style.height = "100%";
  document.body.style.padding = "0";
  document.body.style.height = "100%";
  document.body.style.alignItems = "stretch";
  const face = document.querySelector(".face");
  if (face) {
    face.style.width = "100%"; face.style.height = "100%"; face.style.borderRadius = "0"; face.style.border = "0";
    // Back navigation is the floating cube button only (double-tap / pinch removed).
  }
}
// Floating cube → back to cube navigation (delegated so DOM order doesn't matter).
document.addEventListener('click', function(e){
  if(e.target.closest && e.target.closest('#cubeBack') && window.parent!==window)
    window.parent.postMessage({type:'pangolin-back'},'*');
});
</script>
  <!-- Floating cube: back to cube navigation -->
  <button class="cubeback" id="cubeBack" aria-label="Back to cube">
    <span class="cb-cube">
      <span class="cb-face cb-front"></span><span class="cb-face cb-back"></span>
      <span class="cb-face cb-right"></span><span class="cb-face cb-left"></span>
      <span class="cb-face cb-top"></span><span class="cb-face cb-bottom"></span>
    </span>
  </button>
</body>
</html>
